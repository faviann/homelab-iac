# Tasks to validate Proxmox API connectivity. Included dynamically so validation
# logic can be reused from multiple playbooks while keeping tag scoping precise.

# ============================================================================
# Phase 1: Inventory-Internal Validation (Pre-API)
# ============================================================================

- name: Ensure all LXC hosts have defined VMIDs
  ansible.builtin.assert:
    that:
      - hostvars[item].proxmox_lxc_overrides is defined
      - hostvars[item].proxmox_lxc_overrides.vmid is defined
      - hostvars[item].proxmox_lxc_overrides.vmid | string | length > 0
    fail_msg: >-
      Host '{{ item }}' is missing proxmox_lxc_overrides.vmid in inventory/host_vars/{{ item }}.yml.
      All LXC hosts in the 'lxcs' group must define a unique VMID.
    quiet: true
  loop: "{{ groups['lxcs'] | default([]) }}"
  tags:
    - validation
    - proxmox

- name: Initialize inventory VMID mapping (vmid -> hosts)
  ansible.builtin.set_fact:
    inventory_vmid_map: {}
  tags:
    - validation
    - proxmox

- name: Build inventory VMID mapping (vmid -> hosts)
  ansible.builtin.set_fact:
    inventory_vmid_map: "{{ inventory_vmid_map | combine({vmid: (inventory_vmid_map[vmid] | default([])) + [item]}) }}"
  vars:
    vmid: "{{ hostvars[item].proxmox_lxc_overrides.vmid | string }}"
  loop: "{{ groups['lxcs'] | default([]) }}"
  tags:
    - validation
    - proxmox

- name: Validate inventory VMID mapping type
  ansible.builtin.assert:
    that:
      - inventory_vmid_map is mapping
    fail_msg: >-
      Internal validation error: inventory_vmid_map must be a dictionary but got
      {{ inventory_vmid_map | type_debug }}. This usually indicates a templating/rendering issue.
    quiet: true
  tags:
    - validation
    - proxmox

- name: Detect duplicate VMIDs across inventory
  ansible.builtin.set_fact:
    inventory_duplicate_vmids: "{{ inventory_vmid_map | dict2items | selectattr('value', 'length', 'gt', 1) | list }}"
  tags:
    - validation
    - proxmox

- name: Fail if duplicate VMIDs exist in inventory
  ansible.builtin.fail:
    msg: |
      CRITICAL: Duplicate VMID assignments detected in inventory!
      
      The following VMIDs are assigned to multiple hosts:
      {% for dup in inventory_duplicate_vmids %}
      VMID {{ dup.key }} assigned to: {{ dup.value | map('regex_replace', '^(.*)$', '\\1 (inventory/host_vars/\\1.yml)') | join(', ') }}
      {% endfor %}
      
      Fix these conflicts in inventory/host_vars/*.yml before proceeding.
      Each VMID must be unique across all LXC hosts.
  when:
    - inventory_duplicate_vmids | length > 0
  tags:
    - validation
    - proxmox

# ============================================================================
# Phase 2: Proxmox API Validation
# ============================================================================

- name: Ensure required API inputs are available
  ansible.builtin.assert:
    that:
      - proxmox_api_host is defined
      - proxmox_api_user is defined
      - proxmox_api_token_id is defined
      - proxmox_api_token_secret is defined
      - proxmox_default_node is defined
    fail_msg: "Missing Proxmox API configuration. Check group_vars/all/proxmox.yml and vault secrets."
  tags:
    - validation
    - proxmox

- name: Query LXC inventory on default node
  ansible.builtin.uri:
    url: "https://{{ proxmox_api_host }}:{{ proxmox_api_port | default(8006) }}/api2/json/nodes/{{ proxmox_default_node }}/lxc"
    method: GET
    headers:
      # The syntax of PVEAPIToken=USER@REALM!TOKEN_NAME=TOKEN_SECRET
      Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_verify_ssl | default(true) | bool }}"
    status_code: 200
  register: proxmox_lxc_inventory_response
  changed_when: false
  no_log: true
  tags:
    - validation
    - proxmox

- name: Summarize managed containers
  ansible.builtin.debug:
    msg: >-
      Found {{ proxmox_lxc_inventory_response.json.data | length | default(0) }} containers on node {{ proxmox_default_node }}.
  when:
    - proxmox_lxc_inventory_response is defined
    - proxmox_lxc_inventory_response.json is defined
    - proxmox_lxc_inventory_response.json.data is defined
  tags:
    - validation
    - proxmox

- name: Capture defined and existing LXC names
  ansible.builtin.set_fact:
    proxmox_defined_lxcs: "{{ groups['lxcs'] | default([]) }}"
    proxmox_existing_lxcs: "{{ (proxmox_lxc_inventory_response.json.data | default([])) | map(attribute='name') | list }}"
    cacheable: true
  when:
    - proxmox_lxc_inventory_response.json is defined
    - proxmox_lxc_inventory_response.json.data is defined
  tags:
    - validation
    - proxmox

- name: Identify statically defined LXCs missing in Proxmox
  ansible.builtin.set_fact:
    proxmox_missing_lxcs: "{{ (proxmox_defined_lxcs | default([])) | difference(proxmox_existing_lxcs | default([])) }}"
    cacheable: true
  when: proxmox_defined_lxcs is defined
  tags:
    - validation
    - proxmox

- name: Warn when statically defined LXCs are absent in Proxmox
  ansible.builtin.debug:
    msg: "The following LXCs are missing in Proxmox: {{ proxmox_missing_lxcs }}"
  when:
    - proxmox_missing_lxcs | default([]) | length > 0
  tags:
    - validation
    - proxmox

- name: Assert all statically defined LXCs exist in Proxmox when enforcement enabled
  ansible.builtin.assert:
    that:
      - proxmox_missing_lxcs | default([]) | length == 0
    success_msg: "All statically defined LXCs are present in Proxmox"
    fail_msg: "Missing LXCs in Proxmox: {{ proxmox_missing_lxcs }}"
  when:
    - proxmox_missing_lxcs is defined
    - (proxmox_validation_enforce_existing | default(false)) | bool
  tags:
    - validation
    - proxmox
