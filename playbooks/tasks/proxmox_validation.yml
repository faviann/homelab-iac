# Tasks to validate Proxmox API connectivity. Included dynamically so validation
# logic can be reused from multiple playbooks while keeping tag scoping precise.

# ============================================================================
# Phase 1: Inventory-Internal Validation (Pre-API)
# ============================================================================

- name: Ensure all LXC hosts have defined VMIDs
  ansible.builtin.assert:
    that:
      - hostvars[item].proxmox_lxc_overrides is defined
      - hostvars[item].proxmox_lxc_overrides.vmid is defined
      - hostvars[item].proxmox_lxc_overrides.vmid | string | length > 0
    fail_msg: >-
      Host '{{ item }}' is missing proxmox_lxc_overrides.vmid in inventory/host_vars/{{ item }}.yml.
      All LXC hosts in the 'lxcs' group must define a unique VMID.
    quiet: true
  loop: "{{ groups['lxcs'] | default([]) }}"
  tags:
    - validation
    - proxmox

- name: Ensure Traefik-integrated Docker hosts define default_domain
  ansible.builtin.assert:
    that:
      - hostvars[item].default_domain is defined
      - (hostvars[item].default_domain | string | length) > 0
    fail_msg: >-
      Host '{{ item }}' has Traefik-integrated Docker agents enabled but is missing
      `default_domain` in inventory/host_vars/{{ item }}.yml.
      Define `default_domain` (or explicitly set `traefik_kop_enabled: false` for opt-out hosts).
    quiet: true
  loop: "{{ groups['cap_docker'] | default([]) }}"
  when:
    - (hostvars[item].docker_agents_enabled | default(true)) | bool
    - (hostvars[item].traefik_kop_enabled | default(true)) | bool
  tags:
    - validation
    - proxmox

- name: Build inventory VMID to hostnames mapping
  ansible.builtin.set_fact:
    inventory_vmid_map: "{% set vmid_dict = {} %}{% for host in groups['lxcs'] | default([]) %}{% set vmid = hostvars[host].proxmox_lxc_overrides.vmid | string %}{% if vmid in vmid_dict %}{% set _ = vmid_dict[vmid].append(host) %}{% else %}{% set _ = vmid_dict.update({vmid: [host]}) %}{% endif %}{% endfor %}{{ vmid_dict }}"
  tags:
    - validation
    - proxmox

- name: Detect duplicate VMIDs across inventory
  ansible.builtin.set_fact:
    inventory_duplicate_vmids: >-
      {%- set duplicates = [] -%}
      {%- for item in inventory_vmid_map | dict2items -%}
        {%- if item.value | length > 1 -%}
          {%- set _ = duplicates.append(item) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ duplicates }}
  tags:
    - validation
    - proxmox

- name: Fail if duplicate VMIDs exist in inventory
  ansible.builtin.fail:
    msg: |
      CRITICAL: Duplicate VMID assignments detected in inventory!
      
      The following VMIDs are assigned to multiple hosts:
      {% for dup in inventory_duplicate_vmids %}
      VMID {{ dup.key }} assigned to: {{ dup.value | join(', ') }}
      {% endfor %}
      
      Fix these conflicts in inventory/host_vars/*.yml before proceeding.
      Each VMID must be unique across all LXC hosts.
  when:
    - inventory_duplicate_vmids | length > 0
  tags:
    - validation
    - proxmox

# ============================================================================
# Phase 2: Proxmox API Validation
# ============================================================================

- name: Ensure required API inputs are available
  ansible.builtin.assert:
    that:
      - proxmox_api_host is defined
      - proxmox_api_user is defined
      - proxmox_api_token_id is defined
      - proxmox_api_token_secret is defined
      - proxmox_default_node is defined
    fail_msg: "Missing Proxmox API configuration. Check group_vars/all/proxmox.yml and vault secrets."
  tags:
    - validation
    - proxmox

- name: Query LXC inventory on default node
  ansible.builtin.uri:
    url: "https://{{ proxmox_api_host }}:{{ proxmox_api_port | default(8006) }}/api2/json/nodes/{{ proxmox_default_node }}/lxc"
    method: GET
    headers:
      # The syntax of PVEAPIToken=USER@REALM!TOKEN_NAME=TOKEN_SECRET
      Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_verify_ssl | default(true) | bool }}"
    status_code: 200
  register: proxmox_lxc_inventory_response
  changed_when: false
  no_log: true
  tags:
    - validation
    - proxmox

- name: Summarize managed containers
  ansible.builtin.debug:
    msg: >-
      Found {{ proxmox_lxc_inventory_response.json.data | length | default(0) }} containers on node {{ proxmox_default_node }}.
  when:
    - proxmox_lxc_inventory_response is defined
    - proxmox_lxc_inventory_response.json is defined
    - proxmox_lxc_inventory_response.json.data is defined
  tags:
    - validation
    - proxmox

- name: Capture defined and existing LXC names
  ansible.builtin.set_fact:
    proxmox_defined_lxcs: "{{ groups['lxcs'] | default([]) }}"
    proxmox_existing_lxcs: "{{ (proxmox_lxc_inventory_response.json.data | default([])) | map(attribute='name') | list }}"
    cacheable: true
  when:
    - proxmox_lxc_inventory_response.json is defined
    - proxmox_lxc_inventory_response.json.data is defined
  tags:
    - validation
    - proxmox

- name: Identify statically defined LXCs missing in Proxmox
  ansible.builtin.set_fact:
    proxmox_missing_lxcs: "{{ (proxmox_defined_lxcs | default([])) | difference(proxmox_existing_lxcs | default([])) }}"
    cacheable: true
  when: proxmox_defined_lxcs is defined
  tags:
    - validation
    - proxmox

- name: Warn when statically defined LXCs are absent in Proxmox
  ansible.builtin.debug:
    msg: "The following LXCs are missing in Proxmox: {{ proxmox_missing_lxcs }}"
  when:
    - proxmox_missing_lxcs | default([]) | length > 0
  tags:
    - validation
    - proxmox

- name: Assert all statically defined LXCs exist in Proxmox when enforcement enabled
  ansible.builtin.assert:
    that:
      - proxmox_missing_lxcs | default([]) | length == 0
    success_msg: "All statically defined LXCs are present in Proxmox"
    fail_msg: "Missing LXCs in Proxmox: {{ proxmox_missing_lxcs }}"
  when:
    - proxmox_missing_lxcs is defined
    - (proxmox_validation_enforce_existing | default(false)) | bool
  tags:
    - validation
    - proxmox

# ============================================================================
# Phase 3: VMID/Name Mismatch Detection
# ============================================================================

- name: Build Proxmox VMID to name lookup map
  ansible.builtin.set_fact:
    proxmox_vmid_to_name: "{% set lookup = {} %}{% for container in proxmox_lxc_inventory_response.json.data | default([]) %}{% set _ = lookup.update({container.vmid | string: container.name | string}) %}{% endfor %}{{ lookup }}"
  tags:
    - validation
    - proxmox

- name: Build Proxmox name to VMID lookup map
  ansible.builtin.set_fact:
    proxmox_name_to_vmid: "{% set lookup = {} %}{% for container in proxmox_lxc_inventory_response.json.data | default([]) %}{% set _ = lookup.update({container.name | string: container.vmid | string}) %}{% endfor %}{{ lookup }}"
  tags:
    - validation
    - proxmox

- name: Compare inventory expectations with Proxmox reality
  ansible.builtin.set_fact:
    lxc_validation_results: "{% set results = {} %}{% for host in groups['lxcs'] | default([]) %}{% set expected_vmid = hostvars[host].proxmox_lxc_overrides.vmid | string %}{% set expected_name = hostvars[host].proxmox_lxc_overrides.hostname | default(host) | string %}{% set actual_name_for_vmid = proxmox_vmid_to_name.get(expected_vmid, None) %}{% set actual_vmid_for_name = proxmox_name_to_vmid.get(expected_name, None) %}{% set result = {'status': 'ok', 'type': 'unknown', 'inventory': {'vmid': expected_vmid, 'name': expected_name}, 'proxmox': {}, 'message': '', 'remediation': []} %}{% if actual_name_for_vmid is none and actual_vmid_for_name is none %}{% set _ = result.update({'type': 'absent_ok', 'message': 'Container does not exist in Proxmox (will be created)'}) %}{% elif actual_name_for_vmid == expected_name and actual_vmid_for_name == expected_vmid %}{% set _ = result.update({'type': 'match_ok', 'message': 'VMID and name match Proxmox state'}) %}{% set _ = result['proxmox'].update({'vmid': expected_vmid, 'name': expected_name}) %}{% elif actual_name_for_vmid is not none and actual_name_for_vmid != expected_name and actual_vmid_for_name is none %}{% set _ = result.update({'status': 'mismatch', 'type': 'id_match_name_mismatch'}) %}{% set _ = result.update({'message': \"Host '\" + host + \"': Inventory expects [vmid=\" + expected_vmid + \", name=\" + expected_name + \"], but Proxmox shows [vmid=\" + expected_vmid + \", name=\" + actual_name_for_vmid + \"] - ID match, name mismatch\"}) %}{% set _ = result['proxmox'].update({'vmid': expected_vmid, 'name': actual_name_for_vmid}) %}{% set _ = result['remediation'].append('Fix inventory name in inventory/host_vars/' + host + '.yml to match Proxmox: ' + actual_name_for_vmid) %}{% set _ = result['remediation'].append('OR rename container in Proxmox: pct set ' + expected_vmid + ' -hostname ' + expected_name) %}{% set _ = result['remediation'].append('OR destroy conflicting container: pct destroy ' + expected_vmid) %}{% elif actual_vmid_for_name is not none and actual_vmid_for_name != expected_vmid and actual_name_for_vmid is none %}{% set _ = result.update({'status': 'mismatch', 'type': 'name_match_id_mismatch'}) %}{% set _ = result.update({'message': \"Host '\" + host + \"': Inventory expects [vmid=\" + expected_vmid + \", name=\" + expected_name + \"], but Proxmox shows [vmid=\" + actual_vmid_for_name + \", name=\" + expected_name + \"] - Name match, ID mismatch\"}) %}{% set _ = result['proxmox'].update({'vmid': actual_vmid_for_name, 'name': expected_name}) %}{% set _ = result['remediation'].append('Fix inventory VMID in inventory/host_vars/' + host + '.yml to match Proxmox: ' + actual_vmid_for_name) %}{% set _ = result['remediation'].append('OR destroy conflicting container: pct destroy ' + actual_vmid_for_name) %}{% elif actual_name_for_vmid is not none and actual_vmid_for_name is not none and (actual_name_for_vmid != expected_name or actual_vmid_for_name != expected_vmid) %}{% set _ = result.update({'status': 'mismatch', 'type': 'cross_mismatch'}) %}{% set _ = result.update({'message': \"Host '\" + host + \"': Inventory expects [vmid=\" + expected_vmid + \", name=\" + expected_name + \"], but Proxmox shows [vmid=\" + expected_vmid + \" has name=\" + actual_name_for_vmid + \", name=\" + expected_name + \" has vmid=\" + actual_vmid_for_name + \"] - Cross-mismatch\"}) %}{% set _ = result['proxmox'].update({'vmid': expected_vmid, 'name': actual_name_for_vmid, 'name_owner_vmid': actual_vmid_for_name, 'vmid_owner_name': actual_name_for_vmid}) %}{% set _ = result['remediation'].append('Fix inventory VMID/name in inventory/host_vars/' + host + '.yml to match one of the Proxmox containers') %}{% set _ = result['remediation'].append('OR destroy one container: pct destroy ' + expected_vmid + ' (or ' + actual_vmid_for_name + ')') %}{% set _ = result['remediation'].append('OR rename one container: pct set ' + expected_vmid + ' -hostname ' + expected_name) %}{% endif %}{% set _ = results.update({host: result}) %}{% endfor %}{{ results }}"
  tags:
    - validation
    - proxmox

- name: Build list of hosts with validation failures
  ansible.builtin.set_fact:
    lxc_validation_failed_hosts: >-
      {{
        lxc_validation_results | dict2items
        | selectattr('value.status', 'equalto', 'mismatch')
        | map(attribute='key')
        | list
      }}
  tags:
    - validation
    - proxmox

- name: Display VMID/name mismatch conflicts
  ansible.builtin.debug:
    msg: |
      {% if lxc_validation_failed_hosts | length > 0 %}
      ========================================
      VMID/NAME CONFLICTS DETECTED
      ========================================
      {% for host in lxc_validation_failed_hosts %}
      
      {{ lxc_validation_results[host].message }}
      Remediation options:
      {% for rem in lxc_validation_results[host].remediation %}
        - {{ rem }}
      {% endfor %}
      {% endfor %}
      ========================================
      {% else %}
      All inventory LXC identities match Proxmox state (or containers do not yet exist).
      {% endif %}
  tags:
    - validation
    - proxmox

- name: Report validation summary
  ansible.builtin.debug:
    msg: |
      Validation Summary:
        Total managed LXCs: {{ groups['lxcs'] | default([]) | length }}
        Eligible for operations: {{ (groups['lxcs'] | default([]) | length) - (lxc_validation_failed_hosts | length) }}
        Skipped due to conflicts: {{ lxc_validation_failed_hosts | length }}
      {% if lxc_validation_failed_hosts | length > 0 %}
        Conflicting hosts: {{ lxc_validation_failed_hosts | join(', ') }}
      {% endif %}
  tags:
    - validation
    - proxmox

- name: Fail in strict mode if any mismatches exist
  ansible.builtin.fail:
    msg: |
      STRICT MODE: VMID/name validation failed for {{ lxc_validation_failed_hosts | length }} host(s).
      
      Conflicting hosts: {{ lxc_validation_failed_hosts | join(', ') }}
      
      Review the conflicts above and resolve them before proceeding.
      To allow playbook to continue with non-conflicting hosts, set proxmox_validation_strict: false in inventory/group_vars/all/proxmox.yml
  when:
    - proxmox_validation_strict | default(false) | bool
    - lxc_validation_failed_hosts | length > 0
  tags:
    - validation
    - proxmox

- name: Propagate validation results to all LXC hosts for skip logic
  ansible.builtin.add_host:
    name: "{{ item }}"
    lxc_validation_failed_hosts: "{{ lxc_validation_failed_hosts }}"
    lxc_validation_results: "{{ lxc_validation_results }}"
  loop: "{{ groups['lxcs'] | default([]) }}"
  tags:
    - validation
    - proxmox
