- name: Provision LXCs defined in inventory
  hosts: lxcs
  gather_facts: false
  collections:
    - community.proxmox
  roles:
    - role: proxmox_lxc_provision
  post_tasks:
    - name: Apply Proxmox host-side configuration
      ansible.builtin.include_role:
        name: proxmox_lxc_host_config
      vars:
        ansible_host: "{{ proxmox_api_host }}"
        ansible_user: root
      delegate_to: "{{ proxmox_api_host }}"
      become: true
      when: proxmox_lxc_host_config_enabled | default(true)
