---
- name: Determine control node home directory
  ansible.builtin.set_fact:
    control_node_home_dir: "{{ ansible_facts['env']['HOME'] | default(lookup('env', 'HOME')) }}"
  when: control_node_home_dir is not defined

- name: Determine project root directory
  ansible.builtin.set_fact:
    control_node_project_root: "{{ (playbook_dir | dirname) if (playbook_dir is defined) else lookup('env', 'PWD') }}"
  when: control_node_project_root is not defined

- name: Derive control node paths
  ansible.builtin.set_fact:
    control_node_ssh_directory: "{{ control_node_ssh_directory | default(([control_node_project_root, '.ansible', 'ssh'] | path_join)) }}"
    control_node_ansible_directory: "{{ control_node_ansible_directory | default(([control_node_project_root, '.ansible'] | path_join)) }}"
    control_node_ansible_tmp_directory: "{{ control_node_ansible_tmp_directory | default(([control_node_project_root, '.ansible', 'tmp'] | path_join)) }}"
    control_node_ssh_private_key_path: "{{ control_node_ssh_private_key_path | default(([control_node_project_root, '.ansible', 'ssh', 'proxmox_lxc'] | path_join)) }}"
    control_node_ssh_public_key_path: "{{ control_node_ssh_public_key_path | default((([control_node_project_root, '.ansible', 'ssh', 'proxmox_lxc'] | path_join) ~ '.pub')) }}"
    control_node_vault_password_file: "{{ control_node_vault_password_file | default(([control_node_home_dir, '.ansible', 'vault-pass'] | path_join)) }}"
    control_node_collection_requirements: "{{ control_node_collection_requirements | default(([control_node_project_root, 'collections', 'requirements.yml'] | path_join)) }}"
    control_node_collection_install_path: "{{ control_node_collection_install_path | default(([control_node_project_root, 'collections'] | path_join)) }}"

- name: Ensure SSH directory exists
  ansible.builtin.file:
    path: "{{ control_node_ssh_directory }}"
    state: directory
    mode: "0700"

- name: Ensure Ansible data directory exists
  ansible.builtin.file:
    path: "{{ control_node_ansible_directory }}"
    state: directory
    mode: "0700"

- name: Ensure Ansible local temp directory exists
  ansible.builtin.file:
    path: "{{ control_node_ansible_tmp_directory }}"
    state: directory
    mode: "0700"

- name: Ensure collection install directory exists
  ansible.builtin.file:
    path: "{{ control_node_collection_install_path }}"
    state: directory
    mode: "0755"

- name: Check collection requirements file
  ansible.builtin.stat:
    path: "{{ control_node_collection_requirements }}"
  register: control_node_collection_requirements_stat

- name: Fail when collection requirements file is missing
  ansible.builtin.fail:
    msg: "Ansible collection requirements file {{ control_node_collection_requirements }} is missing."
  when: not control_node_collection_requirements_stat.stat.exists

- name: Install required Ansible collections
  ansible.builtin.command:
    cmd: >-
      ansible-galaxy collection install -r "{{ control_node_collection_requirements }}"
      {{ '--force' if control_node_collection_force else '' }}
      {{ control_node_collection_install_options }}
      -p "{{ control_node_collection_install_path }}"
    chdir: "{{ control_node_project_root }}"
  register: control_node_galaxy_install
  changed_when: false

- name: Include control node SSH tasks
  ansible.builtin.include_tasks: ssh_key.yml

- name: Verify vault password file presence
  ansible.builtin.stat:
    path: "{{ control_node_vault_password_file }}"
  register: control_node_vault_pass_stat

- name: Fail when vault password file is missing
  ansible.builtin.fail:
    msg: "Vault password file {{ control_node_vault_password_file }} is required before running playbooks."
  when: not control_node_vault_pass_stat.stat.exists

- name: Check if vault.yml exists
  ansible.builtin.stat:
    path: "{{ [control_node_project_root, 'inventory', 'group_vars', 'all', 'vault.yml'] | path_join }}"
  register: control_node_vault_file_stat

- name: Check if vault.yml is encrypted
  ansible.builtin.command:
    cmd: head -n1 "{{ [control_node_project_root, 'inventory', 'group_vars', 'all', 'vault.yml'] | path_join }}"
  register: control_node_vault_file_header
  changed_when: false
  failed_when: false
  when: control_node_vault_file_stat.stat.exists

- name: Warn if vault.yml doesn't exist
  ansible.builtin.debug:
    msg: >-
      WARNING: vault.yml not found. Run ./setup.sh or ./configure-vault.sh to configure Proxmox API credentials.
      The playbooks will fail without valid API credentials.
  when: not control_node_vault_file_stat.stat.exists

- name: Warn if vault.yml is not encrypted
  ansible.builtin.debug:
    msg: >-
      WARNING: vault.yml exists but is NOT encrypted. This is a security risk!
      Encrypt it with: uv run --locked ansible-vault encrypt inventory/group_vars/all/vault.yml
  when:
    - control_node_vault_file_stat.stat.exists
    - control_node_vault_file_header.stdout is defined
    - "'$ANSIBLE_VAULT' not in control_node_vault_file_header.stdout"

- name: Install required system packages
  ansible.builtin.package:
    name: "{{ control_node_packages }}"
    state: present
  become: "{{ control_node_package_become }}"
  when:
    - control_node_packages | length > 0
    - not control_node_skip_system_packages

- name: Check external role requirements file
  ansible.builtin.stat:
    path: "{{ control_node_project_root }}/requirements/roles.yml"
  register: control_node_role_requirements_stat

- name: Install external Ansible roles
  ansible.builtin.command:
    cmd: ansible-galaxy role install -r {{ control_node_project_root }}/requirements/roles.yml -p {{ control_node_project_root }}/.ansible/roles
  when: control_node_role_requirements_stat.stat.exists
  changed_when: false  # Galaxy handles idempotency internally
