---
# Docker installation tasks using geerlingguy.docker role
# Only runs for containers in the cap_docker group

- name: Install Docker using geerlingguy.docker role
  ansible.builtin.include_role:
    name: geerlingguy.docker
  vars:
    docker_install_compose_plugin: true
    docker_compose_package: docker-compose-plugin
    docker_compose_package_state: present
    docker_users:
      - "{{ lxc_internal_docker_user }}"
    docker_daemon_options:
      log-driver: "json-file"
      log-opts:
        max-size: "10m"
        max-file: "3"

- name: Ensure Docker service is started and enabled
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Verify Docker installation
  ansible.builtin.command:
    cmd: docker --version
  register: _docker_version
  changed_when: false

- name: Display Docker version
  ansible.builtin.debug:
    msg: "Docker installed: {{ _docker_version.stdout }}"

- name: Verify Docker Compose installation
  ansible.builtin.command:
    cmd: docker compose version
  register: _docker_compose_version
  changed_when: false

- name: Display Docker Compose version
  ansible.builtin.debug:
    msg: "Docker Compose installed: {{ _docker_compose_version.stdout }}"
