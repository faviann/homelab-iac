---
# Main tasks file for lxc_internal_setup role
# Orchestrates internal LXC container configuration

- name: Display container being configured
  ansible.builtin.debug:
    msg: "Configuring {{ inventory_hostname }} ({{ ansible_host | default('unknown IP') }})"

- name: Ensure container is accessible via SSH
  ansible.builtin.wait_for_connection:
    timeout: 60
  register: _connection_check
  retries: 3
  delay: 10
  until: _connection_check is succeeded

- name: Gather container facts
  ansible.builtin.setup:

- name: Update system packages
  ansible.builtin.import_tasks: system_update.yml
  tags:
    - system_update
    - updates

- name: Configure journald log limits
  ansible.builtin.import_tasks: journald_config.yml
  tags:
    - journald
    - logging

- name: Install Docker
  ansible.builtin.import_tasks: docker_install.yml
  when: "'cap_docker' in group_names"
  tags:
    - docker
    - docker_install

- name: Setup Docker environment
  ansible.builtin.import_tasks: docker_setup.yml
  when: "'cap_docker' in group_names"
  tags:
    - docker
    - docker_setup

- name: Flush handlers before reboot
  ansible.builtin.meta: flush_handlers

- name: Reboot container
  ansible.builtin.import_tasks: reboot.yml
  tags:
    - reboot

- name: Configuration complete
  ansible.builtin.debug:
    msg: "Internal configuration of {{ inventory_hostname }} completed successfully"
