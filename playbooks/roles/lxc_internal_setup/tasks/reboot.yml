---
# Reboot container tasks
# Reboots the container and waits for it to come back online

- name: Reboot the container
  ansible.builtin.reboot:
    msg: "Reboot initiated by Ansible lxc_internal_setup role"
    connect_timeout: "{{ lxc_internal_reboot_timeout }}"
    reboot_timeout: "{{ lxc_internal_reboot_timeout }}"
    pre_reboot_delay: 0
    post_reboot_delay: "{{ lxc_internal_post_reboot_delay }}"
    test_command: "{{ lxc_internal_reboot_test_command }}"
  when: lxc_internal_reboot_enabled | bool

- name: Verify container is accessible after reboot
  ansible.builtin.wait_for_connection:
    timeout: "{{ lxc_internal_reboot_timeout }}"
  when: lxc_internal_reboot_enabled | bool

- name: Gather facts after reboot
  ansible.builtin.setup:
  when: lxc_internal_reboot_enabled | bool

- name: Display post-reboot information
  ansible.builtin.debug:
    msg: "Container {{ inventory_hostname }} rebooted successfully. Uptime: {{ ansible_uptime_seconds | default('unknown') }} seconds"
  when: lxc_internal_reboot_enabled | bool
