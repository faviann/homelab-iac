---
# Automatic SSH access setup for Proxmox host
# Auto-detects if SSH key auth works; prompts for password only if needed
# Based on working POC that uses sshpass for password-based initial connection

- name: Ensure SSH key exists on control node
  ansible.builtin.stat:
    path: "{{ proxmox_ssh_key_public }}"
  register: ssh_pubkey_stat
  failed_when: not ssh_pubkey_stat.stat.exists
  delegate_to: localhost

- name: Ensure SSH private key exists on control node
  ansible.builtin.stat:
    path: "{{ proxmox_ssh_key_private }}"
  register: ssh_privkey_stat
  failed_when: not ssh_privkey_stat.stat.exists
  delegate_to: localhost

- name: Test SSH connectivity to Proxmox host
  ansible.builtin.wait_for:
    host: "{{ proxmox_host }}"
    port: "{{ proxmox_ssh_port }}"
    timeout: "{{ proxmox_ssh_connect_timeout }}"
  register: ssh_port_check
  ignore_errors: true
  delegate_to: localhost

- name: Fail if Proxmox host is unreachable
  ansible.builtin.fail:
    msg: "Cannot reach {{ proxmox_host }}:{{ proxmox_ssh_port }}. Check network connectivity and firewall rules."
  when: ssh_port_check.failed

- name: Test if SSH key authentication already works
  ansible.builtin.command:
    cmd: >-
      ssh -i {{ proxmox_ssh_key_private }}
          -o BatchMode=yes
          -o ConnectTimeout={{ proxmox_ssh_connect_timeout }}
          -o StrictHostKeyChecking=accept-new
          -o IdentitiesOnly=yes
          {{ proxmox_ssh_user }}@{{ proxmox_host }}
          true
  register: ssh_key_test
  failed_when: false
  changed_when: false
  delegate_to: localhost

- name: SSH key authentication status
  ansible.builtin.debug:
    msg: >-
      SSH key auth {{ 'already configured ✓' if ssh_key_test.rc == 0 else 'not configured - will prompt for password' }}

- name: Configure SSH key authentication (interactive)
  when: ssh_key_test.rc != 0
  block:
    - name: Prompt for Proxmox root password
      ansible.builtin.pause:
        prompt: |
          
          ╔════════════════════════════════════════════════════════════════════╗
          ║  SSH Key Authentication Setup Required                            ║
          ╚════════════════════════════════════════════════════════════════════╝
          
          SSH key authentication to {{ proxmox_host }} is not configured.
          
          Please enter the root password to automatically add your SSH key.
          This prompt will not appear on subsequent runs.
          
          Password for root@{{ proxmox_host }}
        echo: false
      register: proxmox_root_password
      delegate_to: localhost

    - name: Read SSH public key content
      ansible.builtin.slurp:
        src: "{{ proxmox_ssh_key_public }}"
      register: ssh_pubkey_content
      delegate_to: localhost

    - name: Display public key fingerprint
      ansible.builtin.command:
        cmd: ssh-keygen -lf {{ proxmox_ssh_key_public }}
      register: pubkey_fingerprint
      changed_when: false
      delegate_to: localhost

    - name: Show public key being added
      ansible.builtin.debug:
        msg: "Adding key: {{ pubkey_fingerprint.stdout }}"

    # Verify password authentication works before proceeding
    - name: Verify password authentication works
      ansible.builtin.command:
        cmd: >-
          sshpass -p "{{ proxmox_root_password.user_input }}"
          ssh -o StrictHostKeyChecking=accept-new
              -o ConnectTimeout={{ proxmox_ssh_connect_timeout }}
          {{ proxmox_ssh_user }}@{{ proxmox_host }}
          'echo PASSWORD_OK'
      register: password_test
      changed_when: false
      failed_when: password_test.rc != 0
      no_log: true
      delegate_to: localhost

    - name: Password authentication verified
      ansible.builtin.debug:
        msg: "✓ Password authentication successful, proceeding with key setup"

    # Create .ssh directory with correct permissions
    - name: Ensure .ssh directory exists on Proxmox host
      ansible.builtin.command:
        cmd: >-
          sshpass -p "{{ proxmox_root_password.user_input }}"
          ssh -o StrictHostKeyChecking=accept-new
          {{ proxmox_ssh_user }}@{{ proxmox_host }}
          'mkdir -p /root/.ssh && chmod 700 /root/.ssh'
      changed_when: true
      no_log: true
      delegate_to: localhost

    # Add the SSH public key using shell redirection (most reliable method)
    # Check if key exists first to ensure idempotency
    - name: Check if SSH public key already exists in authorized_keys
      ansible.builtin.command:
        cmd: >-
          sshpass -p "{{ proxmox_root_password.user_input }}"
          ssh -o StrictHostKeyChecking=accept-new
          {{ proxmox_ssh_user }}@{{ proxmox_host }}
          "grep -F '{{ ssh_pubkey_content.content | b64decode | trim }}' /root/.ssh/authorized_keys 2>/dev/null"
      register: key_exists_check
      changed_when: false
      failed_when: false
      no_log: true
      delegate_to: localhost

    - name: Add SSH public key to authorized_keys
      ansible.builtin.shell:
        cmd: |
          sshpass -p "{{ proxmox_root_password.user_input }}" \
          ssh -o StrictHostKeyChecking=accept-new {{ proxmox_ssh_user }}@{{ proxmox_host }} \
          "echo '{{ ssh_pubkey_content.content | b64decode | trim }}' >> /root/.ssh/authorized_keys"
      changed_when: true
      no_log: true
      delegate_to: localhost
      when: key_exists_check.rc != 0

    - name: SSH public key already present
      ansible.builtin.debug:
        msg: "✓ SSH public key already exists in authorized_keys (skipping)"
      when: key_exists_check.rc == 0

    # Set correct permissions on authorized_keys
    - name: Set correct permissions on authorized_keys
      ansible.builtin.command:
        cmd: >-
          sshpass -p "{{ proxmox_root_password.user_input }}"
          ssh -o StrictHostKeyChecking=accept-new
          {{ proxmox_ssh_user }}@{{ proxmox_host }}
          'chmod 600 /root/.ssh/authorized_keys && chown -R root:root /root/.ssh'
      changed_when: true
      no_log: true
      delegate_to: localhost

    # Verify the key was actually added
    - name: Verify SSH public key is in authorized_keys
      ansible.builtin.command:
        cmd: >-
          sshpass -p "{{ proxmox_root_password.user_input }}"
          ssh -o StrictHostKeyChecking=accept-new
          {{ proxmox_ssh_user }}@{{ proxmox_host }}
          "grep -F '{{ ssh_pubkey_content.content | b64decode | trim }}' /root/.ssh/authorized_keys"
      register: key_verification
      changed_when: false
      failed_when: key_verification.rc != 0
      no_log: true
      delegate_to: localhost

    - name: Key successfully configured
      ansible.builtin.debug:
        msg: "✓ SSH public key {{ 'added to' if key_exists_check.rc != 0 else 'verified in' }} {{ proxmox_host }}:/root/.ssh/authorized_keys"

    # Wait briefly for SSH to process changes
    - name: Wait for SSH to process changes
      ansible.builtin.pause:
        seconds: 2

    # Final test of SSH key authentication
    - name: Verify SSH key authentication now works
      ansible.builtin.command:
        cmd: >-
          ssh -i {{ proxmox_ssh_key_private }}
              -o BatchMode=yes
              -o ConnectTimeout={{ proxmox_ssh_connect_timeout }}
              -o StrictHostKeyChecking=accept-new
              -o IdentitiesOnly=yes
              {{ proxmox_ssh_user }}@{{ proxmox_host }}
              'echo SSH_KEY_SUCCESS'
      register: final_ssh_test
      changed_when: false
      failed_when: final_ssh_test.rc != 0
      delegate_to: localhost

    - name: SSH key authentication configured successfully
      ansible.builtin.debug:
        msg:
          - "════════════════════════════════════════════════════════════"
          - "✓ SSH key authentication to {{ proxmox_host }} is now configured"
          - "✓ Future connections will not require a password"
          - "════════════════════════════════════════════════════════════"
