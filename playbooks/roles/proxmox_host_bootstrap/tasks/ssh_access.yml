---
# Automatic SSH access setup for Proxmox host
# Auto-detects if SSH key auth works; prompts for password only if needed

- name: Ensure SSH key exists on control node
  ansible.builtin.stat:
    path: "{{ proxmox_ssh_key_public }}"
  register: ssh_pubkey_stat
  failed_when: not ssh_pubkey_stat.stat.exists
  delegate_to: localhost

- name: Test SSH connectivity to Proxmox host
  ansible.builtin.wait_for:
    host: "{{ proxmox_host }}"
    port: "{{ proxmox_ssh_port }}"
    timeout: "{{ proxmox_ssh_connect_timeout }}"
  register: ssh_port_check
  ignore_errors: true
  delegate_to: localhost

- name: Fail if Proxmox host is unreachable
  ansible.builtin.fail:
    msg: "Cannot reach {{ proxmox_host }}:{{ proxmox_ssh_port }}. Check network connectivity and firewall rules."
  when: ssh_port_check.failed

- name: Test if SSH key authentication already works
  ansible.builtin.command:
    cmd: >-
      ssh -i {{ proxmox_ssh_key_private }}
          -o BatchMode=yes
          -o ConnectTimeout={{ proxmox_ssh_connect_timeout }}
          -o StrictHostKeyChecking=accept-new
          -o IdentitiesOnly=yes
          {{ proxmox_ssh_user }}@{{ proxmox_host }}
          true
  register: ssh_key_test
  failed_when: false
  changed_when: false
  delegate_to: localhost

- name: SSH key authentication status
  ansible.builtin.debug:
    msg: >-
      SSH key auth {{ 'already configured' if ssh_key_test.rc == 0 else 'not configured - will prompt for password' }}

- name: Configure SSH key authentication (interactive)
  when: ssh_key_test.rc != 0
  block:
    - name: Prompt for Proxmox root password
      ansible.builtin.pause:
        prompt: |
          
          ╔════════════════════════════════════════════════════════════════════╗
          ║  SSH Key Authentication Setup Required                            ║
          ╚════════════════════════════════════════════════════════════════════╝
          
          SSH key authentication to {{ proxmox_host }} is not configured.
          
          Please enter the root password to automatically add your SSH key.
          This prompt will not appear on subsequent runs.
          
          Password for root@{{ proxmox_host }}
        echo: false
      register: proxmox_root_password
      delegate_to: localhost

    - name: Read SSH public key content
      ansible.builtin.slurp:
        src: "{{ proxmox_ssh_key_public }}"
      register: ssh_pubkey_content
      delegate_to: localhost

    - name: Get ACTUAL fingerprint of the public key file being added
      ansible.builtin.command:
        cmd: ssh-keygen -lf {{ proxmox_ssh_key_public }}
      register: pubkey_file_fingerprint
      changed_when: false
      delegate_to: localhost

    - name: Display public key being added (for debugging)
      ansible.builtin.debug:
        msg: |
          Public key: {{ (ssh_pubkey_content.content | b64decode).split()[0:2] | join(' ') }}
          Fingerprint: {{ pubkey_file_fingerprint.stdout }}

    - name: Add SSH public key to Proxmox authorized_keys (using shell command for reliability)
      ansible.builtin.shell:
        cmd: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          touch ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys
          # Read the public key
          pubkey="{{ lookup('file', proxmox_ssh_key_public) }}"
          # Check if key already exists
          if grep -Fq "${pubkey%% *}" ~/.ssh/authorized_keys 2>/dev/null; then
            echo "Key already exists in authorized_keys"
            exit 0
          fi
          # Add the key
          echo "$pubkey" >> ~/.ssh/authorized_keys
          echo "Key added successfully"
      delegate_to: "{{ proxmox_host }}"
      vars:
        ansible_user: "{{ proxmox_ssh_user }}"
        ansible_password: "{{ proxmox_root_password.user_input }}"
        ansible_ssh_common_args: '-o StrictHostKeyChecking=accept-new'
      register: authorized_key_result
      changed_when: "'Key added successfully' in authorized_key_result.stdout"

    - name: Display key addition result
      ansible.builtin.debug:
        msg: "{{ authorized_key_result.stdout }}"

    - name: Fail if key addition failed
      ansible.builtin.fail:
        msg: "Failed to add SSH key to Proxmox host: {{ authorized_key_result.stderr }}"
      when: authorized_key_result.rc != 0

    - name: Manually verify key was added to authorized_keys on Proxmox host
      ansible.builtin.command:
        cmd: cat /root/.ssh/authorized_keys
      delegate_to: "{{ proxmox_host }}"
      vars:
        ansible_user: "{{ proxmox_ssh_user }}"
        ansible_password: "{{ proxmox_root_password.user_input }}"
        ansible_ssh_common_args: '-o StrictHostKeyChecking=accept-new'
      register: authorized_keys_content
      changed_when: false

    - name: Display authorized_keys content
      ansible.builtin.debug:
        var: authorized_keys_content.stdout_lines

    - name: Extract just the Ansible control key from authorized_keys
      ansible.builtin.set_fact:
        ansible_key_from_remote: "{{ authorized_keys_content.stdout_lines | select('search', 'Ansible control node') | list | last }}"

    - name: Get fingerprint of key in authorized_keys
      ansible.builtin.shell:
        cmd: |
          echo "{{ ansible_key_from_remote }}" | ssh-keygen -lf -
      register: remote_key_fingerprint
      changed_when: false
      failed_when: false
      delegate_to: localhost

    - name: Check SSH directory and file permissions on Proxmox host
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /root/.ssh
        - /root/.ssh/authorized_keys
      delegate_to: "{{ proxmox_host }}"
      vars:
        ansible_user: "{{ proxmox_ssh_user }}"
        ansible_password: "{{ proxmox_root_password.user_input }}"
        ansible_ssh_common_args: '-o StrictHostKeyChecking=accept-new'
      register: ssh_permissions

    - name: Display SSH permissions
      ansible.builtin.debug:
        msg: "{{ item.item }}: mode={{ item.stat.mode }}, owner={{ item.stat.pw_name }}"
      loop: "{{ ssh_permissions.results }}"
      when: item.stat.exists

    - name: Check local SSH private key permissions
      ansible.builtin.stat:
        path: "{{ proxmox_ssh_key_private }}"
      register: local_private_key_stat
      delegate_to: localhost

    - name: Display local private key permissions
      ansible.builtin.debug:
        msg: "Local private key {{ proxmox_ssh_key_private }}: mode={{ local_private_key_stat.stat.mode }}, exists={{ local_private_key_stat.stat.exists }}"

    - name: Get fingerprint of local public key
      ansible.builtin.command:
        cmd: ssh-keygen -lf {{ proxmox_ssh_key_public }}
      register: local_key_fingerprint
      changed_when: false
      delegate_to: localhost

    - name: Display local key fingerprint
      ansible.builtin.debug:
        var: local_key_fingerprint.stdout

    - name: Display actual public key content from file
      ansible.builtin.command:
        cmd: cat {{ proxmox_ssh_key_public }}
      register: actual_pubkey_content
      changed_when: false
      delegate_to: localhost

    - name: Show what public key is actually in the file
      ansible.builtin.debug:
        msg: "Public key file contains: {{ actual_pubkey_content.stdout }}"

    - name: Compare with what we're trying to add
      ansible.builtin.debug:
        msg: |
          Key from file:     {{ actual_pubkey_content.stdout.split()[0:2] | join(' ') }}
          Key being added:   {{ (ssh_pubkey_content.content | b64decode).split()[0:2] | join(' ') }}
          Match: {{ actual_pubkey_content.stdout.split()[0:2] | join(' ') == (ssh_pubkey_content.content | b64decode).split()[0:2] | join(' ') }}

    - name: Get fingerprint of private key
      ansible.builtin.command:
        cmd: ssh-keygen -lf {{ proxmox_ssh_key_private }}
      register: private_key_fingerprint
      changed_when: false
      delegate_to: localhost

    - name: Display private key fingerprint
      ansible.builtin.debug:
        var: private_key_fingerprint.stdout

    - name: Verify keys match
      ansible.builtin.assert:
        that:
          - local_key_fingerprint.stdout == private_key_fingerprint.stdout
        fail_msg: "Public and private keys do not match! This is a critical error."
        success_msg: "Public and private keys match correctly."

    - name: Display comprehensive key comparison
      ansible.builtin.debug:
        msg: |
          ========================================
          KEY FINGERPRINT COMPARISON
          ========================================
          Local public key file:  {{ pubkey_file_fingerprint.stdout }}
          Local private key:      {{ private_key_fingerprint.stdout }}
          Key in authorized_keys: {{ remote_key_fingerprint.stdout | default('ERROR: Could not read') }}
          
          Local keys match: {{ 'YES ✓' if pubkey_file_fingerprint.stdout == private_key_fingerprint.stdout else 'NO ✗' }}
          Remote key matches: {{ 'YES ✓' if pubkey_file_fingerprint.stdout.split()[1] in (remote_key_fingerprint.stdout | default('')) else 'NO ✗' }}

    - name: Test SSH with verbose output to diagnose the issue
      ansible.builtin.command:
        cmd: >-
          ssh -vvv -i {{ proxmox_ssh_key_private }}
              -o BatchMode=yes
              -o ConnectTimeout={{ proxmox_ssh_connect_timeout }}
              -o StrictHostKeyChecking=accept-new
              -o IdentitiesOnly=yes
              -o IdentityAgent=none
              {{ proxmox_ssh_user }}@{{ proxmox_host }}
              echo SSH_TEST_SUCCESS
      register: ssh_verbose_result
      failed_when: false
      changed_when: false
      delegate_to: localhost

    - name: Display verbose SSH output
      ansible.builtin.debug:
        var: ssh_verbose_result

    - name: Provide manual SSH test command
      ansible.builtin.debug:
        msg: |
          ====================================================================
          MANUAL SSH TEST
          ====================================================================
          
          To test SSH manually, run this command in your terminal:
          
          ssh -vvv -i {{ proxmox_ssh_key_private }} -o BatchMode=yes -o IdentitiesOnly=yes -o IdentityAgent=none root@{{ proxmox_host }} 'echo SUCCESS'
          
          Or without BatchMode (will prompt for password if key fails):
          
          ssh -vvv -i {{ proxmox_ssh_key_private }} -o IdentitiesOnly=yes -o IdentityAgent=none root@{{ proxmox_host }} 'echo SUCCESS'
          
          ====================================================================

    - name: Check Proxmox SSH server logs for rejection reason
      ansible.builtin.shell:
        cmd: |
          journalctl -u ssh -n 50 --no-pager | grep -i "authentication\|failed\|error" | tail -20
      delegate_to: "{{ proxmox_host }}"
      vars:
        ansible_user: "{{ proxmox_ssh_user }}"
        ansible_password: "{{ proxmox_root_password.user_input }}"
        ansible_ssh_common_args: '-o StrictHostKeyChecking=accept-new'
      register: sshd_logs
      changed_when: false
      failed_when: false

    - name: Display SSH server logs
      ansible.builtin.debug:
        msg: "Recent SSH server logs:\n{{ sshd_logs.stdout }}"

    - name: Check if authorized_keys file has correct line endings
      ansible.builtin.command:
        cmd: file /root/.ssh/authorized_keys
      delegate_to: "{{ proxmox_host }}"
      vars:
        ansible_user: "{{ proxmox_ssh_user }}"
        ansible_password: "{{ proxmox_root_password.user_input }}"
        ansible_ssh_common_args: '-o StrictHostKeyChecking=accept-new'
      register: authorized_keys_file_type
      changed_when: false

    - name: Display file type
      ansible.builtin.debug:
        var: authorized_keys_file_type.stdout

    - name: Verify SSH key authentication now works
      ansible.builtin.command:
        cmd: >-
          ssh -i {{ proxmox_ssh_key_private }}
              -o BatchMode=yes
              -o ConnectTimeout={{ proxmox_ssh_connect_timeout }}
              -o StrictHostKeyChecking=accept-new
              -o IdentitiesOnly=yes
              {{ proxmox_ssh_user }}@{{ proxmox_host }}
              true
      changed_when: false
      delegate_to: localhost

    - name: If verification failed, run verbose SSH test for debugging
      ansible.builtin.command:
        cmd: >-
          ssh -vvv -i {{ proxmox_ssh_key_private }}
              -o BatchMode=yes
              -o ConnectTimeout={{ proxmox_ssh_connect_timeout }}
              -o StrictHostKeyChecking=accept-new
              -o IdentitiesOnly=yes
              {{ proxmox_ssh_user }}@{{ proxmox_host }}
              true
      changed_when: false
      delegate_to: localhost
      register: ssh_verbose_test
      failed_when: false
      when: false  # Set to true if you need to debug

    - name: SSH key authentication configured successfully
      ansible.builtin.debug:
        msg: "✓ SSH key authentication to {{ proxmox_host }} is now configured"
