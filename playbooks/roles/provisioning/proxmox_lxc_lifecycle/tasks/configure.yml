- name: Skip runtime-sensitive guest configuration in check mode when container is not running
  ansible.builtin.debug:
    msg: >-
      Check mode skips guest configuration for container
      {{ proxmox_lxc_contract.api_spec.vmid | default(inventory_hostname) }}
      because the pre-action runtime state is {{ proxmox_lifecycle_runtime_state }}.
  when:
    - proxmox_lxc_lifecycle_plan.configure_guest | bool
    - ansible_check_mode | bool
    - proxmox_lifecycle_runtime_state != 'running'

- name: Run guest configuration actions
  when:
    - proxmox_lxc_lifecycle_plan.configure_guest | bool
    - not (ansible_check_mode | bool and proxmox_lifecycle_runtime_state != 'running')
  block:
    - name: Ensure container is accessible via SSH
      ansible.builtin.wait_for_connection:
        timeout: "{{ 60 if (proxmox_lifecycle_rebuilt | bool) else 15 }}"
      register: proxmox_lifecycle_connection_check
      retries: "{{ 6 if (proxmox_lifecycle_rebuilt | bool) else 3 }}"
      delay: "{{ 10 if (proxmox_lifecycle_rebuilt | bool) else 5 }}"
      until: proxmox_lifecycle_connection_check is succeeded

    - name: Gather container facts
      ansible.builtin.setup:

    - name: Configure base system
      ansible.builtin.include_role:
        name: config/lxc_base_system

    - name: Configure GitHub SSH keys
      ansible.builtin.include_role:
        name: config/lxc_github_keys

    - name: Configure logging
      ansible.builtin.include_role:
        name: config/lxc_logging_config

    - name: Install Docker runtime
      ansible.builtin.include_role:
        name: config/lxc_docker_runtime
      when: docker_enabled | default(false)

    - name: Configure NVIDIA GPU runtime
      ansible.builtin.include_role:
        name: config/lxc_nvidia_runtime
      when: gpu_enabled | default(false)

    - name: Configure Docker environment
      ansible.builtin.include_role:
        name: config/lxc_docker_environment
      when: docker_enabled | default(false)

    - name: Apply Authentik blueprints
      ansible.builtin.include_role:
        name: config/authentik_blueprint_sync
      when: authentik_blueprint_sync_enabled | default(false)

    - name: Configure workstation baseline
      ansible.builtin.include_role:
        name: config/lxc_workstation_baseline
      when: workstation_enabled | default(false)

    - name: Flush handlers after guest configuration
      ansible.builtin.meta: flush_handlers

    - name: Reboot container if needed
      ansible.builtin.include_role:
        name: config/lxc_base_system
        tasks_from: reboot
