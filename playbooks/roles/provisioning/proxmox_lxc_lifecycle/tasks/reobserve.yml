---
# Re-observe current runtime state after provisioning and host reconciliation,
# before guest bootstrap. Guest configuration must act on the current state, not
# the pre-action snapshot. Release facts are carried forward from the
# before-observation (no re-probe).

- name: Determine whether post-action re-observation is warranted
  ansible.builtin.set_fact:
    proxmox_lifecycle_reobserve_active: >-
      {{
        (proxmox_lifecycle_has_host_work | bool)
        and (not ansible_check_mode)
        and (proxmox_lxc_contract.api_spec.state | default('present') == 'present')
      }}

- name: Re-observe current container runtime state
  ansible.builtin.include_tasks: observe_runtime_state.yml
  when: proxmox_lifecycle_reobserve_active | bool

- name: Refresh runtime state from re-observation
  ansible.builtin.set_fact:
    proxmox_lifecycle_runtime_state: "{{ proxmox_lifecycle_observed_runtime_state }}"
  when: proxmox_lifecycle_reobserve_active | bool

- name: Build post-action lifecycle observation
  ansible.builtin.set_fact:
    proxmox_lxc_lifecycle_observation_after: >-
      {{
        {
          'runtime_state': proxmox_lifecycle_runtime_state,
          'release': proxmox_lxc_lifecycle_observation_before.release,
          'release_probe_state': proxmox_lxc_lifecycle_observation_before.release_probe_state
        }
        if (proxmox_lifecycle_reobserve_active | bool)
        else proxmox_lxc_lifecycle_observation_before
      }}
