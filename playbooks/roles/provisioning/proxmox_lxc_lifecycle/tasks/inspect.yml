---
- name: Seed the LXC observation from fleet preflight
  ansible.builtin.set_fact:
    proxmox_lifecycle_observation: >-
      {{
        lxc_validation_results[inventory_hostname]
        if (
          lxc_validation_results is defined
          and inventory_hostname in lxc_validation_results
        )
        else {}
      }}
    proxmox_lifecycle_runtime_state: >-
      {{
        (
          lxc_validation_results[inventory_hostname].runtime_state
          if (
            lxc_validation_results is defined
            and inventory_hostname in lxc_validation_results
          )
          else 'unknown'
        )
      }}
    proxmox_lifecycle_actual_release: >-
      {{
        (
          lxc_validation_results[inventory_hostname].actual_release
          if (
            lxc_validation_results is defined
            and inventory_hostname in lxc_validation_results
          )
          else ''
        )
      }}
    proxmox_lifecycle_release_probe_state: >-
      {{
        (
          lxc_validation_results[inventory_hostname].release_probe_state
          if (
            lxc_validation_results is defined
            and inventory_hostname in lxc_validation_results
          )
          else 'unavailable'
        )
      }}

- name: Reject incomplete or target-specific fleet preflight observations
  ansible.builtin.fail:
    msg: >-
      {{
        proxmox_lifecycle_observation.message
        if (
          proxmox_lifecycle_observation.status | default('ok') == 'mismatch'
          and proxmox_lifecycle_observation.type | default('')
            in ['preflight_failed', 'identity_conflict']
        )
        else 'Fleet preflight did not provide a common Proxmox observation for ' ~ inventory_hostname ~ '.'
      }}
  when:
    - proxmox_fleet_preflight_enabled | bool
    - >-
      (
        not (proxmox_lifecycle_collect_all_planning_problems | default(false) | bool)
        and proxmox_lifecycle_observation.status | default('ok') == 'mismatch'
        and proxmox_lifecycle_observation.type | default('')
          in ['preflight_failed', 'identity_conflict']
      )
      or proxmox_lifecycle_observation | length == 0
      or not (proxmox_lifecycle_observation.common_observation | default(false) | bool)

- name: Observe current container runtime state for legacy direct-role callers
  ansible.builtin.include_tasks: observe_runtime_state.yml
  when:
    - not (proxmox_fleet_preflight_enabled | bool)
    - proxmox_lifecycle_release_probe_state == 'unavailable'

- name: Adopt the local LXC observation for legacy direct-role callers
  ansible.builtin.set_fact:
    proxmox_lifecycle_runtime_state: "{{ proxmox_lifecycle_observed_runtime_state }}"
    proxmox_lifecycle_observation: >-
      {{
        proxmox_lifecycle_observation
        if proxmox_lifecycle_observation | length > 0
        else {
          'status': 'ok',
          'type': 'absent_ok' if proxmox_lifecycle_observed_runtime_state == 'absent' else 'match_ok',
          'message': (
            'Container does not exist in Proxmox'
            if proxmox_lifecycle_observed_runtime_state == 'absent'
            else 'Lifecycle inspection derived from live container state'
          ),
          'remediation': []
        }
      }}
  when:
    - not (proxmox_fleet_preflight_enabled | bool)
    - proxmox_lifecycle_release_probe_state == 'unavailable'

- name: Observe the current guest release when required
  ansible.builtin.include_tasks: observe_release.yml
  vars:
    proxmox_lifecycle_release_observation_refresh: false

- name: Record pre-action lifecycle observation
  ansible.builtin.set_fact:
    proxmox_lxc_lifecycle_observation_before:
      runtime_state: "{{ proxmox_lifecycle_runtime_state }}"
      release: "{{ proxmox_lifecycle_actual_release }}"
      release_probe_state: "{{ proxmox_lifecycle_release_probe_state }}"
