---
# Build the stable semantic plan directly from the compiled contract and the
# target's observation. Intermediate decision flags remain lexical Jinja values
# rather than host facts, so downstream execution cannot couple to planner
# scratch state.

- name: Compose semantic lifecycle plan
  ansible.builtin.set_fact:
    proxmox_lifecycle_validation_failed: >-
      {{ proxmox_lifecycle_observation.status | default('ok') == 'mismatch' }}
    proxmox_lxc_lifecycle_plan: >-
      {%- set validation_failed = proxmox_lifecycle_observation.status | default('ok') == 'mismatch' -%}
      {%- set should_provision = proxmox_lifecycle_intent in ['provision_only', 'full'] -%}
      {%- set should_configure = proxmox_lifecycle_intent in ['configure_only', 'full'] -%}
      {%- set desired_present = proxmox_lxc_contract.api_spec.state | default('present') == 'present' -%}
      {%- set release_mismatch = (
        desired_present
        and proxmox_lifecycle_release_probe_state == 'probed'
        and proxmox_lifecycle_desired_release | length > 0
        and proxmox_lifecycle_actual_release | length > 0
        and proxmox_lifecycle_actual_release != proxmox_lifecycle_desired_release
      ) -%}
      {%- set rebuild_required = (
        desired_present
        and proxmox_lifecycle_policy_effective.rebuild_on_release_mismatch | bool
        and release_mismatch
      ) -%}
      {%- set skip_provision = (not should_provision) or validation_failed -%}
      {%- set skip_configure = (
        (not should_configure)
        or validation_failed
        or not desired_present
      ) -%}
      {%- set configure_existing = (
        proxmox_lifecycle_intent == 'configure_only'
        and not validation_failed
        and desired_present
        and proxmox_lifecycle_runtime_state != 'absent'
      ) -%}
      {%- if skip_provision or (not desired_present and proxmox_lifecycle_runtime_state == 'absent') -%}
      {%-   set transition = 'none' -%}
      {%- elif rebuild_required -%}
      {%-   set transition = 'rebuild' -%}
      {%- elif proxmox_lifecycle_intent == 'full' and proxmox_lifecycle_runtime_state == 'stopped' -%}
      {%-   set transition = 'start' -%}
      {%- elif desired_present -%}
      {%-   set transition = 'provision' -%}
      {%- else -%}
      {%-   set transition = 'remove' -%}
      {%- endif -%}
      {%- set prepare_guest = desired_present and ((not skip_provision) or configure_existing) -%}
      {%- if validation_failed -%}
      {%-   set reason = proxmox_lifecycle_observation.message | default('Lifecycle validation failed') -%}
      {%- elif transition == 'remove' -%}
      {%-   set reason = 'Desired state is absent, so the existing container will be removed.' -%}
      {%- elif transition == 'rebuild' -%}
      {%-   set reason = 'Guest release ' ~ proxmox_lifecycle_actual_release ~ ' differs from desired release ' ~ proxmox_lifecycle_desired_release ~ ', so the container will be rebuilt.' -%}
      {%- elif transition == 'start' -%}
      {%-   set reason = 'Existing stopped container will be started because guest configuration requires it.' -%}
      {%- elif transition == 'provision' and proxmox_lifecycle_runtime_state == 'absent' -%}
      {%-   set reason = 'Container is absent from Proxmox, so it will be provisioned.' -%}
      {%- elif proxmox_lifecycle_intent == 'validate_only' -%}
      {%-   set reason = 'Desired and observed lifecycle state was validated without executing changes.' -%}
      {%- elif not desired_present and proxmox_lifecycle_runtime_state == 'absent' -%}
      {%-   set reason = 'Desired state is already absent, so no container transition is planned.' -%}
      {%- elif not desired_present -%}
      {%-   set reason = 'Desired state is absent, but ' ~ proxmox_lifecycle_intent ~ ' plans no container transition.' -%}
      {%- elif proxmox_lifecycle_intent == 'configure_only' -%}
      {%-   set reason = 'Existing running container will have host and guest configuration reconciled.' -%}
      {%- elif proxmox_lifecycle_intent == 'provision_only' -%}
      {%-   set reason = 'Existing container infrastructure will be reconciled without guest configuration.' -%}
      {%- else -%}
      {%-   set reason = 'Existing container infrastructure and guest configuration will be reconciled.' -%}
      {%- endif -%}
      {{
        {
          'container_transition': transition,
          'reconcile_host_config': prepare_guest and (proxmox_lxc_host_config_enabled | default(true) | bool),
          'restore_guest_access': prepare_guest and not (
            proxmox_lifecycle_intent == 'provision_only'
            and proxmox_lifecycle_runtime_state == 'stopped'
            and not rebuild_required
          ),
          'start_container': (
            transition in ['rebuild', 'start']
            or (transition == 'provision' and proxmox_lifecycle_runtime_state == 'absent')
          ),
          'configure_guest': not skip_configure,
          'destructive': transition in ['rebuild', 'remove'],
          'reason': reason
        }
      }}

- name: Enforce lifecycle planning constraints
  ansible.builtin.fail:
    msg: >-
      {%- set desired_present = proxmox_lxc_contract.api_spec.state | default('present') == 'present' -%}
      {%- set rebuild_required = _proxmox_lifecycle_configure_rebuild_required | bool -%}
      {%- if proxmox_lifecycle_policy_effective.strict_validation | bool
             and proxmox_lifecycle_validation_failed | bool -%}
      {{ proxmox_lifecycle_observation.message | default('Lifecycle validation failed') }}
      {%- elif proxmox_lifecycle_intent == 'configure_only' and not desired_present -%}
      Configure-only lifecycle requires desired state present; desired state is absent.
      {%- elif proxmox_lifecycle_intent == 'configure_only'
                and proxmox_lifecycle_runtime_state != 'running' -%}
      Configure-only lifecycle requires an existing running container; observed state is
      {{ proxmox_lifecycle_runtime_state }}.
      {%- elif proxmox_lifecycle_intent == 'configure_only' and rebuild_required -%}
      Configure-only lifecycle cannot perform the required rebuild; guest release
      {{ proxmox_lifecycle_actual_release }} differs from desired release
      {{ proxmox_lifecycle_desired_release }}.
      {%- else -%}
      Lifecycle plan requires destructive transition
      '{{ proxmox_lxc_lifecycle_plan.container_transition }}', but persistent
      lifecycle policy does not authorize destructive transitions.
      {%- endif -%}
  vars:
    _proxmox_lifecycle_configure_rebuild_required: >-
      {{
        proxmox_lxc_contract.api_spec.state | default('present') == 'present'
        and proxmox_lifecycle_policy_effective.rebuild_on_release_mismatch | bool
        and proxmox_lifecycle_release_probe_state == 'probed'
        and proxmox_lifecycle_desired_release | length > 0
        and proxmox_lifecycle_actual_release | length > 0
        and proxmox_lifecycle_actual_release != proxmox_lifecycle_desired_release
      }}
  when: >-
    (
      proxmox_lifecycle_policy_effective.strict_validation | bool
      and proxmox_lifecycle_validation_failed | bool
    )
    or (
      proxmox_lifecycle_intent == 'configure_only'
      and (
        proxmox_lxc_contract.api_spec.state | default('present') != 'present'
        or proxmox_lifecycle_runtime_state != 'running'
        or (_proxmox_lifecycle_configure_rebuild_required | bool)
      )
    )
    or (
      proxmox_lxc_lifecycle_plan.destructive | bool
      and not (proxmox_lifecycle_policy_effective.allow_destructive_transitions | bool)
    )
