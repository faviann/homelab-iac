---
# ==============================================================================
# LIFECYCLE DECISION MATRIX
#
# intent          | desired_state | runtime_state | host_actions                         | guest_actions
# ----------------|---------------|---------------|--------------------------------------|-------------------------------------------
# validate_only   | *             | *             | []                                   | []
# provision_only  | present       | absent        | [ensure_container, ...]              | []
# provision_only  | present       | running       | [ensure_container, ...]              | [] (rebuild if mismatch)
# provision_only  | absent        | *             | [ensure_absent]                      | []
# configure_only  | present       | running       | [reconcile_host_config, ensure_ssh_key] | [wait, gather, configure, reboot]
# configure_only  | present       | absent        | []                                   | [] (skip: not running)
# configure_only  | absent        | *             | []                                   | []
# full            | present       | absent        | [ensure_container, ...]              | [wait, gather, configure, reboot]
# full            | present       | running       | [ensure_container, ...]              | [wait, gather, configure, reboot]
# full            | absent        | *             | [ensure_absent]                      | []
# ==============================================================================

- name: Derive lifecycle intent flags
  ansible.builtin.set_fact:
    proxmox_lifecycle_validation_failed: "{{ proxmox_lifecycle_validation_snapshot.status | default('ok') == 'mismatch' }}"
    proxmox_lifecycle_should_provision: "{{ proxmox_lifecycle_intent in ['provision_only', 'full'] }}"
    proxmox_lifecycle_should_configure: "{{ proxmox_lifecycle_intent in ['configure_only', 'full'] }}"
    proxmox_lifecycle_rebuild_required: >-
      {{
        proxmox_lifecycle_intent in ['provision_only', 'full']
        and proxmox_lxc_contract.api_spec.state | default('present') == 'present'
        and proxmox_lifecycle_policy_effective.rebuild_on_release_mismatch | bool
        and proxmox_lifecycle_release_mismatch | bool
      }}

- name: Enforce strict lifecycle validation policy
  ansible.builtin.fail:
    msg: "{{ proxmox_lifecycle_validation_snapshot.message | default('Lifecycle validation failed') }}"
  when:
    - proxmox_lifecycle_policy_effective.strict_validation | bool
    - proxmox_lifecycle_validation_failed | bool

- name: Build lifecycle action lists
  ansible.builtin.set_fact:
    proxmox_lifecycle_skip_provision: >-
      {{
        (not proxmox_lifecycle_should_provision)
        or (proxmox_lifecycle_validation_failed | bool)
      }}
    proxmox_lifecycle_skip_configure: >-
      {{
        (not proxmox_lifecycle_should_configure)
        or (proxmox_lifecycle_validation_failed | bool)
        or (proxmox_lxc_contract.api_spec.state | default('present') != 'present')
        or (
          proxmox_lifecycle_intent == 'configure_only'
          and proxmox_lifecycle_runtime_state == 'absent'
        )
      }}
    proxmox_lifecycle_host_actions: >-
      {%- set actions = [] -%}
      {%- set _skip_provision = (not proxmox_lifecycle_should_provision) or (proxmox_lifecycle_validation_failed | bool) -%}
      {%- if not _skip_provision -%}
      {%-   if proxmox_lifecycle_rebuild_required | bool -%}
      {%-     set _ = actions.extend(['stop_container', 'destroy_container']) -%}
      {%-   endif -%}
      {%-   if proxmox_lxc_contract.api_spec.state | default('present') == 'present' -%}
      {%-     set _ = actions.append('ensure_container') -%}
      {%-     if proxmox_lxc_host_config_enabled | default(true) -%}
      {%-       set _ = actions.append('reconcile_host_config') -%}
      {%-     endif -%}
      {%-     set _ = actions.append('ensure_ssh_key') -%}
      {%-   else -%}
      {%-     set _ = actions.append('ensure_absent') -%}
      {%-   endif -%}
      {%- endif -%}
          {#- configure_only still refreshes host-side settings when the container already exists -#}
      {%- if proxmox_lifecycle_intent == 'configure_only'
             and not (proxmox_lifecycle_validation_failed | bool)
                  and proxmox_lxc_contract.api_spec.state | default('present') == 'present'
             and proxmox_lifecycle_runtime_state != 'absent' -%}
      {%-   if proxmox_lxc_host_config_enabled | default(true) -%}
      {%-     set _ = actions.append('reconcile_host_config') -%}
      {%-   endif -%}
      {%-   set _ = actions.append('ensure_ssh_key') -%}
      {%- endif -%}
      {{ actions }}
    proxmox_lifecycle_guest_actions: >-
      {%- set actions = [] -%}
      {%- set _skip_configure =
            (not proxmox_lifecycle_should_configure)
            or (proxmox_lifecycle_validation_failed | bool)
            or (proxmox_lxc_contract.api_spec.state | default('present') != 'present')
            or (
              proxmox_lifecycle_intent == 'configure_only'
              and proxmox_lifecycle_runtime_state == 'absent'
            ) -%}
      {%- if not _skip_configure -%}
      {%-   set _ = actions.extend([
              'wait_for_connection',
              'gather_facts',
              'configure_guest',
              'reboot_if_required'
            ]) -%}
      {%- endif -%}
      {{ actions }}
    proxmox_lifecycle_cache_actions: >-
      {%- set actions = [] -%}
      {%- if proxmox_lifecycle_rebuild_required | bool and proxmox_lifecycle_policy_effective.cleanup_rebuilt_state | bool -%}
      {%-   set _ = actions.extend(['clear_fact_cache', 'remove_known_hosts']) -%}
      {%- endif -%}
      {{ actions }}
