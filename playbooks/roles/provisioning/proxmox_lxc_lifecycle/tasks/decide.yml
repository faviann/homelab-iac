---
# ==============================================================================
# LIFECYCLE DECISION MATRIX
#
# Produces the semantic plan `proxmox_lxc_lifecycle_plan`. The plan names
# outcomes (container transition, host reconciliation, guest-access restoration,
# guest configuration, destructive intent, reason) rather than ordered task
# arrays. Downstream tasks consume the plan; they do not re-derive the
# transition.
#
# intent          | desired_state | runtime_state | container_transition | reconcile | restore | configure_guest
# ----------------|---------------|---------------|----------------------|-----------|---------|----------------
# validate_only   | *             | *             | none                 | no        | no      | no
# provision_only  | present       | absent        | provision            | yes       | yes     | no
# provision_only  | present       | running       | provision (rebuild if mismatch) | yes | yes | no
# provision_only  | absent        | *             | remove               | no        | no      | no
# configure_only  | present       | running       | none                 | yes       | yes     | yes
# configure_only  | present       | absent        | none                 | no        | no      | no
# configure_only  | absent        | *             | none                 | no        | no      | no
# full            | present       | absent        | provision            | yes       | yes     | yes
# full            | present       | running       | provision (rebuild if mismatch) | yes | yes | yes
# full            | absent        | *             | remove               | no        | no      | no
# ==============================================================================

- name: Derive lifecycle intent flags
  ansible.builtin.set_fact:
    proxmox_lifecycle_validation_failed: "{{ proxmox_lifecycle_validation_snapshot.status | default('ok') == 'mismatch' }}"
    proxmox_lifecycle_should_provision: "{{ proxmox_lifecycle_intent in ['provision_only', 'full'] }}"
    proxmox_lifecycle_should_configure: "{{ proxmox_lifecycle_intent in ['configure_only', 'full'] }}"
    proxmox_lifecycle_rebuild_required: >-
      {{
        proxmox_lifecycle_intent in ['provision_only', 'full']
        and proxmox_lxc_contract.api_spec.state | default('present') == 'present'
        and proxmox_lifecycle_policy_effective.rebuild_on_release_mismatch | bool
        and proxmox_lifecycle_release_mismatch | bool
      }}

- name: Enforce strict lifecycle validation policy
  ansible.builtin.fail:
    msg: "{{ proxmox_lifecycle_validation_snapshot.message | default('Lifecycle validation failed') }}"
  when:
    - proxmox_lifecycle_policy_effective.strict_validation | bool
    - proxmox_lifecycle_validation_failed | bool

- name: Derive lifecycle scratch flags and reason
  ansible.builtin.set_fact:
    proxmox_lifecycle_skip_provision: >-
      {{
        (not proxmox_lifecycle_should_provision)
        or (proxmox_lifecycle_validation_failed | bool)
      }}
    proxmox_lifecycle_skip_configure: >-
      {{
        (not proxmox_lifecycle_should_configure)
        or (proxmox_lifecycle_validation_failed | bool)
        or (proxmox_lxc_contract.api_spec.state | default('present') != 'present')
        or (
          proxmox_lifecycle_intent == 'configure_only'
          and proxmox_lifecycle_runtime_state == 'absent'
        )
      }}
    proxmox_lifecycle_desired_present: "{{ proxmox_lxc_contract.api_spec.state | default('present') == 'present' }}"
    proxmox_lifecycle_configure_existing: >-
      {{
        proxmox_lifecycle_intent == 'configure_only'
        and not (proxmox_lifecycle_validation_failed | bool)
        and (proxmox_lxc_contract.api_spec.state | default('present') == 'present')
        and proxmox_lifecycle_runtime_state != 'absent'
      }}
    proxmox_lifecycle_reason: >-
      {%- if proxmox_lifecycle_validation_failed | bool -%}
      {{ proxmox_lifecycle_validation_snapshot.message | default('Lifecycle validation failed') }}
      {%- elif proxmox_lifecycle_intent == 'configure_only' and proxmox_lifecycle_runtime_state == 'absent' -%}
      Container does not exist in Proxmox, so configure-only was skipped.
      {%- elif proxmox_lxc_contract.api_spec.state | default('present') != 'present' -%}
      Desired state is absent, so guest configuration was skipped.
      {%- else -%}
      {{ proxmox_lifecycle_validation_snapshot.message | default('Lifecycle actions completed') }}
      {%- endif -%}

- name: Compose semantic lifecycle plan
  ansible.builtin.set_fact:
    proxmox_lxc_lifecycle_plan:
      container_transition: >-
        {{
          'none' if (proxmox_lifecycle_skip_provision | bool)
          else ('rebuild' if (proxmox_lifecycle_rebuild_required | bool)
          else ('provision' if (proxmox_lifecycle_desired_present | bool) else 'remove'))
        }}
      reconcile_host_config: >-
        {{
          (proxmox_lifecycle_desired_present | bool)
          and (
            (not (proxmox_lifecycle_skip_provision | bool))
            or (proxmox_lifecycle_configure_existing | bool)
          )
          and (proxmox_lxc_host_config_enabled | default(true) | bool)
        }}
      restore_guest_access: >-
        {{
          (proxmox_lifecycle_desired_present | bool)
          and (
            (not (proxmox_lifecycle_skip_provision | bool))
            or (proxmox_lifecycle_configure_existing | bool)
          )
        }}
      configure_guest: "{{ not (proxmox_lifecycle_skip_configure | bool) }}"
      destructive: >-
        {{
          (not (proxmox_lifecycle_skip_provision | bool))
          and (
            (proxmox_lifecycle_rebuild_required | bool)
            or (not (proxmox_lifecycle_desired_present | bool))
          )
        }}
      reason: "{{ proxmox_lifecycle_reason }}"
