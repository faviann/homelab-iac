---
# ==============================================================================
# LIFECYCLE DECISION MATRIX
#
# Produces the semantic plan `proxmox_lxc_lifecycle_plan`. The plan names
# outcomes (container transition, host reconciliation, guest-access restoration,
# guest configuration, destructive intent, reason) rather than ordered task
# arrays. Downstream tasks consume the plan; they do not re-derive the
# transition.
#
# intent          | desired_state | runtime_state | container_transition | reconcile | restore | configure_guest
# ----------------|---------------|---------------|----------------------|-----------|---------|----------------
# validate_only   | *             | *             | none                 | no        | no      | no
# provision_only  | present       | absent        | provision            | yes       | yes     | no
# provision_only  | present       | stopped       | provision            | yes       | no      | no
# provision_only  | present       | running       | provision/rebuild    | yes       | yes     | no
# provision_only  | absent        | running/stopped | remove             | no        | no      | no
# provision_only  | absent        | absent        | none                 | no        | no      | no
# configure_only  | present       | running       | none/fail rebuild    | yes       | yes     | yes
# configure_only  | present       | absent/stopped | planning failure    | -         | -       | -
# configure_only  | absent        | *             | planning failure    | -         | -       | -
# full            | present       | absent        | provision            | yes       | yes     | yes
# full            | present       | stopped       | start                | yes       | yes     | yes
# full            | present       | running       | provision/rebuild    | yes       | yes     | yes
# full            | absent        | running/stopped | remove             | no        | no      | no
# full            | absent        | absent        | none                 | no        | no      | no
# ==============================================================================

- name: Derive lifecycle intent flags
  ansible.builtin.set_fact:
    proxmox_lifecycle_validation_failed: "{{ proxmox_lifecycle_validation_snapshot.status | default('ok') == 'mismatch' }}"
    proxmox_lifecycle_should_provision: "{{ proxmox_lifecycle_intent in ['provision_only', 'full'] }}"
    proxmox_lifecycle_should_configure: "{{ proxmox_lifecycle_intent in ['configure_only', 'full'] }}"
    proxmox_lifecycle_rebuild_required: >-
      {{
        proxmox_lxc_contract.api_spec.state | default('present') == 'present'
        and proxmox_lifecycle_policy_effective.rebuild_on_release_mismatch | bool
        and proxmox_lifecycle_release_mismatch | bool
      }}

- name: Enforce strict lifecycle validation policy
  ansible.builtin.fail:
    msg: "{{ proxmox_lifecycle_validation_snapshot.message | default('Lifecycle validation failed') }}"
  when:
    - proxmox_lifecycle_policy_effective.strict_validation | bool
    - proxmox_lifecycle_validation_failed | bool

- name: Require desired state present for configure-only lifecycle
  ansible.builtin.assert:
    that:
      - proxmox_lxc_contract.api_spec.state | default('present') == 'present'
    fail_msg: >-
      Configure-only lifecycle requires desired state present;
      desired state is absent.
  when: proxmox_lifecycle_intent == 'configure_only'

- name: Require an existing running container for configure-only lifecycle
  ansible.builtin.assert:
    that:
      - proxmox_lifecycle_runtime_state == 'running'
    fail_msg: >-
      Configure-only lifecycle requires an existing running container;
      observed state is {{ proxmox_lifecycle_runtime_state }}.
  when: proxmox_lifecycle_intent == 'configure_only'

- name: Reject a required rebuild during configure-only lifecycle
  ansible.builtin.assert:
    that:
      - not (proxmox_lifecycle_rebuild_required | bool)
    fail_msg: >-
      Configure-only lifecycle cannot perform the required rebuild;
      guest release {{ proxmox_lifecycle_actual_release }} differs from desired
      release {{ proxmox_lifecycle_desired_release }}.
  when: proxmox_lifecycle_intent == 'configure_only'

- name: Derive lifecycle scratch flags
  ansible.builtin.set_fact:
    proxmox_lifecycle_skip_provision: >-
      {{
        (not proxmox_lifecycle_should_provision)
        or (proxmox_lifecycle_validation_failed | bool)
      }}
    proxmox_lifecycle_skip_configure: >-
      {{
        (not proxmox_lifecycle_should_configure)
        or (proxmox_lifecycle_validation_failed | bool)
        or (proxmox_lxc_contract.api_spec.state | default('present') != 'present')
        or (
          proxmox_lifecycle_intent == 'configure_only'
          and proxmox_lifecycle_runtime_state == 'absent'
        )
      }}
    proxmox_lifecycle_desired_present: "{{ proxmox_lxc_contract.api_spec.state | default('present') == 'present' }}"
    proxmox_lifecycle_configure_existing: >-
      {{
        proxmox_lifecycle_intent == 'configure_only'
        and not (proxmox_lifecycle_validation_failed | bool)
        and (proxmox_lxc_contract.api_spec.state | default('present') == 'present')
        and proxmox_lifecycle_runtime_state != 'absent'
      }}

- name: Record the planned container transition
  ansible.builtin.set_fact:
    proxmox_lifecycle_container_transition: >-
      {{
        'none'
        if (
          (proxmox_lifecycle_skip_provision | bool)
          or (
            not (proxmox_lifecycle_desired_present | bool)
            and proxmox_lifecycle_runtime_state == 'absent'
          )
        )
        else ('rebuild' if (proxmox_lifecycle_rebuild_required | bool)
        else ('start' if (
          proxmox_lifecycle_intent == 'full'
          and proxmox_lifecycle_runtime_state == 'stopped'
        ) else ('provision' if (proxmox_lifecycle_desired_present | bool) else 'remove')))
      }}

- name: Explain the transition and record desired-present host preparation
  ansible.builtin.set_fact:
    proxmox_lifecycle_prepare_guest: >-
      {{
        (proxmox_lifecycle_desired_present | bool)
        and (
          (not (proxmox_lifecycle_skip_provision | bool))
          or (proxmox_lifecycle_configure_existing | bool)
        )
      }}
    proxmox_lifecycle_reason: >-
      {%- if proxmox_lifecycle_validation_failed | bool -%}
      {{ proxmox_lifecycle_validation_snapshot.message | default('Lifecycle validation failed') }}
      {%- elif proxmox_lifecycle_intent == 'configure_only' and proxmox_lifecycle_runtime_state == 'absent' -%}
      Container does not exist in Proxmox, so configure-only was skipped.
      {%- elif proxmox_lifecycle_container_transition == 'remove' -%}
      Desired state is absent, so the existing container will be removed.
      {%- elif proxmox_lifecycle_container_transition == 'rebuild' -%}
      Guest release {{ proxmox_lifecycle_actual_release }} differs from desired
      release {{ proxmox_lifecycle_desired_release }}, so the container will be rebuilt.
      {%- elif proxmox_lifecycle_container_transition == 'start' -%}
      Existing stopped container will be started because guest configuration requires it.
      {%- elif proxmox_lifecycle_container_transition == 'provision' and proxmox_lifecycle_runtime_state == 'absent' -%}
      Container is absent from Proxmox, so it will be provisioned.
      {%- elif proxmox_lifecycle_intent == 'validate_only' -%}
      Desired and observed lifecycle state was validated without executing changes.
      {%- elif not (proxmox_lifecycle_desired_present | bool) and proxmox_lifecycle_runtime_state == 'absent' -%}
      Desired state is already absent, so no container transition is planned.
      {%- elif not (proxmox_lifecycle_desired_present | bool) -%}
      Desired state is absent, but {{ proxmox_lifecycle_intent }} plans no container transition.
      {%- elif proxmox_lifecycle_intent == 'configure_only' -%}
      Existing running container will have host and guest configuration reconciled.
      {%- elif proxmox_lifecycle_intent == 'provision_only' -%}
      Existing container infrastructure will be reconciled without guest configuration.
      {%- else -%}
      Existing container infrastructure and guest configuration will be reconciled.
      {%- endif -%}

- name: Compose semantic lifecycle plan
  ansible.builtin.set_fact:
    proxmox_lxc_lifecycle_plan:
      container_transition: >-
        {{ proxmox_lifecycle_container_transition }}
      reconcile_host_config: >-
        {{
          (proxmox_lifecycle_prepare_guest | bool)
          and (proxmox_lxc_host_config_enabled | default(true) | bool)
        }}
      restore_guest_access: >-
        {{
          (proxmox_lifecycle_prepare_guest | bool)
          and not (
            proxmox_lifecycle_intent == 'provision_only'
            and proxmox_lifecycle_runtime_state == 'stopped'
            and not (proxmox_lifecycle_rebuild_required | bool)
          )
        }}
      start_container: >-
        {{
          proxmox_lifecycle_container_transition in ['rebuild', 'start']
          or (
            proxmox_lifecycle_container_transition == 'provision'
            and proxmox_lifecycle_runtime_state == 'absent'
          )
        }}
      configure_guest: "{{ not (proxmox_lifecycle_skip_configure | bool) }}"
      destructive: "{{ proxmox_lifecycle_container_transition in ['rebuild', 'remove'] }}"
      reason: "{{ proxmox_lifecycle_reason }}"

- name: Record whether host-side lifecycle work is planned
  ansible.builtin.set_fact:
    proxmox_lifecycle_has_host_work: >-
      {{
        proxmox_lxc_lifecycle_plan.container_transition != 'none'
        or (proxmox_lxc_lifecycle_plan.reconcile_host_config | bool)
      }}
