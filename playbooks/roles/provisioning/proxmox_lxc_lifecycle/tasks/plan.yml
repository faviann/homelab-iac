---
# Compatibility composition for direct role callers. The production facade
# invokes these internal modules in separate plays so target-local compilation
# and semantic planning can use independent scheduling without weakening the
# targeted-set planning barrier.

- name: Initialize lifecycle planning
  ansible.builtin.include_tasks: initialize_planning.yml

- name: Compile the target-local LXC contract
  ansible.builtin.include_tasks: compile_target.yml

- name: Coordinate targeted-set fleet preflight
  ansible.builtin.include_tasks: coordinate_preflight.yml
  run_once: true

- name: Build the target-local semantic lifecycle plan
  ansible.builtin.include_tasks: plan_target.yml

- name: Coordinate the all-target lifecycle planning barrier
  ansible.builtin.include_tasks: coordinate_barrier.yml
  run_once: true

- name: Publish target planning results
  ansible.builtin.include_tasks: publish_planning_result.yml
