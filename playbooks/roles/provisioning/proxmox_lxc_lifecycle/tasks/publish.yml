---
- name: Derive lifecycle outcome status
  ansible.builtin.set_fact:
    proxmox_lifecycle_status: >-
      {%- if proxmox_lifecycle_validation_failed | bool -%}validation_failed
      {%- elif proxmox_lifecycle_intent == 'validate_only' -%}validated
      {%- elif proxmox_lxc_lifecycle_plan.container_transition == 'remove' -%}removed
      {%- elif (
        not (proxmox_lifecycle_desired_present | bool)
        and proxmox_lxc_lifecycle_observation_after.runtime_state == 'absent'
      ) -%}absent
      {%- elif proxmox_lifecycle_skip_provision | bool and proxmox_lifecycle_skip_configure | bool -%}skipped
      {%- elif proxmox_lifecycle_intent == 'provision_only' -%}ensured
      {%- else -%}configured
      {%- endif -%}

- name: Build lifecycle result payload
  ansible.builtin.set_fact:
    lxc_lifecycle_result:
      intent: "{{ proxmox_lifecycle_intent }}"
      plan: "{{ proxmox_lxc_lifecycle_plan }}"
      outcome:
        status: "{{ proxmox_lifecycle_status }}"
        reason: "{{ proxmox_lifecycle_reason }}"
        rebuilt: "{{ proxmox_lifecycle_rebuilt | bool }}"
      observations:
        before: "{{ proxmox_lxc_lifecycle_observation_before }}"
        after: "{{ proxmox_lxc_lifecycle_observation_after | default(proxmox_lxc_lifecycle_observation_before) }}"
    proxmox_lxc_rebuilt: "{{ proxmox_lifecycle_rebuilt | bool }}"
    lxc_lifecycle_skip_host: >-
      {{
        not (proxmox_lifecycle_has_host_work | bool)
        and not (proxmox_lxc_lifecycle_plan.restore_guest_access | bool)
        and not (proxmox_lxc_lifecycle_plan.configure_guest | bool)
      }}

- name: Report lifecycle outcome
  ansible.builtin.debug:
    msg: "Lifecycle {{ lxc_lifecycle_result.outcome.status }} for {{ inventory_hostname }}"
