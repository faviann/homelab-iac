---
- name: Finalize lifecycle outcome state
  ansible.builtin.set_fact:
    _lxc_lifecycle_state: >-
      {{
        _lxc_lifecycle_state
        | combine(
            {
              'status': _lifecycle_status,
              'reason': _lifecycle_reason
            },
            recursive=True
          )
      }}
  vars:
    _lifecycle_status: >-
      {%- if proxmox_lifecycle_validation_failed | bool -%}
      validation_failed
      {%- elif proxmox_lifecycle_intent == 'validate_only' -%}
      validated
      {%- elif proxmox_lifecycle_skip_provision | bool and proxmox_lifecycle_skip_configure | bool -%}
      skipped
      {%- elif proxmox_lifecycle_intent == 'provision_only' -%}
      ensured
      {%- else -%}
      configured
      {%- endif -%}
    _lifecycle_reason: >-
      {%- if proxmox_lifecycle_validation_failed | bool -%}
      {{ proxmox_lifecycle_validation_snapshot.message | default('Lifecycle validation failed') }}
      {%- elif proxmox_lifecycle_intent == 'configure_only' and proxmox_lifecycle_runtime_state == 'absent' -%}
      Container does not exist in Proxmox, so configure-only was skipped.
      {%- elif proxmox_lxc_spec.state | default('present') != 'present' -%}
      Desired state is absent, so guest configuration was skipped.
      {%- else -%}
      {{ proxmox_lifecycle_validation_snapshot.message | default('Lifecycle actions completed') }}
      {%- endif -%}

- name: Build lifecycle result payload
  ansible.builtin.set_fact:
    lxc_lifecycle_result:
      status: "{{ _lxc_lifecycle_state.status }}"
      reason: "{{ _lxc_lifecycle_state.reason }}"
      intent: "{{ _lxc_lifecycle_state.intent }}"
      compiled_spec: "{{ _lxc_lifecycle_state.compiled_spec }}"
      validation_status: "{{ _lxc_lifecycle_state.validation_snapshot.status | default('ok') }}"
      runtime_state: "{{ _lxc_lifecycle_state.runtime_state }}"
      release_probe_state: "{{ _lxc_lifecycle_state.release_probe_state }}"
      release_mismatch: "{{ _lxc_lifecycle_state.release_mismatch | bool }}"
      rebuild_required: "{{ _lxc_lifecycle_state.rebuild_required | bool }}"
      skip_provision: "{{ _lxc_lifecycle_state.skip_provision | bool }}"
      skip_configure: "{{ _lxc_lifecycle_state.skip_configure | bool }}"
      host_actions: "{{ _lxc_lifecycle_state.actions.host }}"
      guest_actions: "{{ _lxc_lifecycle_state.actions.guest }}"
      cache_actions: "{{ _lxc_lifecycle_state.actions.cache }}"
      internal_snapshot:
        validation_snapshot: "{{ _lxc_lifecycle_state.validation_snapshot }}"
        policy_effective: "{{ _lxc_lifecycle_state.policy_effective }}"
        action_decisions:
          host: "{{ _lxc_lifecycle_state.actions.host }}"
          guest: "{{ _lxc_lifecycle_state.actions.guest }}"
          cache: "{{ _lxc_lifecycle_state.actions.cache }}"
    proxmox_lxc_rebuilt: "{{ _lxc_lifecycle_state.rebuilt | bool }}"
    lxc_lifecycle_skip_host: "{{ _lxc_lifecycle_state.skip_provision | bool and _lxc_lifecycle_state.skip_configure | bool }}"

- name: Report lifecycle outcome
  ansible.builtin.debug:
    msg: "Lifecycle {{ lxc_lifecycle_result.status }} for {{ inventory_hostname }}"
