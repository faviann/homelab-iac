---
- name: Report planned release-based rebuild in check mode
  ansible.builtin.debug:
    msg: >-
      Check mode: would destroy and recreate {{ proxmox_lxc_contract.api_spec.hostname }} (vmid {{ proxmox_lxc_contract.api_spec.vmid }})
      because guest release {{ proxmox_lifecycle_actual_release }} differs from desired Debian {{ proxmox_lifecycle_desired_release }}.
  when:
    - ansible_check_mode
    - proxmox_lxc_lifecycle_plan.container_transition == 'rebuild'

- name: Execute release-based rebuild preparation
  when:
    - not ansible_check_mode
    - proxmox_lxc_lifecycle_plan.container_transition == 'rebuild'
  block:
    - name: Stop mismatched running container before rebuild
      community.proxmox.proxmox:
        node: "{{ proxmox_lxc_contract.api_spec.node }}"
        vmid: "{{ proxmox_lxc_contract.api_spec.vmid }}"
        state: stopped
      delegate_to: "{{ proxmox_api_delegate_host }}"
      become: false
      no_log: true

    - name: Destroy mismatched container before recreate
      community.proxmox.proxmox:
        node: "{{ proxmox_lxc_contract.api_spec.node }}"
        vmid: "{{ proxmox_lxc_contract.api_spec.vmid }}"
        state: absent
      delegate_to: "{{ proxmox_api_delegate_host }}"
      become: false
      no_log: true

    - name: Mark host as rebuilt after destroy/recreate path
      ansible.builtin.set_fact:
        proxmox_lifecycle_rebuilt: true
        ansible_python_interpreter: auto_silent

- name: Ensure desired Proxmox LXC state
  ansible.builtin.include_role:
    name: infrastructure/proxmox_lxc_provision
  vars:
    proxmox_lxc_provision_start_allowed: false
  when: proxmox_lxc_lifecycle_plan.container_transition in ['provision', 'rebuild', 'remove', 'start']

- name: Start a container transition that requires a running guest
  community.proxmox.proxmox:
    node: "{{ proxmox_lxc_contract.api_spec.node }}"
    vmid: "{{ proxmox_lxc_contract.api_spec.vmid }}"
    state: started
  delegate_to: "{{ proxmox_api_delegate_host }}"
  become: false
  no_log: true
  when: >-
    proxmox_lxc_lifecycle_plan.container_transition in ['rebuild', 'start']
    or (
      proxmox_lxc_lifecycle_plan.container_transition == 'provision'
      and proxmox_lifecycle_runtime_state == 'absent'
    )

- name: Reconcile Proxmox host-side LXC configuration
  ansible.builtin.include_role:
    name: infrastructure/proxmox_lxc_host_config
    apply:
      delegate_to: "{{ proxmox_pct_delegate_host }}"
      become: true
  vars:
    ansible_host: "{{ proxmox_pct_delegate_host }}"
    ansible_user: root
  when: proxmox_lxc_lifecycle_plan.reconcile_host_config | bool

- name: Find cached facts for rebuilt host
  ansible.builtin.find:
    paths: "{{ [playbook_dir | dirname, '.ansible', 'cache'] | path_join }}"
    patterns: "*_{{ inventory_hostname }}"
    file_type: file
  register: proxmox_lifecycle_rebuilt_cache_files
  delegate_to: localhost
  become: false
  when:
    - proxmox_lifecycle_rebuilt | bool
    - proxmox_lifecycle_policy_effective.cleanup_rebuilt_state | bool

- name: Remove cached facts for rebuilt host
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ proxmox_lifecycle_rebuilt_cache_files.files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  delegate_to: localhost
  become: false
  when:
    - proxmox_lifecycle_rebuilt | bool
    - proxmox_lifecycle_policy_effective.cleanup_rebuilt_state | bool

- name: Remove stale known_hosts entries for rebuilt host
  ansible.builtin.command:
    argv:
      - ssh-keygen
      - -f
      - "{{ lookup('env', 'HOME') }}/.ssh/known_hosts"
      - -R
      - "{{ item }}"
  loop: "{{ [ansible_host | default(inventory_hostname), inventory_hostname] | unique }}"
  loop_control:
    label: "{{ item }}"
  register: proxmox_lifecycle_remove_known_host_result
  changed_when: >-
    'not found' not in (
      (proxmox_lifecycle_remove_known_host_result.stdout | default(''))
      ~
      (proxmox_lifecycle_remove_known_host_result.stderr | default(''))
    )
  failed_when: false
  delegate_to: localhost
  become: false
  when:
    - proxmox_lifecycle_rebuilt | bool
    - proxmox_lifecycle_policy_effective.cleanup_rebuilt_state | bool
