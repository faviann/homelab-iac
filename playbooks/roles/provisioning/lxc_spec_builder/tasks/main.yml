---
- name: Assert required inventory inputs are present
  ansible.builtin.assert:
    that:
      - proxmox_lxc is defined or proxmox_lxc_overrides is defined
      - >-
        (proxmox_lxc is defined and proxmox_lxc.vmid is defined)
        or
        (proxmox_lxc_overrides is defined and proxmox_lxc_overrides.vmid is defined)
      - >-
        (proxmox_lxc is defined and proxmox_lxc.hostname is defined)
        or
        (proxmox_lxc_overrides is defined and proxmox_lxc_overrides.hostname is defined)
    fail_msg: >-
      host_vars/{{ inventory_hostname }}.yml must define vmid and hostname in either
      proxmox_lxc or proxmox_lxc_overrides. See docs/inventory-structure-guide.md for
      the expected shape.

- name: Assert storage backend is configured
  ansible.builtin.assert:
    that:
      - proxmox_default_storage is defined
      - proxmox_default_storage | length > 0
    fail_msg: >-
      proxmox_default_storage must be set in group_vars/all/proxmox.yml.
      Current value: {{ proxmox_default_storage | default('UNDEFINED') }}

- name: Compile and normalize the layered LXC specification
  ansible.builtin.set_fact:
    _proxmox_lxc_compiled_spec: >-
      {%- set layers = [
        proxmox_lxc_defaults | default({}),
        proxmox_lxc_global_defaults | default({}),
        proxmox_lxc_group_defaults | default({}),
        proxmox_lxc_capability_defaults | default({}),
        proxmox_lxc_overrides | default({}),
        proxmox_lxc | default({})
      ] -%}
      {%- set compiled = namespace(value={}) -%}
      {%- for layer in layers -%}
      {%-   set compiled.value = compiled.value | combine(layer, recursive=True) -%}
      {%- endfor -%}
      {%- if compiled.value.disk is defined and compiled.value.disk | string is not search(':') -%}
      {%-   set compiled.value = compiled.value | combine({'disk': proxmox_default_storage ~ ':' ~ (compiled.value.disk | string)}, recursive=True) -%}
      {%- endif -%}
      {%- if lxc_hwaddr is defined
             and compiled.value.netif is defined
             and compiled.value.netif.net0 is defined
             and compiled.value.netif.net0 is not search(',hwaddr=') -%}
      {%-   set compiled.value = compiled.value | combine({
              'netif': {
                'net0': compiled.value.netif.net0
                  | regex_replace(',ip=dhcp', ',hwaddr=' ~ lxc_hwaddr ~ ',ip=dhcp')
              }
            }, recursive=True) -%}
      {%- endif -%}
      {%- if proxmox_lxc_disable_root_password | bool -%}
      {%-   set compiled.value = compiled.value | dict2items | rejectattr('key', 'equalto', 'password') | list | items2dict -%}
      {%- endif -%}
      {%- if proxmox_lxc_controller_pubkey_enabled | bool
             and compiled.value.pubkey is not defined
             and proxmox_lxc_controller_pubkey_path | default('') | length > 0 -%}
      {%-   set controller_pubkey = lookup('ansible.builtin.file', proxmox_lxc_controller_pubkey_path, errors='ignore') | default('', true) -%}
      {%-   if controller_pubkey | length > 0 -%}
      {%-     set compiled.value = compiled.value | combine({'pubkey': controller_pubkey}, recursive=True) -%}
      {%-   endif -%}
      {%- endif -%}
      {{ compiled.value }}

- name: Show spec layer contributions
  ansible.builtin.debug:
    msg: |
      === LXC spec layer contributions for {{ inventory_hostname }} ===
      Layer 1 (role defaults):       {{ proxmox_lxc_defaults | to_nice_yaml }}
      Layer 2 (global defaults):     {{ proxmox_lxc_global_defaults | default({}) | to_nice_yaml }}
      Layer 3 (group/tier defaults): {{ proxmox_lxc_group_defaults | default({}) | to_nice_yaml }}
      Layer 4 (capability defaults): {{ proxmox_lxc_capability_defaults | default({}) | to_nice_yaml }}
      Layer 5 (overrides):           {{ proxmox_lxc_overrides | default({}) | to_nice_yaml }}
      Layer 6 (host spec):           {{ proxmox_lxc | default({}) | to_nice_yaml }}
      Merged result:                 {{ _proxmox_lxc_compiled_spec | to_nice_yaml }}
  tags:
    - never
    - spec_debug

- name: Assert Docker capability defaults are present when Docker is enabled
  ansible.builtin.assert:
    that:
      - _proxmox_lxc_compiled_spec.features is defined
      - _proxmox_lxc_compiled_spec.features | length > 0
    fail_msg: >-
      {{ inventory_hostname }} has docker_enabled enabled but no merged LXC features.
      Add the host to the cap_docker group in inventory/hosts.yml or define
      proxmox_lxc_capability_defaults.features explicitly.
  when: docker_enabled | default(false)

- name: Build the explicit compiled LXC contract
  ansible.builtin.set_fact:
    proxmox_lxc_contract: >-
      {%- set identity = {
        'vmid': _proxmox_lxc_compiled_spec.vmid,
        'hostname': _proxmox_lxc_compiled_spec.hostname
      } -%}
      {%- set api_keys = [
        'node', 'ostemplate', 'pool', 'password', 'pubkey', 'description',
        'storage', 'disk', 'mount_volumes', 'cores', 'cpus', 'cpuunits',
        'memory', 'swap', 'netif', 'unprivileged', 'onboot', 'timezone',
        'nameserver', 'searchdomain', 'mounts', 'startup', 'tags', 'timeout',
        'ostype', 'state', 'update', 'start_on_create'
      ] -%}
      {%- set api_spec = identity | combine(
        _proxmox_lxc_compiled_spec
        | dict2items
        | selectattr('key', 'in', api_keys)
        | list
        | items2dict,
        recursive=True
      ) -%}
      {%- set release_candidates = (_proxmox_lxc_compiled_spec.ostemplate | default('')) | regex_findall('debian-([0-9]+)-') -%}
      {{
        {
          'identity': identity,
          'api_spec': api_spec,
          'host_config': {
            'vmid': identity.vmid,
            'hostname': identity.hostname,
            'host_directories': proxmox_lxc_host_directories | default([]),
            'bind_mounts': proxmox_default_bind_mounts | default({}) | combine(proxmox_lxc_bind_mounts_overrides | default({}), recursive=True),
            'idmap': proxmox_lxc_idmap_overrides | default(proxmox_default_idmap, true),
            'features': _proxmox_lxc_compiled_spec.features | default([]),
            'configure_nvidia_runtime': configure_nvidia_runtime | default(false) | bool,
            'wireguard_kernel_module_access': wireguard_kernel_module_access | default(false) | bool,
            'lxc_custom_sysctls': lxc_custom_sysctls | default([]),
            'lxc_disable_apparmor': lxc_disable_apparmor | default(false) | bool
          },
          'guest_bootstrap': {
            'vmid': identity.vmid,
            'hostname': identity.hostname,
            'pubkey': _proxmox_lxc_compiled_spec.pubkey | default('')
          },
          'derived_metadata': {
            'desired_debian_release_candidates': release_candidates,
            'desired_debian_release': release_candidates | first | default('')
          }
        }
      }}

- name: Validate assembled LXC spec
  ansible.builtin.assert:
    that:
      - _proxmox_lxc_compiled_spec.vmid is defined
      - _proxmox_lxc_compiled_spec.vmid | int > 0
      - _proxmox_lxc_compiled_spec.hostname is defined
      - _proxmox_lxc_compiled_spec.hostname | length > 0
      - _proxmox_lxc_compiled_spec.node is defined
      - _proxmox_lxc_compiled_spec.node | length > 0
      - _proxmox_lxc_compiled_spec.ostemplate is defined
      - _proxmox_lxc_compiled_spec.ostemplate | length > 0
      - _proxmox_lxc_compiled_spec.cores is defined
      - _proxmox_lxc_compiled_spec.cores | int >= 1
      - _proxmox_lxc_compiled_spec.memory is defined
      - _proxmox_lxc_compiled_spec.memory | int >= 64
      - _proxmox_lxc_compiled_spec.disk is defined
      - _proxmox_lxc_compiled_spec.disk | length > 0
      - _proxmox_lxc_compiled_spec.netif is defined
      - _proxmox_lxc_compiled_spec.netif | length > 0
      - _proxmox_lxc_compiled_spec.state in ['present', 'absent']
    fail_msg: >-
      Invalid LXC spec for {{ inventory_hostname }}.
      Assembled spec: {{ _proxmox_lxc_compiled_spec | to_nice_yaml }}
      Check: host_vars/{{ inventory_hostname }}.yml for vmid/hostname,
      group_vars/all/proxmox.yml for node/ostemplate,
      group_vars/tier_*/vars.yml for proxmox_lxc_group_defaults resource defaults.

- name: Validate compiled LXC contract
  ansible.builtin.assert:
    that:
      - proxmox_lxc_contract.identity is mapping
      - proxmox_lxc_contract.api_spec is mapping
      - proxmox_lxc_contract.host_config is mapping
      - proxmox_lxc_contract.host_config.host_directories is sequence
      - proxmox_lxc_contract.host_config.host_directories is not string
      - proxmox_lxc_contract.host_config.bind_mounts is mapping
      - proxmox_lxc_contract.host_config.idmap is sequence
      - proxmox_lxc_contract.host_config.idmap is not string
      - proxmox_lxc_contract.host_config.features is sequence
      - proxmox_lxc_contract.host_config.features is not string
      - proxmox_lxc_contract.host_config.configure_nvidia_runtime is boolean
      - proxmox_lxc_contract.host_config.wireguard_kernel_module_access is boolean
      - proxmox_lxc_contract.host_config.lxc_custom_sysctls is sequence
      - proxmox_lxc_contract.host_config.lxc_custom_sysctls is not string
      - proxmox_lxc_contract.host_config.lxc_disable_apparmor is boolean
      - proxmox_lxc_contract.guest_bootstrap is mapping
      - proxmox_lxc_contract.guest_bootstrap.vmid is defined
      - proxmox_lxc_contract.guest_bootstrap.vmid | int > 0
      - proxmox_lxc_contract.guest_bootstrap.hostname is defined
      - proxmox_lxc_contract.guest_bootstrap.hostname is string
      - proxmox_lxc_contract.guest_bootstrap.hostname | trim | length > 0
      - proxmox_lxc_contract.guest_bootstrap.pubkey is defined
      - proxmox_lxc_contract.guest_bootstrap.pubkey is string
      - proxmox_lxc_contract.guest_bootstrap.pubkey | trim | length > 0
      - proxmox_lxc_contract.derived_metadata is mapping
      - proxmox_lxc_contract.identity.vmid == _proxmox_lxc_compiled_spec.vmid
      - proxmox_lxc_contract.identity.hostname == _proxmox_lxc_compiled_spec.hostname
      - proxmox_lxc_contract.api_spec.vmid == proxmox_lxc_contract.identity.vmid
      - proxmox_lxc_contract.api_spec.hostname == proxmox_lxc_contract.identity.hostname
      - proxmox_lxc_contract.host_config.vmid == proxmox_lxc_contract.identity.vmid
      - proxmox_lxc_contract.host_config.hostname == proxmox_lxc_contract.identity.hostname
      - proxmox_lxc_contract.guest_bootstrap.vmid == proxmox_lxc_contract.identity.vmid
      - proxmox_lxc_contract.guest_bootstrap.hostname == proxmox_lxc_contract.identity.hostname
    fail_msg: >-
      Invalid compiled LXC contract for {{ inventory_hostname }}.
      Contract: {{ proxmox_lxc_contract | to_nice_yaml }}

- name: Validate host-directory contract entries
  ansible.builtin.assert:
    that:
      - item is mapping
      - item.path is defined
      - item.path | string | length > 0
    fail_msg: >-
      proxmox_lxc_host_directories entries for {{ inventory_hostname }} must be
      mappings with a non-empty path.
      Entry: {{ item | to_nice_yaml }}
  loop: "{{ proxmox_lxc_contract.host_config.host_directories }}"
  loop_control:
    label: "{{ item.path | default('missing path') }}"
  when: proxmox_lxc_contract.host_config.host_directories | length > 0

- name: Validate custom-sysctl contract entries
  ansible.builtin.assert:
    that:
      - item is mapping
      - item.key is defined
      - item.key | string | length > 0
      - item.value is defined
    fail_msg: >-
      lxc_custom_sysctls entries for {{ inventory_hostname }} must be mappings
      with a non-empty key and a value.
  loop: "{{ proxmox_lxc_contract.host_config.lxc_custom_sysctls }}"
  loop_control:
    label: "{{ item.key | default('missing key') }}"
  when: proxmox_lxc_contract.host_config.lxc_custom_sysctls | length > 0
