---
# ==============================================================================
# LXC SPEC LAYER PRECEDENCE (lowest -> highest)
# ==============================================================================
#
# Layer 1: proxmox_lxc_defaults           (this file - role baseline)
# Layer 2: proxmox_lxc_global_defaults    (group_vars/all/proxmox.yml)
# Layer 3: proxmox_lxc_group_defaults     (group_vars/tier_*/vars.yml)
# Layer 4: proxmox_lxc_capability_defaults (group_vars/cap_*/vars.yml)
# Layer 5: proxmox_lxc_overrides          (host_vars/<host>.yml - optional)
# Layer 6: proxmox_lxc                    (host_vars/<host>.yml)
#
# To debug a spec value, inspect the layers from 6 -> 1 in descending precedence.
# ==============================================================================

# Default variables for lxc_spec_builder role

# ==============================================================================
# Baseline Container Settings
# ==============================================================================
# Baseline container settings merged with host_vars before provisioning
proxmox_lxc_defaults:
  state: present
  update: false
  unprivileged: true
  onboot: true
  start_on_create: false

# ==============================================================================
# SSH Key Configuration
# ==============================================================================
# Automatically copy the control node's SSH public key into newly provisioned containers
proxmox_lxc_controller_pubkey_enabled: true
proxmox_lxc_controller_pubkey_path: "{{ playbook_dir }}/.ansible/ssh/proxmox_lxc.pub"

# When enabled, omit any password from the provisioning request so root key auth is required
proxmox_lxc_disable_root_password: true
