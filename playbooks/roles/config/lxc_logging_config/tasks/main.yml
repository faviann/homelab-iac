---
# Main tasks file for lxc_logging_config role
# Configures journald log size limits to prevent disk space issues

- name: Check if journald config exists
  ansible.builtin.stat:
    path: /etc/systemd/journald.conf
  register: _journald_config_stat

- name: Fail if journald config is missing
  ansible.builtin.fail:
    msg: "journald.conf not found at /etc/systemd/journald.conf"
  when: not _journald_config_stat.stat.exists

- name: Backup original journald configuration
  ansible.builtin.copy:
    src: /etc/systemd/journald.conf
    dest: /etc/systemd/journald.conf.backup
    remote_src: true
    mode: '0644'
    force: false

- name: Configure journald log limits
  ansible.builtin.blockinfile:
    path: /etc/systemd/journald.conf
    marker: "# {mark} ANSIBLE MANAGED BLOCK - lxc_logging_config"
    block: |
      [Journal]
      SystemMaxUse={{ lxc_logging_journald_max_use }}
      SystemMaxFileSize={{ lxc_logging_journald_max_file_size }}
    create: false
  notify: restart journald

- name: Ensure journald service is enabled and running
  ansible.builtin.systemd:
    name: systemd-journald
    enabled: true
    state: started
