---
# Report: publish a stable deployment report from the stack reconciliation accumulator.

- name: Publish stack sync deployment report
  ansible.builtin.set_fact:
    lxc_docker_env_deployment_report:
      changed: >-
        {{
          (
            (_lxc_docker_env_reconciliation.managed_assets.changed_results | default([]))
            + (_lxc_docker_env_reconciliation.materialized.changed_results | default([]))
            + (_lxc_docker_env_reconciliation.quarantined.changed_results | default([]))
            + (_lxc_docker_env_reconciliation.started.changed_results | default([]))
          )
          | selectattr('changed', 'defined')
          | selectattr('changed')
          | list
          | length > 0
        }}
      discovered_stacks: "{{ _lxc_docker_env_reconciliation.discovered_stacks | default([]) }}"
      created_dirs: "{{ _lxc_docker_env_reconciliation.materialized.created_dirs | default([]) }}"
      updated_dirs: "{{ _lxc_docker_env_reconciliation.materialized.updated_dirs | default([]) }}"
      created_networks: "{{ _lxc_docker_env_reconciliation.started.created_networks | default([]) }}"
      quarantined_stacks: "{{ _lxc_docker_env_reconciliation.quarantined.stacks | default([]) }}"
      started_stacks: "{{ _lxc_docker_env_reconciliation.started.started_stacks | default([]) }}"
      unchanged_stacks: "{{ _lxc_docker_env_reconciliation.started.unchanged_stacks | default([]) }}"
      skipped_stacks: "{{ _lxc_docker_env_reconciliation.started.skipped_stacks | default([]) }}"