---
# Materialize: execute the compose manifest plan by syncing stack files and creating planned assets.

- name: Plan desired stack materialization inputs
  ansible.builtin.include_tasks: planner.yml

- name: Check which per-host stack directories already exist
  ansible.builtin.stat:
    path: "{{ item }}"
  loop: "{{ lxc_stack_sync_manifest_plan.stack_dirs_to_create | default([]) }}"
  loop_control:
    label: "{{ item | relpath(lxc_docker_environment_internal.shared_mount_source ~ '/stacks') }}"
  register: _stack_sync_stack_dir_stats
  when: (lxc_stack_sync_manifest_plan.stack_dirs_to_create | default([])) | length > 0

- name: Create per-host stack directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ lxc_docker_environment_internal.shared_owner }}"
    group: "{{ lxc_docker_environment_internal.shared_group }}"
    mode: '0755'
  loop: "{{ lxc_stack_sync_manifest_plan.stack_dirs_to_create | default([]) }}"
  loop_control:
    label: "{{ item | relpath(lxc_docker_environment_internal.shared_mount_source ~ '/stacks') }}"
  register: _stack_sync_stack_dir_results
  when: (lxc_stack_sync_manifest_plan.stack_dirs_to_create | default([])) | length > 0

- name: Render templated files (.j2) for per-host stacks
  ansible.builtin.template:
    src: "{{ item.source_path }}"
    dest: "{{ item.dest_path }}"
    owner: "{{ lxc_docker_environment_internal.shared_owner }}"
    group: "{{ lxc_docker_environment_internal.shared_group }}"
    mode: '0644'
  vars:
    stack_name: "{{ item.stack_name }}"
  loop: "{{ lxc_stack_sync_manifest_plan.files_to_render | default([]) }}"
  loop_control:
    label: "{{ item.relative_path }}"
  register: _stack_sync_template_results

- name: Copy static files for per-host stacks
  ansible.builtin.copy:
    src: "{{ item.source_path }}"
    dest: "{{ item.dest_path }}"
    owner: "{{ lxc_docker_environment_internal.shared_owner }}"
    group: "{{ lxc_docker_environment_internal.shared_group }}"
    mode: '0644'
  loop: "{{ lxc_stack_sync_manifest_plan.files_to_copy | default([]) }}"
  loop_control:
    label: "{{ item.relative_path }}"
  register: _stack_sync_copy_results

- name: Check which stack prereq dirs already exist
  ansible.builtin.stat:
    path: "{{ item.path }}"
  loop: "{{ lxc_stack_sync_manifest_plan.prereq_dirs | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  register: _stack_sync_prereq_dir_stats
  when: (lxc_stack_sync_manifest_plan.prereq_dirs | default([])) | length > 0

- name: Ensure stack prereq dirs exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop: "{{ lxc_stack_sync_manifest_plan.prereq_dirs | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  register: _stack_sync_prereq_dir_results
  when: (lxc_stack_sync_manifest_plan.prereq_dirs | default([])) | length > 0

- name: Check which ownership override paths already exist
  ansible.builtin.stat:
    path: "{{ item.path }}"
  loop: "{{ lxc_stack_sync_manifest_plan.ownership_overrides | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  register: _stack_sync_ownership_override_stats
  when: (lxc_stack_sync_manifest_plan.ownership_overrides | default([])) | length > 0

- name: Apply path-specific ownership overrides for stack data
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    recurse: "{{ item.recurse | default(false) }}"
  loop: "{{ lxc_stack_sync_manifest_plan.ownership_overrides | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  register: _stack_sync_ownership_override_results
  when: (lxc_stack_sync_manifest_plan.ownership_overrides | default([])) | length > 0

- name: Check which managed file parent directories already exist
  ansible.builtin.stat:
    path: "{{ item.path }}"
  loop: "{{ lxc_stack_sync_manifest_plan.managed_file_parent_dirs | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  register: _stack_sync_managed_file_parent_dir_stats
  when: (lxc_stack_sync_manifest_plan.managed_file_parent_dirs | default([])) | length > 0

- name: Ensure managed file parent directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop: "{{ lxc_stack_sync_manifest_plan.managed_file_parent_dirs | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  register: _stack_sync_managed_file_parent_dir_results
  when: (lxc_stack_sync_manifest_plan.managed_file_parent_dirs | default([])) | length > 0

- name: Create managed files when absent
  ansible.builtin.copy:
    content: ""
    dest: "{{ item.path }}"
    force: false
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop: "{{ lxc_stack_sync_manifest_plan.managed_files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  register: _stack_sync_managed_file_create_results
  when: (lxc_stack_sync_manifest_plan.managed_files | default([])) | length > 0

- name: Ensure managed file permissions are correct
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: file
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop: "{{ lxc_stack_sync_manifest_plan.managed_files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  register: _stack_sync_managed_file_permission_results
  when: (lxc_stack_sync_manifest_plan.managed_files | default([])) | length > 0