---
# Quarantine: stop and move stale deployed top-level stacks.

- name: Ensure stale stack quarantine directory exists
  ansible.builtin.file:
    path: "{{ lxc_docker_environment_internal.stale_stack_quarantine_root }}"
    state: directory
    owner: "{{ lxc_docker_environment_internal.shared_owner }}"
    group: "{{ lxc_docker_environment_internal.shared_group }}"
    mode: "0755"

- name: Stop stale deployed top-level stack projects
  ansible.builtin.command:
    cmd: docker compose down --remove-orphans
    chdir: "{{ item.path }}"
  loop: "{{ _deployed_top_level_stack_dirs.files | default([]) }}"
  loop_control:
    label: "{{ item.path | basename }}"
  failed_when: false
  changed_when: false
  when: (item.path | basename) in lxc_docker_env_stale_top_level_stack_dirs

- name: Quarantine stale deployed top-level stack directories
  ansible.builtin.command:
    argv:
      - mv
      - "{{ item.path }}"
      - >-
        {{ lxc_docker_environment_internal.stale_stack_quarantine_root
        }}/{{ item.path | basename }}-{{ ansible_date_time.iso8601_basic_short }}
  loop: "{{ _deployed_top_level_stack_dirs.files | default([]) }}"
  loop_control:
    label: "{{ item.path | basename }}"
  register: _stack_sync_quarantine_results
  changed_when: true
  when: (item.path | basename) in lxc_docker_env_stale_top_level_stack_dirs

- name: Publish quarantine slice into stack reconciliation
  ansible.builtin.set_fact:
    _lxc_docker_env_reconciliation: >-
      {{
        (_lxc_docker_env_reconciliation | default({}))
        | combine(
            {
              'quarantined': {
                'changed_results': (((_stack_sync_quarantine_results | default({})).results | default([]))),
                'stacks': (
                  (((_stack_sync_quarantine_results | default({})).results | default([]))
                  | selectattr('changed', 'defined')
                  | selectattr('changed')
                  | map(attribute='item.path')
                  | map('basename')
                  | list)
                )
              }
            },
            recursive=True
          )
      }}
