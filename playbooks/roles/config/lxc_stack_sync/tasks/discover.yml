---
# Discovery: find source stacks, compute desired/stale sets, guard against missing source.

- name: Assert stack sync parent role context is present
  ansible.builtin.assert:
    that:
      - lxc_docker_environment_internal is defined
      - lxc_docker_environment_internal.stacks_source is defined
    fail_msg: >-
      config/lxc_stack_sync requires lxc_docker_environment_internal.stacks_source.
      Call this role from config/lxc_docker_environment or provide that context
      explicitly for focused tests.

- name: Initialize stack sync state
  ansible.builtin.set_fact:
    lxc_stack_sync_source_exists: false
    lxc_docker_env_desired_top_level_stack_dirs: []
    lxc_docker_env_stale_top_level_stack_dirs: []
    _lxc_docker_env_reconciliation:
      source_exists: false
      discovered_stacks: []
      stale_stacks: []
      managed_assets:
        changed_results: "{{ lxc_stack_sync_managed_assets.changed_results | default([]) }}"
      materialized:
        changed_results: []
        created_dirs: []
        updated_dirs: []
      quarantined:
        changed_results: []
        stacks: []
      started:
        changed_results: []
        created_networks: []
        started_stacks: []
        unchanged_stacks: []
        skipped_stacks: []
    lxc_stack_sync_manifest_plan:
      templated_outputs: []
      source_compose_specs: []
      stack_dirs_to_create: []
      files_to_render: []
      files_to_copy: []
      prereq_dirs: []
      ownership_overrides: []
      managed_files: []
      managed_file_parent_dirs: []
    lxc_docker_env_deployment_report:
      changed: false
      discovered_stacks: []
      created_dirs: []
      updated_dirs: []
      created_networks: []
      quarantined_stacks: []
      started_stacks: []
      unchanged_stacks: []
      skipped_stacks: []

- name: Check if per-host stacks source exists
  ansible.builtin.stat:
    path: "{{ lxc_docker_environment_internal.stacks_source }}"
  register: _per_host_stacks_dir
  delegate_to: localhost
  become: false

- name: Record whether per-host stack source exists
  ansible.builtin.set_fact:
    lxc_stack_sync_source_exists: "{{ _per_host_stacks_dir.stat.exists | default(false) }}"

- name: Find template files (.j2) in per-host stacks
  ansible.builtin.find:
    paths: "{{ lxc_docker_environment_internal.stacks_source }}"
    patterns: "*.j2"
    hidden: true
    recurse: true
    file_type: file
  register: _per_host_j2_files
  delegate_to: localhost
  become: false
  when: _per_host_stacks_dir.stat.exists | default(false)

- name: Find static files in per-host stacks
  ansible.builtin.find:
    paths: "{{ lxc_docker_environment_internal.stacks_source }}"
    patterns: "*"
    excludes: "*.j2,.gitkeep"
    hidden: true
    recurse: true
    file_type: file
  register: _per_host_static_files
  delegate_to: localhost
  become: false
  when: _per_host_stacks_dir.stat.exists | default(false)

- name: Find directories in per-host stacks
  ansible.builtin.find:
    paths: "{{ lxc_docker_environment_internal.stacks_source }}"
    recurse: true
    file_type: directory
  register: _per_host_dirs
  delegate_to: localhost
  become: false
  when: _per_host_stacks_dir.stat.exists | default(false)

- name: Find top-level directories in per-host stacks
  ansible.builtin.find:
    paths: "{{ lxc_docker_environment_internal.stacks_source }}"
    recurse: false
    file_type: directory
  register: _per_host_top_level_dirs
  delegate_to: localhost
  become: false
  when: _per_host_stacks_dir.stat.exists | default(false)

- name: Find deployed top-level stack directories
  ansible.builtin.find:
    paths: "{{ lxc_docker_environment_internal.shared_mount_source }}/stacks"
    recurse: false
    file_type: directory
  register: _deployed_top_level_stack_dirs

- name: Initialize desired top-level stack directories from managed assets
  ansible.builtin.set_fact:
    lxc_docker_env_desired_top_level_stack_dirs: >-
      {%- set desired = [] -%}
      {%- if docker_agents_enabled | default(false) -%}
      {%- set _ = desired.append('docker-agents') -%}
      {%- endif -%}
      {%- if service_agents_enabled | default(false) -%}
      {%- set _ = desired.append('admin') -%}
      {%- endif -%}
      {{ desired | unique }}

- name: Append per-host repo stack directories to desired stack set
  ansible.builtin.set_fact:
    lxc_docker_env_desired_top_level_stack_dirs: >-
      {{
        (
          lxc_docker_env_desired_top_level_stack_dirs
          + (
            _per_host_top_level_dirs.files | default([])
            | map(attribute='path')
            | map('basename')
            | list
          )
        )
        | unique
      }}
  when: _per_host_stacks_dir.stat.exists | default(false)

- name: Fail when repo stack source is missing but unmanaged deployed stacks exist
  ansible.builtin.assert:
    that:
      - >-
        (
          _deployed_top_level_stack_dirs.files | default([])
          | map(attribute='path')
          | map('basename')
          | difference(lxc_docker_env_desired_top_level_stack_dirs | default([]))
          | list
          | length
        ) == 0
    fail_msg: >-
      Missing per-host stack source directory at
      {{ lxc_docker_environment_internal.stacks_source }} while unmanaged deployed
      stack directories still exist:
      {{
        _deployed_top_level_stack_dirs.files | default([])
        | map(attribute='path')
        | map('basename')
        | difference(lxc_docker_env_desired_top_level_stack_dirs | default([]))
        | list
        | join(', ')
      }}
  when: not (_per_host_stacks_dir.stat.exists | default(false))

- name: Build list of stale deployed top-level stack directories
  ansible.builtin.set_fact:
    lxc_docker_env_stale_top_level_stack_dirs: >-
      {{
        _deployed_top_level_stack_dirs.files | default([])
        | map(attribute='path')
        | map('basename')
        | difference(lxc_docker_env_desired_top_level_stack_dirs | default([]))
        | list
      }}
  when: _per_host_stacks_dir.stat.exists | default(false)

- name: Fail when stack_filter is used but stacks source is absent
  ansible.builtin.assert:
    that: lxc_stack_sync_source_exists | bool
    fail_msg: >-
      stack_filter '{{ stack_filter }}' was requested but the per-host stacks source
      directory does not exist at {{ lxc_docker_environment_internal.stacks_source }}.
  when: stack_filter is defined

- name: Assert stack_filter names a known stack
  ansible.builtin.assert:
    that:
      - stack_filter | length > 0
      - stack_filter in lxc_docker_env_desired_top_level_stack_dirs
    fail_msg: >-
      stack_filter '{{ stack_filter }}' not found. Known stacks:
      {{ lxc_docker_env_desired_top_level_stack_dirs | join(', ') }}
  when: stack_filter is defined

- name: Scope desired stacks to stack_filter
  ansible.builtin.set_fact:
    lxc_docker_env_desired_top_level_stack_dirs: "{{ [stack_filter] }}"
  when: stack_filter is defined

- name: Suppress stale stack list when stack_filter is active
  ansible.builtin.set_fact:
    lxc_docker_env_stale_top_level_stack_dirs: []
  when: stack_filter is defined

- name: Scope per-host find results to stack_filter
  ansible.builtin.set_fact:
    _per_host_j2_files:
      files: >-
        {{
          _per_host_j2_files.files | default([])
          | selectattr('path', 'search', '/' ~ stack_filter ~ '/')
          | list
        }}
    _per_host_static_files:
      files: >-
        {{
          _per_host_static_files.files | default([])
          | selectattr('path', 'search', '/' ~ stack_filter ~ '/')
          | list
        }}
    _per_host_dirs:
      files: >-
        {{
          _per_host_dirs.files | default([])
          | selectattr('path', 'search', '/' ~ stack_filter ~ '/')
          | list
        }}
  when: stack_filter is defined

- name: Publish discovery slice into stack reconciliation
  ansible.builtin.set_fact:
    _lxc_docker_env_reconciliation: >-
      {{
        (_lxc_docker_env_reconciliation | default({}))
        | combine(
            {
              'source_exists': (lxc_stack_sync_source_exists | default(false)),
              'discovered_stacks': (lxc_docker_env_desired_top_level_stack_dirs | default([])),
              'stale_stacks': (lxc_docker_env_stale_top_level_stack_dirs | default([]))
            },
            recursive=True
          )
      }}