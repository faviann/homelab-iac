---
workstation_username: "{{ docker_user }}"
workstation_uid: "{{ docker_uid }}"
workstation_gid: "{{ docker_gid }}"
workstation_home: "/home/{{ workstation_username }}"
workstation_aoe_proxy_firewall_enabled: false
workstation_aoe_proxy_firewall_port: 4001
workstation_aoe_proxy_firewall_allowed_hosts: []
workstation_persistent_home_enabled: false
workstation_persistent_home_root: /ephemeral/workstation/home
workstation_persistent_home_links:
  - name: claude
    path: "{{ workstation_home }}/.claude"
    target: "{{ workstation_persistent_home_root }}/.claude"
    mode: "0700"
  - name: codex
    path: "{{ workstation_home }}/.codex"
    target: "{{ workstation_persistent_home_root }}/.codex"
    mode: "0700"
  - name: repos
    path: "{{ workstation_home }}/repos"
    target: "{{ workstation_persistent_home_root }}/repos"
    mode: "0755"
workstation_packages:
  - tmux
  - mosh
  - wget
  - git
  - htop
  - tree
  - zip
  - unzip
  - build-essential
  - pkg-config
  - python3-venv
  - python3-pip
workstation_setup_marker_path: "{{ workstation_home }}/.local/state/workstation-setup/complete"
workstation_setup_version: "1"
workstation_dotfiles_repo_url: https://github.com/faviann/dotfiles.git
workstation_github_cli_token_item: dotfiles/github-cli-token
workstation_mise_install_url: https://mise.run
workstation_mise_bin: "{{ workstation_home }}/.local/bin/mise"
workstation_mise_shims_dir: "{{ workstation_home }}/.local/share/mise/shims"
workstation_bw_version: "2025.12.0"
workstation_bw_download_url: "https://github.com/bitwarden/clients/releases/download/cli-v{{ workstation_bw_version }}/bw-linux-{{ workstation_bw_version }}.zip"
workstation_bw_release_api_url: "https://api.github.com/repos/bitwarden/clients/releases/tags/cli-v{{ workstation_bw_version }}"
workstation_bw_bin_path: /usr/local/bin/bw
workstation_setup_bin_path: /usr/local/bin/workstation-setup
workstation_setup_profile_hook_path: /etc/profile.d/workstation-setup.sh
workstation_system_bin_owner: root
workstation_system_bin_group: root
