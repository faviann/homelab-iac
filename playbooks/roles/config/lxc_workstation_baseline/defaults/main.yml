---
workstation_username: "{{ docker_user }}"
workstation_uid: "{{ docker_uid }}"
workstation_gid: "{{ docker_gid }}"
workstation_home: "/home/{{ workstation_username }}"
workstation_aoe_proxy_firewall_enabled: false
workstation_aoe_proxy_firewall_port: 4001
workstation_aoe_proxy_firewall_allowed_hosts: []
workstation_aoe_proxy_firewall_nft_dir: /etc/nftables.d
workstation_aoe_proxy_firewall_nft_path: "{{ workstation_aoe_proxy_firewall_nft_dir }}/workstation-aoe-proxy.nft"
workstation_aoe_proxy_firewall_service_path: /etc/systemd/system/workstation-aoe-proxy-firewall.service
workstation_hermes_dashboard_port: 9119
workstation_openclaw_gateway_port: 18789
workstation_persistent_home_enabled: false
workstation_persistent_home_root: /ephemeral/workstation/home
workstation_persistent_home_mount_state: mounted
workstation_persistent_home_fstab_path: /etc/fstab
workstation_persistent_home_links:
  - name: claude
    type: bind_mount
    path: "{{ workstation_home }}/.claude"
    target: "{{ workstation_persistent_home_root }}/.claude"
    mode: "0700"
  - name: codex
    type: bind_mount
    path: "{{ workstation_home }}/.codex"
    target: "{{ workstation_persistent_home_root }}/.codex"
    mode: "0700"
  - name: agents
    type: bind_mount
    path: "{{ workstation_home }}/.agents"
    target: "{{ workstation_persistent_home_root }}/.agents"
    mode: "0700"
  - name: pi
    type: bind_mount
    path: "{{ workstation_home }}/.pi"
    target: "{{ workstation_persistent_home_root }}/.pi"
    mode: "0700"
  - name: agent_of_empires
    type: bind_mount
    path: "{{ workstation_home }}/.config/agent-of-empires"
    target: "{{ workstation_persistent_home_root }}/.config/agent-of-empires"
    mode: "0700"
  - name: hermes
    type: bind_mount
    path: "{{ workstation_home }}/.hermes"
    target: "{{ workstation_persistent_home_root }}/.hermes"
    mode: "0700"
  - name: openclaw
    type: bind_mount
    path: "{{ workstation_home }}/.openclaw"
    target: "{{ workstation_persistent_home_root }}/.openclaw"
    mode: "0700"
  - name: repos
    type: bind_mount
    path: "{{ workstation_home }}/repos"
    target: "{{ workstation_persistent_home_root }}/repos"
    mode: "0755"
workstation_packages:
  - locales
  - tmux
  - mosh
  - wget
  - git
  - sshpass
  - htop
  - tree
  - zip
  - unzip
  - build-essential
  - pkg-config
  - python3-venv
  - python3-pip
  - bubblewrap
workstation_setup_marker_path: "{{ workstation_home }}/.local/state/workstation-setup/complete"
workstation_setup_version: "2"
workstation_dotfiles_repo_url: https://github.com/faviann/dotfiles.git
workstation_github_cli_token_item: dotfiles/github-cli-token
workstation_nix_install_enabled: true
workstation_nix_install_url: https://install.determinate.systems/nix
workstation_home_manager_flake_ref: "{{ workstation_home }}/.local/share/chezmoi#workstation"
workstation_chezmoi_install_enabled: true
workstation_enable_linger: true
workstation_bw_version: "2025.12.0"
workstation_bw_download_url: >-
  https://github.com/bitwarden/clients/releases/download/cli-v{{
  workstation_bw_version }}/bw-linux-{{ workstation_bw_version }}.zip
workstation_bw_release_api_url: "https://api.github.com/repos/bitwarden/clients/releases/tags/cli-v{{ workstation_bw_version }}"
workstation_bw_bin_path: /usr/local/bin/bw
workstation_setup_bin_path: /usr/local/bin/workstation-setup
workstation_setup_profile_hook_path: /etc/profile.d/workstation-setup.sh
workstation_update_agent_tools_source_path: >-
  {{ workstation_home }}/.local/share/chezmoi/dot_local/bin/executable_update-agent-tools
workstation_update_agent_tools_bin_path: "{{ workstation_home }}/.local/bin/update-agent-tools"
workstation_update_agent_tools_requires_bitwarden: false
workstation_update_source_path: >-
  {{ workstation_home }}/.local/share/chezmoi/dot_local/bin/executable_workstation-update
workstation_update_bin_path: "{{ workstation_home }}/.local/bin/workstation-update"
workstation_update_requires_bitwarden: false
workstation_autosync_enabled: true
workstation_autosync_bin_path: /usr/local/bin/workstation-autosync
workstation_autosync_min_interval_seconds: 300
workstation_autosync_log_path: "{{ workstation_home }}/.local/state/workstation-setup/autosync.log"
workstation_autosync_stamp_path: "{{ workstation_home }}/.local/state/workstation-setup/autosync.last"
workstation_autosync_lock_path: "{{ workstation_home }}/.local/state/workstation-setup/autosync.lock"
workstation_autosync_notices_path: "{{ workstation_home }}/.local/state/workstation-setup/notices"
workstation_system_bin_owner: root
workstation_system_bin_group: root
