---
- name: Assert AoE LAN proxy firewall inputs are valid
  ansible.builtin.assert:
    that:
      - workstation_aoe_proxy_firewall_port | int > 0
      - workstation_aoe_proxy_firewall_port | int < 65536
      - workstation_aoe_proxy_firewall_allowed_hosts | length == 1
    fail_msg: >-
      config/lxc_workstation_baseline requires exactly one allowed inventory host
      when workstation_aoe_proxy_firewall_enabled is true.
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Set AoE LAN proxy firewall allowlist host
  ansible.builtin.set_fact:
    workstation_aoe_proxy_firewall_allowed_host: "{{ workstation_aoe_proxy_firewall_allowed_hosts | first }}"
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Assert AoE LAN proxy firewall host exists in inventory
  ansible.builtin.assert:
    that:
      - workstation_aoe_proxy_firewall_allowed_host in hostvars
    fail_msg: >-
      config/lxc_workstation_baseline cannot resolve allowed host '{{ workstation_aoe_proxy_firewall_allowed_host }}'
      because it is not present in inventory.
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Derive AoE LAN proxy firewall allowlist endpoint
  ansible.builtin.set_fact:
    workstation_aoe_proxy_firewall_allowed_endpoint: >-
      {{
        hostvars[workstation_aoe_proxy_firewall_allowed_host].ansible_host
        | default(workstation_aoe_proxy_firewall_allowed_host)
      }}
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Resolve AoE LAN proxy firewall allowlist address
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      getent ahostsv4 {{ workstation_aoe_proxy_firewall_allowed_endpoint | quote }} | awk '{print $1}' | sort -u
    executable: /bin/bash
  register: workstation_aoe_proxy_firewall_resolution
  failed_when: false
  changed_when: false
  check_mode: false
  delegate_to: localhost
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Assert AoE LAN proxy firewall host resolution succeeded
  ansible.builtin.assert:
    that:
      - workstation_aoe_proxy_firewall_resolution.rc == 0
      - ( workstation_aoe_proxy_firewall_resolution.stdout_lines | default([]) | select('match', '^[0-9]+(?:\\.[0-9]+){3}$') | list | length
        ) > 0
    fail_msg: >-
      config/lxc_workstation_baseline could not resolve any IPv4 address for
      allowed host '{{ workstation_aoe_proxy_firewall_allowed_host }}' using endpoint
      '{{ workstation_aoe_proxy_firewall_allowed_endpoint }}'.
      Fix inventory ansible_host/DNS for this host before enabling
      workstation_aoe_proxy_firewall_enabled.
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Initialize AoE LAN proxy firewall IPv4 allowlist
  ansible.builtin.set_fact:
    workstation_aoe_proxy_firewall_allowed_ipv4: []
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Collect AoE LAN proxy firewall IPv4 allowlist
  ansible.builtin.set_fact:
    workstation_aoe_proxy_firewall_allowed_ipv4: >-
      {{
        (workstation_aoe_proxy_firewall_allowed_ipv4 | default([]))
        + (
          workstation_aoe_proxy_firewall_resolution.stdout_lines
          | default([])
          | select('match', '^[0-9]+(?:\.[0-9]+){3}$')
          | list
        )
      }}
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Deduplicate AoE LAN proxy firewall IPv4 allowlist
  ansible.builtin.set_fact:
    workstation_aoe_proxy_firewall_allowed_ipv4: >-
      {{
        workstation_aoe_proxy_firewall_allowed_ipv4
        | unique
        | list
      }}
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Assert AoE LAN proxy firewall allowlist resolved
  ansible.builtin.assert:
    that:
      - workstation_aoe_proxy_firewall_allowed_ipv4 | length > 0
    fail_msg: >-
      config/lxc_workstation_baseline could not resolve any IPv4 addresses for
      workstation_aoe_proxy_firewall_allowed_hosts.
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Install AoE LAN proxy firewall package
  ansible.builtin.apt:
    name: nftables
    state: present
    update_cache: true
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Ensure AoE LAN proxy firewall include directory exists
  ansible.builtin.file:
    path: "{{ workstation_aoe_proxy_firewall_nft_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Deploy AoE LAN proxy firewall rules
  ansible.builtin.template:
    src: workstation-aoe-proxy.nft.j2
    dest: "{{ workstation_aoe_proxy_firewall_nft_path }}"
    owner: root
    group: root
    mode: "0644"
  register: workstation_aoe_proxy_firewall_rules_file
  notify: Restart AoE LAN proxy firewall
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Validate AoE LAN proxy firewall ruleset
  ansible.builtin.command:
    argv:
      - nft
      - -c
      - -f
      - "{{ workstation_aoe_proxy_firewall_nft_path }}"
  changed_when: false
  when:
    - workstation_aoe_proxy_firewall_enabled | bool
    - not ansible_check_mode

- name: Deploy AoE LAN proxy firewall service
  ansible.builtin.template:
    src: workstation-aoe-proxy-firewall.service.j2
    dest: "{{ workstation_aoe_proxy_firewall_service_path }}"
    owner: root
    group: root
    mode: "0644"
  register: workstation_aoe_proxy_firewall_service_file
  notify: Restart AoE LAN proxy firewall
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Enable AoE LAN proxy firewall service
  ansible.builtin.systemd:
    name: workstation-aoe-proxy-firewall.service
    daemon_reload: true
    enabled: true
    state: started
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Flush AoE LAN proxy firewall handlers
  ansible.builtin.meta: flush_handlers
  when:
    - workstation_aoe_proxy_firewall_enabled | bool
    - not ansible_check_mode

- name: Stat AoE LAN proxy firewall unit file
  ansible.builtin.stat:
    path: "{{ workstation_aoe_proxy_firewall_service_path }}"
  register: _aoe_fw_service_stat
  when: not workstation_aoe_proxy_firewall_enabled | bool

- name: Stop AoE LAN proxy firewall service when disabled
  ansible.builtin.systemd:
    name: workstation-aoe-proxy-firewall.service
    daemon_reload: true
    enabled: false
    state: stopped
  failed_when: false
  when: (not workstation_aoe_proxy_firewall_enabled | bool) and (_aoe_fw_service_stat.stat.exists | default(false))

- name: Remove live AoE LAN proxy firewall table when disabled
  ansible.builtin.command:
    argv:
      - nft
      - delete
      - table
      - inet
      - workstation_aoe_proxy
  changed_when: workstation_aoe_proxy_firewall_delete_result.rc == 0
  failed_when: false
  register: workstation_aoe_proxy_firewall_delete_result
  when: (not workstation_aoe_proxy_firewall_enabled | bool) and (_aoe_fw_service_stat.stat.exists | default(false))

- name: Remove AoE LAN proxy firewall service file when disabled
  ansible.builtin.file:
    path: "{{ workstation_aoe_proxy_firewall_service_path }}"
    state: absent
  when: (not workstation_aoe_proxy_firewall_enabled | bool) and (_aoe_fw_service_stat.stat.exists | default(false))

- name: Remove AoE LAN proxy firewall rules when disabled
  ansible.builtin.file:
    path: "{{ workstation_aoe_proxy_firewall_nft_path }}"
    state: absent
  when: (not workstation_aoe_proxy_firewall_enabled | bool) and (_aoe_fw_service_stat.stat.exists | default(false))

- name: Reload systemd after AoE LAN proxy firewall cleanup
  ansible.builtin.systemd:
    daemon_reload: true
  when: (not workstation_aoe_proxy_firewall_enabled | bool) and (_aoe_fw_service_stat.stat.exists | default(false))
