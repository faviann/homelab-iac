---
- name: Assert AoE LAN proxy firewall inputs are valid
  ansible.builtin.assert:
    that:
      - workstation_aoe_proxy_firewall_port | int > 0
      - workstation_aoe_proxy_firewall_port | int < 65536
      - workstation_aoe_proxy_firewall_allowed_hosts | length > 0
    fail_msg: >-
      config/lxc_workstation_baseline requires at least one allowed inventory host
      when workstation_aoe_proxy_firewall_enabled is true.
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Assert AoE LAN proxy firewall hosts exist in inventory
  ansible.builtin.assert:
    that:
      - item in hostvars
    fail_msg: >-
      config/lxc_workstation_baseline cannot resolve allowed host '{{ item }}'
      because it is not present in inventory.
  loop: "{{ workstation_aoe_proxy_firewall_allowed_hosts }}"
  loop_control:
    label: "{{ item }}"
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Derive AoE LAN proxy firewall allowlist endpoints
  ansible.builtin.set_fact:
    workstation_aoe_proxy_firewall_allowed_endpoints: >-
      {{
        (workstation_aoe_proxy_firewall_allowed_endpoints | default([]))
        + [hostvars[item].ansible_host | default(item)]
      }}
  loop: "{{ workstation_aoe_proxy_firewall_allowed_hosts }}"
  loop_control:
    label: "{{ item }}"
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Resolve AoE LAN proxy firewall allowlist addresses
  ansible.builtin.shell:
    cmd: "getent ahostsv4 {{ item | quote }} | awk '{print $1}' | sort -u"
  register: workstation_aoe_proxy_firewall_resolution
  changed_when: false
  check_mode: false
  delegate_to: localhost
  loop: "{{ workstation_aoe_proxy_firewall_allowed_endpoints | unique }}"
  loop_control:
    label: "{{ item }}"
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Initialize AoE LAN proxy firewall IPv4 allowlist
  ansible.builtin.set_fact:
    workstation_aoe_proxy_firewall_allowed_ipv4: []
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Collect AoE LAN proxy firewall IPv4 allowlist
  ansible.builtin.set_fact:
    workstation_aoe_proxy_firewall_allowed_ipv4: >-
      {{
        (workstation_aoe_proxy_firewall_allowed_ipv4 | default([]))
        + (
          item.stdout_lines
          | default([])
          | select('match', '^[0-9]+(?:\.[0-9]+){3}$')
          | list
        )
      }}
  loop: "{{ workstation_aoe_proxy_firewall_resolution.results | default([]) }}"
  loop_control:
    label: "{{ item.item | default('resolved-host') }}"
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Deduplicate AoE LAN proxy firewall IPv4 allowlist
  ansible.builtin.set_fact:
    workstation_aoe_proxy_firewall_allowed_ipv4: >-
      {{
        workstation_aoe_proxy_firewall_allowed_ipv4
        | unique
        | list
      }}
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Assert AoE LAN proxy firewall allowlist resolved
  ansible.builtin.assert:
    that:
      - workstation_aoe_proxy_firewall_allowed_ipv4 | length > 0
    fail_msg: >-
      config/lxc_workstation_baseline could not resolve any IPv4 addresses for
      workstation_aoe_proxy_firewall_allowed_hosts.
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Install AoE LAN proxy firewall package
  ansible.builtin.apt:
    name: nftables
    state: present
    update_cache: true
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Ensure AoE LAN proxy firewall include directory exists
  ansible.builtin.file:
    path: /etc/nftables.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Deploy AoE LAN proxy firewall rules
  ansible.builtin.template:
    src: workstation-aoe-proxy.nft.j2
    dest: /etc/nftables.d/workstation-aoe-proxy.nft
    owner: root
    group: root
    mode: "0644"
  register: workstation_aoe_proxy_firewall_rules_file
  notify: Restart AoE LAN proxy firewall
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Validate AoE LAN proxy firewall ruleset
  ansible.builtin.command:
    argv:
      - nft
      - -c
      - -f
      - /etc/nftables.d/workstation-aoe-proxy.nft
  changed_when: false
  when:
    - workstation_aoe_proxy_firewall_enabled | bool
    - not ansible_check_mode

- name: Deploy AoE LAN proxy firewall service
  ansible.builtin.template:
    src: workstation-aoe-proxy-firewall.service.j2
    dest: /etc/systemd/system/workstation-aoe-proxy-firewall.service
    owner: root
    group: root
    mode: "0644"
  register: workstation_aoe_proxy_firewall_service_file
  notify: Restart AoE LAN proxy firewall
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Enable AoE LAN proxy firewall service
  ansible.builtin.systemd:
    name: workstation-aoe-proxy-firewall.service
    daemon_reload: true
    enabled: true
    state: started
  when: workstation_aoe_proxy_firewall_enabled | bool

- name: Flush AoE LAN proxy firewall handlers
  ansible.builtin.meta: flush_handlers
  when:
    - workstation_aoe_proxy_firewall_enabled | bool
    - not ansible_check_mode

- name: Stop AoE LAN proxy firewall service when disabled
  ansible.builtin.systemd:
    name: workstation-aoe-proxy-firewall.service
    daemon_reload: true
    enabled: false
    state: stopped
  failed_when: false
  when: not workstation_aoe_proxy_firewall_enabled | bool

- name: Remove live AoE LAN proxy firewall table when disabled
  ansible.builtin.command:
    argv:
      - nft
      - delete
      - table
      - inet
      - workstation_aoe_proxy
  changed_when: workstation_aoe_proxy_firewall_delete_result.rc == 0
  failed_when: false
  register: workstation_aoe_proxy_firewall_delete_result
  when: not workstation_aoe_proxy_firewall_enabled | bool

- name: Remove AoE LAN proxy firewall service file when disabled
  ansible.builtin.file:
    path: /etc/systemd/system/workstation-aoe-proxy-firewall.service
    state: absent
  when: not workstation_aoe_proxy_firewall_enabled | bool

- name: Remove AoE LAN proxy firewall rules when disabled
  ansible.builtin.file:
    path: /etc/nftables.d/workstation-aoe-proxy.nft
    state: absent
  when: not workstation_aoe_proxy_firewall_enabled | bool

- name: Reload systemd after AoE LAN proxy firewall cleanup
  ansible.builtin.systemd:
    daemon_reload: true
  when: not workstation_aoe_proxy_firewall_enabled | bool