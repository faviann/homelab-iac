---
- name: Validate controller bootstrap environment variables are present
  ansible.builtin.assert:
    that:
      - workstation_bootstrap_controller_env.keys() | list | sort == ['BW_CLIENTID', 'BW_CLIENTSECRET', 'BW_PASSWORD']
      - lookup('ansible.builtin.env', workstation_bootstrap_controller_env.BW_CLIENTID) | length > 0
      - lookup('ansible.builtin.env', workstation_bootstrap_controller_env.BW_CLIENTSECRET) | length > 0
      - lookup('ansible.builtin.env', workstation_bootstrap_controller_env.BW_PASSWORD) | length > 0
      - "'\n' not in lookup('ansible.builtin.env', workstation_bootstrap_controller_env.BW_CLIENTID)"
      - "'\n' not in lookup('ansible.builtin.env', workstation_bootstrap_controller_env.BW_CLIENTSECRET)"
      - "'\n' not in lookup('ansible.builtin.env', workstation_bootstrap_controller_env.BW_PASSWORD)"
    fail_msg: >-
      Set WORKSTATION_BW_CLIENTID, WORKSTATION_BW_CLIENTSECRET, and
      WORKSTATION_BW_PASSWORD in the controller environment before running
      workstation_bootstrap_unattended=true. Values must not contain newlines.
  no_log: true

- name: Stage and run workstation bootstrap
  block:
    - name: Ensure workstation bootstrap run directory exists
      ansible.builtin.file:
        path: "{{ workstation_bootstrap_run_dir }}"
        state: directory
        owner: "{{ workstation_uid }}"
        group: "{{ workstation_gid }}"
        mode: "0700"
      no_log: true

    - name: Write workstation bootstrap envelope
      ansible.builtin.copy:
        dest: "{{ workstation_bootstrap_env_path }}"
        owner: "{{ workstation_uid }}"
        group: "{{ workstation_gid }}"
        mode: "0600"
        content: |
          BW_CLIENTID={{ lookup('ansible.builtin.env', workstation_bootstrap_controller_env.BW_CLIENTID) }}
          BW_CLIENTSECRET={{ lookup('ansible.builtin.env', workstation_bootstrap_controller_env.BW_CLIENTSECRET) }}
          BW_PASSWORD={{ lookup('ansible.builtin.env', workstation_bootstrap_controller_env.BW_PASSWORD) }}
      no_log: true

    - name: Run workstation bootstrap
      ansible.builtin.command:
        cmd: /usr/local/bin/workstation-bootstrap
      become: true
      become_user: "{{ workstation_username }}"
      environment:
        HOME: "{{ workstation_home }}"
      no_log: true
  always:
    - name: Ensure workstation bootstrap run directory is absent
      ansible.builtin.file:
        path: "{{ workstation_bootstrap_run_dir }}"
        state: absent
      no_log: true