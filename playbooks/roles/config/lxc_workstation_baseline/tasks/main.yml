---
- name: Assert workstation baseline inputs are present
  ansible.builtin.assert:
    that:
      - docker_user is defined
      - docker_user | string | length > 0
      - docker_uid is defined
      - docker_gid is defined
      - workstation_username == docker_user
      - workstation_uid == docker_uid
      - workstation_gid == docker_gid
    fail_msg: >-
      config/lxc_workstation_baseline requires docker_user/docker_uid/docker_gid.
      Set docker_user to the daily login user.

- name: Install workstation baseline packages
  ansible.builtin.apt:
    name: "{{ workstation_packages }}"
    state: present
    update_cache: true
  when: workstation_packages | length > 0

- name: Generate en_US.UTF-8 locale
  ansible.builtin.shell:
    cmd: locale -a 2>/dev/null | grep -qi 'en_US.utf8' || locale-gen en_US.UTF-8
  register: workstation_locale_gen
  changed_when: workstation_locale_gen.stdout | length > 0
  when: workstation_locale_enabled | default(true) | bool

- name: Set system default locale
  ansible.builtin.copy:
    dest: /etc/default/locale
    content: "LANG=en_US.UTF-8\n"
    owner: root
    group: root
    mode: "0644"
  when: workstation_locale_enabled | default(true) | bool

- name: Configure AoE LAN proxy firewall
  ansible.builtin.include_tasks: aoe_proxy_firewall.yml

- name: Configure workstation persistent home mounts
  ansible.builtin.include_tasks: persistent_home.yml
  when: workstation_persistent_home_enabled | bool

- name: Configure GitHub SSH keys
  ansible.builtin.include_role:
    name: config/lxc_github_keys

- name: Install chezmoi
  ansible.builtin.shell:
    cmd: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin
    creates: /usr/local/bin/chezmoi

- name: Inspect Bitwarden CLI binary
  ansible.builtin.stat:
    path: "{{ workstation_bw_bin_path }}"
  register: _workstation_bw_bin

- name: Note Bitwarden CLI would be installed in normal mode
  ansible.builtin.debug:
    msg: "Bitwarden CLI would be installed at {{ workstation_bw_bin_path }}"
  changed_when: true
  when:
    - ansible_check_mode
    - not _workstation_bw_bin.stat.exists

- name: Install Bitwarden CLI
  ansible.builtin.include_tasks: bitwarden_cli.yml
  when: not ansible_check_mode

- name: Install Determinate Nix
  ansible.builtin.include_tasks: nix.yml
  when: workstation_nix_install_enabled | bool

- name: Enable workstation user lingering
  ansible.builtin.command:
    cmd: "loginctl enable-linger {{ workstation_username }}"
    creates: "/var/lib/systemd/linger/{{ workstation_username }}"
  when: workstation_enable_linger | bool

- name: Install workstation setup command
  ansible.builtin.template:
    src: workstation-setup.sh.j2
    dest: "{{ workstation_setup_bin_path }}"
    owner: "{{ workstation_system_bin_owner }}"
    group: "{{ workstation_system_bin_group }}"
    mode: "0755"

- name: Install workstation setup login hook
  ansible.builtin.template:
    src: workstation-setup-profile.sh.j2
    dest: "{{ workstation_setup_profile_hook_path }}"
    owner: "{{ workstation_system_bin_owner }}"
    group: "{{ workstation_system_bin_group }}"
    mode: "0644"
