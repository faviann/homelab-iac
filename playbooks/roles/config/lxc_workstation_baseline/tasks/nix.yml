---
- name: Assert Determinate Nix installer is configured
  ansible.builtin.assert:
    that:
      - workstation_nix_install_url is defined
      - workstation_nix_install_url | string | length > 0
    fail_msg: workstation_nix_install_url must point to the Determinate Nix installer.

- name: Inspect Nix profile binary
  ansible.builtin.stat:
    path: /nix/var/nix/profiles/default/bin/nix
  register: _workstation_nix_bin

# Upstream installer is a curl-piped script; get_url cannot replace it.
- name: Install Determinate Nix # noqa: command-instead-of-module
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      curl --proto '=https' --tlsv1.2 -sSf -L {{ workstation_nix_install_url | quote }} \
        | sh -s -- install --no-confirm
    creates: /nix/receipt.json
    executable: /bin/bash

- name: Verify Nix is installed
  ansible.builtin.command:
    cmd: /nix/var/nix/profiles/default/bin/nix --version
  changed_when: false
  when: (not ansible_check_mode) or _workstation_nix_bin.stat.exists
