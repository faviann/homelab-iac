---
argument_specs:
  main:
    short_description: Configure the workstation login and package baseline inside an LXC
    options:
      docker_user:
        type: str
        required: true
        description: Daily login username for the workstation account inherited from docker host vars.
      docker_uid:
        type: int
        required: true
        description: Numeric UID for the workstation account inherited from docker host vars.
      docker_gid:
        type: int
        required: true
        description: Numeric GID for the workstation account inherited from docker host vars.
      workstation_username:
        type: str
        required: false
        description: Username that should own the workstation login baseline.
      workstation_uid:
        type: int
        required: false
        description: UID that should own the workstation login baseline.
      workstation_gid:
        type: int
        required: false
        description: GID that should own the workstation login baseline.
      workstation_home:
        type: str
        required: false
        description: Filesystem home directory for the workstation login account.
      workstation_persistent_home_enabled:
        type: bool
        required: false
        description: Whether to manage selected workstation home paths as persistent symlinks.
      workstation_persistent_home_root:
        type: str
        required: false
        description: Persistent root directory for selected workstation home path targets.
      workstation_persistent_home_links:
        type: list
        elements: dict
        required: false
        description: Home symlinks to create from the workstation home into persistent /ephemeral storage.
      workstation_packages:
        type: list
        elements: str
        required: false
        description: Package list to install for the workstation baseline.
