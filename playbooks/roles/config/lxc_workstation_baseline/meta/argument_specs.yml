---
argument_specs:
  main:
    short_description: Configure the workstation login and package baseline inside an LXC
    options:
      docker_user:
        type: str
        required: true
        description: Daily login username for the workstation account inherited from docker host vars.
      docker_uid:
        type: int
        required: true
        description: Numeric UID for the workstation account inherited from docker host vars.
      docker_gid:
        type: int
        required: true
        description: Numeric GID for the workstation account inherited from docker host vars.
      workstation_username:
        type: str
        required: false
        description: Username that should own the workstation login baseline.
      workstation_uid:
        type: int
        required: false
        description: UID that should own the workstation login baseline.
      workstation_gid:
        type: int
        required: false
        description: GID that should own the workstation login baseline.
      workstation_home:
        type: str
        required: false
        description: Filesystem home directory for the workstation login account.
      workstation_aoe_proxy_firewall_enabled:
        type: bool
        required: false
        description: Whether to restrict the AoE LAN proxy port inside the workstation LXC.
      workstation_aoe_proxy_firewall_port:
        type: int
        required: false
        description: TCP port exposed by the workstation-local AoE LAN proxy.
      workstation_aoe_proxy_firewall_allowed_hosts:
        type: list
        elements: str
        required: false
        description: Inventory hosts allowed to reach the AoE LAN proxy port.
      workstation_hermes_dashboard_port:
        type: int
        required: false
        description: >-
          Port the Hermes Agent dashboard binds to (default 9119). Firewall
          rules for this port are added to the AoE nft table when
          workstation_aoe_proxy_firewall_enabled is true.
      workstation_openclaw_gateway_port:
        type: int
        required: false
        description: >-
          Port the OpenClaw gateway dashboard binds to (default 18789). Firewall
          rules for this port are added to the AoE nft table when
          workstation_aoe_proxy_firewall_enabled is true.
      workstation_persistent_home_enabled:
        type: bool
        required: false
        description: Whether to manage selected workstation home paths as persistent bind mounts.
      workstation_persistent_home_root:
        type: str
        required: false
        description: Persistent root directory for selected workstation home path targets.
      workstation_persistent_home_links:
        type: list
        elements: dict
        required: false
        description: Home mount definitions from the workstation home into persistent /ephemeral storage.
      workstation_persistent_home_mount_state:
        type: str
        required: false
        description: Mount state used for persistent home bind mounts (mounted on real hosts, present in tests).
      workstation_persistent_home_fstab_path:
        type: str
        required: false
        description: Fstab file path used when managing persistent home bind mounts.
      workstation_packages:
        type: list
        elements: str
        required: false
        description: Package list to install for the workstation baseline.
      workstation_setup_marker_path:
        type: str
        required: false
        description: Durable marker written after successful interactive workstation setup.
      workstation_setup_version:
        type: str
        required: false
        description: Setup contract version recorded in the durable marker.
      workstation_dotfiles_repo_url:
        type: str
        required: false
        description: HTTPS dotfiles repository URL used before SSH keys are rendered.
      workstation_github_cli_token_item:
        type: str
        required: false
        description: Bitwarden item name containing the GitHub CLI token in notes.
      workstation_nix_install_enabled:
        type: bool
        required: false
        description: Whether to install Determinate Nix for workstation user tooling.
      workstation_nix_install_url:
        type: str
        required: false
        description: Determinate Nix installer URL.
      workstation_home_manager_flake_ref:
        type: str
        required: false
        description: Home Manager flake reference used by workstation-setup.
      workstation_enable_linger:
        type: bool
        required: false
        description: Whether to enable systemd user lingering for the workstation account.
      workstation_bw_version:
        type: str
        required: false
        description: Bitwarden CLI version installed as the bootstrap-critical system binary.
      workstation_bw_download_url:
        type: str
        required: false
        description: Bitwarden CLI native Linux artifact URL.
      workstation_bw_release_api_url:
        type: str
        required: false
        description: GitHub release API URL used to retrieve the published digest for the Bitwarden CLI artifact.
      workstation_bw_bin_path:
        type: str
        required: false
        description: Filesystem path where the setup-critical bw executable should be installed.
      workstation_setup_bin_path:
        type: str
        required: false
        description: Filesystem path where the interactive workstation setup command should be installed.
      workstation_setup_profile_hook_path:
        type: str
        required: false
        description: Filesystem path where the interactive SSH login hook should be installed.
      workstation_autosync_enabled:
        type: bool
        required: false
        description: Whether to install the backgrounded login-triggered dotfiles autosync command.
      workstation_autosync_bin_path:
        type: str
        required: false
        description: Filesystem path where the workstation autosync command should be installed.
      workstation_autosync_min_interval_seconds:
        type: int
        required: false
        description: Minimum seconds between autosync runs; rapid successive logins are throttled.
      workstation_autosync_log_path:
        type: str
        required: false
        description: File the detached autosync process appends its stdout/stderr to.
      workstation_autosync_stamp_path:
        type: str
        required: false
        description: File recording the last autosync run epoch used for throttling.
      workstation_autosync_lock_path:
        type: str
        required: false
        description: Lock file serializing concurrent autosync runs.
      workstation_autosync_notices_path:
        type: str
        required: false
        description: File where autosync queues user-facing reminders for the login hook to print.
      workstation_system_bin_owner:
        type: str
        required: false
        description: Owner to apply to system-level workstation helper binaries.
      workstation_system_bin_group:
        type: str
        required: false
        description: Group to apply to system-level workstation helper binaries.
