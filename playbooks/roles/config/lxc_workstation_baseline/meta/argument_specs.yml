---
argument_specs:
  main:
    short_description: Configure the workstation login and package baseline inside an LXC
    options:
      docker_user:
        type: str
        required: true
        description: Daily login username for the workstation account inherited from docker host vars.
      docker_uid:
        type: int
        required: true
        description: Numeric UID for the workstation account inherited from docker host vars.
      docker_gid:
        type: int
        required: true
        description: Numeric GID for the workstation account inherited from docker host vars.
      workstation_username:
        type: str
        required: false
        description: Username that should own the workstation login baseline.
      workstation_uid:
        type: int
        required: false
        description: UID that should own the workstation login baseline.
      workstation_gid:
        type: int
        required: false
        description: GID that should own the workstation login baseline.
      workstation_home:
        type: str
        required: false
        description: Filesystem home directory for the workstation login account.
      workstation_agent_state_enabled:
        type: bool
        required: false
        description: Whether to manage persistent Claude/Codex comfort-state links for the workstation user.
      workstation_agent_state_root:
        type: str
        required: false
        description: Persistent local path used for selected agent CLI state directories.
      workstation_agent_state_links:
        type: list
        elements: dict
        required: false
        description: Agent state symlinks to create from the workstation home into workstation_agent_state_root.
      workstation_packages:
        type: list
        elements: str
        required: false
        description: Package list to install for the workstation baseline.
