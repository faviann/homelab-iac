---
# Workaround for containerd 1.7.29+ bug in unprivileged LXC
# See: https://github.com/opencontainers/runc/issues/4968
# See: https://github.com/containerd/containerd/issues/12484

- name: Check current containerd version
  ansible.builtin.shell: |
    dpkg -l containerd.io | grep -oP '\d+\.\d+\.\d+' | head -1
  register: _containerd_version
  changed_when: false
  failed_when: false

- name: Downgrade containerd to working version for LXC
  ansible.builtin.apt:
    name: "containerd.io=1.7.28-1~debian.12~bookworm"
    state: present
    allow_downgrade: true
  when:
    - _containerd_version.stdout is defined
    - _containerd_version.stdout is version('1.7.29', '>=')
  register: _containerd_downgrade

- name: Hold containerd.io package to prevent auto-upgrade
  ansible.builtin.dpkg_selections:
    name: containerd.io
    selection: hold
  when:
    - _containerd_version.stdout is defined
    - _containerd_version.stdout is version('1.7.29', '<')

- name: Restart Docker service after containerd downgrade
  ansible.builtin.systemd:
    name: docker
    state: restarted
  when: _containerd_downgrade is changed
