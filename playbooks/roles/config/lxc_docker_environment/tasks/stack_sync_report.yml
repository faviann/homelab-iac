---
# Report: publish a stable deployment report from the internal reconciliation boundary.
# Inputs:  _lxc_docker_env_reconciliation
# Outputs: lxc_docker_env_deployment_report

- name: Publish stack sync deployment report
  ansible.builtin.set_fact:
    lxc_docker_env_deployment_report:
      changed: >-
        {{
          stack_sync_changed_results
          | selectattr('changed', 'defined')
          | selectattr('changed')
          | list
          | length > 0
        }}
      discovered_stacks: >-
        {{ reconciliation.discovery.desired_stacks | default([]) }}
      created_dirs: >-
        {{
          changed_dir_paths
          | difference(existing_dir_paths)
        }}
      updated_dirs: >-
        {{
          changed_dir_paths
          | intersect(existing_dir_paths)
        }}
      created_networks: >-
        {{
          reconciliation.start.network_results | default([])
          | selectattr('changed', 'defined')
          | selectattr('changed')
          | map(attribute='item')
          | list
        }}
      quarantined_stacks: "{{ reconciliation.discovery.stale_stacks | default([]) }}"
      started_stacks: >-
        {{
          reconciliation.start.stack_up_results | default([])
          | selectattr('changed', 'defined')
          | selectattr('changed')
          | map(attribute='item.path')
          | map('dirname')
          | map('basename')
          | list
        }}
      unchanged_stacks: >-
        {{
          reconciliation.start.stack_up_results | default([])
          | rejectattr('skipped', 'defined')
          | selectattr('changed', 'defined')
          | rejectattr('changed')
          | map(attribute='item.path')
          | map('dirname')
          | map('basename')
          | list
        }}
      skipped_stacks: >-
        {{
          reconciliation.start.stack_up_results | default([])
          | selectattr('skipped', 'defined')
          | selectattr('skipped')
          | map(attribute='item.path')
          | map('dirname')
          | map('basename')
          | list
        }}
  vars:
    reconciliation: "{{ _lxc_docker_env_reconciliation | default({}) }}"
    stack_sync_changed_results: >-
      {{
        (
          [reconciliation.managed_assets.dockge_copy] if reconciliation.managed_assets.dockge_copy is defined else []
        )
        + (reconciliation.managed_assets.legacy_stack_removals | default([]))
        + (
          [reconciliation.managed_assets.legacy_admin_removal]
          if reconciliation.managed_assets.legacy_admin_removal is defined else []
        )
        + (
          [reconciliation.managed_assets.docker_agents_stack_removal]
          if reconciliation.managed_assets.docker_agents_stack_removal is defined else []
        )
        + (
          [reconciliation.managed_assets.docker_agents_env]
          if reconciliation.managed_assets.docker_agents_env is defined else []
        )
        + (
          [reconciliation.managed_assets.docker_agents_env_removal]
          if reconciliation.managed_assets.docker_agents_env_removal is defined else []
        )
        + (
          [reconciliation.managed_assets.docker_agents_compose]
          if reconciliation.managed_assets.docker_agents_compose is defined else []
        )
        + (
          [reconciliation.managed_assets.docker_agents_override]
          if reconciliation.managed_assets.docker_agents_override is defined else []
        )
        + (
          [reconciliation.managed_assets.docker_agents_override_removal]
          if reconciliation.managed_assets.docker_agents_override_removal is defined else []
        )
        + (
          [reconciliation.managed_assets.docker_agents_assets]
          if reconciliation.managed_assets.docker_agents_assets is defined else []
        )
        + (reconciliation.managed_assets.docs_removal | default([]))
        + (
          [reconciliation.managed_assets.ownership_normalization]
          if reconciliation.managed_assets.ownership_normalization is defined else []
        )
        + (
          [reconciliation.managed_assets.stacks_dir]
          if reconciliation.managed_assets.stacks_dir is defined else []
        )
        + (reconciliation.quarantine.results | default([]))
        + (reconciliation.materialize.stack_dirs.results | default([]))
        + (reconciliation.materialize.templates | default([]))
        + (reconciliation.materialize.copies | default([]))
        + (reconciliation.materialize.prereq_dir_results | default([]))
        + (reconciliation.materialize.ownership_override_results | default([]))
        + (reconciliation.materialize.managed_file_parent_dir_results | default([]))
        + (reconciliation.materialize.managed_file_create_results | default([]))
        + (reconciliation.materialize.managed_file_permission_results | default([]))
        + (reconciliation.start.network_results | default([]))
        + (reconciliation.start.stack_up_results | default([]))
      }}
    changed_dir_paths: >-
      {{
        (
          (reconciliation.materialize.stack_dirs.results | default([]))
          + (reconciliation.materialize.prereq_dir_results | default([]))
          + (reconciliation.materialize.ownership_override_results | default([]))
          + (reconciliation.materialize.managed_file_parent_dir_results | default([]))
        )
        | selectattr('changed', 'defined')
        | selectattr('changed')
        | map(attribute='path')
        | list
      }}
    existing_dir_paths: >-
      {{
        (
          (reconciliation.materialize.stack_dirs.stats | default([]))
          | selectattr('stat.exists', 'defined')
          | selectattr('stat.exists')
          | map(attribute='item')
          | list
        )
        + (
          (reconciliation.materialize.prereq_dir_stats | default([]))
          | selectattr('stat.exists', 'defined')
          | selectattr('stat.exists')
          | map(attribute='item')
          | list
        )
        + (
          (reconciliation.materialize.ownership_override_stats | default([]))
          | selectattr('stat.exists', 'defined')
          | selectattr('stat.exists')
          | map(attribute='item.path')
          | list
        )
        + (
          (reconciliation.materialize.managed_file_parent_dir_stats | default([]))
          | selectattr('stat.exists', 'defined')
          | selectattr('stat.exists')
          | map(attribute='item.path')
          | list
        )
      }}
