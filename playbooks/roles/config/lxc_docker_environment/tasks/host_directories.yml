---
- name: Ensure host-level Docker data directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(omit) }}"
    group: "{{ item.group | default(omit) }}"
    mode: "{{ item.mode | default('0755') }}"
  loop: "{{ lxc_docker_env_host_directories }}"
  loop_control:
    label: "{{ item.path }}"