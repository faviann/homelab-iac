---
# Host-specific DbUp migration invocation for the overmind memory database.

- name: Assert overmind migration inputs are present
  ansible.builtin.assert:
    that:
      - overmind_image_repository is defined
      - overmind_image_repository | string | length > 0
      - overmind_image_tag is defined
      - overmind_image_tag | string | length > 0
      - overmind_image_tag | string != "latest"
      - overmind_image_tag is match('^[0-9][0-9A-Za-z._-]*$')
      - overmind_migration_network is defined
      - overmind_migration_network | string | length > 0
      - overmind_postgres_bootstrap.container_name is defined
      - overmind_postgres_bootstrap.container_name | string | length > 0
      - overmind_postgres_bootstrap.admin_user is defined
      - overmind_postgres_bootstrap.admin_user | string | length > 0
      - overmind_postgres_bootstrap.admin_password is defined
      - overmind_postgres_bootstrap.admin_password | string | length > 0
      - overmind_postgres_bootstrap.memory_database is defined
      - overmind_postgres_bootstrap.memory_database | string | length > 0
    fail_msg: >-
      overmind_migrations_enabled requires overmind_image_repository,
      overmind_image_tag, overmind_migration_network, and
      overmind_postgres_bootstrap container_name, admin_user, admin_password,
      and memory_database. overmind_image_tag must be an immutable version tag,
      not latest.

- name: Choose overmind disposable verification database name
  ansible.builtin.set_fact:
    _config_overmind_verify_database: >-
      overmind_verify_{{ lookup('pipe', 'date +%s%N') | regex_replace('[^0-9]', '') }}

# Built once here so the disposable migrate, disposable verify-schema, and
# production migrate invocations share one connection-string shape instead of
# repeating it. The two strings differ only by target database.
- name: Build overmind admin connection strings for verification and production
  ansible.builtin.set_fact:
    _config_overmind_verify_connection_string: >-
      {{
        "Host=" ~ overmind_postgres_bootstrap.container_name
        ~ ";Port=5432"
        ~ ";Database=" ~ _config_overmind_verify_database
        ~ ";Username=" ~ overmind_postgres_bootstrap.admin_user
        ~ ";Password=" ~ overmind_postgres_bootstrap.admin_password
      }}
    _config_overmind_memory_connection_string: >-
      {{
        "Host=" ~ overmind_postgres_bootstrap.container_name
        ~ ";Port=5432"
        ~ ";Database=" ~ overmind_postgres_bootstrap.memory_database
        ~ ";Username=" ~ overmind_postgres_bootstrap.admin_user
        ~ ";Password=" ~ overmind_postgres_bootstrap.admin_password
      }}
  no_log: true

- name: Verify overmind schema shape against a disposable migrated database
  block:
    - name: Create overmind disposable verification database
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - -e
          - PGPASSWORD
          - "{{ overmind_postgres_bootstrap.container_name }}"
          - createdb
          - -U
          - "{{ overmind_postgres_bootstrap.admin_user }}"
          - "{{ _config_overmind_verify_database }}"
      environment:
        PGPASSWORD: "{{ overmind_postgres_bootstrap.admin_password }}"
      register: _config_overmind_verify_database_create
      changed_when: false
      failed_when: false
      no_log: true

    - name: Migrate overmind disposable verification database
      ansible.builtin.command:
        argv:
          - docker
          - run
          - --rm
          - --network
          - "{{ overmind_migration_network }}"
          - -e
          - MEMSRV_ADMIN_CONNECTION_STRING
          - --entrypoint
          - memctl
          - "{{ overmind_image_repository }}:{{ overmind_image_tag }}"
          - migrate
      environment:
        MEMSRV_ADMIN_CONNECTION_STRING: "{{ _config_overmind_verify_connection_string }}"
      register: _config_overmind_verify_database_migrate
      changed_when: false
      failed_when: false
      no_log: true
      when: _config_overmind_verify_database_create.rc == 0

    - name: Run overmind schema verifier against disposable database
      ansible.builtin.command:
        argv:
          - docker
          - run
          - --rm
          - --network
          - "{{ overmind_migration_network }}"
          - -e
          - MEMSRV_ADMIN_CONNECTION_STRING
          - --entrypoint
          - memctl
          - "{{ overmind_image_repository }}:{{ overmind_image_tag }}"
          - verify-schema
      environment:
        MEMSRV_ADMIN_CONNECTION_STRING: "{{ _config_overmind_verify_connection_string }}"
      register: _config_overmind_verify_database_schema
      changed_when: false
      failed_when: false
      no_log: true
      when:
        - _config_overmind_verify_database_create.rc == 0
        - _config_overmind_verify_database_migrate.rc | default(1) == 0
  always:
    - name: Drop overmind disposable verification database
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - -e
          - PGPASSWORD
          - "{{ overmind_postgres_bootstrap.container_name }}"
          - dropdb
          - -U
          - "{{ overmind_postgres_bootstrap.admin_user }}"
          - --if-exists
          - --force
          - "{{ _config_overmind_verify_database }}"
      environment:
        PGPASSWORD: "{{ overmind_postgres_bootstrap.admin_password }}"
      register: _config_overmind_verify_database_drop
      changed_when: false
      failed_when: false
      no_log: true

- name: Fail when overmind disposable verification database creation fails
  ansible.builtin.fail:
    msg: >-
      overmind disposable schema verification could not create its temporary
      database on {{ overmind_postgres_bootstrap.container_name }}. Production
      database {{ overmind_postgres_bootstrap.memory_database }} was not checked
      or migrated by the verifier.
  when: _config_overmind_verify_database_create.rc | default(1) != 0

- name: Fail when overmind disposable migration fails
  ansible.builtin.fail:
    msg: >-
      overmind memctl migrate failed for the disposable schema verification
      database using {{ overmind_image_repository }}:{{ overmind_image_tag }}.
      Production database {{ overmind_postgres_bootstrap.memory_database }} was
      not checked or migrated by the verifier.
  when:
    - _config_overmind_verify_database_create.rc == 0
    - _config_overmind_verify_database_migrate.rc | default(1) != 0

- name: Fail when overmind disposable schema verification fails
  ansible.builtin.fail:
    msg: >-
      overmind memctl verify-schema failed for a disposable migrated database
      using {{ overmind_image_repository }}:{{ overmind_image_tag }}. Production
      database {{ overmind_postgres_bootstrap.memory_database }} was not checked
      or migrated by the verifier.
  when:
    - _config_overmind_verify_database_create.rc == 0
    - _config_overmind_verify_database_migrate.rc | default(1) == 0
    - _config_overmind_verify_database_schema.rc | default(1) != 0

- name: Run overmind production DbUp migrations from tagged application image
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - --network
      - "{{ overmind_migration_network }}"
      - -e
      - MEMSRV_ADMIN_CONNECTION_STRING
      - --entrypoint
      - memctl
      - "{{ overmind_image_repository }}:{{ overmind_image_tag }}"
      - migrate
  environment:
    MEMSRV_ADMIN_CONNECTION_STRING: "{{ _config_overmind_memory_connection_string }}"
  register: _config_overmind_migrations_result
  changed_when: false
  failed_when: false
  no_log: true

- name: Fail when overmind DbUp migrations fail
  ansible.builtin.fail:
    msg: >-
      overmind memctl migrate failed for
      {{ overmind_image_repository }}:{{ overmind_image_tag }}. Confirm the immutable
      image tag exists, Docker can pull from GHCR, and the memory database and
      memsrv role bootstrap completed.
  when: _config_overmind_migrations_result.rc != 0

# Verification passed, so production was migrated above. A leaked disposable
# database does not touch production, so this is raised last: it flags the leak
# loudly for manual cleanup without withholding the migration verification
# already proved safe.
- name: Fail when overmind disposable verification database cleanup fails
  ansible.builtin.fail:
    msg: >-
      overmind schema verification and production migration completed, but cleanup
      could not drop its temporary database on {{ overmind_postgres_bootstrap.container_name }}.
      Drop any overmind_verify_* database manually before rerunning.
  when: _config_overmind_verify_database_drop.rc | default(1) != 0
