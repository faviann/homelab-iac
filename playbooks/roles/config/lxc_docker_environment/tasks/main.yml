---
# Main tasks file for lxc_docker_environment role
# Configures the Docker host contract, then delegates repo-managed stack
# reconciliation to the standalone stack sync role.

- name: Assert Docker capability inputs are present
  ansible.builtin.assert:
    that:
      - docker_user is defined
      - docker_user | string | length > 0
      - docker_uid is defined
      - docker_gid is defined
    fail_msg: >-
      config/lxc_docker_environment requires docker_user, docker_uid, and docker_gid.
      Add {{ inventory_hostname }} to the cap_docker group in inventory/hosts.yml or
      define those variables explicitly for the host.

- name: Verify required packages are installed
  ansible.builtin.package_facts:
    manager: apt
  tags:
    - docker_host_setup

- name: Fail if sudo is not installed
  ansible.builtin.fail:
    msg: "sudo package must be installed before Docker environment configuration. Please run lxc_base_system role first."
  when: "'sudo' not in ansible_facts.packages"
  tags:
    - docker_host_setup

- name: Build internal Docker environment contract
  ansible.builtin.set_fact:
    lxc_docker_environment_internal:
      external_networks: "{{ lxc_docker_env_external_networks | default([]) }}"
      path_ownership_overrides: "{{ lxc_docker_env_path_ownership_overrides | default([]) }}"
      shared_mount_source: "{{ lxc_docker_env_shared_mount_source }}"
      shared_owner: "{{ lxc_docker_env_shared_owner }}"
      shared_group: "{{ lxc_docker_env_shared_group }}"
      root_docker_conf_path: "{{ lxc_docker_env_root_docker_conf_path }}"
      stacks_source: "{{ lxc_docker_env_stacks_source }}"
      stale_stack_quarantine_root: "{{ lxc_docker_env_stale_stack_quarantine_root }}"
      docker_agents_stack_dir: "{{ lxc_docker_env_docker_agents_stack_dir }}"
      dockhand_hawser_stacks_source_dir: "{{ lxc_docker_env_dockhand_hawser_stacks_source_dir }}"
      legacy_managed_stacks: "{{ lxc_docker_env_legacy_managed_stacks }}"
      docker_user: "{{ docker_user }}"
      docker_uid: "{{ docker_uid }}"
      docker_gid: "{{ docker_gid }}"

- name: Check if Dockge directory exists
  ansible.builtin.stat:
    path: "{{ lxc_docker_environment_internal.root_docker_conf_path }}/dockge"
  register: _dockge_dir_stat
  tags:
    - docker_host_setup

- name: Stop Dockge before cleanup
  ansible.builtin.command:
    cmd: docker compose down --remove-orphans
    chdir: "{{ lxc_docker_environment_internal.root_docker_conf_path }}/dockge"
  become: true
  become_user: "{{ lxc_docker_environment_internal.docker_user }}"
  failed_when: false
  # One-shot migration cleanup: only runs while the legacy dir still exists.
  changed_when: true
  when:
    - _dockge_dir_stat.stat.exists
    - _dockge_dir_stat.stat.isdir
    - not ansible_check_mode
  tags:
    - docker_host_setup

- name: Remove Dockge directory from mounted Docker config
  ansible.builtin.file:
    path: "{{ lxc_docker_environment_internal.root_docker_conf_path }}/dockge"
    state: absent
  tags:
    - docker_host_setup

- name: Remove Dockge directory from shared storage
  ansible.builtin.file:
    path: "{{ lxc_docker_environment_internal.shared_mount_source }}/dockge"
    state: absent
  tags:
    - docker_host_setup

- name: Ensure shared mount source directory exists on host
  ansible.builtin.file:
    path: "{{ lxc_docker_environment_internal.shared_mount_source }}"
    state: directory
    mode: '0755'
  tags:
    - docker_host_setup

- name: Materialize managed Docker assets
  ansible.builtin.include_tasks: managed_assets.yml

- name: Ensure Docker config mount target exists
  ansible.builtin.file:
    path: "{{ lxc_docker_environment_internal.root_docker_conf_path }}"
    state: directory
    mode: '0755'
  tags:
    - docker_host_setup

- name: Check if bind mount already exists
  ansible.builtin.command:
    cmd: "mountpoint -q {{ lxc_docker_environment_internal.root_docker_conf_path }}"
  register: _mount_check
  changed_when: false
  failed_when: false
  tags:
    - docker_host_setup

- name: Create bind mount for Docker config
  ansible.posix.mount:
    path: "{{ lxc_docker_environment_internal.root_docker_conf_path }}"
    src: "{{ lxc_docker_environment_internal.shared_mount_source }}"
    opts: bind
    state: mounted
    fstype: none
  when: _mount_check.rc != 0
  tags:
    - docker_host_setup

- name: Ensure bind mount is in fstab
  ansible.posix.mount:
    path: "{{ lxc_docker_environment_internal.root_docker_conf_path }}"
    src: "{{ lxc_docker_environment_internal.shared_mount_source }}"
    opts: bind
    state: present
    fstype: none
    dump: '0'
    passno: '0'
  tags:
    - docker_host_setup

- name: Ensure docker group exists
  ansible.builtin.group:
    name: docker
    state: present
    system: true
  tags:
    - docker_host_setup

- name: Ensure Docker user primary group exists
  ansible.builtin.group:
    name: "{{ lxc_docker_environment_internal.docker_user }}"
    gid: "{{ lxc_docker_environment_internal.docker_gid }}"
    state: present
  tags:
    - docker_host_setup

- name: Create Docker user
  ansible.builtin.user:
    name: "{{ lxc_docker_environment_internal.docker_user }}"
    uid: "{{ lxc_docker_environment_internal.docker_uid }}"
    group: "{{ lxc_docker_environment_internal.docker_user }}"
    groups:
      - docker
      - sudo
    append: true
    shell: /bin/bash
    create_home: true
    password_lock: true
    comment: "Docker user managed by Ansible"
  register: _docker_user_result
  tags:
    - docker_host_setup

- name: Ensure Docker user can use sudo without password
  ansible.builtin.lineinfile:
    path: "/etc/sudoers.d/{{ lxc_docker_environment_internal.docker_user }}"
    line: "{{ lxc_docker_environment_internal.docker_user }} ALL=(ALL) NOPASSWD:ALL"
    create: true
    mode: '0440'
    validate: 'visudo -cf %s'
  tags:
    - docker_host_setup

- name: Ensure host-level Docker data directories exist
  ansible.builtin.include_tasks: host_directories.yml
  when: (lxc_docker_env_host_directories | default([])) | length > 0

- name: Remove retired containers
  community.docker.docker_container:
    name: "{{ item }}"
    state: absent
  loop: "{{ lxc_docker_env_absent_containers }}"
  become: true
  become_user: "{{ lxc_docker_environment_internal.docker_user }}"

- name: Reconcile repo-managed stacks
  ansible.builtin.include_role:
    name: config/lxc_stack_sync

- name: Configure overmind verified Postgres backups
  ansible.builtin.include_tasks: overmind_postgres_backup.yml
  when: overmind_postgres_backup_enabled | default(false) | bool

- name: Seed Dockhand environments
  ansible.builtin.include_tasks: dockhand_environments.yml
  when: portal_instance | default(false)
