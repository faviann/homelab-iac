---
# Main tasks file for lxc_docker_environment role
# Configures Docker environment: users, mounts, and Dockge deployment

- name: Verify required packages are installed
  ansible.builtin.package_facts:
    manager: apt

- name: Fail if sudo is not installed
  ansible.builtin.fail:
    msg: "sudo package must be installed before Docker environment configuration. Please run lxc_base_system role first."
  when: "'sudo' not in ansible_facts.packages"

- name: Ensure shared mount source directory exists on host
  ansible.builtin.file:
    path: "{{ lxc_docker_env_shared_mount_source }}"
    state: directory
    mode: '0755'

- name: Copy Dockge templates to shared directory
  ansible.builtin.copy:
    src: "templates/files/dockge/"
    dest: "{{ lxc_docker_env_shared_mount_source }}/dockge/"
    owner: "{{ lxc_docker_env_shared_owner }}"
    group: "{{ lxc_docker_env_shared_group }}"
    mode: '0644'
    directory_mode: '0755'
  register: _copy_dockge_result
  notify: restart dockge

- name: Ensure Homepage discovery stack directory exists
  ansible.builtin.file:
    path: "{{ lxc_docker_env_homepage_discovery_stack_dir }}"
    state: directory
    owner: "{{ lxc_docker_env_shared_owner }}"
    group: "{{ lxc_docker_env_shared_group }}"
    mode: '0755'

- name: Render Homepage discovery proxy compose template
  ansible.builtin.template:
    src: "files/homepage-discovery/compose.yml.j2"
    dest: "{{ lxc_docker_env_homepage_discovery_stack_dir }}/compose.yml"
    owner: "{{ lxc_docker_env_shared_owner }}"
    group: "{{ lxc_docker_env_shared_group }}"
    mode: '0644'

- name: Initialize portal instance host list
  ansible.builtin.set_fact:
    lxc_docker_env_portal_hosts: []
  when: service_agents_enabled | default(false)

- name: Collect portal instance hosts from inventory
  ansible.builtin.set_fact:
    lxc_docker_env_portal_hosts: "{{ lxc_docker_env_portal_hosts + [item] }}"
  loop: "{{ groups['lxcs'] | default([]) }}"
  when:
    - service_agents_enabled | default(false)
    - hostvars[item].portal_instance | default(false)

- name: Validate admin environment variables
  ansible.builtin.assert:
    that:
      - lxc_docker_env_portal_hosts | length == 1
      - default_domain is defined
      - default_domain | length > 0
    fail_msg: >-
      Service-agent hosts require exactly one host with portal_instance=true and a
      default_domain value defined in host_vars.
  when: service_agents_enabled | default(false)

- name: Ensure admin stack directory exists (service agents only)
  ansible.builtin.file:
    path: "{{ lxc_docker_env_shared_mount_source }}/stacks/admin"
    state: directory
    owner: "{{ lxc_docker_env_shared_owner }}"
    group: "{{ lxc_docker_env_shared_group }}"
    mode: '0755'
  when: service_agents_enabled | default(false)

- name: Remove legacy root admin directory
  ansible.builtin.file:
    path: "{{ lxc_docker_env_shared_mount_source }}/admin"
    state: absent

- name: Remove admin stack for docker-only hosts
  ansible.builtin.file:
    path: "{{ lxc_docker_env_shared_mount_source }}/stacks/admin"
    state: absent
  when: docker_enabled | default(false) and not (service_agents_enabled | default(false))

- name: Render admin environment file (service agents only)
  ansible.builtin.template:
    src: "files/admin/.env.j2"
    dest: "{{ lxc_docker_env_shared_mount_source }}/stacks/admin/.env"
    owner: "{{ lxc_docker_env_shared_owner }}"
    group: "{{ lxc_docker_env_shared_group }}"
    mode: '0644'
  when: service_agents_enabled | default(false)
  register: _template_admin_env_result

- name: Render admin compose template (service agents only)
  ansible.builtin.template:
    src: "files/admin/compose.yml.j2"
    dest: "{{ lxc_docker_env_shared_mount_source }}/stacks/admin/compose.yml"
    owner: "{{ lxc_docker_env_shared_owner }}"
    group: "{{ lxc_docker_env_shared_group }}"
    mode: '0644'
  when: service_agents_enabled | default(false)
  register: _template_admin_compose_result

- name: Copy stacks templates to shared directory (service agents only)
  ansible.builtin.copy:
    src: "templates/files/stacks/"
    dest: "{{ lxc_docker_env_shared_mount_source }}/stacks/"
    owner: "{{ lxc_docker_env_shared_owner }}"
    group: "{{ lxc_docker_env_shared_group }}"
    mode: '0644'
    directory_mode: '0755'
  when: service_agents_enabled | default(false)
  register: _copy_stacks_result

- name: Find markdown/docs in deployed docker config
  ansible.builtin.find:
    paths:
      - "{{ lxc_docker_env_shared_mount_source }}"
    patterns:
      - "README*"
      - "*.md"
    recurse: true
    file_type: file
  register: _docker_env_docs
  failed_when: false

- name: Remove markdown/docs from deployed docker config
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ _docker_env_docs.files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"

- name: Normalize Docker config ownership for existing files
  ansible.builtin.file:
    path: "{{ lxc_docker_env_shared_mount_source }}"
    owner: "{{ lxc_docker_env_shared_owner }}"
    group: "{{ lxc_docker_env_shared_group }}"
    recurse: true
    state: directory

- name: Remove service-agent stacks for docker-only hosts
  ansible.builtin.file:
    path: "{{ lxc_docker_env_shared_mount_source }}/stacks/admin"
    state: absent
  when: docker_enabled | default(false) and not (service_agents_enabled | default(false))

- name: Ensure stacks directory exists
  ansible.builtin.file:
    path: "{{ lxc_docker_env_shared_mount_source }}/stacks"
    state: directory
    owner: "{{ lxc_docker_env_shared_owner }}"
    group: "{{ lxc_docker_env_shared_group }}"
    mode: '0755'

# ==============================================================================
# Per-Host Stacks: Deploy compose stacks from stacks/<hostname>/
# ==============================================================================
- name: Check if per-host stacks source exists
  ansible.builtin.stat:
    path: "{{ lxc_docker_env_stacks_source }}"
  register: _per_host_stacks_dir
  delegate_to: localhost
  become: false

- name: Find template files (.j2) in per-host stacks
  ansible.builtin.find:
    paths: "{{ lxc_docker_env_stacks_source }}"
    patterns: "*.j2"
    hidden: true
    recurse: true
    file_type: file
  register: _per_host_j2_files
  delegate_to: localhost
  become: false
  when: _per_host_stacks_dir.stat.exists | default(false)

- name: Find static files in per-host stacks
  ansible.builtin.find:
    paths: "{{ lxc_docker_env_stacks_source }}"
    patterns: "*"
    excludes: "*.j2,.gitkeep"
    hidden: true
    recurse: true
    file_type: file
  register: _per_host_static_files
  delegate_to: localhost
  become: false
  when: _per_host_stacks_dir.stat.exists | default(false)

- name: Find directories in per-host stacks
  ansible.builtin.find:
    paths: "{{ lxc_docker_env_stacks_source }}"
    recurse: true
    file_type: directory
  register: _per_host_dirs
  delegate_to: localhost
  become: false
  when: _per_host_stacks_dir.stat.exists | default(false)

- name: Create per-host stack directories
  ansible.builtin.file:
    path: "{{ lxc_docker_env_shared_mount_source }}/stacks/{{ item.path | relpath(lxc_docker_env_stacks_source) }}"
    state: directory
    owner: "{{ lxc_docker_env_shared_owner }}"
    group: "{{ lxc_docker_env_shared_group }}"
    mode: '0755'
  loop: "{{ _per_host_dirs.files | default([]) }}"
  loop_control:
    label: "{{ item.path | relpath(lxc_docker_env_stacks_source) }}"
  when: _per_host_stacks_dir.stat.exists | default(false)

- name: Render templated files (.j2) for per-host stacks
  ansible.builtin.template:
    src: "{{ item.path }}"
    dest: "{{ lxc_docker_env_shared_mount_source }}/stacks/{{ item.path | relpath(lxc_docker_env_stacks_source) | regex_replace('\\.j2$', '') }}"
    owner: "{{ lxc_docker_env_shared_owner }}"
    group: "{{ lxc_docker_env_shared_group }}"
    mode: '0644'
  loop: "{{ _per_host_j2_files.files | default([]) }}"
  loop_control:
    label: "{{ item.path | relpath(lxc_docker_env_stacks_source) }}"
  when: _per_host_stacks_dir.stat.exists | default(false)

- name: Copy static files for per-host stacks
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ lxc_docker_env_shared_mount_source }}/stacks/{{ item.path | relpath(lxc_docker_env_stacks_source) }}"
    owner: "{{ lxc_docker_env_shared_owner }}"
    group: "{{ lxc_docker_env_shared_group }}"
    mode: '0644'
  loop: "{{ _per_host_static_files.files | default([]) }}"
  loop_control:
    label: "{{ item.path | relpath(lxc_docker_env_stacks_source) }}"
  when: _per_host_stacks_dir.stat.exists | default(false)

- name: Ensure Docker config mount target exists
  ansible.builtin.file:
    path: "{{ lxc_docker_env_root_docker_conf_path }}"
    state: directory
    mode: '0755'

- name: Check if bind mount already exists
  ansible.builtin.command:
    cmd: "mountpoint -q {{ lxc_docker_env_root_docker_conf_path }}"
  register: _mount_check
  changed_when: false
  failed_when: false

- name: Create bind mount for Docker config
  ansible.posix.mount:
    path: "{{ lxc_docker_env_root_docker_conf_path }}"
    src: "{{ lxc_docker_env_shared_mount_source }}"
    opts: bind
    state: mounted
    fstype: none
  when: _mount_check.rc != 0  # rc=0 means IS mounted, rc!=0 means NOT mounted

- name: Ensure bind mount is in fstab
  ansible.posix.mount:
    path: "{{ lxc_docker_env_root_docker_conf_path }}"
    src: "{{ lxc_docker_env_shared_mount_source }}"
    opts: bind
    state: present
    fstype: none
    dump: '0'
    passno: '0'

- name: Ensure docker group exists
  ansible.builtin.group:
    name: docker
    state: present
    system: true

- name: Create Docker user
  ansible.builtin.user:
    name: "{{ lxc_docker_env_user }}"
    uid: "{{ lxc_docker_env_uid }}"
    group: "{{ lxc_docker_env_gid }}"
    groups:
      - docker
      - sudo
    append: true
    shell: /bin/bash
    create_home: true
    password_lock: true  # Lock password for security
    comment: "Docker user managed by Ansible"
  register: _docker_user_result

- name: Ensure Docker user can use sudo without password
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/{{ lxc_docker_env_user }}
    line: "{{ lxc_docker_env_user }} ALL=(ALL) NOPASSWD:ALL"
    create: true
    mode: '0440'
    validate: 'visudo -cf %s'

- name: Check if Dockge directory exists
  ansible.builtin.stat:
    path: "{{ lxc_docker_env_dockge_compose_dir }}"
  register: _dockge_dir_stat

- name: Check if Dockge is already running
  ansible.builtin.command:
    cmd: docker compose ps -q
    chdir: "{{ lxc_docker_env_dockge_compose_dir }}"
  register: _dockge_status
  changed_when: false
  failed_when: false
  check_mode: false
  when: _dockge_dir_stat.stat.exists and _dockge_dir_stat.stat.isdir

- name: Start Dockge with docker compose
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ lxc_docker_env_dockge_compose_dir }}"
  become: true
  become_user: "{{ lxc_docker_env_user }}"
  when:
    - _dockge_dir_stat.stat.exists
    - _dockge_dir_stat.stat.isdir
    - (_dockge_status.stdout | default('') | length == 0)
  register: _dockge_start_result

- name: Display Dockge startup result
  ansible.builtin.debug:
    msg: "Dockge {{ _dockge_start_result.changed | default(false) | ternary('started', 'already running or not configured') }}"
  when: _dockge_dir_stat.stat.exists

# ==============================================================================
# Stack Lifecycle: Discover and start all deployed compose stacks
# ==============================================================================
- name: Create external Docker networks
  ansible.builtin.command:
    cmd: "docker network create {{ item }}"
  loop: "{{ lxc_docker_env_external_networks }}"
  register: _network_create
  changed_when: _network_create.rc == 0
  failed_when: _network_create.rc != 0 and 'already exists' not in _network_create.stderr
  when: lxc_docker_env_external_networks | length > 0

- name: Find all compose files in stacks directory
  ansible.builtin.find:
    paths: "{{ lxc_docker_env_root_docker_conf_path }}/stacks"
    patterns:
      - "compose.yml"
      - "compose.yaml"
    recurse: true
    depth: 2
  register: _stack_compose_files

- name: Ensure all stacks are running
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ item.path | dirname }}"
  loop: "{{ _stack_compose_files.files | default([]) }}"
  loop_control:
    label: "{{ item.path | dirname | basename }}"
  register: _stack_up_results
  changed_when: "'Started' in _stack_up_results.stderr or 'Created' in _stack_up_results.stderr"
