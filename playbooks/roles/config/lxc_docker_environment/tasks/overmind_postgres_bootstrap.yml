---
# Host-specific bootstrap for the overmind memory Postgres substrate.

- name: Assert overmind Postgres bootstrap inputs are present
  ansible.builtin.assert:
    that:
      - overmind_postgres_bootstrap.container_name is defined
      - overmind_postgres_bootstrap.container_name | string | length > 0
      - overmind_postgres_bootstrap.admin_user is defined
      - overmind_postgres_bootstrap.admin_user | string | length > 0
      - overmind_postgres_bootstrap.admin_database is defined
      - overmind_postgres_bootstrap.admin_database | string | length > 0
      - overmind_postgres_bootstrap.admin_password is defined
      - overmind_postgres_bootstrap.admin_password | string | length > 0
      - overmind_postgres_bootstrap.memory_database is defined
      - overmind_postgres_bootstrap.memory_database | string | length > 0
      - overmind_postgres_bootstrap.memory_database is match('^[a-z_][a-z0-9_]*$')
      - overmind_postgres_bootstrap.memsrv_role is defined
      - overmind_postgres_bootstrap.memsrv_role | string | length > 0
      - overmind_postgres_bootstrap.memsrv_role is match('^[a-z_][a-z0-9_]*$')
      - overmind_postgres_bootstrap.memsrv_password is defined
      - overmind_postgres_bootstrap.memsrv_password | string | length > 0
    fail_msg: >-
      overmind_postgres_bootstrap_enabled requires container_name, admin_user,
      admin_database, admin_password, memory_database, memsrv_role, and
      memsrv_password. memory_database and memsrv_role must be simple lowercase
      PostgreSQL identifiers.

- name: Wait for overmind Postgres to accept local admin connections
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -e
      - PGPASSWORD
      - "{{ overmind_postgres_bootstrap.container_name }}"
      - pg_isready
      - -U
      - "{{ overmind_postgres_bootstrap.admin_user }}"
      - -d
      - "{{ overmind_postgres_bootstrap.admin_database }}"
  environment:
    PGPASSWORD: "{{ overmind_postgres_bootstrap.admin_password }}"
  register: _overmind_postgres_ready
  changed_when: false
  retries: 12
  delay: 5
  until: _overmind_postgres_ready.rc == 0
  no_log: true

- name: Check whether overmind memory database exists
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -e
      - PGPASSWORD
      - "{{ overmind_postgres_bootstrap.container_name }}"
      - psql
      - -U
      - "{{ overmind_postgres_bootstrap.admin_user }}"
      - -d
      - postgres
      - -tAc
      - "SELECT 1 FROM pg_database WHERE datname = '{{ overmind_postgres_bootstrap.memory_database }}'"
  environment:
    PGPASSWORD: "{{ overmind_postgres_bootstrap.admin_password }}"
  register: _overmind_memory_database_exists
  changed_when: false
  no_log: true

- name: Create overmind memory database
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -e
      - PGPASSWORD
      - "{{ overmind_postgres_bootstrap.container_name }}"
      - createdb
      - -U
      - "{{ overmind_postgres_bootstrap.admin_user }}"
      - "{{ overmind_postgres_bootstrap.memory_database }}"
  environment:
    PGPASSWORD: "{{ overmind_postgres_bootstrap.admin_password }}"
  when: _overmind_memory_database_exists.stdout | trim != "1"
  changed_when: true
  no_log: true

- name: Check whether overmind memsrv role exists
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -e
      - PGPASSWORD
      - "{{ overmind_postgres_bootstrap.container_name }}"
      - psql
      - -U
      - "{{ overmind_postgres_bootstrap.admin_user }}"
      - -d
      - postgres
      - -tAc
      - "SELECT 1 FROM pg_roles WHERE rolname = '{{ overmind_postgres_bootstrap.memsrv_role }}'"
  environment:
    PGPASSWORD: "{{ overmind_postgres_bootstrap.admin_password }}"
  register: _overmind_memsrv_role_exists
  changed_when: false
  no_log: true

- name: Create overmind memsrv login role
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -i
      - -e
      - PGPASSWORD
      - "{{ overmind_postgres_bootstrap.container_name }}"
      - psql
      - -U
      - "{{ overmind_postgres_bootstrap.admin_user }}"
      - -d
      - postgres
      - -v
      - ON_ERROR_STOP=1
  environment:
    PGPASSWORD: "{{ overmind_postgres_bootstrap.admin_password }}"
  args:
    stdin: |
      CREATE ROLE {{ overmind_postgres_bootstrap.memsrv_role }} WITH LOGIN
      PASSWORD '{{ overmind_postgres_bootstrap.memsrv_password | replace("'", "''") }}';
  when: _overmind_memsrv_role_exists.stdout | trim != "1"
  changed_when: true
  no_log: true

- name: Check whether overmind memsrv login password is current
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -e
      - PGPASSWORD
      - "{{ overmind_postgres_bootstrap.container_name }}"
      - psql
      - -U
      - "{{ overmind_postgres_bootstrap.memsrv_role }}"
      - -d
      - "{{ overmind_postgres_bootstrap.memory_database }}"
      - -tAc
      - "SELECT 1"
  environment:
    PGPASSWORD: "{{ overmind_postgres_bootstrap.memsrv_password }}"
  register: _overmind_memsrv_password_current
  changed_when: false
  failed_when: false
  when: _overmind_memsrv_role_exists.stdout | trim == "1"
  no_log: true

- name: Converge overmind memsrv login password
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -i
      - -e
      - PGPASSWORD
      - "{{ overmind_postgres_bootstrap.container_name }}"
      - psql
      - -U
      - "{{ overmind_postgres_bootstrap.admin_user }}"
      - -d
      - postgres
      - -v
      - ON_ERROR_STOP=1
  environment:
    PGPASSWORD: "{{ overmind_postgres_bootstrap.admin_password }}"
  args:
    stdin: |
      ALTER ROLE {{ overmind_postgres_bootstrap.memsrv_role }} WITH LOGIN
      PASSWORD '{{ overmind_postgres_bootstrap.memsrv_password | replace("'", "''") }}';
  when:
    - _overmind_memsrv_role_exists.stdout | trim == "1"
    - _overmind_memsrv_password_current.rc | default(1) != 0
  changed_when: true
  no_log: true
