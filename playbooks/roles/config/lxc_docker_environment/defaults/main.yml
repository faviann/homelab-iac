---
# Default variables for lxc_docker_environment role

# ==============================================================================
# Docker Environment Configuration
# ==============================================================================
# Shared storage path inside container (source for bind mount)
lxc_docker_env_shared_mount_source: "/shared/{{ inventory_hostname }}"

# Target mount point for Docker configuration
lxc_docker_env_root_docker_conf_path: "/conf/docker"

# Ownership for files in shared directory (UID:GID)
# Uses the host-specific docker user UID/GID from inventory/capability vars.
lxc_docker_env_shared_owner: "{{ lxc_docker_env_uid }}"
lxc_docker_env_shared_group: "{{ lxc_docker_env_gid }}"

# Dockge compose directory (relative to mount target)
lxc_docker_env_dockge_compose_dir: "{{ lxc_docker_env_root_docker_conf_path }}/dockge"

# Managed Docker agents stack
lxc_docker_env_docker_agents_stack_dir: "{{ lxc_docker_env_shared_mount_source }}/stacks/docker-agents"

# Quarantine location for stale managed stacks removed from source control.
lxc_docker_env_stale_stack_quarantine_root: "{{ lxc_docker_env_shared_mount_source }}/stale-stacks"

# Managed stack cleanup targets from previous layouts
lxc_docker_env_legacy_managed_stacks:
  - name: admin
    dir: "{{ lxc_docker_env_shared_mount_source }}/stacks/admin"
    compose_file: compose.yml
  - name: homepage-discovery
    dir: "{{ lxc_docker_env_shared_mount_source }}/stacks/homepage-discovery"
    compose_file: compose.yml

# Per-host stacks source directory (project-relative)
lxc_docker_env_stacks_source: "{{ playbook_dir }}/../stacks/{{ inventory_hostname }}"

# Docker user configuration (inherited from cap_docker group vars)
lxc_docker_env_user: "{{ docker_user | default('dockeruser') }}"
lxc_docker_env_uid: "{{ docker_uid | default(1000) }}"
lxc_docker_env_gid: "{{ docker_gid | default(1000) }}"

# External Docker networks to create before starting stacks
# Override in host_vars to declare networks required by compose files
lxc_docker_env_external_networks: []
