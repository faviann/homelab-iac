---
argument_specs:
  main:
    short_description: Configure Docker environment inside an LXC
    options:
      docker_user:
        type: str
        required: true
        description: Docker service account username from cap_docker inventory vars.
      docker_uid:
        type: int
        required: true
        description: Docker service account UID from cap_docker inventory vars.
      docker_gid:
        type: int
        required: true
        description: Docker service account GID from cap_docker inventory vars.
      dockhand_hawser_stacks_dir:
        type: str
        required: false
        description: Host path mirrored into Hawser for Dockhand-managed remote stack files.
      dockhand_hawser_token:
        type: str
        required: false
        no_log: true
        description: Shared Hawser authentication token sourced from vault for the Standard-mode pilot.
