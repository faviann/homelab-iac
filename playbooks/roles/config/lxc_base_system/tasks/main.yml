---
# Main tasks file for lxc_base_system role
# Handles base system configuration: package updates and reboots

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: "{{ lxc_base_system_apt_cache_valid_time }}"
  when: lxc_base_system_apt_update_cache | bool

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: dist
    autoremove: true
    autoclean: true
  register: _apt_upgrade_result
  when: lxc_base_system_apt_upgrade | bool

- name: Display upgrade result
  ansible.builtin.debug:
    msg: "Upgraded {{ _apt_upgrade_result.changed | default(false) | ternary('packages', 'no packages') }}"
  when: lxc_base_system_apt_upgrade | bool
