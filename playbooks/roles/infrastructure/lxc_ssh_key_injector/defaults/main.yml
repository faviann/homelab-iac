---
# Default variables for lxc_ssh_key_injector role

# Proxmox host to delegate pct commands to
# pct commands must run on the Proxmox host itself
lxc_ssh_key_injector_delegate_host: "{{ proxmox_pct_delegate_host | default(proxmox_api_host) }}"

# User for Proxmox host access
lxc_ssh_key_injector_delegate_user: root

# Skip containers that don't exist (true) or fail (false)
lxc_ssh_key_injector_skip_missing: true

# Skip containers that exist but are not running (true) or fail (false)
lxc_ssh_key_injector_skip_stopped: true
