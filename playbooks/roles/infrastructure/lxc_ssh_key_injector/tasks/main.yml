---
# Main tasks file for lxc_ssh_key_injector role
# Injects one explicit guest-bootstrap input via Proxmox pct commands.

- name: Validate explicit guest-bootstrap input
  ansible.builtin.assert:
    that:
      - lxc_ssh_key_injector_guest_bootstrap is defined
      - lxc_ssh_key_injector_guest_bootstrap is mapping
      - lxc_ssh_key_injector_guest_bootstrap.vmid is defined
      - lxc_ssh_key_injector_guest_bootstrap.vmid | int > 0
      - lxc_ssh_key_injector_guest_bootstrap.hostname is defined
      - lxc_ssh_key_injector_guest_bootstrap.hostname | string | length > 0
      - lxc_ssh_key_injector_guest_bootstrap.pubkey is defined
      - lxc_ssh_key_injector_guest_bootstrap.pubkey | string | length > 0
    fail_msg: >-
      infrastructure/lxc_ssh_key_injector requires an explicit guest-bootstrap
      mapping containing vmid, hostname, and pubkey.

# In check mode the derived state below ignores pct status anyway, and when
# the controller key could not be installed (proxmox_ssh_ready false) the
# Proxmox host is unreachable — skip the probe instead of failing the host.
- name: Check if container exists on Proxmox
  proxmox_pct:
    vmid: "{{ lxc_ssh_key_injector_guest_bootstrap.vmid }}"
    command: status
  register: _container_status
  delegate_to: "{{ lxc_ssh_key_injector_delegate_host }}"
  vars:
    ansible_user: "{{ lxc_ssh_key_injector_delegate_user }}"
  ignore_errors: true
  when: hostvars['localhost'].proxmox_ssh_ready | default(true)

- name: Derive container runtime state from pct status
  ansible.builtin.set_fact:
    _lxc_ssh_key_injector_container_state: >-
      {{
        'check_mode'
        if ansible_check_mode | bool
        else (
        'absent'
        if _container_status.rc != 0
        else (_container_status.status | default('unknown', true))
        )
      }}

- name: Skip runtime-sensitive SSH key injection in check mode
  ansible.builtin.debug:
    msg: >-
      Check mode skips pct runtime inspection and in-guest SSH key injection for
      container {{ lxc_ssh_key_injector_guest_bootstrap.vmid }}
      ({{ lxc_ssh_key_injector_guest_bootstrap.hostname }}).
  when: _lxc_ssh_key_injector_container_state == 'check_mode'

- name: Skip non-existent containers
  ansible.builtin.debug:
    msg: >-
      Container {{ lxc_ssh_key_injector_guest_bootstrap.vmid }}
      ({{ lxc_ssh_key_injector_guest_bootstrap.hostname }}) does not exist - skipping
  when:
    - _lxc_ssh_key_injector_container_state == 'absent'
    - lxc_ssh_key_injector_skip_missing | bool

- name: Fail on non-existent containers when skip_missing is false
  ansible.builtin.fail:
    msg: >-
      Container {{ lxc_ssh_key_injector_guest_bootstrap.vmid }}
      ({{ lxc_ssh_key_injector_guest_bootstrap.hostname }}) does not exist
  when:
    - _lxc_ssh_key_injector_container_state == 'absent'
    - not (lxc_ssh_key_injector_skip_missing | bool)

- name: Skip stopped containers
  ansible.builtin.debug:
    msg: >-
      Container {{ lxc_ssh_key_injector_guest_bootstrap.vmid }}
      ({{ lxc_ssh_key_injector_guest_bootstrap.hostname }}) is
      {{ _lxc_ssh_key_injector_container_state }} - skipping SSH key injection
  when:
    - _lxc_ssh_key_injector_container_state == 'stopped'
    - lxc_ssh_key_injector_skip_stopped | bool

- name: Fail on stopped containers when skip_stopped is false
  ansible.builtin.fail:
    msg: >-
      Container {{ lxc_ssh_key_injector_guest_bootstrap.vmid }}
      ({{ lxc_ssh_key_injector_guest_bootstrap.hostname }}) is stopped
  when:
    - _lxc_ssh_key_injector_container_state == 'stopped'
    - not (lxc_ssh_key_injector_skip_stopped | bool)

- name: Fail when pct status returned an unknown runtime state
  ansible.builtin.fail:
    msg: >-
      Container {{ lxc_ssh_key_injector_guest_bootstrap.vmid }}
      ({{ lxc_ssh_key_injector_guest_bootstrap.hostname }}) returned an unknown pct status:
      {{ _container_status.stdout | default('') | trim }}
  when:
    - _lxc_ssh_key_injector_container_state not in ['absent', 'stopped', 'running', 'check_mode']

- name: Ensure SSH public key is installed idempotently
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ lxc_ssh_key_injector_guest_bootstrap.vmid | string }}"
      - --
      - sh
      - -eu
      - -c
      - |
        changed=0
        pubkey="$(printf '%s' "$1" | base64 -d)" || exit 1
        [ -n "$pubkey" ]

        ssh_dir=/root/.ssh
        auth_keys="$ssh_dir/authorized_keys"

        umask 077

        if [ ! -d "$ssh_dir" ]; then
          mkdir -p "$ssh_dir"
          changed=1
        fi

        if [ "$(stat -c '%u:%g' "$ssh_dir")" != '0:0' ]; then
          chown 0:0 "$ssh_dir"
          changed=1
        fi

        if [ "$(stat -c '%a' "$ssh_dir")" != '700' ]; then
          chmod 700 "$ssh_dir"
          changed=1
        fi

        if [ ! -f "$auth_keys" ]; then
          : > "$auth_keys"
          changed=1
        fi

        if [ "$(stat -c '%u:%g' "$auth_keys")" != '0:0' ]; then
          chown 0:0 "$auth_keys"
          changed=1
        fi

        if [ "$(stat -c '%a' "$auth_keys")" != '600' ]; then
          chmod 600 "$auth_keys"
          changed=1
        fi

        if ! grep -qxF -- "$pubkey" "$auth_keys"; then
          printf '%s\n' "$pubkey" >> "$auth_keys"
          changed=1
        fi

        printf 'CHANGED=%s\n' "$changed"
      - sh
      - "{{ lxc_ssh_key_injector_guest_bootstrap.pubkey | b64encode }}"
  delegate_to: "{{ lxc_ssh_key_injector_delegate_host }}"
  vars:
    ansible_user: "{{ lxc_ssh_key_injector_delegate_user }}"
  register: _ssh_key_injector_apply
  when: _lxc_ssh_key_injector_container_state == 'running'
  changed_when: "'CHANGED=1' in (_ssh_key_injector_apply.stdout | default(''))"
  failed_when: >-
    (_ssh_key_injector_apply.rc != 0)
    or ('CHANGED=' not in (_ssh_key_injector_apply.stdout | default('')))
  no_log: true

- name: Verify SSH key is present
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ lxc_ssh_key_injector_guest_bootstrap.vmid | string }}"
      - --
      - sh
      - -eu
      - -c
      - |
        pubkey="$(printf '%s' "$1" | base64 -d)" || exit 1
        grep -cxF -- "$pubkey" /root/.ssh/authorized_keys
      - sh
      - "{{ lxc_ssh_key_injector_guest_bootstrap.pubkey | b64encode }}"
  delegate_to: "{{ lxc_ssh_key_injector_delegate_host }}"
  vars:
    ansible_user: "{{ lxc_ssh_key_injector_delegate_user }}"
  register: _key_count
  when: _lxc_ssh_key_injector_container_state == 'running'
  changed_when: false
  failed_when: _key_count.rc != 0
  no_log: true

- name: Warn when duplicate SSH keys are present
  ansible.builtin.debug:
    msg: >-
      SSH key for {{ lxc_ssh_key_injector_guest_bootstrap.hostname }} appears
      {{ _key_count.stdout | trim }} times in authorized_keys.
      The injector preserved existing contents but duplicates should be cleaned up separately.
  when:
    - _lxc_ssh_key_injector_container_state == 'running'
    - (_key_count.stdout | trim | int) > 1

- name: Report SSH key injection result
  ansible.builtin.debug:
    msg: >-
      SSH key verified in container {{ lxc_ssh_key_injector_guest_bootstrap.hostname }}
      ({{ _key_count.stdout | default('0') }} occurrence(s))
  when:
    - _container_status.rc | default(1) == 0
    - _key_count.stdout is defined
