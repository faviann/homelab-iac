---
# Main tasks file for proxmox_lxc_provision role
# Provisions LXC containers via Proxmox API
# Note: LXC spec is built by dependency role: provisioning/lxc_spec_builder

- name: Allow explicit start override per host
  when: proxmox_lxc_start_on_create is defined
  ansible.builtin.set_fact:
    proxmox_lxc_spec: "{{ proxmox_lxc_spec | combine({'start_on_create': proxmox_lxc_start_on_create | bool}) }}"

- name: Validate required Proxmox details
  ansible.builtin.assert:
    that:
      - proxmox_api_host is defined
      - proxmox_api_user is defined
      - proxmox_api_token_id is defined
      - proxmox_api_token_secret is defined
      - proxmox_lxc_spec.hostname is defined
      - proxmox_lxc_spec.ostemplate is defined
      - proxmox_lxc_spec.node is defined
      - proxmox_lxc_spec.vmid is defined
    fail_msg: >-
      Missing required Proxmox settings. Check group_vars/all/proxmox.yml and host_vars/{{ inventory_hostname }}.yml

- name: Derive desired Debian release from ostemplate
  ansible.builtin.set_fact:
    proxmox_lxc_desired_release_candidates: "{{ proxmox_lxc_spec.ostemplate | regex_findall('debian-([0-9]+)-') }}"

- name: Validate desired Debian release can be derived from ostemplate
  ansible.builtin.assert:
    that:
      - proxmox_lxc_desired_release_candidates | length > 0
    fail_msg: >-
      Cannot derive desired Debian release from ostemplate '{{ proxmox_lxc_spec.ostemplate }}'.
      Expected a template name like 'debian-<major>-...'.
  when: proxmox_lxc_rebuild_on_release_mismatch | default(false) | bool

- name: Record desired Debian release
  ansible.builtin.set_fact:
    proxmox_lxc_desired_release: "{{ proxmox_lxc_desired_release_candidates | first }}"

- name: Seed release state from validation results when available
  ansible.builtin.set_fact:
    proxmox_lxc_runtime_state: "{{ lxc_validation_results[inventory_hostname].runtime_state | default('unknown') }}"
    proxmox_lxc_actual_release: "{{ lxc_validation_results[inventory_hostname].actual_release | default('') }}"
    proxmox_lxc_release_probe_state: "{{ lxc_validation_results[inventory_hostname].release_probe_state | default('unavailable') }}"
    proxmox_lxc_release_mismatch: "{{ lxc_validation_results[inventory_hostname].release_mismatch | default(false) | bool }}"
    proxmox_lxc_rebuild_eligible: "{{ lxc_validation_results[inventory_hostname].rebuild_eligible | default(false) | bool }}"
  when:
    - lxc_validation_results is defined
    - inventory_hostname in lxc_validation_results

- name: Initialize release state when validation data is unavailable
  ansible.builtin.set_fact:
    proxmox_lxc_runtime_state: unknown
    proxmox_lxc_actual_release: ""
    proxmox_lxc_release_probe_state: unavailable
    proxmox_lxc_release_mismatch: false
    proxmox_lxc_rebuild_eligible: false
  when: proxmox_lxc_release_probe_state is not defined

- name: Query current container runtime state when validation data is unavailable
  ansible.builtin.command:
    cmd: "pct status {{ proxmox_lxc_spec.vmid }}"
  register: proxmox_lxc_pct_status_result
  changed_when: false
  failed_when: false
  delegate_to: "{{ proxmox_pct_delegate_host }}"
  vars:
    ansible_user: "{{ proxmox_host_delegate_user | default('root') }}"
  when:
    - proxmox_lxc_spec.state | default('present') == 'present'
    - proxmox_lxc_release_probe_state == 'unavailable'

- name: Derive runtime state from pct status
  ansible.builtin.set_fact:
    proxmox_lxc_runtime_state: >-
      {{
        'absent'
        if proxmox_lxc_pct_status_result.rc != 0
        else (proxmox_lxc_pct_status_result.stdout | regex_search('running|stopped') | default('unknown', true))
      }}
  when:
    - proxmox_lxc_spec.state | default('present') == 'present'
    - proxmox_lxc_release_probe_state == 'unavailable'

- name: Probe guest Debian release from running container
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ proxmox_lxc_spec.vmid | string }}"
      - --
      - sh
      - -c
      - ". /etc/os-release && printf '%s' \"$VERSION_ID\""
  register: proxmox_lxc_release_probe_result
  changed_when: false
  failed_when: false
  delegate_to: "{{ proxmox_pct_delegate_host }}"
  vars:
    ansible_user: "{{ proxmox_host_delegate_user | default('root') }}"
  when:
    - proxmox_lxc_spec.state | default('present') == 'present'
    - proxmox_lxc_release_probe_state == 'unavailable'
    - proxmox_lxc_runtime_state == 'running'

- name: Finalize release state from local probe
  ansible.builtin.set_fact:
    proxmox_lxc_actual_release: "{{ _probed_release }}"
    proxmox_lxc_release_probe_state: >-
      {%- if proxmox_lxc_runtime_state == 'absent' -%}
      absent
      {%- elif proxmox_lxc_runtime_state == 'stopped' -%}
      skipped_stopped
      {%- elif _probed_release | length == 0 or (proxmox_lxc_release_probe_result.rc | default(1)) != 0 -%}
      probe_failed
      {%- else -%}
      probed
      {%- endif -%}
    proxmox_lxc_release_mismatch: "{{ _release_mismatch }}"
    proxmox_lxc_rebuild_eligible: "{{ _release_mismatch | bool }}"
  vars:
    _probed_release: "{{ proxmox_lxc_release_probe_result.stdout | default('') | regex_findall('([0-9]+)') | first | default('') }}"
    _release_mismatch: >-
      {{
        proxmox_lxc_runtime_state == 'running'
        and _probed_release | length > 0
        and proxmox_lxc_desired_release | length > 0
        and _probed_release != proxmox_lxc_desired_release
      }}
  when:
    - proxmox_lxc_spec.state | default('present') == 'present'
    - proxmox_lxc_release_probe_state == 'unavailable'

- name: Determine whether container should be rebuilt
  ansible.builtin.set_fact:
    proxmox_lxc_rebuilt: "{{ proxmox_lxc_rebuild_required | bool }}"
    proxmox_lxc_rebuild_required: >-
      {{
        proxmox_lxc_spec.state | default('present') == 'present'
        and (proxmox_lxc_rebuild_on_release_mismatch | default(false) | bool)
        and (proxmox_lxc_rebuild_eligible | bool)
      }}

- name: Override interpreter discovery for rebuilt hosts in later plays
  ansible.builtin.add_host:
    name: "{{ inventory_hostname }}"
    proxmox_lxc_rebuilt: true
    ansible_python_interpreter: auto_silent
  when: proxmox_lxc_rebuild_required | bool

- name: Find cached facts for rebuilt host
  ansible.builtin.find:
    paths: "{{ [playbook_dir | dirname, '.ansible', 'cache'] | path_join }}"
    patterns: "*_{{ inventory_hostname }}"
    file_type: file
  register: proxmox_lxc_rebuilt_cache_files
  delegate_to: localhost
  become: false
  when: proxmox_lxc_rebuild_required | bool

- name: Remove cached facts for rebuilt host
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ proxmox_lxc_rebuilt_cache_files.files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  delegate_to: localhost
  become: false
  when: proxmox_lxc_rebuild_required | bool

- name: Remove stale known_hosts entries for rebuilt host
  ansible.builtin.command:
    argv:
      - ssh-keygen
      - -f
      - "{{ lookup('env', 'HOME') }}/.ssh/known_hosts"
      - -R
      - "{{ item }}"
  loop: "{{ [ansible_host | default(inventory_hostname), inventory_hostname] | unique }}"
  loop_control:
    label: "{{ item }}"
  register: proxmox_lxc_remove_known_host_result
  changed_when: "'not found' not in ((proxmox_lxc_remove_known_host_result.stdout | default('')) ~ (proxmox_lxc_remove_known_host_result.stderr | default('')))"
  failed_when: false
  delegate_to: localhost
  become: false
  when: proxmox_lxc_rebuild_required | bool

- name: Report planned release-based rebuild in check mode
  ansible.builtin.debug:
    msg: >-
      Check mode: would destroy and recreate {{ proxmox_lxc_spec.hostname }} (vmid {{ proxmox_lxc_spec.vmid }})
      because guest release {{ proxmox_lxc_actual_release }} differs from desired Debian {{ proxmox_lxc_desired_release }}.
  when:
    - ansible_check_mode
    - proxmox_lxc_rebuild_required | bool

- name: Warn about guest release mismatch without auto-rebuild
  ansible.builtin.debug:
    msg: >-
      Host {{ inventory_hostname }} is running Debian {{ proxmox_lxc_actual_release }}, but the desired
      template targets Debian {{ proxmox_lxc_desired_release }}. Set
      proxmox_lxc_rebuild_on_release_mismatch=true to allow automatic destroy/recreate.
  when:
    - proxmox_lxc_spec.state | default('present') == 'present'
    - proxmox_lxc_release_mismatch | bool
    - not (proxmox_lxc_rebuild_on_release_mismatch | default(false) | bool)

- name: Warn when release check is skipped for stopped container
  ansible.builtin.debug:
    msg: >-
      Host {{ inventory_hostname }} is stopped, so automatic release-based rebuild is skipped.
      Start the container and rerun provisioning if you want release inspection before rebuild.
  when:
    - proxmox_lxc_spec.state | default('present') == 'present'
    - proxmox_lxc_release_probe_state == 'skipped_stopped'
    - proxmox_lxc_rebuild_on_release_mismatch | default(false) | bool

- name: Warn when guest release inspection failed
  ansible.builtin.debug:
    msg: >-
      Host {{ inventory_hostname }} could not be inspected for guest release via /etc/os-release,
      so automatic release-based rebuild is skipped.
  when:
    - proxmox_lxc_spec.state | default('present') == 'present'
    - proxmox_lxc_release_probe_state == 'probe_failed'
    - proxmox_lxc_rebuild_on_release_mismatch | default(false) | bool

- name: Stop mismatched running container before rebuild
  community.proxmox.proxmox:
    api_host: "{{ proxmox_api_host }}"
    api_port: "{{ proxmox_api_port | default(omit) }}"
    api_user: "{{ proxmox_api_user }}"
    api_token_id: "{{ proxmox_api_token_id }}"
    api_token_secret: "{{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_verify_ssl | default(true) | bool }}"
    node: "{{ proxmox_lxc_spec.node }}"
    vmid: "{{ proxmox_lxc_spec.vmid }}"
    state: stopped
  delegate_to: "{{ proxmox_api_delegate_host }}"
  become: false
  no_log: true
  when:
    - not ansible_check_mode
    - proxmox_lxc_rebuild_required | bool

- name: Destroy mismatched container before recreate
  community.proxmox.proxmox:
    api_host: "{{ proxmox_api_host }}"
    api_port: "{{ proxmox_api_port | default(omit) }}"
    api_user: "{{ proxmox_api_user }}"
    api_token_id: "{{ proxmox_api_token_id }}"
    api_token_secret: "{{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_verify_ssl | default(true) | bool }}"
    node: "{{ proxmox_lxc_spec.node }}"
    vmid: "{{ proxmox_lxc_spec.vmid }}"
    state: absent
  delegate_to: "{{ proxmox_api_delegate_host }}"
  become: false
  no_log: true
  when:
    - not ansible_check_mode
    - proxmox_lxc_rebuild_required | bool

# Note: Some LXC settings cannot be applied via the Proxmox API (even with root@pam):
# - Feature flags (like keyctl=1): Applied via pct commands in proxmox_lxc_host_config/tasks/features.yml
# - All mount points: Applied via config file edits in proxmox_lxc_host_config/tasks/config_file.yml
#   This includes both bind mounts and shared storage volumes (to allow sharing across containers)

- name: Ensure LXC container exists
  community.proxmox.proxmox:
    api_host: "{{ proxmox_api_host }}"
    api_port: "{{ proxmox_api_port | default(omit) }}"
    api_user: "{{ proxmox_api_user }}"
    api_token_id: "{{ proxmox_api_token_id }}"
    api_token_secret: "{{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_verify_ssl | default(true) | bool }}"
    node: "{{ proxmox_lxc_spec.node }}"
    vmid: "{{ proxmox_lxc_spec.vmid }}"
    hostname: "{{ proxmox_lxc_spec.hostname }}"
    ostemplate: "{{ proxmox_lxc_spec.ostemplate }}"
    pool: "{{ proxmox_lxc_spec.pool | default(omit) }}"
    password: "{{ proxmox_lxc_spec.password | default(omit) }}"
    pubkey: "{{ proxmox_lxc_spec.pubkey | default(omit) }}"
    description: "{{ proxmox_lxc_spec.description | default(omit) }}"
    storage: "{{ proxmox_lxc_spec.storage | default(omit) }}"
    disk: "{{ proxmox_lxc_spec.disk | default(omit) }}"
    mount_volumes: "{{ proxmox_lxc_spec.mount_volumes | default(omit) }}"
    cores: "{{ proxmox_lxc_spec.cores | default(omit) }}"
    cpus: "{{ proxmox_lxc_spec.cpus | default(omit) }}"
    cpuunits: "{{ proxmox_lxc_spec.cpuunits | default(omit) }}"
    memory: "{{ proxmox_lxc_spec.memory | default(omit) }}"
    swap: "{{ proxmox_lxc_spec.swap | default(omit) }}"
    netif: "{{ proxmox_lxc_spec.netif | default(omit) }}"
    features: "{{ proxmox_lxc_spec.features | default(omit) }}"
    unprivileged: "{{ proxmox_lxc_spec.unprivileged | default(omit) }}"
    onboot: "{{ proxmox_lxc_spec.onboot | default(omit) }}"
    timezone: "{{ proxmox_lxc_spec.timezone | default(omit) }}"
    nameserver: "{{ proxmox_lxc_spec.nameserver | default(omit) }}"
    searchdomain: "{{ proxmox_lxc_spec.searchdomain | default(omit) }}"
    mounts: "{{ proxmox_lxc_spec.mounts | default(omit) }}"
    startup: "{{ proxmox_lxc_spec.startup | default(omit) }}"
    tags: "{{ proxmox_lxc_spec.tags | default(omit) }}"
    timeout: "{{ proxmox_lxc_spec.timeout | default(omit) }}"
    ostype: "{{ proxmox_lxc_spec.ostype | default(omit) }}"
    state: "{{ proxmox_lxc_spec.state | default('present') }}"
    update: "{{ proxmox_lxc_spec['update'] | default(false) | bool }}"
  register: proxmox_lxc_result
  delegate_to: "{{ proxmox_api_delegate_host }}"
  become: false
  no_log: true

- name: Start LXC when requested
  when: proxmox_lxc_spec.start_on_create | default(false) | bool
  community.proxmox.proxmox:
    api_host: "{{ proxmox_api_host }}"
    api_port: "{{ proxmox_api_port | default(omit) }}"
    api_user: "{{ proxmox_api_user }}"
    api_token_id: "{{ proxmox_api_token_id }}"
    api_token_secret: "{{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_verify_ssl | default(true) | bool }}"
    node: "{{ proxmox_lxc_spec.node }}"
    vmid: "{{ proxmox_lxc_spec.vmid }}"
    state: started
  delegate_to: "{{ proxmox_api_delegate_host }}"
  become: false
  no_log: true

- name: Report container provisioning outcome
  ansible.builtin.debug:
    msg: >-
      Container {{ proxmox_lxc_spec.hostname }} (vmid {{ proxmox_lxc_spec.vmid }}) ensured {{ proxmox_lxc_spec.state | default('present') }}.
  when: proxmox_lxc_result is defined and proxmox_lxc_result.changed
