---
# Main tasks file for proxmox_lxc_provision role
# Ensures the desired LXC exists via the Proxmox API.
# Lifecycle decisions such as rebuilds, inspection, and cleanup are owned by
# provisioning/proxmox_lxc_lifecycle.

- name: Resolve API-facing LXC contract slice
  ansible.builtin.set_fact:
    proxmox_lxc_api_spec: "{{ proxmox_lxc_contract.api_spec }}"

- name: Allow explicit start override per host
  when: proxmox_lxc_start_on_create is defined
  ansible.builtin.set_fact:
    proxmox_lxc_api_spec: "{{ proxmox_lxc_api_spec | combine({'start_on_create': proxmox_lxc_start_on_create | bool}) }}"

- name: Validate required Proxmox details
  ansible.builtin.assert:
    that:
      - proxmox_api_host is defined
      - proxmox_api_user is defined
      - proxmox_api_token_id is defined
      - proxmox_api_token_secret is defined
      - proxmox_lxc_api_spec.hostname is defined
      - proxmox_lxc_api_spec.ostemplate is defined
      - proxmox_lxc_api_spec.node is defined
      - proxmox_lxc_api_spec.vmid is defined
    fail_msg: >-
      Missing required Proxmox settings. Check group_vars/all/proxmox.yml and host_vars/{{ inventory_hostname }}.yml

# Note: Some LXC settings cannot be applied via the Proxmox API (even with root@pam):
# - Feature flags (like keyctl=1): Applied via pct commands in proxmox_lxc_host_config/tasks/features.yml
# - All mount points: Applied via config file edits in proxmox_lxc_host_config/tasks/config_file.yml
#   This includes both bind mounts and shared storage volumes (to allow sharing across containers)

- name: Ensure LXC container exists
  community.proxmox.proxmox:
    node: "{{ proxmox_lxc_api_spec.node }}"
    vmid: "{{ proxmox_lxc_api_spec.vmid }}"
    hostname: "{{ proxmox_lxc_api_spec.hostname }}"
    ostemplate: "{{ proxmox_lxc_api_spec.ostemplate }}"
    pool: "{{ proxmox_lxc_api_spec.pool | default(omit) }}"
    password: "{{ proxmox_lxc_api_spec.password | default(omit) }}"
    pubkey: "{{ proxmox_lxc_api_spec.pubkey | default(omit) }}"
    description: "{{ proxmox_lxc_api_spec.description | default(omit) }}"
    storage: "{{ proxmox_lxc_api_spec.storage | default(omit) }}"
    disk: "{{ proxmox_lxc_api_spec.disk | default(omit) }}"
    mount_volumes: "{{ proxmox_lxc_api_spec.mount_volumes | default(omit) }}"
    cores: "{{ proxmox_lxc_api_spec.cores | default(omit) }}"
    cpus: "{{ proxmox_lxc_api_spec.cpus | default(omit) }}"
    cpuunits: "{{ proxmox_lxc_api_spec.cpuunits | default(omit) }}"
    memory: "{{ proxmox_lxc_api_spec.memory | default(omit) }}"
    swap: "{{ proxmox_lxc_api_spec.swap | default(omit) }}"
    netif: "{{ proxmox_lxc_api_spec.netif | default(omit) }}"
    unprivileged: "{{ proxmox_lxc_api_spec.unprivileged | default(omit) }}"
    onboot: "{{ proxmox_lxc_api_spec.onboot | default(omit) }}"
    timezone: "{{ proxmox_lxc_api_spec.timezone | default(omit) }}"
    nameserver: "{{ proxmox_lxc_api_spec.nameserver | default(omit) }}"
    searchdomain: "{{ proxmox_lxc_api_spec.searchdomain | default(omit) }}"
    mounts: "{{ proxmox_lxc_api_spec.mounts | default(omit) }}"
    startup: "{{ proxmox_lxc_api_spec.startup | default(omit) }}"
    tags: "{{ proxmox_lxc_api_spec.tags | default(omit) }}"
    timeout: "{{ proxmox_lxc_api_spec.timeout | default(omit) }}"
    ostype: "{{ proxmox_lxc_api_spec.ostype | default(omit) }}"
    state: "{{ proxmox_lxc_api_spec.state | default('present') }}"
    update: "{{ proxmox_lxc_api_spec['update'] | default(false) | bool }}"
  register: proxmox_lxc_result
  delegate_to: "{{ proxmox_api_delegate_host }}"
  become: false
  no_log: true

- name: Start LXC when requested
  when: proxmox_lxc_api_spec.start_on_create | default(false) | bool
  community.proxmox.proxmox:
    node: "{{ proxmox_lxc_api_spec.node }}"
    vmid: "{{ proxmox_lxc_api_spec.vmid }}"
    state: started
  delegate_to: "{{ proxmox_api_delegate_host }}"
  become: false
  no_log: true

- name: Report container provisioning outcome
  ansible.builtin.debug:
    msg: >-
      Container {{ proxmox_lxc_api_spec.hostname }} (vmid {{ proxmox_lxc_api_spec.vmid }}) ensured {{ proxmox_lxc_api_spec.state | default('present') }}.
  when: proxmox_lxc_result is defined and proxmox_lxc_result.changed
