---
# Default variables for proxmox_host_bootstrap role
# Prepares SSH access and validates Proxmox host readiness

# Proxmox host connection details
proxmox_host: "{{ proxmox_api_host | default('proxmox.lan') }}"
proxmox_ssh_user: root

# SSH key configuration - references control_node_bootstrap variables for DRY
# These paths should match what control_node_bootstrap generates
# Machine-local paths (home-dir based so every git worktree shares the same key)
proxmox_ssh_key_private: "{{ control_node_ssh_private_key_path | default(lookup('env', 'HOME') + '/.ansible/ssh/proxmox_lxc') }}"
proxmox_ssh_key_public: "{{ control_node_ssh_public_key_path | default(ssh_key_shared_resolved_public_key_path | default('')) }}"

# Connection timeouts
proxmox_ssh_connect_timeout: 5
proxmox_ssh_port: 22

# Validation checks
proxmox_validate_pct: true
proxmox_validate_api: true
proxmox_min_lxc_pve_version: "6.0.5-2"
