---
argument_specs:
  main:
    short_description: Apply host-side LXC configuration on the Proxmox node
    options:
      proxmox_lxc_contract:
        type: dict
        required: true
        description: Authoritative compiled LXC contract containing the host_config slice.
      proxmox_host_config_delegate:
        type: str
        required: false
        description: Host that executes pct and config-file mutations.
      proxmox_lxc_host_config_become:
        type: bool
        required: false
        default: true
        description: Whether host-side pct operations should use privilege escalation.
      proxmox_lxc_host_config_path_root:
        type: str
        required: false
        default: /etc/pve/lxc
        description: Root path containing Proxmox LXC config files.
      proxmox_lxc_host_config_restart_ready_timeout:
        type: int
        required: false
        default: 120
        description: >-
          Overall deadline, in seconds, for a restarted LXC to accept a guest command
          through the Proxmox host.
      proxmox_lxc_host_config_restart_ready_delay:
        type: int
        required: false
        default: 3
        description: Delay, in seconds, between guest-command readiness attempts.
      proxmox_lxc_host_config_restart_ready_command_timeout:
        type: int
        required: false
        default: 10
        description: >-
          Per-attempt execution timeout, in seconds, for the guest-command readiness probe.
