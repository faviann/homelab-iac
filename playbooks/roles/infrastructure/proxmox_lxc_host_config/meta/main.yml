---
# Dependencies for proxmox_lxc_host_config role
# This role requires the LXC spec to be built first to access:
#   - proxmox_lxc_bind_mounts (mp0-mp3 mount points)
#   - proxmox_lxc_idmap (UID/GID mappings)
#   - proxmox_lxc_spec (VMID and hostname)
dependencies:
  - role: provisioning/lxc_spec_builder
