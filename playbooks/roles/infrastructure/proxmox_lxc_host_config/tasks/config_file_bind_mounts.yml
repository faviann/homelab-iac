---
# Apply bind mount configuration
# Idempotent: Only updates if mounts differ from current state

- name: Get current bind mounts
  ansible.builtin.shell: |
    set -o pipefail
    { grep '^mp[0-9]\+:' {{ _lxc_config_file | quote }} || [ "$?" -eq 1 ]; } |
    while IFS=: read -r mount_key mount_value; do
      normalized_value=$(
        printf '%s\n' "$mount_value" |
        tr ',' '\n' |
        sed 's/^[[:space:]]*//;s/[[:space:]]*$//' |
        sort |
        paste -sd, -
      )
      printf '%s: %s\n' "$mount_key" "$normalized_value"
    done | sort
  args:
    executable: /bin/bash
  delegate_to: "{{ proxmox_host_config_delegate }}"
  become: "{{ proxmox_lxc_host_config_become }}"
  register: _current_mounts
  check_mode: false
  changed_when: false

- name: Initialize normalized desired bind mounts
  ansible.builtin.set_fact:
    _desired_mounts_list: []

- name: Normalize desired bind mounts
  ansible.builtin.set_fact:
    _desired_mounts_list: >-
      {{
        _desired_mounts_list
        + [
            item.key ~ ': '
            ~ (item.value.split(',') | map('trim') | sort | join(','))
          ]
      }}
  loop: "{{ proxmox_lxc_host_config_spec.bind_mounts | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: Determine desired bind mounts (sorted)
  ansible.builtin.set_fact:
    _desired_mounts: "{{ _desired_mounts_list | sort | join('\n') }}"

- name: Update bind mounts only if different
  when: _current_mounts.stdout != _desired_mounts
  block:
    - name: Remove all existing bind mount points
      ansible.builtin.lineinfile:
        path: "{{ _lxc_config_file }}"
        regexp: '^mp\d+:'
        state: absent
      delegate_to: "{{ proxmox_host_config_delegate }}"
      become: "{{ proxmox_lxc_host_config_become }}"

    - name: Apply bind mount points
      ansible.builtin.lineinfile:
        path: "{{ _lxc_config_file }}"
        line: "{{ item.key }}: {{ item.value }}"
        insertafter: '^rootfs:'
        create: false
      delegate_to: "{{ proxmox_host_config_delegate }}"
      become: "{{ proxmox_lxc_host_config_become }}"
      loop: "{{ proxmox_lxc_host_config_spec.bind_mounts | dict2items | sort(attribute='key') }}"

- name: Publish bind-mount reconciliation result
  ansible.builtin.set_fact:
    _proxmox_lxc_host_config_component_results: >-
      {{
        _proxmox_lxc_host_config_component_results
        | combine(
            {
              'bind_mounts': {
                'changed': (_current_mounts.stdout != _desired_mounts),
                'restart_required': (_current_mounts.stdout != _desired_mounts)
              }
            },
            recursive=True
          )
      }}
