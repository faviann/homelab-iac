---
# Treat sysctls and AppArmor lines as authoritative managed desired sets.

- name: Get current sysctl and AppArmor configuration
  ansible.builtin.shell: |
    set -o pipefail
    { grep -E '^lxc\.(sysctl|apparmor)\.' {{ infrastructure_proxmox_lxc_host_config_file | quote }} || [ "$?" -eq 1 ]; } |
    sed -E 's/[[:space:]]*[:=][[:space:]]*/=/' |
    sort
  args:
    executable: /bin/bash
  environment:
    LC_ALL: C
  delegate_to: "{{ proxmox_host_config_delegate }}"
  become: "{{ proxmox_lxc_host_config_become }}"
  register: infrastructure_proxmox_lxc_host_config_current_sysctls_apparmor
  check_mode: false
  changed_when: false

- name: Initialize desired sysctl and AppArmor configuration
  ansible.builtin.set_fact:
    infrastructure_proxmox_lxc_host_config_desired_sysctls_apparmor_list: []

- name: Normalize desired sysctl configuration
  ansible.builtin.set_fact:
    infrastructure_proxmox_lxc_host_config_desired_sysctls_apparmor_list: >-
      {{
        infrastructure_proxmox_lxc_host_config_desired_sysctls_apparmor_list
        + ['lxc.sysctl.' ~ item.key ~ '=' ~ (item.value | string)]
      }}
  loop: "{{ infrastructure_proxmox_lxc_host_config_spec.lxc_custom_sysctls }}"
  loop_control:
    label: "{{ item.key }}"

- name: Add desired AppArmor configuration
  ansible.builtin.set_fact:
    infrastructure_proxmox_lxc_host_config_desired_sysctls_apparmor_list: >-
      {{ infrastructure_proxmox_lxc_host_config_desired_sysctls_apparmor_list
         + ['lxc.apparmor.profile=unconfined'] }}
  when: infrastructure_proxmox_lxc_host_config_spec.lxc_disable_apparmor | bool

- name: Determine desired sysctl and AppArmor configuration
  ansible.builtin.set_fact:
    # Keep this template in a YAML double-quoted scalar: YAML unescapes the
    # \n before Jinja runs; a plain/folded scalar would join on literal
    # backslash-n and break idempotent comparison against the config file.
    infrastructure_proxmox_lxc_host_config_desired_sysctls_apparmor: "{{
      infrastructure_proxmox_lxc_host_config_desired_sysctls_apparmor_list
      | unique | sort | join('\n') }}"

- name: Reconcile authoritative sysctl and AppArmor configuration
  when: >-
    infrastructure_proxmox_lxc_host_config_current_sysctls_apparmor.stdout
    != infrastructure_proxmox_lxc_host_config_desired_sysctls_apparmor
  block:
    - name: Remove existing sysctl and AppArmor configuration
      ansible.builtin.lineinfile:
        path: "{{ infrastructure_proxmox_lxc_host_config_file }}"
        regexp: "^lxc\\.(sysctl|apparmor)\\."
        state: absent
        create: false
      delegate_to: "{{ proxmox_host_config_delegate }}"
      become: "{{ proxmox_lxc_host_config_become }}"

    - name: Apply desired custom sysctls
      ansible.builtin.lineinfile:
        path: "{{ infrastructure_proxmox_lxc_host_config_file }}"
        line: "lxc.sysctl.{{ item.key }} = {{ item.value }}"
        state: present
        create: false
      delegate_to: "{{ proxmox_host_config_delegate }}"
      become: "{{ proxmox_lxc_host_config_become }}"
      loop: "{{ infrastructure_proxmox_lxc_host_config_spec.lxc_custom_sysctls }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Apply desired AppArmor configuration
      ansible.builtin.lineinfile:
        path: "{{ infrastructure_proxmox_lxc_host_config_file }}"
        line: "lxc.apparmor.profile: unconfined"
        state: present
        create: false
      delegate_to: "{{ proxmox_host_config_delegate }}"
      become: "{{ proxmox_lxc_host_config_become }}"
      when: infrastructure_proxmox_lxc_host_config_spec.lxc_disable_apparmor | bool

- name: Publish sysctl and AppArmor reconciliation result
  ansible.builtin.set_fact:
    infrastructure_proxmox_lxc_host_config_component_results: >-
      {{
        infrastructure_proxmox_lxc_host_config_component_results
        | combine(
            {
              'sysctls': {
                'changed': (
                  infrastructure_proxmox_lxc_host_config_current_sysctls_apparmor.stdout
                  != infrastructure_proxmox_lxc_host_config_desired_sysctls_apparmor
                ),
                'restart_required': (
                  infrastructure_proxmox_lxc_host_config_current_sysctls_apparmor.stdout
                  != infrastructure_proxmox_lxc_host_config_desired_sysctls_apparmor
                )
              }
            },
            recursive=True
          )
      }}
