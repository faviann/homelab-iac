---
# Apply custom sysctl configurations to LXC config file
# Required for containers running Docker images that need specific kernel parameters

- name: Apply custom sysctls to LXC configuration
  ansible.builtin.lineinfile:
    path: "{{ _lxc_config_file }}"
    regexp: "^lxc\\.sysctl\\.{{ item.key | regex_escape() }}\\s*="
    line: "lxc.sysctl.{{ item.key }} = {{ item.value }}"
    state: present
    create: false
    backup: true
  delegate_to: "{{ proxmox_host_config_delegate }}"
  become: "{{ proxmox_lxc_host_config_become }}"
  loop: "{{ lxc_custom_sysctls | default([]) }}"
  when:
    - lxc_custom_sysctls is defined
    - lxc_custom_sysctls | length > 0
  register: _sysctl_results

- name: Disable AppArmor for Docker compatibility
  ansible.builtin.lineinfile:
    path: "{{ _lxc_config_file }}"
    regexp: "^lxc\\.apparmor\\.profile\\s*="
    line: "lxc.apparmor.profile: unconfined"
    state: present
    create: false
    backup: true
  delegate_to: "{{ proxmox_host_config_delegate }}"
  become: "{{ proxmox_lxc_host_config_become }}"
  when:
    - lxc_disable_apparmor | default(false) | bool
  register: _apparmor_result

- name: Publish sysctl reconciliation result
  ansible.builtin.set_fact:
    _proxmox_lxc_host_config_component_results: >-
      {{
        _proxmox_lxc_host_config_component_results
        | combine(
            {
              'sysctls': {
                'changed': (
                  (
                    _sysctl_results.results | default([])
                    | selectattr('changed', 'defined')
                    | selectattr('changed')
                    | list
                    | length > 0
                  )
                  or (_apparmor_result.changed | default(false))
                ),
                'restart_required': (
                  (
                    _sysctl_results.results | default([])
                    | selectattr('changed', 'defined')
                    | selectattr('changed')
                    | list
                    | length > 0
                  )
                  or (_apparmor_result.changed | default(false))
                )
              }
            },
            recursive=True
          )
      }}
