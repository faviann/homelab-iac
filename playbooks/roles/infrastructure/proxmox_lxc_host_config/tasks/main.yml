---
# Orchestrates host-side LXC configuration tasks
# These operations require direct SSH access to the Proxmox host

- name: Validate host-config execution context
  ansible.builtin.assert:
    that:
      - proxmox_host_config_delegate is defined
      - proxmox_host_config_delegate | string | length > 0
      - proxmox_lxc_host_config_path_root is defined
      - proxmox_lxc_host_config_path_root | string | length > 0
    fail_msg: >-
      infrastructure/proxmox_lxc_host_config requires proxmox_host_config_delegate and
      proxmox_lxc_host_config_path_root. Check group_vars/all/proxmox.yml.

- name: Resolve host-config LXC contract slice
  ansible.builtin.assert:
    that:
      - proxmox_lxc_contract is defined
      - proxmox_lxc_contract.host_config is defined
      - proxmox_lxc_contract.host_config.hostname is defined
      - proxmox_lxc_contract.host_config.vmid is defined
    fail_msg: "proxmox_lxc_contract.host_config with hostname and vmid is required"

- name: Resolve host-config LXC contract slice
  ansible.builtin.set_fact:
    infrastructure_proxmox_lxc_host_config_spec: "{{ proxmox_lxc_contract.host_config }}"

- name: Validate required context
  ansible.builtin.assert:
    that:
      - infrastructure_proxmox_lxc_host_config_spec is defined
      - infrastructure_proxmox_lxc_host_config_spec.hostname is defined
      - infrastructure_proxmox_lxc_host_config_spec.vmid is defined
    fail_msg: >-
      infrastructure_proxmox_lxc_host_config_spec with hostname and vmid is required

- name: Initialize host reconciliation component outcomes
  ansible.builtin.set_fact:
    infrastructure_proxmox_lxc_host_config_component_results:
      host_directories:
        changed: false
        restart_required: false
      idmap:
        changed: false
        restart_required: false
      bind_mounts:
        changed: false
        restart_required: false
      nvidia:
        changed: false
        restart_required: false
      wireguard:
        changed: false
        restart_required: false
      sysctls:
        changed: false
        restart_required: false
      features:
        changed: false
        restart_required: false

- name: Initialize host reconciliation result
  ansible.builtin.set_fact:
    # Public lifecycle output consumed by callers after this role completes.
    proxmox_lxc_host_config_result:  # noqa: var-naming[no-role-prefix]
      vmid: "{{ infrastructure_proxmox_lxc_host_config_spec.vmid }}"
      hostname: "{{ infrastructure_proxmox_lxc_host_config_spec.hostname }}"
      components: "{{ infrastructure_proxmox_lxc_host_config_component_results }}"
      overall_changed: false
      restart_required: false
      restart_applied: false

- name: Determine host-config LXC configuration file path
  ansible.builtin.set_fact:
    infrastructure_proxmox_lxc_host_config_file: >-
      {{ proxmox_lxc_host_config_path_root }}/{{ infrastructure_proxmox_lxc_host_config_spec.vmid }}.conf

- name: Ensure host-side LXC directories exist
  ansible.builtin.include_tasks: host_directories.yml
  when:
    - infrastructure_proxmox_lxc_host_config_spec.host_directories | default([]) | length > 0
    - hostvars['localhost'].proxmox_ssh_ready | default(true)

# proxmox_ssh_ready is false only when check mode could not install the
# controller key (set by proxmox_host_bootstrap on localhost); the Proxmox
# host is then unreachable, so skip everything that delegates to it.
- name: Check if host-config LXC configuration file exists
  ansible.builtin.stat:
    path: "{{ infrastructure_proxmox_lxc_host_config_file }}"
  register: infrastructure_proxmox_lxc_host_config_file_stat
  delegate_to: "{{ proxmox_host_config_delegate }}"
  become: "{{ proxmox_lxc_host_config_become }}"
  when: hostvars['localhost'].proxmox_ssh_ready | default(true)

- name: Skip host reconciliation in check mode when Proxmox SSH is unavailable
  ansible.builtin.debug:
    msg: >-
      Check mode skips host-config reconciliation for container
      {{ infrastructure_proxmox_lxc_host_config_spec.vmid }}
      ({{ infrastructure_proxmox_lxc_host_config_spec.hostname }})
      because SSH key authentication to the Proxmox host is not configured.
  when: not (hostvars['localhost'].proxmox_ssh_ready | default(true))

- name: Skip runtime-sensitive host reconciliation in check mode when config is absent
  ansible.builtin.debug:
    msg: >-
      Check mode skips host-config reconciliation for container
      {{ infrastructure_proxmox_lxc_host_config_spec.vmid }}
      ({{ infrastructure_proxmox_lxc_host_config_spec.hostname }})
      because {{ infrastructure_proxmox_lxc_host_config_file }} does not exist yet.
  when:
    - ansible_check_mode | bool
    - hostvars['localhost'].proxmox_ssh_ready | default(true)
    - not infrastructure_proxmox_lxc_host_config_file_stat.stat.exists

- name: Apply LXC config file modifications
  ansible.builtin.include_tasks: config_file.yml
  when: >-
    not (
      ansible_check_mode | bool
      and not (infrastructure_proxmox_lxc_host_config_file_stat.stat.exists | default(false))
    )
  tags:
    - config_file
    - idmap
    - gpu
    - wireguard

- name: Apply LXC feature flags via pct
  ansible.builtin.include_tasks: features.yml
  when:
    - >-
      not (
        ansible_check_mode | bool
        and not (infrastructure_proxmox_lxc_host_config_file_stat.stat.exists | default(false))
      )
  tags:
    - features

- name: Finalize host reconciliation result
  ansible.builtin.set_fact:
    # Public lifecycle output consumed by callers after this role completes.
    proxmox_lxc_host_config_result:  # noqa: var-naming[no-role-prefix]
      vmid: "{{ infrastructure_proxmox_lxc_host_config_spec.vmid }}"
      hostname: "{{ infrastructure_proxmox_lxc_host_config_spec.hostname }}"
      components: "{{ infrastructure_proxmox_lxc_host_config_component_results }}"
      overall_changed: >-
        {{
          infrastructure_proxmox_lxc_host_config_component_results
          | dict2items
          | selectattr('value.changed')
          | list
          | length > 0
        }}
      restart_required: >-
        {{
          infrastructure_proxmox_lxc_host_config_component_results
          | dict2items
          | selectattr('value.restart_required')
          | list
          | length > 0
        }}
      restart_applied: false

- name: Check container runtime status for config-file-driven restart
  proxmox_pct:
    vmid: "{{ infrastructure_proxmox_lxc_host_config_spec.vmid }}"
    command: status
  register: infrastructure_proxmox_lxc_host_config_container_status
  delegate_to: "{{ proxmox_host_config_delegate }}"
  become: "{{ proxmox_lxc_host_config_become }}"
  when:
    - proxmox_lxc_host_config_result.restart_required
    - not ansible_check_mode

- name: Restart container to apply config file changes
  proxmox_pct:
    vmid: "{{ infrastructure_proxmox_lxc_host_config_spec.vmid }}"
    command: reboot
  delegate_to: "{{ proxmox_host_config_delegate }}"
  become: "{{ proxmox_lxc_host_config_become }}"
  when:
    - proxmox_lxc_host_config_result.restart_required
    - not ansible_check_mode
    - infrastructure_proxmox_lxc_host_config_container_status is defined
    - infrastructure_proxmox_lxc_host_config_container_status.status | default('') == 'running'
  register: infrastructure_proxmox_lxc_host_config_container_restart

# This must remain synchronous so the published result describes the completed reboot.
# Readiness here is only that the restarted container accepts a guest command through
# the Proxmox host: the exact next operation this seam requires. SSH readiness stays
# owned by the guest-configuration connection wait, after guest access is restored.
- name: Wait for restarted container to accept guest commands  # noqa: no-handler
  proxmox_pct:
    vmid: "{{ infrastructure_proxmox_lxc_host_config_spec.vmid }}"
    command: wait_exec
    ready_timeout: "{{ proxmox_lxc_host_config_restart_ready_timeout }}"
    ready_delay: "{{ proxmox_lxc_host_config_restart_ready_delay }}"
    ready_command_timeout: "{{ proxmox_lxc_host_config_restart_ready_command_timeout }}"
  when: infrastructure_proxmox_lxc_host_config_container_restart is changed
  delegate_to: "{{ proxmox_host_config_delegate }}"
  become: "{{ proxmox_lxc_host_config_become }}"

# This must remain synchronous so callers receive the final restart outcome.
- name: Update result after config-file-driven restart  # noqa: no-handler var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    proxmox_lxc_host_config_result: >-
      {{
        proxmox_lxc_host_config_result
        | combine({'restart_applied': true, 'restart_required': false}, recursive=True)
      }}
  when: infrastructure_proxmox_lxc_host_config_container_restart is changed
