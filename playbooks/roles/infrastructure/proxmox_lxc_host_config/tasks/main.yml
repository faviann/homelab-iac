---
# Orchestrates host-side LXC configuration tasks
# These operations require direct SSH access to the Proxmox host

- name: Validate host-config execution context
  ansible.builtin.assert:
    that:
      - proxmox_host_config_delegate is defined
      - proxmox_host_config_delegate | string | length > 0
      - proxmox_lxc_host_config_path_root is defined
      - proxmox_lxc_host_config_path_root | string | length > 0
    fail_msg: >-
      infrastructure/proxmox_lxc_host_config requires proxmox_host_config_delegate and
      proxmox_lxc_host_config_path_root. Check group_vars/all/proxmox.yml.

- name: Resolve host-config LXC contract slice
  ansible.builtin.assert:
    that:
      - proxmox_lxc_contract is defined
      - proxmox_lxc_contract.host_config is defined
      - proxmox_lxc_contract.host_config.hostname is defined
      - proxmox_lxc_contract.host_config.vmid is defined
    fail_msg: "proxmox_lxc_contract.host_config with hostname and vmid is required"

- name: Resolve host-config LXC contract slice
  ansible.builtin.set_fact:
    proxmox_lxc_host_config_spec: "{{ proxmox_lxc_contract.host_config }}"

- name: Validate required context
  ansible.builtin.assert:
    that:
      - proxmox_lxc_host_config_spec is defined
      - proxmox_lxc_host_config_spec.hostname is defined
      - proxmox_lxc_host_config_spec.vmid is defined
    fail_msg: "proxmox_lxc_host_config_spec with hostname and vmid is required"

- name: Initialize host reconciliation component outcomes
  ansible.builtin.set_fact:
    _proxmox_lxc_host_config_component_results:
      host_directories:
        changed: false
        restart_required: false
      idmap:
        changed: false
        restart_required: false
      bind_mounts:
        changed: false
        restart_required: false
      nvidia:
        changed: false
        restart_required: false
      wireguard:
        changed: false
        restart_required: false
      sysctls:
        changed: false
        restart_required: false
      features:
        changed: false
        restart_required: false

- name: Initialize host reconciliation result
  ansible.builtin.set_fact:
    proxmox_lxc_host_config_result:
      vmid: "{{ proxmox_lxc_host_config_spec.vmid }}"
      hostname: "{{ proxmox_lxc_host_config_spec.hostname }}"
      components: "{{ _proxmox_lxc_host_config_component_results }}"
      overall_changed: false
      restart_required: false
      restart_applied: false

- name: Determine host-config LXC configuration file path
  ansible.builtin.set_fact:
    _proxmox_lxc_host_config_file: >-
      {{ proxmox_lxc_host_config_path_root }}/{{ proxmox_lxc_host_config_spec.vmid }}.conf

- name: Ensure host-side LXC directories exist
  ansible.builtin.include_tasks: host_directories.yml
  when:
    - proxmox_lxc_host_config_spec.host_directories | default([]) | length > 0
    - hostvars['localhost'].proxmox_ssh_ready | default(true)

# proxmox_ssh_ready is false only when check mode could not install the
# controller key (set by proxmox_host_bootstrap on localhost); the Proxmox
# host is then unreachable, so skip everything that delegates to it.
- name: Check if host-config LXC configuration file exists
  ansible.builtin.stat:
    path: "{{ _proxmox_lxc_host_config_file }}"
  register: _proxmox_lxc_host_config_file_stat
  delegate_to: "{{ proxmox_host_config_delegate }}"
  become: "{{ proxmox_lxc_host_config_become }}"
  when: hostvars['localhost'].proxmox_ssh_ready | default(true)

- name: Skip host reconciliation in check mode when Proxmox SSH is unavailable
  ansible.builtin.debug:
    msg: >-
      Check mode skips host-config reconciliation for container
      {{ proxmox_lxc_host_config_spec.vmid }} ({{ proxmox_lxc_host_config_spec.hostname }})
      because SSH key authentication to the Proxmox host is not configured.
  when: not (hostvars['localhost'].proxmox_ssh_ready | default(true))

- name: Skip runtime-sensitive host reconciliation in check mode when config is absent
  ansible.builtin.debug:
    msg: >-
      Check mode skips host-config reconciliation for container
      {{ proxmox_lxc_host_config_spec.vmid }} ({{ proxmox_lxc_host_config_spec.hostname }})
      because {{ _proxmox_lxc_host_config_file }} does not exist yet.
  when:
    - ansible_check_mode | bool
    - hostvars['localhost'].proxmox_ssh_ready | default(true)
    - not _proxmox_lxc_host_config_file_stat.stat.exists

- name: Apply LXC config file modifications
  ansible.builtin.include_tasks: config_file.yml
  when: not (ansible_check_mode | bool and not (_proxmox_lxc_host_config_file_stat.stat.exists | default(false)))
  tags:
    - config_file
    - idmap
    - gpu
    - wireguard

- name: Apply LXC feature flags via pct
  ansible.builtin.include_tasks: features.yml
  when:
    - not (ansible_check_mode | bool and not (_proxmox_lxc_host_config_file_stat.stat.exists | default(false)))
  tags:
    - features

- name: Finalize host reconciliation result
  ansible.builtin.set_fact:
    proxmox_lxc_host_config_result:
      vmid: "{{ proxmox_lxc_host_config_spec.vmid }}"
      hostname: "{{ proxmox_lxc_host_config_spec.hostname }}"
      components: "{{ _proxmox_lxc_host_config_component_results }}"
      overall_changed: >-
        {{
          _proxmox_lxc_host_config_component_results
          | dict2items
          | selectattr('value.changed')
          | list
          | length > 0
        }}
      restart_required: >-
        {{
          _proxmox_lxc_host_config_component_results
          | dict2items
          | selectattr('value.restart_required')
          | list
          | length > 0
        }}
      restart_applied: false

- name: Check container runtime status for config-file-driven restart
  proxmox_pct:
    vmid: "{{ proxmox_lxc_host_config_spec.vmid }}"
    command: status
  register: _config_container_status
  delegate_to: "{{ proxmox_host_config_delegate }}"
  become: "{{ proxmox_lxc_host_config_become }}"
  when:
    - proxmox_lxc_host_config_result.restart_required
    - not ansible_check_mode

- name: Restart container to apply config file changes
  proxmox_pct:
    vmid: "{{ proxmox_lxc_host_config_spec.vmid }}"
    command: reboot
  delegate_to: "{{ proxmox_host_config_delegate }}"
  become: "{{ proxmox_lxc_host_config_become }}"
  when:
    - proxmox_lxc_host_config_result.restart_required
    - not ansible_check_mode
    - _config_container_status is defined
    - _config_container_status.status | default('') == 'running'
  register: _config_container_restart

- name: Wait for container to complete reboot
  ansible.builtin.pause:
    seconds: 15
    prompt: "Waiting for container {{ proxmox_lxc_host_config_spec.vmid }} to complete reboot and start SSH service"
  when: _config_container_restart is changed
  delegate_to: "{{ proxmox_host_config_delegate }}"

- name: Update result after config-file-driven restart
  ansible.builtin.set_fact:
    proxmox_lxc_host_config_result: >-
      {{
        proxmox_lxc_host_config_result
        | combine({'restart_applied': true, 'restart_required': false}, recursive=True)
      }}
  when: _config_container_restart is changed
