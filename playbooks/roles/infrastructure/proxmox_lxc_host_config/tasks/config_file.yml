---
# Apply LXC configuration file modifications
# These settings cannot be set via the Proxmox API and require direct file editing
# Modular structure: Each feature is handled by a separate task file for maintainability

- name: Determine LXC configuration file path
  ansible.builtin.set_fact:
    _lxc_config_file: "{{ proxmox_lxc_host_config_path_root }}/{{ proxmox_lxc_host_config_spec.vmid }}.conf"

- name: Check if LXC configuration file exists
  ansible.builtin.stat:
    path: "{{ _lxc_config_file }}"
  delegate_to: "{{ proxmox_host_config_delegate }}"
  become: "{{ proxmox_lxc_host_config_become }}"
  register: _lxc_config_stat

- name: Fail if container config file does not exist
  ansible.builtin.fail:
    msg: "LXC configuration file {{ _lxc_config_file }} not found. Ensure container is created first."
  when: not _lxc_config_stat.stat.exists

- name: Validate host-config data types
  ansible.builtin.assert:
    that:
      - proxmox_lxc_host_config_spec.bind_mounts | default({}) is mapping
      - proxmox_lxc_host_config_spec.idmap | default([]) is sequence
      - proxmox_lxc_host_config_spec.idmap | default([]) is not string
      - proxmox_lxc_host_config_spec.features | default([]) is sequence
      - proxmox_lxc_host_config_spec.features | default([]) is not string
    fail_msg: "Host config spec must provide bind_mounts as a mapping and idmap/features as lists"

- name: Apply UID/GID ID mappings
  ansible.builtin.include_tasks: config_file_idmap.yml
  when:
    - proxmox_lxc_host_config_spec.idmap is defined
    - proxmox_lxc_host_config_spec.idmap | length > 0
  tags:
    - idmap

- name: Apply bind mount points
  ansible.builtin.include_tasks: config_file_bind_mounts.yml
  when:
    - proxmox_lxc_host_config_spec.bind_mounts is defined
    - proxmox_lxc_host_config_spec.bind_mounts | length > 0
  tags:
    - bind_mounts
    - mounts

- name: Apply WireGuard configuration
  ansible.builtin.include_tasks: config_file_wireguard.yml
  tags:
    - wireguard

- name: Apply NVIDIA GPU configuration
  ansible.builtin.include_tasks: config_file_nvidia.yml
  tags:
    - gpu
    - nvidia

- name: Apply custom LXC sysctls and AppArmor configuration
  ansible.builtin.include_tasks: config_file_sysctls.yml
  tags:
    - sysctls
    - apparmor
