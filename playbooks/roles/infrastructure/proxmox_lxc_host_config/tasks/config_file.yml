---
# Apply LXC configuration file modifications
# These settings cannot be set via the Proxmox API and require direct file editing
# Modular structure: Each feature is handled by a separate task file for maintainability

- name: Determine LXC configuration file path
  ansible.builtin.set_fact:
    infrastructure_proxmox_lxc_host_config_file: >-
      {{ proxmox_lxc_host_config_path_root }}/{{ infrastructure_proxmox_lxc_host_config_spec.vmid }}.conf

- name: Check if LXC configuration file exists
  ansible.builtin.stat:
    path: "{{ infrastructure_proxmox_lxc_host_config_file }}"
  delegate_to: "{{ proxmox_host_config_delegate }}"
  become: "{{ proxmox_lxc_host_config_become }}"
  register: infrastructure_proxmox_lxc_host_config_file_stat

- name: Fail if container config file does not exist
  ansible.builtin.fail:
    msg: >-
      LXC configuration file {{ infrastructure_proxmox_lxc_host_config_file }} not found.
      Ensure container is created first.
  when: not infrastructure_proxmox_lxc_host_config_file_stat.stat.exists

- name: Validate host-config data types
  ansible.builtin.assert:
    that:
      - infrastructure_proxmox_lxc_host_config_spec.bind_mounts | default({}) is mapping
      - infrastructure_proxmox_lxc_host_config_spec.idmap | default([]) is sequence
      - infrastructure_proxmox_lxc_host_config_spec.idmap | default([]) is not string
      - infrastructure_proxmox_lxc_host_config_spec.features | default([]) is sequence
      - infrastructure_proxmox_lxc_host_config_spec.features | default([]) is not string
      - infrastructure_proxmox_lxc_host_config_spec.configure_nvidia_runtime is boolean
      - infrastructure_proxmox_lxc_host_config_spec.wireguard_kernel_module_access is boolean
      - infrastructure_proxmox_lxc_host_config_spec.lxc_custom_sysctls is sequence
      - infrastructure_proxmox_lxc_host_config_spec.lxc_custom_sysctls is not string
      - infrastructure_proxmox_lxc_host_config_spec.lxc_disable_apparmor is boolean
    fail_msg: "Host config spec contains invalid managed host-side desired state"

- name: Apply UID/GID ID mappings
  ansible.builtin.include_tasks: config_file_idmap.yml
  tags:
    - idmap

- name: Apply bind mount points
  ansible.builtin.include_tasks: config_file_bind_mounts.yml
  tags:
    - bind_mounts
    - mounts

- name: Apply WireGuard configuration
  ansible.builtin.include_tasks: config_file_wireguard.yml
  tags:
    - wireguard

- name: Apply NVIDIA GPU configuration
  ansible.builtin.include_tasks: config_file_nvidia.yml
  tags:
    - gpu
    - nvidia

- name: Apply custom LXC sysctls and AppArmor configuration
  ansible.builtin.include_tasks: config_file_sysctls.yml
  tags:
    - sysctls
    - apparmor
