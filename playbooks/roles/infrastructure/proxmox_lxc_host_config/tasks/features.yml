---
# Apply ALL LXC feature flags via pct command
# Some features (like keyctl) cannot be set via Proxmox API even with root@pam
# To keep feature management simple and consistent, we apply ALL features via pct
# rather than splitting between API and SSH

- name: Get current container features configuration
  proxmox_pct:
    vmid: "{{ proxmox_lxc_host_config_spec.vmid }}"
    command: config
  register: _pct_config
  delegate_to: "{{ proxmox_host_config_delegate }}"
  become: "{{ proxmox_lxc_host_config_become }}"

- name: Normalize current features string
  ansible.builtin.set_fact:
    _current_features_string: >-
      {{
        _pct_config.config.features | default('') | trim
      }}

- name: Parse current features into list
  ansible.builtin.set_fact:
    _current_features_list: >-
      {{
        (_current_features_string.split(',') if _current_features_string else [])
        | map('trim')
        | select()
        | unique
        | sort
        | list
      }}

- name: Build target features list
  ansible.builtin.set_fact:
    _target_features_list: >-
      {{
        (proxmox_lxc_host_config_spec.features | default([]))
        | select()
        | unique
        | sort
        | list
      }}

- name: Build features string for pct command
  ansible.builtin.set_fact:
    _target_features_string: "{{ _target_features_list | join(',') }}"

- name: Display features operation
  ansible.builtin.debug:
    msg:
      - "Container VMID: {{ proxmox_lxc_host_config_spec.vmid }}"
      - "Current features: {{ _current_features_list | join(',') if _current_features_list | length > 0 else '(none)' }}"
      - "Target features: {{ _target_features_string }}"

- name: Apply feature flags via pct set
  proxmox_pct:
    vmid: "{{ proxmox_lxc_host_config_spec.vmid }}"
    command: set
    config_options:
      features: "{{ _target_features_string }}"
  register: _pct_set_result
  delegate_to: "{{ proxmox_host_config_delegate }}"
  become: "{{ proxmox_lxc_host_config_become }}"
  when: _target_features_string != (_current_features_list | join(','))

- name: Feature changes applied
  ansible.builtin.debug:
    msg: >-
      Applied features to container {{ proxmox_lxc_host_config_spec.vmid }}:
      {{ _target_features_string }}. Host reconciliation will restart the
      container if runtime state requires it.
  when: _pct_set_result is changed

- name: Features already in sync
  ansible.builtin.debug:
    msg: "Container {{ proxmox_lxc_host_config_spec.vmid }} features already configured correctly"
  when: _pct_set_result is not changed

- name: Publish feature reconciliation result
  ansible.builtin.set_fact:
    _proxmox_lxc_host_config_component_results: >-
      {{
        _proxmox_lxc_host_config_component_results
        | combine(
            {
              'features': {
                'changed': (_pct_set_result is changed),
                'restart_required': (_pct_set_result is changed)
              }
            },
            recursive=True
          )
      }}
