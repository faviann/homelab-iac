---
# Apply ALL LXC feature flags via pct command
# Some features (like keyctl) cannot be set via Proxmox API even with root@pam
# To keep feature management simple and consistent, we apply ALL features via pct
# rather than splitting between API and SSH

- name: Get current container features configuration
  ansible.builtin.command:
    cmd: "pct config {{ proxmox_lxc_host_config_spec.vmid }}"
  register: _pct_config
  changed_when: false
  delegate_to: "{{ proxmox_host_config_delegate }}"
  become: "{{ proxmox_lxc_host_config_become }}"

- name: Normalize current features string
  ansible.builtin.set_fact:
    _current_features_string: >-
      {{
        (
          _pct_config.stdout_lines
          | select('search', 'features:')
          | list
          | first
          | default('features: ')
        )
        | replace('features:', '')
        | trim
      }}

- name: Parse current features into list
  ansible.builtin.set_fact:
    _current_features_list: >-
      {{
        (_current_features_string.split(',') if _current_features_string else [])
        | map('trim')
        | select()
        | unique
        | sort
        | list
      }}

- name: Build target features list
  ansible.builtin.set_fact:
    _target_features_list: >-
      {{
        (proxmox_lxc_host_config_spec.features | default([]))
        | select()
        | unique
        | sort
        | list
      }}

- name: Build features string for pct command
  ansible.builtin.set_fact:
    _target_features_string: "{{ _target_features_list | join(',') }}"

- name: Display features operation
  ansible.builtin.debug:
    msg:
      - "Container VMID: {{ proxmox_lxc_host_config_spec.vmid }}"
      - "Current features: {{ _current_features_list | join(',') if _current_features_list | length > 0 else '(none)' }}"
      - "Target features: {{ _target_features_string }}"

- name: Apply feature flags via pct set
  ansible.builtin.command:
    cmd: "pct set {{ proxmox_lxc_host_config_spec.vmid }} -features {{ _target_features_string }}"
  register: _pct_set_result
  changed_when: _pct_set_result.rc == 0
  delegate_to: "{{ proxmox_host_config_delegate }}"
  become: "{{ proxmox_lxc_host_config_become }}"
  when: _target_features_string != (_current_features_list | join(','))

- name: Check container runtime status
  ansible.builtin.command:
    cmd: "pct status {{ proxmox_lxc_host_config_spec.vmid }}"
  register: _container_status
  changed_when: false
  delegate_to: "{{ proxmox_host_config_delegate }}"
  become: "{{ proxmox_lxc_host_config_become }}"
  when: _pct_set_result is changed

- name: Restart container to apply feature changes
  ansible.builtin.command:
    cmd: "pct reboot {{ proxmox_lxc_host_config_spec.vmid }}"
  delegate_to: "{{ proxmox_host_config_delegate }}"
  become: "{{ proxmox_lxc_host_config_become }}"
  when:
    - _pct_set_result is changed
    - _container_status is defined
    - "'running' in _container_status.stdout"
  register: _container_restart

- name: Wait for container to complete reboot
  ansible.builtin.pause:
    seconds: 15
    prompt: "Waiting for container {{ proxmox_lxc_host_config_spec.vmid }} to complete reboot and start SSH service"
  when: _container_restart is changed
  delegate_to: "{{ proxmox_host_config_delegate }}"

- name: Feature changes applied (restart required)
  ansible.builtin.debug:
    msg: "Container {{ proxmox_lxc_host_config_spec.vmid }} feature changes applied. Start the container to activate them."
  when:
    - _pct_set_result is changed
    - _container_status is defined
    - "'running' not in _container_status.stdout"

- name: Feature changes applied and activated
  ansible.builtin.debug:
    msg: "Applied features to container {{ proxmox_lxc_host_config_spec.vmid }}: {{ _target_features_string }}{{ ' (container restarted)' if _container_restart is changed else '' }}"
  when: _pct_set_result is changed

- name: Features already in sync
  ansible.builtin.debug:
    msg: "Container {{ proxmox_lxc_host_config_spec.vmid }} features already configured correctly"
  when: _pct_set_result is not changed

- name: Publish feature reconciliation result
  ansible.builtin.set_fact:
    proxmox_lxc_host_config_result: >-
      {{
        proxmox_lxc_host_config_result
        | combine(
            {
              'components': {
                'features': {
                  'changed': (_pct_set_result is changed),
                  'restart_required': (
                    (_pct_set_result is changed)
                    and (_container_status is defined)
                    and ('running' not in (_container_status.stdout | default('')))
                  ),
                  'restart_applied': (_container_restart is changed)
                }
              }
            },
            recursive=True
          )
      }}
