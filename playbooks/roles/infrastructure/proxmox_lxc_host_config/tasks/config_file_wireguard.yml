---
# Apply WireGuard tun device access configuration
# Already idempotent via state: present/absent with regexp matching

- name: Apply WireGuard tun device access
  ansible.builtin.lineinfile:
    path: "{{ _lxc_config_file }}"
    regexp: '^lxc\.mount\.entry:.*dev/net/tun'
    line: "lxc.mount.entry: /dev/net/tun dev/net/tun none bind,create=file"
    state: "{{ 'present' if (proxmox_lxc_host_config_spec.wireguard_kernel_module_access | bool) else 'absent' }}"
    create: false
  delegate_to: "{{ proxmox_host_config_delegate }}"
  become: "{{ proxmox_lxc_host_config_become }}"
  register: _wireguard_result

- name: Publish WireGuard reconciliation result
  ansible.builtin.set_fact:
    _proxmox_lxc_host_config_component_results: >-
      {{
        _proxmox_lxc_host_config_component_results
        | combine(
            {
              'wireguard': {
                'changed': (_wireguard_result.changed | default(false)),
                'restart_required': (_wireguard_result.changed | default(false))
              }
            },
            recursive=True
          )
      }}
