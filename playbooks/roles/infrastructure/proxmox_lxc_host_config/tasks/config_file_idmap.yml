---
# Apply UID/GID ID mapping configuration
# Idempotent: Only updates if mappings differ from current state

- name: Get current UID/GID ID mappings
  ansible.builtin.shell: |
    set -o pipefail
    awk '
      /^lxc\.idmap:/ {
        value = substr($0, index($0, ":") + 1)
        gsub(/^[[:space:]]+|[[:space:]]+$/, "", value)
        gsub(/[[:space:]]+/, " ", value)
        print value
      }
    ' {{ infrastructure_proxmox_lxc_host_config_file | quote }} | sort -u
  args:
    executable: /bin/bash
  environment:
    LC_ALL: C
  delegate_to: "{{ proxmox_host_config_delegate }}"
  become: "{{ proxmox_lxc_host_config_become }}"
  register: infrastructure_proxmox_lxc_host_config_current_idmap
  check_mode: false
  changed_when: false

- name: Normalize desired ID mappings
  ansible.builtin.set_fact:
    infrastructure_proxmox_lxc_host_config_desired_idmap_list: >-
      {{ infrastructure_proxmox_lxc_host_config_spec.idmap | map('trim')
         | map('regex_replace', '\\s+', ' ') | unique | sort | list }}

- name: Determine desired ID mappings (sorted)
  ansible.builtin.set_fact:
    # Keep this template in a YAML double-quoted scalar: YAML unescapes the
    # \n before Jinja runs; a plain/folded scalar would join on literal
    # backslash-n and break idempotent comparison against the config file.
    infrastructure_proxmox_lxc_host_config_desired_idmap: "{{
      infrastructure_proxmox_lxc_host_config_desired_idmap_list | join('\n') }}"

- name: Update ID mappings only if different
  when: >-
    infrastructure_proxmox_lxc_host_config_current_idmap.stdout
    != infrastructure_proxmox_lxc_host_config_desired_idmap
  block:
    - name: Remove all existing UID/GID ID mappings
      ansible.builtin.lineinfile:
        path: "{{ infrastructure_proxmox_lxc_host_config_file }}"
        regexp: '^lxc\.idmap:'
        state: absent
      delegate_to: "{{ proxmox_host_config_delegate }}"
      become: "{{ proxmox_lxc_host_config_become }}"

    - name: Apply UID/GID ID mappings
      ansible.builtin.lineinfile:
        path: "{{ infrastructure_proxmox_lxc_host_config_file }}"
        line: "lxc.idmap: {{ item }}"
        insertafter: '^unprivileged:'
        create: false
      delegate_to: "{{ proxmox_host_config_delegate }}"
      become: "{{ proxmox_lxc_host_config_become }}"
      loop: "{{ infrastructure_proxmox_lxc_host_config_spec.idmap | sort }}"

- name: Publish idmap reconciliation result
  ansible.builtin.set_fact:
    infrastructure_proxmox_lxc_host_config_component_results: >-
      {{
        infrastructure_proxmox_lxc_host_config_component_results
        | combine(
            {
              'idmap': {
                'changed': (
                  infrastructure_proxmox_lxc_host_config_current_idmap.stdout
                  != infrastructure_proxmox_lxc_host_config_desired_idmap
                ),
                'restart_required': (
                  infrastructure_proxmox_lxc_host_config_current_idmap.stdout
                  != infrastructure_proxmox_lxc_host_config_desired_idmap
                )
              }
            },
            recursive=True
          )
      }}
