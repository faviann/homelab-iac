---
# Configure LXCs through the lifecycle facade without re-running provisioning.
#
# Usage:
#   uv run --locked ansible-playbook playbooks/configure-lxcs.yml
#   uv run --locked ansible-playbook playbooks/configure-lxcs.yml --limit portal

- name: Run the configure-only lifecycle
  ansible.builtin.import_playbook: lifecycle-lxcs.yml
  vars:
    proxmox_lifecycle_intent: configure_only
