---
# Configure LXC containers internally
# Runs inside containers to set up system, logging, Docker, etc.
#
# Usage:
#   ansible-playbook playbooks/configure-lxcs.yml
#   ansible-playbook playbooks/configure-lxcs.yml --limit portal

- name: Configure LXC containers internally
  hosts: lxcs
  gather_facts: false
  strategy: free  # Hosts run independently for better performance
  tasks:
    - name: Find cached facts for rebuilt hosts
      ansible.builtin.find:
        paths: "{{ [playbook_dir | dirname, '.ansible', 'cache'] | path_join }}"
        patterns: "*_{{ inventory_hostname }}"
        file_type: file
      register: _rebuilt_host_cache_files
      delegate_to: localhost
      become: false
      when:
        - inventory_hostname not in (lxc_validation_failed_hosts | default([]))
        - proxmox_lxc_rebuilt | default(false) | bool

    - name: Remove cached facts for rebuilt hosts
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ _rebuilt_host_cache_files.files | default([]) }}"
      loop_control:
        label: "{{ item.path }}"
      delegate_to: localhost
      become: false
      when:
        - inventory_hostname not in (lxc_validation_failed_hosts | default([]))
        - proxmox_lxc_rebuilt | default(false) | bool

    - name: Remove stale known_hosts entries for rebuilt hosts
      ansible.builtin.command:
        argv:
          - ssh-keygen
          - -f
          - "{{ lookup('env', 'HOME') }}/.ssh/known_hosts"
          - -R
          - "{{ item }}"
      loop: "{{ [ansible_host | default(inventory_hostname), inventory_hostname] | unique }}"
      loop_control:
        label: "{{ item }}"
      register: _remove_known_host_result
      changed_when: "'not found' not in ((_remove_known_host_result.stdout | default('')) ~ (_remove_known_host_result.stderr | default('')))"
      failed_when: false
      delegate_to: localhost
      become: false
      when:
        - inventory_hostname not in (lxc_validation_failed_hosts | default([]))
        - proxmox_lxc_rebuilt | default(false) | bool

    - name: Ensure container is accessible via SSH
      ansible.builtin.wait_for_connection:
        timeout: 15
      register: _connection_check
      retries: 3
      delay: 10
      until: _connection_check is succeeded
      when: inventory_hostname not in (lxc_validation_failed_hosts | default([]))

    - name: Gather container facts
      ansible.builtin.setup:
      when: inventory_hostname not in (lxc_validation_failed_hosts | default([]))

    - name: Configure base system
      ansible.builtin.include_role:
        name: config/lxc_base_system
      when: inventory_hostname not in (lxc_validation_failed_hosts | default([]))

    - name: Configure logging
      ansible.builtin.include_role:
        name: config/lxc_logging_config
      when: inventory_hostname not in (lxc_validation_failed_hosts | default([]))

    - name: Install Docker runtime
      ansible.builtin.include_role:
        name: config/lxc_docker_runtime
      when:
        - inventory_hostname not in (lxc_validation_failed_hosts | default([]))
        - docker_enabled | default(false)

    - name: Configure NVIDIA GPU runtime
      ansible.builtin.include_role:
        name: config/lxc_nvidia_runtime
      when:
        - inventory_hostname not in (lxc_validation_failed_hosts | default([]))
        - gpu_enabled | default(false)

    - name: Configure Docker environment
      ansible.builtin.include_role:
        name: config/lxc_docker_environment
      when:
        - inventory_hostname not in (lxc_validation_failed_hosts | default([]))
        - docker_enabled | default(false)

    - name: Flush handlers after all configuration
      ansible.builtin.meta: flush_handlers
      when: inventory_hostname not in (lxc_validation_failed_hosts | default([]))

    - name: Reboot container if needed
      ansible.builtin.include_role:
        name: config/lxc_base_system
        tasks_from: reboot
      when: inventory_hostname not in (lxc_validation_failed_hosts | default([]))

    - name: Configuration complete
      ansible.builtin.debug:
        msg: "Internal configuration of {{ inventory_hostname }} completed successfully"
      when: inventory_hostname not in (lxc_validation_failed_hosts | default([]))
