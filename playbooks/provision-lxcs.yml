---
# Provision LXCs and apply host-side reconciliation without guest configuration.
#
# Usage:
#   ansible-playbook playbooks/provision-lxcs.yml
#   ansible-playbook playbooks/provision-lxcs.yml --limit portal

- name: Run the provision-only lifecycle
  ansible.builtin.import_playbook: lifecycle-lxcs.yml
  vars:
    proxmox_lifecycle_intent: provision_only
