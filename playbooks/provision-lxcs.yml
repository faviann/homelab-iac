---
# Provision LXC containers via Proxmox API
# Creates containers and applies host-side configuration
#
# Usage:
#   ansible-playbook playbooks/provision-lxcs.yml
#   ansible-playbook playbooks/provision-lxcs.yml --limit gatekeeper

- name: Ensure LXC containers exist
  hosts: lxcs
  gather_facts: false
  become: false
  collections:
    - community.proxmox
  roles:
    - role: infrastructure/proxmox_lxc_provision
      when: inventory_hostname not in (lxc_validation_failed_hosts | default([]))

- name: Apply host-side container configuration
  hosts: lxcs
  gather_facts: false
  tasks:
    - name: Apply Proxmox host configuration for LXC
      ansible.builtin.include_role:
        name: infrastructure/proxmox_lxc_host_config
        apply:
          delegate_to: "{{ proxmox_pct_delegate_host }}"
          become: true
      vars:
        ansible_host: "{{ proxmox_pct_delegate_host }}"
        ansible_user: root
      when:
        - proxmox_lxc_host_config_enabled | default(true)
        - inventory_hostname not in (lxc_validation_failed_hosts | default([]))

- name: Ensure SSH keys are installed in LXC containers
  hosts: lxcs
  gather_facts: false
  vars:
    lxc_ssh_key_injector_pubkey_path: "{{ playbook_dir | dirname }}/.ansible/ssh/proxmox_lxc.pub"
  roles:
    - role: infrastructure/lxc_ssh_key_injector
      when: inventory_hostname not in (lxc_validation_failed_hosts | default([]))
