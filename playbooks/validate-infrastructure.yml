---
# Standalone lifecycle validation. It performs the same target compilation,
# fleet preflight, common observation, and semantic planning as a lifecycle run,
# but reports every detected problem before returning nonzero.

- name: Validate lifecycle prerequisites
  ansible.builtin.import_playbook: lifecycle-prerequisites.yml

- name: Validate targeted LXC lifecycle plans
  hosts: lxcs
  gather_facts: false
  become: false
  tasks:
    - name: Run aggregate standalone lifecycle validation
      ansible.builtin.include_tasks:
        file: "{{ [playbook_dir, 'tasks', 'standalone_lifecycle_validation.yml'] | path_join }}"
