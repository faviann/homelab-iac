---
# Playbook to add control node SSH key to existing LXC containers
# This does NOT delete containers - it only adds the SSH public key to authorized_keys
#
# Usage:
#   ansible-playbook playbooks/add-ssh-keys-to-lxcs.yml
#   ansible-playbook playbooks/add-ssh-keys-to-lxcs.yml --limit portal

- name: Add SSH keys to existing LXC containers via Proxmox host
  hosts: lxcs
  gather_facts: false

  vars:
    lxc_ssh_key_injector_pubkey_path: "{{ playbook_dir }}/../.ansible/ssh/proxmox_lxc.pub"

  roles:
    - infrastructure/lxc_ssh_key_injector
      delegate_to: "{{ proxmox_api_host }}"
      vars:
        ansible_user: root
      register: key_verify
      when: container_status.rc == 0
      changed_when: false
      failed_when: key_verify.stdout == "0"

    - name: Report SSH key installation status
      ansible.builtin.debug:
        msg: "SSH key successfully installed on {{ inventory_hostname }} (VMID {{ proxmox_lxc_overrides.vmid }})"
      when: container_status.rc == 0

- name: Test SSH connectivity to updated containers
  hosts: lxcs
  gather_facts: false
  tags:
    - verify
    - ssh_test

  tasks:
    - name: Test SSH connection with new key
      ansible.builtin.ping:
      register: ping_result
      ignore_unreachable: true
      ignore_errors: true

    - name: Report SSH connectivity status
      ansible.builtin.debug:
        msg: "✓ SSH connection successful to {{ inventory_hostname }}"
      when: ping_result is succeeded and ping_result is not unreachable

    - name: Report SSH connectivity failure
      ansible.builtin.debug:
        msg: "✗ SSH connection failed to {{ inventory_hostname }} - manual intervention may be needed"
      when: ping_result is unreachable or ping_result is failed
