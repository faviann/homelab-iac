---
# Pre-flight validation playbook to test Proxmox API credentials
# Run this after setup to verify your credentials work correctly
#
# Usage: ansible-playbook playbooks/validate-credentials.yml

- name: Validate Proxmox API credentials and permissions
  hosts: proxmox_api
  connection: local
  gather_facts: false
  
  vars:
    validation_results: []

  tasks:
    - name: Check if vault variables are defined
      ansible.builtin.assert:
        that:
          - proxmox_api_host is defined
          - proxmox_api_user is defined
          - proxmox_api_token_id is defined
          - proxmox_api_token_secret is defined
        fail_msg: >-
          Required vault variables are missing. Ensure vault.yml is properly configured and encrypted.
          Run ./configure-vault.sh to set up credentials.
        success_msg: "All required vault variables are defined"

    - name: Check if vault variables contain placeholder values
      ansible.builtin.fail:
        msg: >-
          Vault contains placeholder values (REPLACE_WITH_YOUR_*).
          Run ./configure-vault.sh to configure actual credentials.
      when: >
        'REPLACE' in proxmox_api_user or
        'REPLACE' in proxmox_api_token_id or
        'REPLACE' in proxmox_api_token_secret

    - name: Test Proxmox API connectivity (version endpoint)
      ansible.builtin.uri:
        url: "https://{{ proxmox_api_host }}:{{ proxmox_api_port | default(8006) }}/api2/json/version"
        method: GET
        headers:
          Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
        validate_certs: "{{ proxmox_verify_ssl | default(false) }}"
        status_code: 200
        timeout: 10
      register: api_version_result
      no_log: true
      ignore_errors: true

    - name: Report API connectivity result
      ansible.builtin.debug:
        msg: >-
          {% if api_version_result.failed %}
          ❌ FAILED: Cannot connect to Proxmox API at {{ proxmox_api_host }}:{{ proxmox_api_port | default(8006) }}
          Error: {{ api_version_result.msg | default('Unknown error') }}
          {% else %}
          ✅ SUCCESS: Connected to Proxmox VE {{ api_version_result.json.data.version | default('unknown') }}
          {% endif %}

    - name: Fail if API connectivity test failed
      ansible.builtin.fail:
        msg: "Cannot connect to Proxmox API. Check network connectivity and API host setting."
      when: api_version_result.failed

    - name: Test API permissions (cluster status)
      ansible.builtin.uri:
        url: "https://{{ proxmox_api_host }}:{{ proxmox_api_port | default(8006) }}/api2/json/cluster/status"
        method: GET
        headers:
          Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
        validate_certs: "{{ proxmox_verify_ssl | default(false) }}"
        status_code: 200
        timeout: 10
      register: api_cluster_result
      no_log: true
      ignore_errors: true

    - name: Report cluster status permission
      ansible.builtin.debug:
        msg: >-
          {% if api_cluster_result.failed %}
          ⚠️  WARNING: Cannot access cluster status (may lack permissions)
          {% else %}
          ✅ SUCCESS: Can access cluster status
          {% endif %}

    - name: Test node access
      ansible.builtin.uri:
        url: "https://{{ proxmox_api_host }}:{{ proxmox_api_port | default(8006) }}/api2/json/nodes/{{ proxmox_default_node }}/status"
        method: GET
        headers:
          Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
        validate_certs: "{{ proxmox_verify_ssl | default(false) }}"
        status_code: 200
        timeout: 10
      register: api_node_result
      no_log: true
      ignore_errors: true

    - name: Report node access result
      ansible.builtin.debug:
        msg: >-
          {% if api_node_result.failed %}
          ❌ FAILED: Cannot access node '{{ proxmox_default_node }}'
          Error: {{ api_node_result.msg | default('Unknown error') }}
          {% else %}
          ✅ SUCCESS: Can access node '{{ proxmox_default_node }}' (status: {{ api_node_result.json.data.status | default('unknown') }})
          {% endif %}

    - name: Test LXC container listing
      ansible.builtin.uri:
        url: "https://{{ proxmox_api_host }}:{{ proxmox_api_port | default(8006) }}/api2/json/nodes/{{ proxmox_default_node }}/lxc"
        method: GET
        headers:
          Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
        validate_certs: "{{ proxmox_verify_ssl | default(false) }}"
        status_code: 200
        timeout: 10
      register: api_lxc_result
      no_log: true
      ignore_errors: true

    - name: Report LXC listing result
      ansible.builtin.debug:
        msg: >-
          {% if api_lxc_result.failed %}
          ❌ FAILED: Cannot list LXC containers on node '{{ proxmox_default_node }}'
          Error: {{ api_lxc_result.msg | default('Unknown error') }}
          {% else %}
          ✅ SUCCESS: Can list LXC containers (found {{ api_lxc_result.json.data | length }} container(s))
          {% endif %}

    - name: Build validation summary
      ansible.builtin.set_fact:
        validation_summary:
          api_connectivity: "{{ 'PASS' if not api_version_result.failed else 'FAIL' }}"
          cluster_access: "{{ 'PASS' if not api_cluster_result.failed else 'WARNING' }}"
          node_access: "{{ 'PASS' if not api_node_result.failed else 'FAIL' }}"
          lxc_access: "{{ 'PASS' if not api_lxc_result.failed else 'FAIL' }}"
          proxmox_version: "{{ api_version_result.json.data.version | default('N/A') }}"
          node_status: "{{ api_node_result.json.data.status | default('N/A') }}"
          container_count: "{{ api_lxc_result.json.data | length if not api_lxc_result.failed else 0 }}"

    - name: Display validation summary
      ansible.builtin.debug:
        msg: |
          
          ═══════════════════════════════════════════════════════════
          Proxmox API Credential Validation Summary
          ═══════════════════════════════════════════════════════════
          
          API Host:           {{ proxmox_api_host }}:{{ proxmox_api_port | default(8006) }}
          API User:           {{ proxmox_api_user }}
          Token ID:           {{ proxmox_api_token_id }}
          Default Node:       {{ proxmox_default_node }}
          
          Test Results:
          ─────────────────────────────────────────────────────────
          API Connectivity:   {{ validation_summary.api_connectivity }}
          Cluster Access:     {{ validation_summary.cluster_access }}
          Node Access:        {{ validation_summary.node_access }}
          LXC Access:         {{ validation_summary.lxc_access }}
          
          Environment:
          ─────────────────────────────────────────────────────────
          Proxmox Version:    {{ validation_summary.proxmox_version }}
          Node Status:        {{ validation_summary.node_status }}
          LXC Containers:     {{ validation_summary.container_count }}
          
          ═══════════════════════════════════════════════════════════
          {% if validation_summary.api_connectivity == 'FAIL' or validation_summary.node_access == 'FAIL' or validation_summary.lxc_access == 'FAIL' %}
          
          ⚠️  Some tests FAILED. Review the errors above and:
             - Verify network connectivity to {{ proxmox_api_host }}
             - Check API token permissions in Proxmox
             - Ensure node name '{{ proxmox_default_node }}' is correct
             - Run ./configure-vault.sh to update credentials
          
          {% else %}
          
          ✅ All critical tests PASSED!
             You can now run: ansible-playbook site.yml
          
          {% endif %}
          ═══════════════════════════════════════════════════════════

    - name: Fail if critical tests failed
      ansible.builtin.fail:
        msg: "Credential validation failed. See summary above for details."
      when: >
        validation_summary.api_connectivity == 'FAIL' or
        validation_summary.node_access == 'FAIL' or
        validation_summary.lxc_access == 'FAIL'
