---
# Main orchestrator for Proxmox LXC lifecycle operations
# Routes through the lifecycle facade for full validation, provisioning, and
# guest configuration.
#
# Usage:
#   uv run --locked ansible-playbook site.yml                    # Run full lifecycle
#   uv run --locked ansible-playbook playbooks/validate-infrastructure.yml  # Just validation
#   uv run --locked ansible-playbook playbooks/provision-lxcs.yml          # Just provisioning
#   uv run --locked ansible-playbook playbooks/configure-lxcs.yml          # Just configuration

- name: Run the full LXC lifecycle
  ansible.builtin.import_playbook: playbooks/lifecycle-lxcs.yml
