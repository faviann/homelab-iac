---
# Top-level playbook orchestrating Proxmox LXC lifecycle operations.
# Run everything:           ansible-playbook -i inventory/hosts.yml site.yml
# Run specific phases only: ansible-playbook ... --tags validation|provision|host_prep|configure

- name: Verify control node has been bootstrapped
  hosts: localhost
  connection: local
  gather_facts: false
  become: false  # Run as regular user
  tags:
    - always
  vars:
    control_node_project_root: "{{ playbook_dir }}"
    control_node_pip_virtualenv: "{{ [playbook_dir, '.ansible', 'venv'] | path_join }}"
    control_node_collection_install_path: "{{ [playbook_dir, 'collections'] | path_join }}"
    control_node_required_collections:
      - community.proxmox
  tasks:
    - name: Check for control node virtual environment
      ansible.builtin.stat:
        path: "{{ control_node_pip_virtualenv }}"
      register: control_node_virtualenv_stat
      run_once: true

    - name: Check for required Ansible collections
      ansible.builtin.stat:
        path: "{{ [control_node_collection_install_path, 'ansible_collections', item | replace('.', '/')] | path_join }}"
      loop: "{{ control_node_required_collections }}"
      register: control_node_collection_stats
      run_once: true

    - name: Detect missing bootstrap artifacts
      ansible.builtin.set_fact:
        control_node_missing_collections: "{{ control_node_collection_stats.results | rejectattr('stat.exists') | map(attribute='item') | list }}"
      run_once: true

    - name: Assert bootstrap prerequisites are present
      ansible.builtin.assert:
        that:
          - control_node_virtualenv_stat.stat.exists
          - control_node_missing_collections | length == 0
        fail_msg: >-
          Bootstrap prerequisites are missing. Run `ansible-playbook bootstrap.yml` to install the
          control node virtualenv and dependencies. Missing collections: {{ control_node_missing_collections }}.
        success_msg: Bootstrap prerequisites detected.
      run_once: true

- name: Bootstrap Proxmox host SSH access
  hosts: localhost
  connection: local
  gather_facts: false
  become: false  # Run as regular user
  tags:
    - always
    - bootstrap
  roles:
    - proxmox_host_bootstrap

- name: Validate Proxmox API connectivity
  hosts: proxmox_api
  gather_facts: false
  become: false
  collections:
    - community.proxmox
  tags:
    - always
    - validation
    - proxmox
  tasks:
    - name: Include Proxmox validation tasks
      ansible.builtin.include_tasks:
        file: "{{ [playbook_dir, 'playbooks', 'tasks', 'proxmox_validation.yml'] | path_join }}"
      tags:
        - always
        - validation
        - proxmox

- name: Ensure LXC containers exist
  hosts: lxcs
  gather_facts: false
  become: false
  collections:
    - community.proxmox
  tags:
    - provision
    - lxc
  roles:
    - role: proxmox_lxc_provision
      when: inventory_hostname not in (lxc_validation_failed_hosts | default([]))

- name: Apply host-side container configuration
  hosts: lxcs
  gather_facts: false
  tags:
    - host_config
    - provision
  tasks:
    - name: Apply Proxmox host configuration for LXC
      ansible.builtin.include_role:
        name: proxmox_lxc_host_config
        apply:
          delegate_to: "{{ proxmox_api_host }}"
          become: true
      vars:
        ansible_host: "{{ proxmox_api_host }}"
        ansible_user: root
      when:
        - proxmox_lxc_host_config_enabled | default(true)
        - inventory_hostname not in (lxc_validation_failed_hosts | default([]))

- name: Ensure SSH keys are installed in LXC containers
  hosts: lxcs
  gather_facts: false
  tags:
    - always
    - ssh_setup
  vars:
    control_node_ssh_public_key_path: "{{ playbook_dir }}/.ansible/ssh/proxmox_lxc.pub"
  tasks:
    - name: Load control node SSH public key
      ansible.builtin.set_fact:
        control_node_ssh_pubkey: "{{ lookup('file', control_node_ssh_public_key_path) }}"
      delegate_to: localhost
      run_once: true

    - name: Check if container exists on Proxmox
      ansible.builtin.command:
        cmd: "pct status {{ proxmox_lxc_overrides.vmid }}"
      register: container_status
      delegate_to: "{{ proxmox_api_host }}"
      vars:
        ansible_user: root
      changed_when: false
      failed_when: false
      when: inventory_hostname not in (lxc_validation_failed_hosts | default([]))

    - name: Create .ssh directory in container
      ansible.builtin.command:
        cmd: "pct exec {{ proxmox_lxc_overrides.vmid }} -- mkdir -p /root/.ssh"
      delegate_to: "{{ proxmox_api_host }}"
      vars:
        ansible_user: root
      when:
        - inventory_hostname not in (lxc_validation_failed_hosts | default([]))
        - container_status.rc == 0
      changed_when: true

    - name: Set .ssh directory permissions
      ansible.builtin.command:
        cmd: "pct exec {{ proxmox_lxc_overrides.vmid }} -- chmod 700 /root/.ssh"
      delegate_to: "{{ proxmox_api_host }}"
      vars:
        ansible_user: root
      when:
        - inventory_hostname not in (lxc_validation_failed_hosts | default([]))
        - container_status.rc == 0
      changed_when: false

    - name: Check if SSH key already exists in authorized_keys
      ansible.builtin.shell:
        cmd: "pct exec {{ proxmox_lxc_overrides.vmid }} -- grep -qF '{{ control_node_ssh_pubkey }}' /root/.ssh/authorized_keys 2>/dev/null"
      delegate_to: "{{ proxmox_api_host }}"
      vars:
        ansible_user: root
      register: key_exists
      when:
        - inventory_hostname not in (lxc_validation_failed_hosts | default([]))
        - container_status.rc == 0
      changed_when: false
      failed_when: false

    - name: Add SSH public key to authorized_keys (idempotent)
      ansible.builtin.shell:
        cmd: |
          pct exec {{ proxmox_lxc_overrides.vmid }} -- bash -c "echo '{{ control_node_ssh_pubkey }}' >> /root/.ssh/authorized_keys"
      delegate_to: "{{ proxmox_api_host }}"
      vars:
        ansible_user: root
      when:
        - inventory_hostname not in (lxc_validation_failed_hosts | default([]))
        - container_status.rc == 0
        - key_exists.rc != 0
      changed_when: true

    - name: Set authorized_keys permissions
      ansible.builtin.command:
        cmd: "pct exec {{ proxmox_lxc_overrides.vmid }} -- chmod 600 /root/.ssh/authorized_keys"
      delegate_to: "{{ proxmox_api_host }}"
      vars:
        ansible_user: root
      when:
        - inventory_hostname not in (lxc_validation_failed_hosts | default([]))
        - container_status.rc == 0
      changed_when: false

- name: Configure LXC containers internally
  hosts: lxcs
  gather_facts: false
  tags:
    - configure
    - lxc_internal
  tasks:
    - name: Run internal LXC setup
      ansible.builtin.include_role:
        name: lxc_internal_setup
      when: inventory_hostname not in (lxc_validation_failed_hosts | default([]))
