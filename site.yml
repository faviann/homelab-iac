---
# Top-level playbook orchestrating Proxmox LXC lifecycle operations.
# Run everything:           ansible-playbook -i inventory/hosts.yml site.yml
# Run specific phases only: ansible-playbook ... --tags bootstrap|validation|provision|host_prep|configure

- name: Bootstrap Ansible control node
  hosts: localhost
  connection: local
  gather_facts: true
  tags:
    - always
    - bootstrap
  collections:
    - community.crypto
  vars:
    control_node_project_root: "{{ playbook_dir }}"
    control_node_pip_requirements: "{{ [playbook_dir, 'requirements', 'pip.txt'] | path_join }}"
    control_node_collection_requirements: "{{ [playbook_dir, 'collections', 'requirements.yml'] | path_join }}"
  roles:
    - control_node_bootstrap

- name: Validate Proxmox API connectivity
  hosts: proxmox_api
  gather_facts: false
  collections:
    - community.proxmox
  tags:
    - always
    - validation
    - proxmox
  tasks:
    - name: Ensure required API inputs are available
      ansible.builtin.assert:
        that:
          - proxmox_api_host is defined
          - proxmox_api_user is defined
          - proxmox_api_token_id is defined
          - proxmox_api_token_secret is defined
          - proxmox_default_node is defined
        fail_msg: "Missing Proxmox API configuration. Check group_vars/all/proxmox.yml and vault secrets."
      tags:
        - validation

    - name: Query LXC inventory on default node
      community.proxmox.proxmox_lxc_info:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        validate_certs: {{ proxmox_verify_ssl | default(true) }}
        node: "{{ proxmox_default_node }}"
      register: proxmox_lxc_inventory
      tags:
        - validation

    - name: Summarize managed containers
      ansible.builtin.debug:
        msg: >-
          Found {{ proxmox_lxc_inventory.resources | length | default(0) }} containers on node {{ proxmox_default_node }}.
      when: proxmox_lxc_inventory is defined
      tags:
        - validation

- name: Ensure LXC containers exist and host-side prep is applied
  hosts: lxcs
  gather_facts: false
  collections:
    - community.proxmox
  tags:
    - provision
    - host_prep
    - lxc
  pre_tasks:
    - name: Build effective LXC specification
      ansible.builtin.include_role:
        name: proxmox_lxc_provision
        tasks_from: spec
        apply:
          tags:
            - provision
            - spec
      tags:
        - provision
        - spec

    - name: Prepare Proxmox host before provisioning
      ansible.builtin.include_role:
        name: proxmox_lxc_host_prep
        apply:
          tags:
            - host_prep
            - provision
      vars:
        proxmox_lxc_host_prep_phase: pre
      when: proxmox_lxc_host_prep_enabled | default(true)
      tags:
        - host_prep
        - provision

  roles:
    - role: proxmox_lxc_provision
      tags:
        - provision

  post_tasks:
    - name: Apply post-provision host adjustments
      ansible.builtin.include_role:
        name: proxmox_lxc_host_prep
        apply:
          tags:
            - host_prep
            - provision
      vars:
        proxmox_lxc_host_prep_phase: post
      when: proxmox_lxc_host_prep_enabled | default(true)
      tags:
        - host_prep
        - provision

- name: Configure services inside provisioned containers
  hosts: service_agents
  gather_facts: false
  tags:
    - configure
    - in_guest
  vars:
    lxc_guest_configuration_enabled: {{ hostvars[inventory_hostname].lxc_guest_configuration_enabled | default(false) }}
  tasks:
    - name: Placeholder for guest configuration roles
      ansible.builtin.debug:
        msg: "Configure in-container services for {{ inventory_hostname }}. Attach roles here."
      when: lxc_guest_configuration_enabled | bool
      tags:
        - configure
        - in_guest
