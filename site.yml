---
# Main orchestrator for Proxmox LXC lifecycle operations
# Imports focused playbooks in sequence for full infrastructure deployment
#
# Usage:
#   ansible-playbook site.yml                    # Run full lifecycle
#   ansible-playbook playbooks/validate-infrastructure.yml  # Just validation
#   ansible-playbook playbooks/provision-lxcs.yml          # Just provisioning
#   ansible-playbook playbooks/configure-lxcs.yml          # Just configuration

- name: Validate infrastructure
  ansible.builtin.import_playbook: playbooks/validate-infrastructure.yml

- name: Provision LXC containers
  ansible.builtin.import_playbook: playbooks/provision-lxcs.yml

- name: Configure LXC containers
  ansible.builtin.import_playbook: playbooks/configure-lxcs.yml
