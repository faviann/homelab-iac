---
- name: Test workstation persistent home success path
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    workstation_username: "{{ lookup('pipe', 'id -un') }}"
    workstation_uid: "{{ lookup('pipe', 'id -u') | int }}"
    workstation_gid: "{{ lookup('pipe', 'id -g') | int }}"
    workstation_home: "{{ temp_root }}/home/{{ workstation_username }}"
    workstation_packages: []
    workstation_persistent_home_enabled: true
    workstation_persistent_home_root: "{{ temp_root }}/ephemeral/workstation/home"
    workstation_bw_bin_path: "{{ temp_root }}/bin/bw"
    workstation_setup_bin_path: "{{ temp_root }}/bin/workstation-setup"
    workstation_setup_profile_hook_path: "{{ temp_root }}/etc/profile.d/workstation-setup.sh"
    workstation_system_bin_owner: "{{ lookup('pipe', 'id -un') }}"
    workstation_system_bin_group: "{{ lookup('pipe', 'id -gn') }}"
    workstation_persistent_home_links:
      - name: claude
        path: "{{ workstation_home }}/.claude"
        target: "{{ workstation_persistent_home_root }}/.claude"
        mode: "0700"
      - name: codex
        path: "{{ workstation_home }}/.codex"
        target: "{{ workstation_persistent_home_root }}/.codex"
        mode: "0700"
      - name: repos
        path: "{{ workstation_home }}/repos"
        target: "{{ workstation_persistent_home_root }}/repos"
        mode: "0755"
    lxc_ssh_user: "{{ workstation_username }}"
    lxc_ssh_uid: "{{ lookup('pipe', 'id -u') | int }}"
    lxc_ssh_gid: "{{ lookup('pipe', 'id -g') | int }}"
    lxc_github_keys_home: "{{ workstation_home }}"
    lxc_github_users:
      - faviann
    docker_user: "{{ workstation_username }}"
    docker_uid: "{{ lookup('pipe', 'id -u') | int }}"
    docker_gid: "{{ lookup('pipe', 'id -g') | int }}"
  tasks:
    - name: Ensure writable test directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ temp_root }}/bin"
        - "{{ temp_root }}/etc/profile.d"

    - name: Place mock curl on PATH
      ansible.builtin.copy:
        dest: "{{ temp_root }}/curl"
        mode: "0755"
        content: |
          #!/bin/sh
          case "$*" in
            *faviann.keys*)
              printf '%s\n' 'ssh-ed25519 AAAATESTKEYONE faviann@laptop'
              ;;
            *get.chezmoi.io*)
              printf '%s\n' '#!/bin/sh' 'exit 0'
              ;;
            *mise.run*)
              printf '%s\n' \
                '#!/bin/sh' \
                'set -eu' \
                'install -d "$HOME/.local/bin"' \
                'cat > "$HOME/.local/bin/mise" <<"EOF"' \
                '#!/bin/sh' \
                'if [ "$1" = "--version" ]; then' \
                '  echo mise-test' \
                '  exit 0' \
                'fi' \
                'exit 0' \
                'EOF' \
                'chmod 0755 "$HOME/.local/bin/mise"'
              ;;
            *)
              exit 0
              ;;
          esac

    - name: Ensure workstation home exists
      ansible.builtin.file:
        path: "{{ workstation_home }}"
        state: directory
        mode: "0755"

    - name: Create existing workstation persistent parent with loose mode
      ansible.builtin.file:
        path: "{{ temp_root }}/ephemeral/workstation"
        state: directory
        mode: "0755"

    - name: Include workstation baseline role with PATH mocks
      block:
        - ansible.builtin.include_role:
            name: config/lxc_workstation_baseline
      environment:
        PATH: "{{ temp_root }}:{{ lookup('env', 'PATH') }}"

    - name: Stat persistent home root
      ansible.builtin.stat:
        path: "{{ temp_root }}/ephemeral/workstation/home"
      register: persistent_home_root_stat

    - name: Stat workstation state parent
      ansible.builtin.stat:
        path: "{{ temp_root }}/ephemeral/workstation"
      register: workstation_state_parent_stat

    - name: Stat Claude persistent home directory
      ansible.builtin.stat:
        path: "{{ temp_root }}/ephemeral/workstation/home/.claude"
      register: claude_state_dir_stat

    - name: Stat Codex persistent home directory
      ansible.builtin.stat:
        path: "{{ temp_root }}/ephemeral/workstation/home/.codex"
      register: codex_state_dir_stat

    - name: Stat repos persistent home directory
      ansible.builtin.stat:
        path: "{{ temp_root }}/ephemeral/workstation/home/repos"
      register: repos_dir_stat

    - name: Stat Claude home symlink
      ansible.builtin.stat:
        path: "{{ workstation_home }}/.claude"
      register: claude_home_link_stat

    - name: Stat Codex home symlink
      ansible.builtin.stat:
        path: "{{ workstation_home }}/.codex"
      register: codex_home_link_stat

    - name: Stat repos home symlink
      ansible.builtin.stat:
        path: "{{ workstation_home }}/repos"
      register: repos_home_link_stat

    - name: Assert workstation persistent home was linked safely
      ansible.builtin.assert:
        that:
          - workstation_state_parent_stat.stat.isdir
          - workstation_state_parent_stat.stat.uid == workstation_uid
          - workstation_state_parent_stat.stat.gid == workstation_gid
          - workstation_state_parent_stat.stat.mode == "0700"
          - persistent_home_root_stat.stat.isdir
          - persistent_home_root_stat.stat.uid == workstation_uid
          - persistent_home_root_stat.stat.gid == workstation_gid
          - persistent_home_root_stat.stat.mode == "0700"
          - claude_state_dir_stat.stat.isdir
          - claude_state_dir_stat.stat.uid == workstation_uid
          - claude_state_dir_stat.stat.gid == workstation_gid
          - claude_state_dir_stat.stat.mode == "0700"
          - codex_state_dir_stat.stat.isdir
          - codex_state_dir_stat.stat.uid == workstation_uid
          - codex_state_dir_stat.stat.gid == workstation_gid
          - codex_state_dir_stat.stat.mode == "0700"
          - repos_dir_stat.stat.isdir
          - repos_dir_stat.stat.uid == workstation_uid
          - repos_dir_stat.stat.gid == workstation_gid
          - repos_dir_stat.stat.mode == "0755"
          - claude_home_link_stat.stat.islnk
          - claude_home_link_stat.stat.lnk_source == temp_root ~ "/ephemeral/workstation/home/.claude"
          - codex_home_link_stat.stat.islnk
          - codex_home_link_stat.stat.lnk_source == temp_root ~ "/ephemeral/workstation/home/.codex"
          - repos_home_link_stat.stat.islnk
          - repos_home_link_stat.stat.lnk_source == temp_root ~ "/ephemeral/workstation/home/repos"
        fail_msg: "Workstation persistent home directories or symlinks were not created as expected"
