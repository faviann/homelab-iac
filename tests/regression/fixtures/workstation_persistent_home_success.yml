---
- name: Test workstation persistent home success path
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    workstation_username: "{{ lookup('pipe', 'id -un') }}"
    workstation_uid: "{{ lookup('pipe', 'id -u') | int }}"
    workstation_gid: "{{ lookup('pipe', 'id -g') | int }}"
    workstation_home: "{{ temp_root }}/home/{{ workstation_username }}"
    workstation_aoe_proxy_firewall_nft_dir: "{{ temp_root }}/etc/nftables.d"
    workstation_aoe_proxy_firewall_service_path: "{{ temp_root }}/etc/systemd/system/workstation-aoe-proxy-firewall.service"
    workstation_packages: []
    workstation_locale_enabled: false
    workstation_persistent_home_enabled: true
    workstation_nix_install_enabled: false
    workstation_enable_linger: false
    workstation_persistent_home_root: "{{ temp_root }}/ephemeral/workstation/home"
    workstation_persistent_home_mount_state: present
    workstation_persistent_home_fstab_path: "{{ temp_root }}/fstab"
    workstation_bw_bin_path: "{{ temp_root }}/bin/bw"
    workstation_setup_bin_path: "{{ temp_root }}/bin/workstation-setup"
    workstation_setup_profile_hook_path: "{{ temp_root }}/etc/profile.d/workstation-setup.sh"
    workstation_system_bin_owner: "{{ lookup('pipe', 'id -un') }}"
    workstation_system_bin_group: "{{ lookup('pipe', 'id -gn') }}"
    workstation_persistent_home_links:
      - name: claude
        type: bind_mount
        path: "{{ workstation_home }}/.claude"
        target: "{{ workstation_persistent_home_root }}/.claude"
        mode: "0700"
      - name: codex
        type: bind_mount
        path: "{{ workstation_home }}/.codex"
        target: "{{ workstation_persistent_home_root }}/.codex"
        mode: "0700"
      - name: agents
        type: bind_mount
        path: "{{ workstation_home }}/.agents"
        target: "{{ workstation_persistent_home_root }}/.agents"
        mode: "0700"
      - name: pi
        type: bind_mount
        path: "{{ workstation_home }}/.pi"
        target: "{{ workstation_persistent_home_root }}/.pi"
        mode: "0700"
      - name: agent_of_empires
        type: bind_mount
        path: "{{ workstation_home }}/.config/agent-of-empires"
        target: "{{ workstation_persistent_home_root }}/.config/agent-of-empires"
        mode: "0700"
      - name: hermes
        type: bind_mount
        path: "{{ workstation_home }}/.hermes"
        target: "{{ workstation_persistent_home_root }}/.hermes"
        mode: "0700"
      - name: openclaw
        type: bind_mount
        path: "{{ workstation_home }}/.openclaw"
        target: "{{ workstation_persistent_home_root }}/.openclaw"
        mode: "0700"
      - name: repos
        type: bind_mount
        path: "{{ workstation_home }}/repos"
        target: "{{ workstation_persistent_home_root }}/repos"
        mode: "0755"
    lxc_ssh_user: "{{ workstation_username }}"
    lxc_ssh_uid: "{{ lookup('pipe', 'id -u') | int }}"
    lxc_ssh_gid: "{{ lookup('pipe', 'id -g') | int }}"
    lxc_github_keys_home: "{{ workstation_home }}"
    lxc_github_users:
      - faviann
    docker_user: "{{ workstation_username }}"
    docker_uid: "{{ lookup('pipe', 'id -u') | int }}"
    docker_gid: "{{ lookup('pipe', 'id -g') | int }}"
  tasks:
    - name: Ensure writable test directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ temp_root }}/bin"
        - "{{ temp_root }}/etc/profile.d"

    - name: Place mock curl on PATH
      ansible.builtin.copy:
        dest: "{{ temp_root }}/curl"
        mode: "0755"
        content: |
          #!/bin/sh
          case "$*" in
            *faviann.keys*)
              printf '%s\n' 'ssh-ed25519 AAAATESTKEYONE faviann@laptop'
              ;;
            *get.chezmoi.io*)
              printf '%s\n' '#!/bin/sh' 'exit 0'
              ;;
            *)
              exit 0
              ;;
          esac

    - name: Ensure workstation home exists
      ansible.builtin.file:
        path: "{{ workstation_home }}"
        state: directory
        mode: "0755"

    - name: Create existing workstation persistent parent with loose mode
      ansible.builtin.file:
        path: "{{ temp_root }}/ephemeral/workstation"
        state: directory
        mode: "0755"

    - name: Include workstation baseline role with PATH mocks
      environment:
        PATH: "{{ temp_root }}:{{ lookup('env', 'PATH') }}"
      block:
        - name: Include workstation baseline role
          ansible.builtin.include_role:
            name: config/lxc_workstation_baseline

    - name: Stat persistent home root
      ansible.builtin.stat:
        path: "{{ temp_root }}/ephemeral/workstation/home"
      register: persistent_home_root_stat

    - name: Stat workstation state parent
      ansible.builtin.stat:
        path: "{{ temp_root }}/ephemeral/workstation"
      register: workstation_state_parent_stat

    - name: Stat Claude persistent home directory
      ansible.builtin.stat:
        path: "{{ temp_root }}/ephemeral/workstation/home/.claude"
      register: claude_state_dir_stat

    - name: Stat Codex persistent home directory
      ansible.builtin.stat:
        path: "{{ temp_root }}/ephemeral/workstation/home/.codex"
      register: codex_state_dir_stat

    - name: Stat agents persistent home directory
      ansible.builtin.stat:
        path: "{{ temp_root }}/ephemeral/workstation/home/.agents"
      register: agents_state_dir_stat

    - name: Stat Pi persistent home directory
      ansible.builtin.stat:
        path: "{{ temp_root }}/ephemeral/workstation/home/.pi"
      register: pi_state_dir_stat

    - name: Stat repos persistent home directory
      ansible.builtin.stat:
        path: "{{ temp_root }}/ephemeral/workstation/home/repos"
      register: repos_dir_stat

    - name: Stat Hermes persistent home directory
      ansible.builtin.stat:
        path: "{{ temp_root }}/ephemeral/workstation/home/.hermes"
      register: hermes_state_dir_stat

    - name: Stat AoE persistent home directory
      ansible.builtin.stat:
        path: "{{ temp_root }}/ephemeral/workstation/home/.config/agent-of-empires"
      register: aoe_state_dir_stat

    - name: Stat OpenClaw persistent home directory
      ansible.builtin.stat:
        path: "{{ temp_root }}/ephemeral/workstation/home/.openclaw"
      register: openclaw_state_dir_stat

    - name: Stat Claude home path
      ansible.builtin.stat:
        path: "{{ workstation_home }}/.claude"
      register: claude_home_path_stat

    - name: Stat Codex home path
      ansible.builtin.stat:
        path: "{{ workstation_home }}/.codex"
      register: codex_home_path_stat

    - name: Stat agents home path
      ansible.builtin.stat:
        path: "{{ workstation_home }}/.agents"
      register: agents_home_path_stat

    - name: Stat Pi home path
      ansible.builtin.stat:
        path: "{{ workstation_home }}/.pi"
      register: pi_home_path_stat

    - name: Stat AoE home path
      ansible.builtin.stat:
        path: "{{ workstation_home }}/.config/agent-of-empires"
      register: aoe_home_path_stat

    - name: Stat repos home path
      ansible.builtin.stat:
        path: "{{ workstation_home }}/repos"
      register: repos_home_path_stat

    - name: Stat Hermes home path
      ansible.builtin.stat:
        path: "{{ workstation_home }}/.hermes"
      register: hermes_home_path_stat

    - name: Stat OpenClaw home path
      ansible.builtin.stat:
        path: "{{ workstation_home }}/.openclaw"
      register: openclaw_home_path_stat

    - name: Assert workstation persistent home mount paths were prepared safely
      ansible.builtin.assert:
        that:
          - workstation_state_parent_stat.stat.isdir
          - workstation_state_parent_stat.stat.uid == workstation_uid
          - workstation_state_parent_stat.stat.gid == workstation_gid
          - workstation_state_parent_stat.stat.mode == "0700"
          - persistent_home_root_stat.stat.isdir
          - persistent_home_root_stat.stat.uid == workstation_uid
          - persistent_home_root_stat.stat.gid == workstation_gid
          - persistent_home_root_stat.stat.mode == "0700"
          - claude_state_dir_stat.stat.isdir
          - claude_state_dir_stat.stat.uid == workstation_uid
          - claude_state_dir_stat.stat.gid == workstation_gid
          - claude_state_dir_stat.stat.mode == "0700"
          - codex_state_dir_stat.stat.isdir
          - codex_state_dir_stat.stat.uid == workstation_uid
          - codex_state_dir_stat.stat.gid == workstation_gid
          - codex_state_dir_stat.stat.mode == "0700"
          - agents_state_dir_stat.stat.isdir
          - agents_state_dir_stat.stat.uid == workstation_uid
          - agents_state_dir_stat.stat.gid == workstation_gid
          - agents_state_dir_stat.stat.mode == "0700"
          - pi_state_dir_stat.stat.isdir
          - pi_state_dir_stat.stat.uid == workstation_uid
          - pi_state_dir_stat.stat.gid == workstation_gid
          - pi_state_dir_stat.stat.mode == "0700"
          - repos_dir_stat.stat.isdir
          - repos_dir_stat.stat.uid == workstation_uid
          - repos_dir_stat.stat.gid == workstation_gid
          - repos_dir_stat.stat.mode == "0755"
          - aoe_state_dir_stat.stat.isdir
          - aoe_state_dir_stat.stat.uid == workstation_uid
          - aoe_state_dir_stat.stat.gid == workstation_gid
          - aoe_state_dir_stat.stat.mode == "0700"
          - hermes_state_dir_stat.stat.isdir
          - hermes_state_dir_stat.stat.uid == workstation_uid
          - hermes_state_dir_stat.stat.gid == workstation_gid
          - hermes_state_dir_stat.stat.mode == "0700"
          - openclaw_state_dir_stat.stat.isdir
          - openclaw_state_dir_stat.stat.uid == workstation_uid
          - openclaw_state_dir_stat.stat.gid == workstation_gid
          - openclaw_state_dir_stat.stat.mode == "0700"
          - claude_home_path_stat.stat.isdir
          - not (claude_home_path_stat.stat.islnk | default(false))
          - codex_home_path_stat.stat.isdir
          - not (codex_home_path_stat.stat.islnk | default(false))
          - agents_home_path_stat.stat.isdir
          - not (agents_home_path_stat.stat.islnk | default(false))
          - pi_home_path_stat.stat.isdir
          - not (pi_home_path_stat.stat.islnk | default(false))
          - aoe_home_path_stat.stat.isdir
          - not (aoe_home_path_stat.stat.islnk | default(false))
          - hermes_home_path_stat.stat.isdir
          - not (hermes_home_path_stat.stat.islnk | default(false))
          - openclaw_home_path_stat.stat.isdir
          - not (openclaw_home_path_stat.stat.islnk | default(false))
          - repos_home_path_stat.stat.isdir
          - not (repos_home_path_stat.stat.islnk | default(false))
        fail_msg: "Workstation persistent home directories or mount paths were not prepared as expected"
