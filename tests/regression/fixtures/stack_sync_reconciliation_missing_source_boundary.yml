---
- name: Test stack sync reconciliation missing-source boundary
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    docker_agents_enabled: false
    service_agents_enabled: false
    lxc_stack_sync_managed_assets:
      changed_results: []
    lxc_stack_sync_deploy_exclude_regex: '^[^/]+/(README(\..*)?|docs($|/.*)|stack\.ya?ml|metadata\.(ya?ml|json))$'
    lxc_docker_environment_internal:
      shared_mount_source: "{{ temp_root }}/shared"
      root_docker_conf_path: "{{ temp_root }}/shared"
      stacks_source: "{{ temp_root }}/missing-source"
      stale_stack_quarantine_root: "{{ temp_root }}/shared/stale-stacks"
      external_networks: []
      path_ownership_overrides: []
      shared_owner: 1000
      shared_group: 1000
      docker_uid: 1000
      docker_gid: 1000
  tasks:
    - name: Create deployed stacks root with unmanaged rogue stack
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ lxc_docker_environment_internal.shared_mount_source }}/stacks"
        - "{{ lxc_docker_environment_internal.shared_mount_source }}/stacks/rogue"

    - name: Include stack sync main
      ansible.builtin.include_tasks: "../../../playbooks/roles/config/lxc_stack_sync/tasks/main.yml"
