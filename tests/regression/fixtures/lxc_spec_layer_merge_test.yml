---
- name: Test LXC spec layer merge precedence
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    proxmox_default_storage: local-lvm
    proxmox_lxc_global_defaults:
      node: pve-a
      ostemplate: local:vztmpl/debian-12-standard_12.2-1_amd64.tar.zst
      memory: 2048
    proxmox_lxc_group_defaults:
      cores: 2
      memory: 1024
      disk: "16"
      netif:
        net0: name=eth0,bridge=vmbr1,firewall=0,ip=dhcp,ip6=auto,type=veth
    proxmox_lxc_capability_defaults:
      features:
        - nesting=1
        - keyctl=1
    proxmox_lxc_overrides:
      vmid: 4201
      memory: 8192
    proxmox_lxc:
      hostname: merge-test-host
      pubkey: ssh-ed25519 AAAATEST merge@test
    lxc_hwaddr: 'AA:BB:CC:DD:EE:FF'
    proxmox_lxc_controller_pubkey_enabled: false
    proxmox_lxc_disable_root_password: true
  tasks:
    - name: Build compiled LXC contract
      ansible.builtin.include_role:
        name: provisioning/lxc_spec_builder

    - name: Assert identity and API contract preserve precedence and normalization
      ansible.builtin.assert:
        that:
          - proxmox_lxc_contract.identity.vmid == 4201
          - proxmox_lxc_contract.identity.hostname == 'merge-test-host'
          - proxmox_lxc_contract.api_spec.node == 'pve-a'
          - proxmox_lxc_contract.api_spec.ostemplate == 'local:vztmpl/debian-12-standard_12.2-1_amd64.tar.zst'
          - proxmox_lxc_contract.api_spec.cores == 2
          - proxmox_lxc_contract.api_spec.disk == 'local-lvm:16'
          - proxmox_lxc_contract.api_spec.memory == 8192
          - proxmox_lxc_contract.api_spec.netif.net0 is search('hwaddr=AA:BB:CC:DD:EE:FF')
        fail_msg: "Identity or API contract did not preserve layered precedence and normalization"

    - name: Assert host-config contract features come from compiled spec
      ansible.builtin.assert:
        that:
          - proxmox_lxc_contract.host_config.features | sort == proxmox_lxc_capability_defaults.features | sort
        fail_msg: "Contract host_config features did not come from the compiled spec"

    - name: Assert derived metadata comes from the desired template
      ansible.builtin.assert:
        that:
          - proxmox_lxc_contract.derived_metadata.desired_debian_release == '12'
          - proxmox_lxc_contract.derived_metadata.desired_debian_release_candidates == ['12']
        fail_msg: "Derived metadata did not come from the desired template"