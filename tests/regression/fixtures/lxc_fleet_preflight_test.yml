---
- name: Exercise fleet preflight through the lifecycle facade
  hosts: lxcs
  connection: local
  gather_facts: false
  tasks:
    - name: Invoke the lifecycle facade
      block:
        - name: Plan the targeted LXC lifecycle
          ansible.builtin.include_role:
            name: provisioning/proxmox_lxc_lifecycle
            tasks_from: plan
      rescue:
        - name: Capture the observable fleet preflight failure
          ansible.builtin.set_fact:
            fleet_observed_failure: "{{ ansible_failed_result.msg }}"

    - name: Assert successful planners consumed the common observation
      ansible.builtin.assert:
        that:
          - fleet_observed_failure is not defined
          - lxc_lifecycle_result.outcome.status == 'validated'
          - lxc_lifecycle_result.observations.before.runtime_state == fleet_expected_runtime_state
          - proxmox_fleet_target_observations[inventory_hostname].common_observation | bool
          - proxmox_fleet_common_observation | length == 3
      vars:
        fleet_expected_runtime_state: stopped
      when: fleet_expected_failure_fragments is not defined

    - name: Assert all expected fleet preflight problems were reported
      ansible.builtin.assert:
        that:
          - fleet_observed_failure is not defined
          - lxc_lifecycle_result.outcome.status == 'planning_failed'
          - item in lxc_lifecycle_result.outcome.reason
      loop: "{{ fleet_expected_failure_fragments }}"
      when: fleet_expected_failure_fragments is defined
