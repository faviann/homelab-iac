---
- name: Validate workstation bootstrap contract statically
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    role_root: "{{ playbook_dir }}/../../../playbooks/roles/config/lxc_workstation_baseline"
  tasks:
    - name: Verify role root exists
      ansible.builtin.stat:
        path: "{{ role_root }}/tasks/main.yml"
      register: role_root_stat

    - name: Assert role root exists
      ansible.builtin.assert:
        that:
          - role_root_stat.stat.exists

    - name: Read main tasks
      ansible.builtin.slurp:
        src: "{{ role_root }}/tasks/main.yml"
      register: main_tasks_raw

    - name: Read bootstrap tasks
      ansible.builtin.slurp:
        src: "{{ role_root }}/tasks/bootstrap.yml"
      register: bootstrap_tasks_raw

    - name: Parse task files
      ansible.builtin.set_fact:
        main_tasks: "{{ main_tasks_raw.content | b64decode | from_yaml }}"
        bootstrap_tasks: "{{ bootstrap_tasks_raw.content | b64decode | from_yaml }}"

    - name: Read bootstrap template
      ansible.builtin.slurp:
        src: "{{ role_root }}/templates/workstation-bootstrap.sh.j2"
      register: bootstrap_template

    - name: Assert bootstrap tasks are opt-in and secret-safe
      ansible.builtin.assert:
        that:
          - (main_tasks | to_json) is search('workstation_bootstrap_unattended')
          - (bootstrap_tasks | to_json) is search('no_log')
          - (bootstrap_tasks | to_json) is search('workstation_bootstrap_env_path')
          - (bootstrap_tasks | to_json) is search('WORKSTATION_BW_CLIENTID')

    - name: Assert bootstrap template does not source envelope
      ansible.builtin.assert:
        that:
          - (bootstrap_template.content | b64decode) is search('Parse the envelope as data') or (bootstrap_template.content | b64decode) is search('parse_env_file')
          - not ((bootstrap_template.content | b64decode) is search('source .*$ENV_PATH'))
          - (bootstrap_template.content | b64decode) is search('trap cleanup EXIT')
          - (bootstrap_template.content | b64decode) is search('gh auth status')
          - (bootstrap_template.content | b64decode) is search('git@github.com')