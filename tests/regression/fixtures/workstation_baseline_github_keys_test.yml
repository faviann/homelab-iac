---
- name: Test workstation baseline GitHub key population
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    workstation_username: "{{ lookup('pipe', 'id -un') }}"
    workstation_uid: "{{ lookup('pipe', 'id -u') | int }}"
    workstation_gid: "{{ lookup('pipe', 'id -g') | int }}"
    workstation_home: "{{ temp_root }}/home/{{ workstation_username }}"
    workstation_aoe_proxy_firewall_nft_dir: "{{ temp_root }}/etc/nftables.d"
    workstation_aoe_proxy_firewall_service_path: "{{ temp_root }}/etc/systemd/system/workstation-aoe-proxy-firewall.service"
    workstation_packages: []
    workstation_locale_enabled: false
    workstation_chezmoi_install_enabled: false
    workstation_persistent_home_enabled: false
    workstation_nix_install_enabled: false
    workstation_enable_linger: false
    workstation_bw_bin_path: "{{ temp_root }}/bin/bw"
    workstation_setup_bin_path: "{{ temp_root }}/bin/workstation-setup"
    workstation_setup_profile_hook_path: "{{ temp_root }}/etc/profile.d/workstation-setup.sh"
    workstation_system_bin_owner: "{{ lookup('pipe', 'id -un') }}"
    workstation_system_bin_group: "{{ lookup('pipe', 'id -gn') }}"
    lxc_ssh_user: "{{ workstation_username }}"
    lxc_ssh_uid: "{{ lookup('pipe', 'id -u') | int }}"
    lxc_ssh_gid: "{{ lookup('pipe', 'id -g') | int }}"
    lxc_github_keys_home: "{{ workstation_home }}"
    lxc_github_users:
      - faviann
      - aperture
    docker_user: "{{ workstation_username }}"
    docker_uid: "{{ lookup('pipe', 'id -u') | int }}"
    docker_gid: "{{ lookup('pipe', 'id -g') | int }}"
  tasks:
    - name: Ensure writable test directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ temp_root }}/bin"
        - "{{ temp_root }}/etc/profile.d"

    - name: Place mock curl on PATH
      ansible.builtin.copy:
        dest: "{{ temp_root }}/curl"
        mode: "0755"
        content: |
          #!/bin/sh
          url=""
          for arg in "$@"; do
            case "$arg" in
              http://*|https://*)
                url="$arg"
                ;;
            esac
          done
          case "$url" in
            *faviann.keys)
              printf '%s\n' \
                'ssh-ed25519 AAAATESTKEYONE faviann@laptop' \
                'ssh-ed25519 AAAATESTKEYONE faviann@laptop'
              ;;
            *aperture.keys)
              printf '%s\n' \
                'ssh-ed25519 AAAATESTKEYTWO faviann@phone'
              ;;
            *get.chezmoi.io)
              printf '%s\n' \
                '#!/bin/sh' \
                'exit 0'
              ;;
            *)
              echo "unexpected curl url: $url" >&2
              exit 1
              ;;
          esac

    - name: Include workstation baseline role with PATH mocks
      environment:
        PATH: "{{ temp_root }}:{{ lookup('env', 'PATH') }}"
      block:
        - name: Include workstation baseline role
          ansible.builtin.include_role:
            name: config/lxc_workstation_baseline

    - name: Stat workstation ssh directory
      ansible.builtin.stat:
        path: "{{ workstation_home }}/.ssh"
      register: workstation_ssh_dir_stat

    - name: Stat workstation authorized_keys
      ansible.builtin.stat:
        path: "{{ workstation_home }}/.ssh/authorized_keys"
      register: workstation_authorized_keys_stat

    - name: Stat workstation outbound private key
      ansible.builtin.stat:
        path: "{{ workstation_home }}/.ssh/id_ed25519"
      register: workstation_private_key_stat

    - name: Stat workstation GitHub known_hosts
      ansible.builtin.stat:
        path: "{{ workstation_home }}/.ssh/known_hosts"
      register: workstation_known_hosts_stat

    - name: Read workstation authorized_keys
      ansible.builtin.slurp:
        src: "{{ workstation_home }}/.ssh/authorized_keys"
      register: workstation_authorized_keys_content

    - name: Assert workstation baseline only writes inbound GitHub authorized_keys
      ansible.builtin.assert:
        that:
          - workstation_ssh_dir_stat.stat.uid == workstation_uid
          - workstation_ssh_dir_stat.stat.gid == workstation_gid
          - workstation_ssh_dir_stat.stat.mode == "0700"
          - workstation_authorized_keys_stat.stat.uid == workstation_uid
          - workstation_authorized_keys_stat.stat.gid == workstation_gid
          - workstation_authorized_keys_stat.stat.mode == "0600"
          - (workstation_authorized_keys_content.content | b64decode) == "ssh-ed25519 AAAATESTKEYONE
            faviann@laptop\nssh-ed25519 AAAATESTKEYTWO faviann@phone\n"
          - not workstation_private_key_stat.stat.exists
          - not workstation_known_hosts_stat.stat.exists
        fail_msg: "Workstation baseline did not write only the expected inbound GitHub authorized_keys"
