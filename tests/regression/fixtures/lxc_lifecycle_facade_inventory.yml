---
all:
  children:
    lifecycle_scenarios:
      vars:
        ansible_connection: local
        proxmox_skip_self: false
        proxmox_lxc_controller_pubkey_enabled: false
        proxmox_lxc_host_config_enabled: true
        proxmox_pct_delegate_host: localhost
        proxmox_api_delegate_host: localhost
        proxmox_default_storage: local-lvm
        proxmox_default_bind_mounts: {}
        proxmox_default_idmap: []
        proxmox_lxc_disable_root_password: true
        proxmox_lifecycle_release_probe_tasks_file: >-
          {{
            [inventory_dir, '..', '..', '..', 'playbooks', 'tasks', 'probe_lxc_release.yml']
            | path_join
          }}
        proxmox_lifecycle_policy:
          strict_validation: false
          rebuild_on_release_mismatch: true
          cleanup_rebuilt_state: false
          skip_stopped_release_checks: true
      hosts:
        full_create:
          lifecycle_vmid: 4401
          proxmox_lifecycle_intent: full
          lifecycle_desired_state: present
          lifecycle_runtime_state: absent
          lifecycle_actual_release: ""
          lifecycle_release_probe_state: absent
          lifecycle_seed_release: "12"
          lifecycle_expected_transition: provision
          lifecycle_expected_destructive: false
          lifecycle_expected_reconcile_host_config: true
          lifecycle_expected_restore_guest_access: true
          lifecycle_expected_configure_guest: true
          lifecycle_expected_outcome: configured
          lifecycle_expected_before_runtime: absent
          lifecycle_expected_after_runtime: running
          lifecycle_expected_after_release: "12"
          lifecycle_expected_after_probe_state: probed
        configure_absent:
          lifecycle_vmid: 4402
          proxmox_lifecycle_intent: configure_only
          lifecycle_desired_state: present
          lifecycle_runtime_state: absent
          lifecycle_actual_release: ""
          lifecycle_release_probe_state: absent
          lifecycle_seed_release: "12"
          lifecycle_expected_transition: none
          lifecycle_expected_destructive: false
          lifecycle_expected_reconcile_host_config: false
          lifecycle_expected_restore_guest_access: false
          lifecycle_expected_configure_guest: false
          lifecycle_expected_outcome: skipped
          lifecycle_expected_before_runtime: absent
          lifecycle_expected_after_runtime: absent
        full_rebuild:
          lifecycle_vmid: 4403
          proxmox_lifecycle_intent: full
          lifecycle_desired_state: present
          lifecycle_runtime_state: running
          lifecycle_actual_release: "11"
          lifecycle_release_probe_state: probed
          lifecycle_seed_release: "11"
          lifecycle_expected_transition: rebuild
          lifecycle_expected_destructive: true
          lifecycle_expected_reconcile_host_config: true
          lifecycle_expected_restore_guest_access: true
          lifecycle_expected_configure_guest: true
          lifecycle_expected_outcome: configured
          lifecycle_expected_before_runtime: running
          lifecycle_expected_after_runtime: running
          lifecycle_expected_after_release: "12"
          lifecycle_expected_after_probe_state: probed
        provision_existing:
          lifecycle_vmid: 4404
          proxmox_lifecycle_intent: provision_only
          lifecycle_desired_state: present
          lifecycle_runtime_state: running
          lifecycle_actual_release: "12"
          lifecycle_release_probe_state: probed
          lifecycle_seed_release: "12"
          lifecycle_expected_transition: provision
          lifecycle_expected_destructive: false
          lifecycle_expected_reconcile_host_config: true
          lifecycle_expected_restore_guest_access: true
          lifecycle_expected_configure_guest: false
          lifecycle_expected_outcome: ensured
          lifecycle_expected_before_runtime: running
          lifecycle_expected_after_runtime: running
          lifecycle_expected_after_release: "12"
          lifecycle_expected_after_probe_state: probed
        full_remove:
          lifecycle_vmid: 4405
          proxmox_lifecycle_intent: full
          lifecycle_desired_state: absent
          lifecycle_runtime_state: running
          lifecycle_actual_release: "12"
          lifecycle_release_probe_state: probed
          lifecycle_seed_release: "12"
          lifecycle_expected_transition: remove
          lifecycle_expected_destructive: true
          lifecycle_expected_reconcile_host_config: false
          lifecycle_expected_restore_guest_access: false
          lifecycle_expected_configure_guest: false
          lifecycle_expected_outcome: removed
          lifecycle_expected_before_runtime: running
          lifecycle_expected_after_runtime: absent
          lifecycle_expected_after_release: ""
          lifecycle_expected_after_probe_state: absent
        full_already_absent:
          lifecycle_vmid: 4409
          proxmox_lifecycle_intent: full
          lifecycle_desired_state: absent
          lifecycle_runtime_state: absent
          lifecycle_actual_release: ""
          lifecycle_release_probe_state: absent
          lifecycle_seed_release: "12"
          lifecycle_expected_transition: none
          lifecycle_expected_destructive: false
          lifecycle_expected_reconcile_host_config: false
          lifecycle_expected_restore_guest_access: false
          lifecycle_expected_configure_guest: false
          lifecycle_expected_outcome: absent
          lifecycle_expected_before_runtime: absent
          lifecycle_expected_after_runtime: absent
        validate_absent_running:
          lifecycle_vmid: 4410
          proxmox_lifecycle_intent: validate_only
          lifecycle_desired_state: absent
          lifecycle_runtime_state: running
          lifecycle_actual_release: "12"
          lifecycle_release_probe_state: probed
          lifecycle_seed_release: "12"
          lifecycle_expected_transition: none
          lifecycle_expected_destructive: false
          lifecycle_expected_reconcile_host_config: false
          lifecycle_expected_restore_guest_access: false
          lifecycle_expected_configure_guest: false
          lifecycle_expected_outcome: validated
          lifecycle_expected_before_runtime: running
          lifecycle_expected_after_runtime: running
        configure_running:
          lifecycle_vmid: 4406
          proxmox_lifecycle_intent: configure_only
          lifecycle_desired_state: present
          lifecycle_runtime_state: running
          lifecycle_actual_release: "12"
          lifecycle_release_probe_state: probed
          lifecycle_seed_release: "12"
          lifecycle_expected_transition: none
          lifecycle_expected_destructive: false
          lifecycle_expected_reconcile_host_config: true
          lifecycle_expected_restore_guest_access: true
          lifecycle_expected_configure_guest: true
          lifecycle_expected_outcome: configured
          lifecycle_expected_before_runtime: running
          lifecycle_expected_after_runtime: running
          lifecycle_expected_after_release: "12"
          lifecycle_expected_after_probe_state: probed
        validate_running:
          lifecycle_vmid: 4407
          proxmox_lifecycle_intent: validate_only
          lifecycle_desired_state: present
          lifecycle_runtime_state: running
          lifecycle_actual_release: "12"
          lifecycle_release_probe_state: probed
          lifecycle_seed_release: "12"
          lifecycle_expected_transition: none
          lifecycle_expected_destructive: false
          lifecycle_expected_reconcile_host_config: false
          lifecycle_expected_restore_guest_access: false
          lifecycle_expected_configure_guest: false
          lifecycle_expected_outcome: validated
          lifecycle_expected_before_runtime: running
          lifecycle_expected_after_runtime: running
        validation_failed:
          lifecycle_vmid: 4408
          proxmox_lifecycle_intent: full
          lifecycle_desired_state: present
          lifecycle_runtime_state: running
          lifecycle_actual_release: "12"
          lifecycle_release_probe_state: probed
          lifecycle_seed_release: "12"
          lifecycle_validation_status: mismatch
          lifecycle_validation_message: Invalid DNS configuration detected
          lifecycle_expected_transition: none
          lifecycle_expected_destructive: false
          lifecycle_expected_reconcile_host_config: false
          lifecycle_expected_restore_guest_access: false
          lifecycle_expected_configure_guest: false
          lifecycle_expected_outcome: validation_failed
          lifecycle_expected_before_runtime: running
          lifecycle_expected_after_runtime: running
