---
- name: Test proxmox_lxc_host_config boundary result
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    proxmox_host_config_delegate: localhost
    proxmox_lxc_host_config_become: false
    proxmox_lxc_host_config_path_root: "{{ temp_root }}/etc/pve/lxc"
    proxmox_lxc_contract:
      host_config:
        vmid: 4201
        hostname: contract-host
        bind_mounts:
          mp0: /srv/media,mp=/media
        idmap:
          - u 0 100000 65536
          - g 0 100000 65536
        features:
          - nesting=1
          - keyctl=1
    wireguard_kernel_module_access: true
    lxc_custom_sysctls:
      - key: net.ipv4.ip_forward
        value: 1
    lxc_disable_apparmor: true
    configure_nvidia_runtime: false
  tasks:
    - name: Create temp Proxmox config root
      ansible.builtin.file:
        path: "{{ proxmox_lxc_host_config_path_root }}"
        state: directory
        mode: "0755"

    - name: Seed container config file
      ansible.builtin.copy:
        dest: "{{ proxmox_lxc_host_config_path_root }}/4201.conf"
        mode: "0644"
        content: |
          arch: amd64
          hostname: contract-host
          unprivileged: 1
          rootfs: local-lvm:vm-4201-disk-0,size=16G

    - name: Place mock pct script on PATH
      ansible.builtin.copy:
        dest: "{{ temp_root }}/pct"
        mode: "0755"
        content: |
          #!/bin/sh
          echo "$*" >> "{{ temp_root }}/pct-calls.log"
          case "$1" in
            config)
              cat <<'EOF'
          arch: amd64
          features: nesting=1
          EOF
              ;;
            status)
              echo "status: running"
              ;;
            set|reboot)
              ;;
            *)
              echo "unexpected pct args: $*" >&2
              exit 1
              ;;
          esac
          exit 0

    - name: Include host config tasks with mock pct on PATH
      block:
        - ansible.builtin.include_tasks: "../../../playbooks/roles/infrastructure/proxmox_lxc_host_config/tasks/main.yml"
      environment:
        PATH: "{{ temp_root }}:{{ lookup('env', 'PATH') }}"

    - name: Read updated container config file
      ansible.builtin.slurp:
        src: "{{ proxmox_lxc_host_config_path_root }}/4201.conf"
      register: _host_config_file

    - name: Read mock pct call log
      ansible.builtin.slurp:
        src: "{{ temp_root }}/pct-calls.log"
      register: _pct_calls

    - name: Assert config-file reconciliations were applied
      ansible.builtin.assert:
        that:
          - "'lxc.idmap: u 0 100000 65536' in (_host_config_file.content | b64decode)"
          - "'lxc.idmap: g 0 100000 65536' in (_host_config_file.content | b64decode)"
          - "'mp0: /srv/media,mp=/media' in (_host_config_file.content | b64decode)"
          - "'lxc.mount.entry: /dev/net/tun dev/net/tun none bind,create=file' in (_host_config_file.content | b64decode)"
          - "'lxc.sysctl.net.ipv4.ip_forward = 1' in (_host_config_file.content | b64decode)"
          - "'lxc.apparmor.profile: unconfined' in (_host_config_file.content | b64decode)"
        fail_msg: "Host config file did not receive the expected reconciled lines"

    - name: Assert pct feature reconciliation was executed
      ansible.builtin.assert:
        that:
          - "'config 4201' in (_pct_calls.content | b64decode)"
          - "'set 4201 --features keyctl=1,nesting=1' in (_pct_calls.content | b64decode)"
          - "'status 4201' in (_pct_calls.content | b64decode)"
          - "'reboot 4201' in (_pct_calls.content | b64decode)"
        fail_msg: "Feature reconciliation did not invoke the expected pct commands"

    - name: Assert boundary result reports component changes and restart outcome
      ansible.builtin.assert:
        that:
          - proxmox_lxc_host_config_result.overall_changed
          - proxmox_lxc_host_config_result.restart_applied
          - not proxmox_lxc_host_config_result.restart_required
          - proxmox_lxc_host_config_result.components.idmap.changed
          - proxmox_lxc_host_config_result.components.bind_mounts.changed
          - proxmox_lxc_host_config_result.components.wireguard.changed
          - proxmox_lxc_host_config_result.components.sysctls.changed
          - proxmox_lxc_host_config_result.components.features.changed
          - proxmox_lxc_host_config_result.components.features.restart_applied
        fail_msg: "Host config boundary result did not capture component changes and restart semantics"