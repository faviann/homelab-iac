---
- name: Test NVIDIA repository cache and install ordering
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    lxc_nvidia_runtime_enabled: true
    lxc_nvidia_runtime_keyring_path: /fixture/keyrings/nvidia.gpg
  tasks:
    - name: Create isolated APT directories
      tags:
        - lxc_nvidia_runtime_repository
        - lxc_nvidia_runtime_toolkit_install
      ansible.builtin.file:
        path: "{{ temp_root }}/{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - apt-lists/partial
        - apt-archives/partial

    - name: Configure isolated empty APT state
      tags:
        - lxc_nvidia_runtime_repository
        - lxc_nvidia_runtime_toolkit_install
      ansible.builtin.copy:
        dest: "{{ temp_root }}/apt.conf"
        mode: "0644"
        content: |
          Dir::Etc::sourcelist "/dev/null";
          Dir::Etc::sourceparts "/dev/null";
          Dir::State::lists "{{ temp_root }}/apt-lists";
          Dir::Cache::archives "{{ temp_root }}/apt-archives";
          Acquire::Languages "none";

    - name: Place successful curl on PATH
      tags:
        - lxc_nvidia_runtime_repository
        - lxc_nvidia_runtime_toolkit_install
      ansible.builtin.copy:
        dest: "{{ temp_root }}/curl"
        mode: "0755"
        content: |
          #!/bin/sh
          printf '%s\n' 'deb https://nvidia.example/stable /'

    - name: Exercise package setup through toolkit install
      environment:
        APT_CONFIG: "{{ temp_root }}/apt.conf"
        PATH: "{{ temp_root }}:{{ lookup('env', 'PATH') }}"
      block:
        - name: Include lxc_nvidia_runtime package tasks
          tags:
            - lxc_nvidia_runtime_repository
            - lxc_nvidia_runtime_toolkit_install
          ansible.builtin.include_role:
            name: config/lxc_nvidia_runtime

        - name: Reject an unexpectedly successful isolated toolkit install
          tags:
            - lxc_nvidia_runtime_repository
            - lxc_nvidia_runtime_toolkit_install
          ansible.builtin.fail:
            msg: The isolated toolkit install succeeded unexpectedly
      rescue:
        - name: Assert cache refresh completed before isolated install failure
          tags:
            - lxc_nvidia_runtime_repository
            - lxc_nvidia_runtime_toolkit_install
          ansible.builtin.assert:
            that:
              - ansible_failed_task.name == 'Install NVIDIA Container Toolkit'
              - _nvidia_repo_added is changed
              - _nvidia_apt_cache_updated is succeeded
            fail_msg: Repository publication and APT refresh did not precede toolkit install
