---
- name: Test compiled LXC contract shape
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    proxmox_default_storage: local-lvm
    proxmox_lxc_global_defaults:
      node: pve-a
      ostemplate: local:vztmpl/debian-12-standard_12.2-1_amd64.tar.zst
      description: global-description
      timezone: UTC
    proxmox_lxc_group_defaults:
      description: group-description
      tags: group-managed
      cores: 2
      memory: 1024
      swap: 512
      disk: "16"
      netif:
        net0: name=eth0,bridge=vmbr1,firewall=0,ip=dhcp,ip6=auto,type=veth
    proxmox_lxc_capability_defaults:
      description: capability-description
      onboot: false
      features:
        - nesting=1
        - keyctl=1
    proxmox_lxc_overrides:
      vmid: 4201
      hostname: override-host
      description: override-description
      password: super-secret
    proxmox_lxc:
      hostname: contract-host
      description: host-description
      pubkey: ssh-ed25519 AAAATEST contract@test
    proxmox_default_bind_mounts:
      mp0: /srv/media,mp=/media
      mp1: /srv/config,mp=/config
    proxmox_lxc_bind_mounts_overrides:
      mp1: /srv/custom-config,mp=/config
    proxmox_lxc_host_directories:
      - path: /srv/custom-config
        mode: "0755"
    proxmox_default_idmap:
      - u 0 100000 65536
      - g 0 100000 65536
    configure_nvidia_runtime: true
    wireguard_kernel_module_access: true
    lxc_custom_sysctls:
      - key: net.ipv4.ip_forward
        value: 1
    lxc_disable_apparmor: true
    lxc_hwaddr: "AA:BB:CC:DD:EE:FF"
    proxmox_lxc_controller_pubkey_enabled: false
    proxmox_lxc_disable_root_password: true
  tasks:
    - name: Build compiled LXC contract
      ansible.builtin.include_role:
        name: provisioning/lxc_spec_builder

    - name: Assert compiled contract slices exist
      ansible.builtin.assert:
        that:
          - proxmox_lxc_contract.identity is mapping
          - proxmox_lxc_contract.api_spec is mapping
          - proxmox_lxc_contract.host_config is mapping
          - proxmox_lxc_contract.guest_bootstrap is mapping
          - proxmox_lxc_contract.derived_metadata is mapping
        fail_msg: "Compiled LXC contract did not expose the expected slices"

    - name: Assert identity and derived metadata are published explicitly
      ansible.builtin.assert:
        that:
          - proxmox_lxc_contract.identity.vmid == 4201
          - proxmox_lxc_contract.identity.hostname == 'contract-host'
          - proxmox_lxc_contract.derived_metadata.desired_debian_release == '12'
          - proxmox_lxc_contract.derived_metadata.desired_debian_release_candidates == ['12']
        fail_msg: "Compiled LXC contract did not expose explicit identity or derived metadata"

    - name: Assert API slice keeps precedence and tier-derived defaults
      ansible.builtin.assert:
        that:
          - proxmox_lxc_contract.api_spec.vmid == 4201
          - proxmox_lxc_contract.api_spec.hostname == 'contract-host'
          - proxmox_lxc_contract.api_spec.description == 'host-description'
          - proxmox_lxc_contract.api_spec.node == 'pve-a'
          - proxmox_lxc_contract.api_spec.ostemplate == 'local:vztmpl/debian-12-standard_12.2-1_amd64.tar.zst'
          - proxmox_lxc_contract.api_spec.cores == 2
          - proxmox_lxc_contract.api_spec.memory == 1024
          - proxmox_lxc_contract.api_spec.swap == 512
          - proxmox_lxc_contract.api_spec.disk == 'local-lvm:16'
          - proxmox_lxc_contract.api_spec.netif.net0 is search('bridge=vmbr1')
          - proxmox_lxc_contract.api_spec.netif.net0 is search('hwaddr=AA:BB:CC:DD:EE:FF')
          - proxmox_lxc_contract.api_spec.onboot == false
          - proxmox_lxc_contract.api_spec.password is not defined
          - proxmox_lxc_contract.api_spec.features is not defined
        fail_msg: "API slice did not preserve precedence, tier defaults, or host-only field stripping"

    - name: Assert host-config slice owns all managed host-side desired state
      ansible.builtin.assert:
        that:
          - proxmox_lxc_contract.host_config.vmid == 4201
          - proxmox_lxc_contract.host_config.hostname == 'contract-host'
          - proxmox_lxc_contract.host_config.bind_mounts.mp0 == '/srv/media,mp=/media'
          - proxmox_lxc_contract.host_config.bind_mounts.mp1 == '/srv/custom-config,mp=/config'
          - proxmox_lxc_contract.host_config.host_directories == proxmox_lxc_host_directories
          - proxmox_lxc_contract.host_config.idmap == proxmox_default_idmap
          - proxmox_lxc_contract.host_config.features | sort == proxmox_lxc_capability_defaults.features | sort
          - proxmox_lxc_contract.host_config.configure_nvidia_runtime
          - proxmox_lxc_contract.host_config.wireguard_kernel_module_access
          - proxmox_lxc_contract.host_config.lxc_custom_sysctls == lxc_custom_sysctls
          - proxmox_lxc_contract.host_config.lxc_disable_apparmor
        fail_msg: "Host-config slice did not capture all managed host-side desired state"

    - name: Assert guest-bootstrap slice owns pubkey injection details
      ansible.builtin.assert:
        that:
          - proxmox_lxc_contract.guest_bootstrap.vmid == 4201
          - proxmox_lxc_contract.guest_bootstrap.hostname == 'contract-host'
          - proxmox_lxc_contract.guest_bootstrap.pubkey == 'ssh-ed25519 AAAATEST contract@test'
        fail_msg: "Guest-bootstrap slice did not capture the expected pubkey details"
