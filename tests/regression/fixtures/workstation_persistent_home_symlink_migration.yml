---
- name: Test workstation persistent home symlink migration
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    workstation_username: faviann
    workstation_uid: "{{ lookup('pipe', 'id -u') | int }}"
    workstation_gid: "{{ lookup('pipe', 'id -g') | int }}"
    workstation_home: "{{ temp_root }}/home/faviann"
    workstation_persistent_home_enabled: true
    workstation_persistent_home_root: "{{ temp_root }}/ephemeral/workstation/home"
    workstation_persistent_home_mount_state: present
    workstation_persistent_home_fstab_path: "{{ temp_root }}/fstab"
    workstation_persistent_home_links:
      - name: claude
        type: bind_mount
        path: "{{ workstation_home }}/.claude"
        target: "{{ workstation_persistent_home_root }}/.claude"
        mode: "0700"
      - name: codex
        type: bind_mount
        path: "{{ workstation_home }}/.codex"
        target: "{{ workstation_persistent_home_root }}/.codex"
        mode: "0700"
      - name: agent_of_empires
        type: bind_mount
        path: "{{ workstation_home }}/.config/agent-of-empires"
        target: "{{ workstation_persistent_home_root }}/.config/agent-of-empires"
        mode: "0700"
      - name: hermes
        type: bind_mount
        path: "{{ workstation_home }}/.hermes"
        target: "{{ workstation_persistent_home_root }}/.hermes"
        mode: "0700"
      - name: repos
        type: bind_mount
        path: "{{ workstation_home }}/repos"
        target: "{{ workstation_persistent_home_root }}/repos"
        mode: "0755"
  tasks:
    - name: Ensure workstation home exists
      ansible.builtin.file:
        path: "{{ workstation_home }}"
        state: directory
        mode: "0755"

    - name: Ensure persistent target exists for legacy symlink
      ansible.builtin.file:
        path: "{{ workstation_persistent_home_root }}/.claude"
        state: directory
        mode: "0700"

    - name: Create legacy managed symlink for migration
      ansible.builtin.file:
        src: "{{ workstation_persistent_home_root }}/.claude"
        dest: "{{ workstation_home }}/.claude"
        state: link

    - name: Include focused workstation persistent home tasks
      ansible.builtin.include_role:
        name: config/lxc_workstation_baseline
        tasks_from: persistent_home

    - name: Stat migrated Claude home path
      ansible.builtin.stat:
        path: "{{ workstation_home }}/.claude"
      register: claude_home_path_stat

    - name: Assert managed symlink was migrated to managed bind-mount path
      ansible.builtin.assert:
        that:
          - claude_home_path_stat.stat.isdir
          - not (claude_home_path_stat.stat.islnk | default(false))
        fail_msg: "Managed symlink migration to bind-mount path failed for .claude"
