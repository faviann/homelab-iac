---
- name: Test lxc_github_keys fails clearly when GitHub returns no keys
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    lxc_ssh_user: faviann
    lxc_ssh_uid: "{{ lookup('pipe', 'id -u') | int }}"
    lxc_ssh_gid: "{{ lookup('pipe', 'id -g') | int }}"
    lxc_github_keys_home: "{{ temp_root }}/home/faviann"
    lxc_github_users:
      - faviann
  tasks:
    - name: Place empty mock curl on PATH
      ansible.builtin.copy:
        dest: "{{ temp_root }}/curl"
        mode: "0755"
        content: |
          #!/bin/sh
          exit 0

    - name: Include lxc_github_keys role with empty GitHub response
      environment:
        PATH: "{{ temp_root }}:{{ lookup('env', 'PATH') }}"
      block:
        - name: Include lxc_github_keys role
          ansible.builtin.include_role:
            name: config/lxc_github_keys
