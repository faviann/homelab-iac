---
- name: Test materialize renders templates and copies static files
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    lxc_docker_environment_internal:
      shared_mount_source: "{{ temp_root }}/shared"
      stacks_source: "{{ temp_root }}/stacks-source"
      shared_owner: "{{ ansible_user_uid }}"
      shared_group: "{{ ansible_user_gid }}"
      docker_uid: "{{ ansible_user_uid }}"
      docker_gid: "{{ ansible_user_gid }}"
      path_ownership_overrides:
        - path: "{{ temp_root }}/shared/stacks/myapp/data/cache"
          owner: "{{ ansible_user_uid }}"
          group: "{{ ansible_user_gid }}"
          recurse: false
  tasks:
    - name: Create source stack layout
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ lxc_docker_environment_internal.stacks_source }}/myapp"
        - "{{ lxc_docker_environment_internal.shared_mount_source }}/stacks"

    - name: Create a templated compose file (.j2)
      ansible.builtin.copy:
        content: |
          # stack: {{ '{{' }} stack_name {{ '}}' }}
          services:
            app:
              image: myapp:latest
          x-prereq-dirs:
            - ./data/uploads
            - ./data/cache
        dest: "{{ lxc_docker_environment_internal.stacks_source }}/myapp/compose.yaml.j2"

    - name: Create a static config file
      ansible.builtin.copy:
        content: "static-config-content"
        dest: "{{ lxc_docker_environment_internal.stacks_source }}/myapp/config.conf"

    - name: Run actual find ops to populate discover registers
      ansible.builtin.find:
        paths: "{{ lxc_docker_environment_internal.stacks_source }}"
        patterns: "*.j2"
        hidden: true
        recurse: true
        file_type: file
      register: _per_host_j2_files
      delegate_to: localhost
      become: false

    - ansible.builtin.find:
        paths: "{{ lxc_docker_environment_internal.stacks_source }}"
        patterns: "*"
        excludes: "*.j2,.gitkeep"
        hidden: true
        recurse: true
        file_type: file
      register: _per_host_static_files
      delegate_to: localhost
      become: false

    - ansible.builtin.find:
        paths: "{{ lxc_docker_environment_internal.stacks_source }}"
        recurse: true
        file_type: directory
      register: _per_host_dirs
      delegate_to: localhost
      become: false

    - name: Include materialize
      ansible.builtin.include_tasks: "../../../playbooks/roles/config/lxc_stack_sync/tasks/materialize.yml"

    - name: Assert templated compose file was rendered at target path
      ansible.builtin.stat:
        path: "{{ lxc_docker_environment_internal.shared_mount_source }}/stacks/myapp/compose.yaml"
      register: _rendered_compose_stat
    - ansible.builtin.assert:
        that:
          - _rendered_compose_stat.stat.exists
        fail_msg: "Rendered compose.yaml not found at target path"

    - name: Assert rendered content contains stack_name substitution
      ansible.builtin.slurp:
        src: "{{ lxc_docker_environment_internal.shared_mount_source }}/stacks/myapp/compose.yaml"
      register: _rendered_content
    - ansible.builtin.assert:
        that:
          - "'stack: myapp' in (_rendered_content.content | b64decode)"
        fail_msg: "stack_name var was not substituted in rendered output"

    - name: Assert static config file was copied
      ansible.builtin.stat:
        path: "{{ lxc_docker_environment_internal.shared_mount_source }}/stacks/myapp/config.conf"
      register: _static_file_stat
    - ansible.builtin.assert:
        that:
          - _static_file_stat.stat.exists
        fail_msg: "Static config.conf not found at target path"

    - name: Assert .j2 source file was NOT copied as a static file
      ansible.builtin.stat:
        path: "{{ lxc_docker_environment_internal.shared_mount_source }}/stacks/myapp/compose.yaml.j2"
      register: _j2_source_stat
    - ansible.builtin.assert:
        that:
          - not _j2_source_stat.stat.exists
        fail_msg: "compose.yaml.j2 should not appear at target (it is a template source)"

    - name: Assert planner output captures stack assets and prereq dirs
      ansible.builtin.assert:
        that:
          - "'myapp/compose.yaml' in (lxc_stack_sync_manifest_plan.templated_outputs | default([]))"
          - lxc_stack_sync_manifest_plan.stack_dirs_to_create | length > 0
          - lxc_stack_sync_manifest_plan.files_to_render | length == 1
          - lxc_stack_sync_manifest_plan.files_to_copy | length == 1
          - "(lxc_docker_environment_internal.shared_mount_source ~ '/stacks/myapp/data/uploads') in (lxc_stack_sync_manifest_plan.prereq_dirs | map(attribute='path') | list)"
          - "(lxc_docker_environment_internal.shared_mount_source ~ '/stacks/myapp/data/cache') not in (lxc_stack_sync_manifest_plan.prereq_dirs | map(attribute='path') | list)"
          - lxc_stack_sync_manifest_plan.ownership_overrides | length == 1
        fail_msg: "Planner output did not capture the expected stack assets and prereq dirs"
