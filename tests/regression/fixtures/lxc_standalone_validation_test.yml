---
- name: Exercise standalone aggregate lifecycle validation
  hosts: lxcs
  connection: local
  gather_facts: false
  tasks:
    - name: Run the production standalone validation seam
      ansible.builtin.include_tasks:
        file: >-
          {{
            [
              inventory_dir,
              '..',
              '..',
              '..',
              'playbooks',
              'tasks',
              'standalone_lifecycle_validation.yml'
            ] | path_join
          }}
