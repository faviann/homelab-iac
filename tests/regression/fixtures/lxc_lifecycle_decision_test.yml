---
# Speed note: target-local compilation and semantic planning use the free
# strategy because every scenario owns isolated observable state. Targeted-set
# planning-barrier behavior is covered separately by the planning-barrier
# fixture, so this matrix can exercise the same internal planning modules with
# an explicitly open barrier.
- name: Exercise semantic lifecycle scenarios through the single-target facade
  hosts: lifecycle_scenarios
  connection: local
  gather_facts: false
  strategy: ansible.builtin.free
  vars: &lifecycle_scenario_vars
    proxmox_lxc:
      state: "{{ lifecycle_desired_state }}"
      hostname: "{{ inventory_hostname }}"
      vmid: "{{ lifecycle_vmid }}"
      node: pve-a
      ostemplate: local:vztmpl/debian-12-standard_12.2-1_amd64.tar.zst
      cores: 1
      memory: 128
      disk: 4
      netif:
        net0: name=eth0,bridge=vmbr0,ip=dhcp
      start_on_create: true
      pubkey: ssh-ed25519 AAAACONTRACT lifecycle@test
    lxc_validation_results: >-
      {{
        {
          inventory_hostname: {
            'status': lifecycle_validation_status | default('ok'),
            'type': 'absent_ok' if lifecycle_runtime_state == 'absent' else 'match_ok',
            'message': lifecycle_validation_message | default('VMID and name match Proxmox state'),
            'runtime_state': lifecycle_runtime_state,
            'actual_release': lifecycle_actual_release,
            'release_probe_state': lifecycle_release_probe_state
          }
        }
      }}
  pre_tasks:
    - name: Validate the isolated observable-state directory
      ansible.builtin.assert:
        that:
          - lifecycle_test_state_dir is defined
          - lifecycle_test_state_dir | length > 0

    - name: Seed the observed runtime state
      ansible.builtin.copy:
        dest: "{{ lifecycle_test_state_dir }}/{{ lifecycle_vmid }}.state"
        content: "{{ lifecycle_runtime_state }}"
        mode: "0600"
      delegate_to: localhost

    - name: Seed the observed guest release
      ansible.builtin.copy:
        dest: "{{ lifecycle_test_state_dir }}/{{ lifecycle_vmid }}.release"
        content: "{{ lifecycle_seed_release }}"
        mode: "0600"
      delegate_to: localhost

    - name: Reset the lifecycle execution-event record
      ansible.builtin.copy:
        dest: "{{ lifecycle_test_state_dir }}/{{ lifecycle_vmid }}.events"
        content: ""
        mode: "0600"
      delegate_to: localhost

    - name: Seed observable known-host state for rebuild cleanup scenarios
      ansible.builtin.lineinfile:
        path: "{{ lookup('env', 'HOME') }}/.ssh/known_hosts"
        line: >-
          {{ inventory_hostname }} ssh-ed25519
          AAAAC3NzaC1lZDI1NTE5AAAAIAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
        create: true
        mode: "0600"
      throttle: 1
      delegate_to: localhost
      when: lifecycle_expected_known_host_cleanup is defined
- name: Initialize semantic lifecycle scenario planning
  hosts: lifecycle_scenarios
  connection: local
  gather_facts: false
  vars: *lifecycle_scenario_vars
  tasks:
    - name: Initialize the target-local planning contract
      ansible.builtin.import_role:
        name: provisioning/proxmox_lxc_lifecycle
        tasks_from: initialize_planning

- name: Compile every semantic lifecycle scenario independently
  hosts: lifecycle_scenarios
  connection: local
  gather_facts: false
  strategy: ansible.builtin.free
  vars: *lifecycle_scenario_vars
  tasks:
    - name: Compile the target-local LXC contract
      ansible.builtin.import_role:
        name: provisioning/proxmox_lxc_lifecycle
        tasks_from: compile_target

- name: Build every semantic lifecycle plan independently
  hosts: lifecycle_scenarios
  connection: local
  gather_facts: false
  strategy: ansible.builtin.free
  vars: *lifecycle_scenario_vars
  tasks:
    - name: Build the target-local semantic lifecycle plan
      ansible.builtin.import_role:
        name: provisioning/proxmox_lxc_lifecycle
        tasks_from: plan_target

- name: Publish semantic lifecycle scenario planning results
  hosts: lifecycle_scenarios
  connection: local
  gather_facts: false
  strategy: ansible.builtin.free
  vars: *lifecycle_scenario_vars
  tasks:
    - name: Publish the semantic plan through the stable result interface
      ansible.builtin.import_role:
        name: provisioning/proxmox_lxc_lifecycle
        tasks_from: publish_planning_result
      vars:
        proxmox_lifecycle_barrier_blocked: false

# Scenario isolation note: every scenario observes and mutates only its own
# per-vmid state files, so this fixture executes scenarios in parallel for
# fast feedback. Production linear execution and fail-fast ordering (ADR 0001)
# are covered by the planning-barrier fixture, which keeps serial: 1.
- name: Execute successful semantic lifecycle scenarios after all planning completes
  hosts: lifecycle_scenarios:!lifecycle_plan_failures
  connection: local
  gather_facts: false
  strategy: ansible.builtin.free
  vars: *lifecycle_scenario_vars
  tasks:
    - name: Execute through the split lifecycle facade
      ansible.builtin.include_role:
        name: provisioning/proxmox_lxc_lifecycle
        tasks_from: execute

- name: Assert semantic lifecycle scenario results
  hosts: lifecycle_scenarios
  connection: local
  gather_facts: false
  strategy: ansible.builtin.free
  vars: *lifecycle_scenario_vars
  tasks:
    - name: Assert the facade published the scenario's semantic result
      ansible.builtin.assert:
        that:
          - lxc_lifecycle_result.plan.container_transition == lifecycle_expected_transition
          - lxc_lifecycle_result.plan.destructive == lifecycle_expected_destructive
          - lxc_lifecycle_result.plan.reconcile_host_config == lifecycle_expected_reconcile_host_config
          - lxc_lifecycle_result.plan.restore_guest_access == lifecycle_expected_restore_guest_access
          - lxc_lifecycle_result.plan.configure_guest == lifecycle_expected_configure_guest
          - lxc_lifecycle_result.plan.start_container == lifecycle_expected_start_container
          - lxc_lifecycle_result.outcome.status == lifecycle_expected_outcome
          - lxc_lifecycle_result.outcome.rebuilt == lifecycle_expected_rebuilt | default(false)
          - lxc_lifecycle_result.observations.before.runtime_state == lifecycle_expected_before_runtime
          - lxc_lifecycle_result.observations.after.runtime_state == lifecycle_expected_after_runtime
          - lxc_lifecycle_result.plan.reason | length > 15
          - lxc_lifecycle_result.keys() | list | sort == ['intent', 'observations', 'outcome', 'plan'] | sort
          - >-
            lxc_lifecycle_result.plan.keys() | list | sort == [
              'configure_guest',
              'container_transition',
              'destructive',
              'reason',
              'reconcile_host_config',
              'restore_guest_access',
              'start_container'
            ] | sort
          - lxc_lifecycle_result.outcome.keys() | list | sort == ['reason', 'rebuilt', 'status'] | sort
          - lxc_lifecycle_result.observations.keys() | list | sort == ['after', 'before'] | sort
          - lxc_lifecycle_result.observations.before.keys() | list | sort == ['release', 'release_probe_state', 'runtime_state'] | sort
          - lxc_lifecycle_result.observations.after.keys() | list | sort == ['release', 'release_probe_state', 'runtime_state'] | sort
          - "'host_actions' not in lxc_lifecycle_result"
          - "'guest_actions' not in lxc_lifecycle_result"
          - "'cache_actions' not in lxc_lifecycle_result"
          - "'internal_snapshot' not in lxc_lifecycle_result"
          - "'compiled_spec' not in lxc_lifecycle_result"
          - "'validation_status' not in lxc_lifecycle_result"
        fail_msg: "Lifecycle facade did not publish the expected result for {{ inventory_hostname }}"
      when: lifecycle_expected_planning_failure is not defined

    - name: Assert the facade rejected the disallowed lifecycle intent
      ansible.builtin.assert:
        that:
          - lxc_lifecycle_result.outcome.status == 'planning_failed'
          - lxc_lifecycle_result.outcome.reason is search(lifecycle_expected_planning_failure)
        fail_msg: >-
          Expected planning failure '{{ lifecycle_expected_planning_failure }}',
          observed '{{ lxc_lifecycle_result.outcome.reason | default('no failure') }}'.
      when: lifecycle_expected_planning_failure is defined

    - name: Assert post-action release observation is current
      ansible.builtin.assert:
        that:
          - lxc_lifecycle_result.observations.after.release == lifecycle_expected_after_release
          - lxc_lifecycle_result.observations.after.release_probe_state == lifecycle_expected_after_probe_state
      when: lifecycle_expected_after_release is defined

    - name: Assert removal reason describes the destructive transition
      ansible.builtin.assert:
        that:
          - lxc_lifecycle_result.plan.reason is search('remove')
          - lxc_lifecycle_result.plan.reason is search('absent')
      when:
        - lifecycle_expected_transition == 'remove'
        - lifecycle_expected_planning_failure is not defined

    - name: Assert no-transition plans never promise removal
      ansible.builtin.assert:
        that:
          - lxc_lifecycle_result.plan.reason is not search('will be removed')
      when:
        - lifecycle_expected_transition == 'none'
        - lifecycle_expected_planning_failure is not defined

    - name: Read the lifecycle execution-event record
      ansible.builtin.slurp:
        src: "{{ lifecycle_test_state_dir }}/{{ lifecycle_vmid }}.events"
      register: lifecycle_execution_event_record
      delegate_to: localhost

    - name: Assert the required and forbidden semantic execution events
      ansible.builtin.assert:
        that:
          - lifecycle_expected_events | difference(lifecycle_execution_events) | length == 0
          - lifecycle_execution_events | difference(lifecycle_expected_events) | length == 0
          - lifecycle_execution_events | unique | length == lifecycle_execution_events | length
        fail_msg: >-
          Expected semantic execution event set {{ lifecycle_expected_events }},
          observed {{ lifecycle_execution_events }}.
      vars:
        lifecycle_execution_events: >-
          {{ (lifecycle_execution_event_record.content | b64decode).splitlines() }}

    - name: Read observable known-host state after lifecycle execution
      ansible.builtin.slurp:
        src: "{{ lookup('env', 'HOME') }}/.ssh/known_hosts"
      register: lifecycle_known_hosts_record
      delegate_to: localhost
      when: lifecycle_expected_known_host_cleanup is defined

    - name: Assert rebuild cleanup follows the executed rebuild outcome
      ansible.builtin.assert:
        that:
          - >-
            (inventory_hostname not in (lifecycle_known_hosts_record.content | b64decode))
            == (lifecycle_expected_known_host_cleanup | bool)
        fail_msg: >-
          Known-host cleanup for {{ inventory_hostname }} did not match the
          executed rebuild outcome.
      when: lifecycle_expected_known_host_cleanup is defined

    - name: Persist a cache-control fact for the cross-command ephemerality check
      ansible.builtin.set_fact:
        lifecycle_cache_control: persisted
        cacheable: true
      when: lifecycle_expected_planning_failure is not defined

- name: Reject stale semantic state when a later run fails during compilation
  hosts: full_create
  connection: local
  gather_facts: false
  vars: *lifecycle_scenario_vars
  tasks:
    - name: Capture the completed first-run semantic state
      ansible.builtin.set_fact:
        lifecycle_first_run_plan: "{{ proxmox_lxc_lifecycle_plan }}"
        lifecycle_first_run_observation: "{{ proxmox_lxc_lifecycle_observation_before }}"
        lifecycle_first_run_result: "{{ lxc_lifecycle_result }}"

    - name: Initialize a second lifecycle run in the same host context
      ansible.builtin.import_role:
        name: provisioning/proxmox_lxc_lifecycle
        tasks_from: initialize_planning

    - name: Fail the second run during target-local compilation
      ansible.builtin.import_role:
        name: provisioning/proxmox_lxc_lifecycle
        tasks_from: compile_target
      vars:
        proxmox_lifecycle_intent: invalid_second_run

    - name: Coordinate the failed second-run planning barrier
      ansible.builtin.import_role:
        name: provisioning/proxmox_lxc_lifecycle
        tasks_from: coordinate_barrier

    - name: Publish the failed second-run semantic result
      ansible.builtin.import_role:
        name: provisioning/proxmox_lxc_lifecycle
        tasks_from: publish_planning_result
      vars:
        proxmox_lifecycle_intent: invalid_second_run

    - name: Assert the failed second run owns fresh semantic state
      ansible.builtin.assert:
        that:
          - lifecycle_first_run_plan | length > 0
          - lifecycle_first_run_observation | length > 0
          - lifecycle_first_run_result.outcome.status == 'configured'
          - proxmox_lxc_lifecycle_plan == {}
          - proxmox_lxc_lifecycle_observation_before == {}
          - lxc_lifecycle_result.intent == 'invalid_second_run'
          - lxc_lifecycle_result.plan == {}
          - lxc_lifecycle_result.outcome.status == 'planning_failed'
          - lxc_lifecycle_result.outcome.reason is search('Invalid proxmox_lifecycle_intent')
          - lxc_lifecycle_result.observations.before == {}
          - lxc_lifecycle_result.observations.after == {}
        fail_msg: >-
          A failed later run reused semantic plan, observation, or result state
          from the completed first run.
