---
- name: Seed a local test host for Hawser Standard pilot checks
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Add fake servarr host
      ansible.builtin.add_host:
        name: servarr
        ansible_connection: local

- name: Verify Hawser Standard pilot rendering and fail-closed validation
  hosts: servarr
  connection: local
  gather_facts: false
  vars:
    current_user: "{{ lookup('pipe', 'id -un') }}"
    current_group: "{{ lookup('pipe', 'id -gn') }}"
    lxc_docker_environment_role_path: "{{ playbook_dir }}/../../../playbooks/roles/config/lxc_docker_environment"
    lxc_docker_environment_internal:
      legacy_managed_stacks: []
      shared_mount_source: "{{ temp_root }}/shared"
      shared_owner: "{{ current_user }}"
      shared_group: "{{ current_group }}"
      docker_agents_stack_dir: "{{ temp_root }}/shared/stacks/docker-agents"
      dockhand_hawser_stacks_source_dir: "{{ temp_root }}/shared/dockhand-stacks"
    docker_agents_enabled: true
    traefik_kop_enabled: false
    dockhand_hawser_enabled: true
    dockhand_hawser_token: "pilot$token"
    dockhand_hawser_stacks_dir: "/conf/docker/dockhand-stacks"
    homepage_docker_proxy_port: 2375
  tasks:
    - name: Create shared mount source root
      ansible.builtin.file:
        path: "{{ lxc_docker_environment_internal.shared_mount_source }}"
        state: directory
        mode: '0755'

    - name: Render managed assets with Hawser Standard enabled
      ansible.builtin.include_tasks: "../../../playbooks/roles/config/lxc_docker_environment/tasks/managed_assets.yml"

    - name: Read rendered Hawser compose file
      ansible.builtin.slurp:
        src: "{{ lxc_docker_environment_internal.docker_agents_stack_dir }}/compose.yml"
      register: hawser_standard_compose

    - name: Read rendered Hawser environment file
      ansible.builtin.slurp:
        src: "{{ lxc_docker_environment_internal.docker_agents_stack_dir }}/.env"
      register: hawser_standard_env

    - name: Assert Hawser Standard compose and env content
      ansible.builtin.assert:
        that:
          - "'2376:2376' in (hawser_standard_compose.content | b64decode)"
          - "'PORT=2376' in (hawser_standard_compose.content | b64decode)"
          - "'BIND_ADDRESS=0.0.0.0' in (hawser_standard_compose.content | b64decode)"
          - "'TOKEN=${TOKEN}' in (hawser_standard_compose.content | b64decode)"
          - "'DOCKER_SOCKET=/var/run/docker.sock' in (hawser_standard_compose.content | b64decode)"
          - "'STACKS_DIR=/conf/docker/dockhand-stacks' in (hawser_standard_compose.content | b64decode)"
          - "'AGENT_NAME=servarr' in (hawser_standard_compose.content | b64decode)"
          - "'LOG_LEVEL=info' in (hawser_standard_compose.content | b64decode)"
          - "'DOCKHAND_SERVER_URL' not in (hawser_standard_compose.content | b64decode)"
          - "(hawser_standard_env.content | b64decode | trim) == 'TOKEN=pilot$$token'"
          - "'DOCKHAND_SERVER_URL' not in (hawser_standard_env.content | b64decode)"
        fail_msg: "Hawser Standard pilot did not render the expected compose and env output"

    - name: Assert missing Hawser token fails closed
      block:
        - name: Re-run managed assets with an empty Hawser token
          ansible.builtin.include_tasks: "../../../playbooks/roles/config/lxc_docker_environment/tasks/managed_assets.yml"
          vars:
            dockhand_hawser_token: ""

        - name: Fail because empty token unexpectedly passed validation
          ansible.builtin.fail:
            msg: "Expected managed_assets.yml to fail when dockhand_hawser_enabled is true and the token is empty"
      rescue:
        - name: Assert failure message mentions the Hawser token requirement
          ansible.builtin.assert:
            that:
              - ansible_failed_result.msg is defined
              - "'dockhand_hawser_token' in ansible_failed_result.msg"
              - "'Hawser Standard' in ansible_failed_result.msg"
            fail_msg: "Unexpected failure when verifying Hawser Standard token guardrail"