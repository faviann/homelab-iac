---
- name: Test overmind migrations use tagged GHCR image and ephemeral admin env
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    overmind_image_repository: ghcr.io/faviann/overmind
    overmind_image_tag: "0.2.1"
    overmind_migration_network: postgres_default
    overmind_mock_verify_schema_fails: false
    overmind_expected_production_migration_log_pattern: >-
      (?m)^ARGS:run --rm --network postgres_default -e MEMSRV_ADMIN_CONNECTION_STRING
      --entrypoint memctl ghcr[.]io/faviann/overmind:0[.]2[.]1 migrate$
    overmind_postgres_bootstrap:
      container_name: overmind-postgres
      admin_user: overmind
      admin_database: overmind
      admin_password: fake-admin-password
      memory_database: memory
      memsrv_role: memsrv
      memsrv_password: "fake-memsrv-password"
  tasks:
    - name: Place mock docker script that records bootstrap and migration calls
      ansible.builtin.copy:
        content: |
          #!/bin/sh
          log="{{ temp_root }}/docker-calls.log"
          state="{{ temp_root }}/state"
          mkdir -p "$state"
          printf 'ARGS:%s\n' "$*" >> "$log"
          if [ -n "${MEMSRV_ADMIN_CONNECTION_STRING:-}" ]; then
            printf 'ENV:MEMSRV_ADMIN_CONNECTION_STRING_PRESENT\n' >> "$log"
            db="$(printf '%s' "$MEMSRV_ADMIN_CONNECTION_STRING" | sed -n 's/.*Database=\([^;]*\).*/\1/p')"
            if [ -n "$db" ]; then
              printf 'ENVDB:%s\n' "$db" >> "$log"
            fi
          fi
          stdin="$(cat)"
          if [ -n "$stdin" ]; then
            printf 'STDIN:%s\n' "$stdin" >> "$log"
          fi

          case "$*" in
            *"pg_isready"*)
              exit 0
              ;;
            *"SELECT 1 FROM pg_database WHERE datname = 'memory'"*)
              if [ -f "$state/database-created" ]; then
                printf '1\n'
              fi
              exit 0
              ;;
            *"createdb"*" memory"*)
              touch "$state/database-created"
              exit 0
              ;;
            *"createdb"*" overmind_verify_"*)
              verify_db="$(printf '%s' "$*" | awk '{print $NF}')"
              printf '%s\n' "$verify_db" > "$state/verify-db"
              touch "$state/verify-db-created"
              exit 0
              ;;
            *"dropdb"*" overmind_verify_"*)
              verify_db="$(cat "$state/verify-db" 2>/dev/null || true)"
              case "$*" in
                *" $verify_db")
                  touch "$state/verify-db-dropped"
                  exit 0
                  ;;
              esac
              exit 1
              ;;
            *"SELECT 1 FROM pg_roles WHERE rolname = 'memsrv'"*)
              if [ -f "$state/role-created" ]; then
                printf '1\n'
              fi
              exit 0
              ;;
            *"-U memsrv -d memory"*"SELECT 1"*)
              if [ -f "$state/role-created" ]; then
                printf '1\n'
                exit 0
              fi
              exit 1
              ;;
            *"run --rm --network postgres_default -e MEMSRV_ADMIN_CONNECTION_STRING --entrypoint memctl {{ overmind_image_repository }}:{{ overmind_image_tag }} migrate")
              if [ ! -f "$state/role-created" ]; then
                exit 1
              fi
              if [ -z "${MEMSRV_ADMIN_CONNECTION_STRING:-}" ]; then
                exit 1
              fi
              db="$(printf '%s' "$MEMSRV_ADMIN_CONNECTION_STRING" | sed -n 's/.*Database=\([^;]*\).*/\1/p')"
              case "$db" in
                memory)
                  if [ ! -f "$state/database-created" ]; then
                    exit 1
                  fi
                  touch "$state/production-migrated"
                  exit 0
                  ;;
                overmind_verify_*)
                  if [ ! -f "$state/verify-db-created" ]; then
                    exit 1
                  fi
                  touch "$state/verify-db-migrated"
                  exit 0
                  ;;
              esac
              exit 1
              ;;
            *"run --rm --network postgres_default -e MEMSRV_ADMIN_CONNECTION_STRING --entrypoint memctl {{ overmind_image_repository }}:{{ overmind_image_tag }} verify-schema")
              if [ ! -f "$state/verify-db-migrated" ]; then
                exit 1
              fi
              db="$(printf '%s' "$MEMSRV_ADMIN_CONNECTION_STRING" | sed -n 's/.*Database=\([^;]*\).*/\1/p')"
              case "$db" in
                overmind_verify_*)
                  touch "$state/verify-db-verified"
                  {% if overmind_mock_verify_schema_fails | bool %}
                  exit 1
                  {% endif %}
                  exit 0
                  ;;
              esac
              exit 0
              ;;
            *"psql"*)
              if printf '%s' "$stdin" | grep -q 'CREATE ROLE memsrv'; then
                touch "$state/role-created"
              fi
              exit 0
              ;;
          esac

          exit 1
        dest: "{{ temp_root }}/docker"
        mode: "0755"

    - name: Run bootstrap and migrations once
      when: not overmind_mock_verify_schema_fails | bool
      environment:
        PATH: "{{ temp_root }}:{{ lookup('env', 'PATH') }}"
      block:
        - name: Include overmind Postgres bootstrap tasks
          ansible.builtin.include_tasks: "../../../playbooks/roles/config/lxc_docker_environment/tasks/overmind_postgres_bootstrap.yml"

        - name: Include overmind migration tasks
          ansible.builtin.include_tasks: "../../../playbooks/roles/config/lxc_docker_environment/tasks/overmind_migrations.yml"

    - name: Run bootstrap and migrations again
      when: not overmind_mock_verify_schema_fails | bool
      environment:
        PATH: "{{ temp_root }}:{{ lookup('env', 'PATH') }}"
      block:
        - name: Include overmind Postgres bootstrap tasks again
          ansible.builtin.include_tasks: "../../../playbooks/roles/config/lxc_docker_environment/tasks/overmind_postgres_bootstrap.yml"

        - name: Include overmind migration tasks again
          ansible.builtin.include_tasks: "../../../playbooks/roles/config/lxc_docker_environment/tasks/overmind_migrations.yml"

    - name: Run migrations with expected disposable verifier failure
      when: overmind_mock_verify_schema_fails | bool
      environment:
        PATH: "{{ temp_root }}:{{ lookup('env', 'PATH') }}"
      block:
        - name: Include overmind Postgres bootstrap tasks before expected failure
          ansible.builtin.include_tasks: "../../../playbooks/roles/config/lxc_docker_environment/tasks/overmind_postgres_bootstrap.yml"

        - name: Include overmind migration tasks with expected failure
          ansible.builtin.include_tasks: "../../../playbooks/roles/config/lxc_docker_environment/tasks/overmind_migrations.yml"
      rescue:
        - name: Mark expected disposable verification failure
          ansible.builtin.set_fact:
            _expected_verify_failure_seen: true

    - name: Slurp docker call log
      ansible.builtin.slurp:
        src: "{{ temp_root }}/docker-calls.log"
      register: _docker_log

    - name: Count migration and bootstrap calls
      ansible.builtin.set_fact:
        _docker_log_text: "{{ _docker_log.content | b64decode }}"
        _migration_calls: >-
          {{
            (_docker_log.content | b64decode)
            | regex_findall(overmind_expected_production_migration_log_pattern | trim)
            | list
            | length
          }}
        _verify_schema_calls: >-
          {{
            (_docker_log.content | b64decode)
            | regex_findall('(?m)^ARGS:.*verify-schema$')
            | list
            | length
          }}
        _migration_env_calls: >-
          {{
            (_docker_log.content | b64decode)
            | regex_findall('(?m)^ENV:MEMSRV_ADMIN_CONNECTION_STRING_PRESENT$')
            | list
            | length
          }}
        _verify_db_createdb_calls: >-
          {{
            (_docker_log.content | b64decode)
            | regex_findall('(?m)^ARGS:exec .* createdb .* overmind_verify_.*$')
            | list
            | length
          }}
        _verify_db_dropdb_calls: >-
          {{
            (_docker_log.content | b64decode)
            | regex_findall('(?m)^ARGS:exec .* dropdb .* overmind_verify_.*$')
            | list
            | length
          }}
        _verify_db_env_calls: >-
          {{
            (_docker_log.content | b64decode)
            | regex_findall('(?m)^ENVDB:overmind_verify_.*$')
            | list
            | length
          }}
        _production_db_env_calls: >-
          {{
            (_docker_log.content | b64decode)
            | regex_findall('(?m)^ENVDB:memory$')
            | list
            | length
          }}
        _createdb_calls: >-
          {{
            (_docker_log.content | b64decode).split('\n')
            | select('search', 'ARGS:exec .* createdb .* memory')
            | list
            | length
          }}
        _create_role_calls: >-
          {{
            (_docker_log.content | b64decode).split('\n')
            | select('search', 'STDIN:CREATE ROLE memsrv')
            | list
            | length
          }}

    - name: Assert migrations use the immutable image tag and do not persist admin env
      when: not overmind_mock_verify_schema_fails | bool
      ansible.builtin.assert:
        that:
          - _migration_calls | int == 4
          - _verify_schema_calls | int == 2
          - _migration_env_calls | int == 6
          - _verify_db_createdb_calls | int == 2
          - _verify_db_dropdb_calls | int == 2
          - _verify_db_env_calls | int == 4
          - _production_db_env_calls | int == 2
          - _createdb_calls | int == 1
          - _create_role_calls | int == 1
          - "'ghcr.io/faviann/overmind:0.2.1' in _docker_log_text"
          - "'ghcr.io/faviann/overmind:latest' not in _docker_log_text"
          - "'fake-admin-password' not in _docker_log_text"
          - "'postgresql://overmind' not in _docker_log_text"
          - "'CREATE TABLE' not in _docker_log_text"
          - "'ALTER TABLE schemaversions' not in _docker_log_text"
        fail_msg: "Unexpected overmind migration docker log: {{ _docker_log_text }}"

    - name: Assert disposable verification failure cleans up and skips production
      when: overmind_mock_verify_schema_fails | bool
      ansible.builtin.assert:
        that:
          - _expected_verify_failure_seen | default(false) | bool
          - _migration_calls | int == 1
          - _verify_schema_calls | int == 1
          - _migration_env_calls | int == 2
          - _verify_db_createdb_calls | int == 1
          - _verify_db_dropdb_calls | int == 1
          - _verify_db_env_calls | int == 2
          - _production_db_env_calls | int == 0
          - "'ghcr.io/faviann/overmind:0.2.1' in _docker_log_text"
          - "'fake-admin-password' not in _docker_log_text"
        fail_msg: "Unexpected overmind verifier failure docker log: {{ _docker_log_text }}"
