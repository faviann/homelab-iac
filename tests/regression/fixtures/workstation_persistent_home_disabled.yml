---
- name: Test workstation persistent home disabled path
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    workstation_username: "{{ lookup('pipe', 'id -un') }}"
    workstation_uid: "{{ lookup('pipe', 'id -u') | int }}"
    workstation_gid: "{{ lookup('pipe', 'id -g') | int }}"
    workstation_home: "{{ temp_root }}/home/{{ workstation_username }}"
    workstation_aoe_proxy_firewall_nft_dir: "{{ temp_root }}/etc/nftables.d"
    workstation_aoe_proxy_firewall_service_path: "{{ temp_root }}/etc/systemd/system/workstation-aoe-proxy-firewall.service"
    workstation_autosync_bin_path: "{{ temp_root }}/bin/workstation-autosync"
    workstation_packages: []
    workstation_locale_enabled: false
    workstation_persistent_home_enabled: false
    workstation_nix_install_enabled: false
    workstation_enable_linger: false
    workstation_persistent_home_root: "{{ temp_root }}/ephemeral/workstation/home"
    workstation_persistent_home_mount_state: present
    workstation_persistent_home_fstab_path: "{{ temp_root }}/fstab"
    workstation_bw_bin_path: "{{ temp_root }}/bin/bw"
    workstation_setup_bin_path: "{{ temp_root }}/bin/workstation-setup"
    workstation_setup_profile_hook_path: "{{ temp_root }}/etc/profile.d/workstation-setup.sh"
    workstation_system_bin_owner: "{{ lookup('pipe', 'id -un') }}"
    workstation_system_bin_group: "{{ lookup('pipe', 'id -gn') }}"
    workstation_persistent_home_links:
      - name: claude
        type: bind_mount
        path: "{{ workstation_home }}/.claude"
        target: "{{ workstation_persistent_home_root }}/.claude"
        mode: "0700"
      - name: codex
        type: bind_mount
        path: "{{ workstation_home }}/.codex"
        target: "{{ workstation_persistent_home_root }}/.codex"
        mode: "0700"
      - name: pi
        type: bind_mount
        path: "{{ workstation_home }}/.pi"
        target: "{{ workstation_persistent_home_root }}/.pi"
        mode: "0700"
      - name: agent_of_empires
        type: bind_mount
        path: "{{ workstation_home }}/.config/agent-of-empires"
        target: "{{ workstation_persistent_home_root }}/.config/agent-of-empires"
        mode: "0700"
      - name: hermes
        type: bind_mount
        path: "{{ workstation_home }}/.hermes"
        target: "{{ workstation_persistent_home_root }}/.hermes"
        mode: "0700"
      - name: openclaw
        type: bind_mount
        path: "{{ workstation_home }}/.openclaw"
        target: "{{ workstation_persistent_home_root }}/.openclaw"
        mode: "0700"
      - name: repos
        type: bind_mount
        path: "{{ workstation_home }}/repos"
        target: "{{ workstation_persistent_home_root }}/repos"
        mode: "0755"
    lxc_ssh_user: "{{ workstation_username }}"
    lxc_ssh_uid: "{{ lookup('pipe', 'id -u') | int }}"
    lxc_ssh_gid: "{{ lookup('pipe', 'id -g') | int }}"
    lxc_github_keys_home: "{{ workstation_home }}"
    lxc_github_users:
      - faviann
    docker_user: "{{ workstation_username }}"
    docker_uid: "{{ lookup('pipe', 'id -u') | int }}"
    docker_gid: "{{ lookup('pipe', 'id -g') | int }}"
  tasks:
    - name: Ensure writable test directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ temp_root }}/bin"
        - "{{ temp_root }}/etc/profile.d"

    - name: Place mock curl on PATH
      ansible.builtin.copy:
        dest: "{{ temp_root }}/curl"
        mode: "0755"
        content: |
          #!/bin/sh
          case "$*" in
            *faviann.keys*)
              printf '%s\n' 'ssh-ed25519 AAAATESTKEYONE faviann@laptop'
              ;;
            *get.chezmoi.io*)
              printf '%s\n' '#!/bin/sh' 'exit 0'
              ;;
            *)
              exit 0
              ;;
          esac

    - name: Ensure workstation home exists
      ansible.builtin.file:
        path: "{{ workstation_home }}"
        state: directory
        mode: "0755"

    - name: Include workstation baseline role with PATH mocks
      block:
        - ansible.builtin.include_role:
            name: config/lxc_workstation_baseline
      environment:
        PATH: "{{ temp_root }}:{{ lookup('env', 'PATH') }}"

    - name: Stat persistent home root
      ansible.builtin.stat:
        path: "{{ temp_root }}/ephemeral/workstation/home"
      register: persistent_home_root_stat

    - name: Stat Claude home path
      ansible.builtin.stat:
        path: "{{ workstation_home }}/.claude"
      register: claude_home_stat

    - name: Stat Codex home path
      ansible.builtin.stat:
        path: "{{ workstation_home }}/.codex"
      register: codex_home_stat

    - name: Stat Pi home path
      ansible.builtin.stat:
        path: "{{ workstation_home }}/.pi"
      register: pi_home_stat

    - name: Stat repos home path
      ansible.builtin.stat:
        path: "{{ workstation_home }}/repos"
      register: repos_home_stat

    - name: Stat AoE home path
      ansible.builtin.stat:
        path: "{{ workstation_home }}/.config/agent-of-empires"
      register: aoe_home_stat

    - name: Stat Hermes home path
      ansible.builtin.stat:
        path: "{{ workstation_home }}/.hermes"
      register: hermes_home_stat

    - name: Assert workstation persistent home was skipped
      ansible.builtin.assert:
        that:
          - not persistent_home_root_stat.stat.exists
          - not claude_home_stat.stat.exists
          - not codex_home_stat.stat.exists
          - not pi_home_stat.stat.exists
          - not aoe_home_stat.stat.exists
          - not hermes_home_stat.stat.exists
          - not repos_home_stat.stat.exists
        fail_msg: "Disabled workstation persistent home should not create directories or links"
