---
- name: Test workstation persistent home disabled path
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    workstation_username: "{{ lookup('pipe', 'id -un') }}"
    workstation_uid: "{{ lookup('pipe', 'id -u') | int }}"
    workstation_gid: "{{ lookup('pipe', 'id -g') | int }}"
    workstation_home: "{{ temp_root }}/home/{{ workstation_username }}"
    workstation_packages: []
    workstation_persistent_home_enabled: false
    workstation_persistent_home_root: "{{ temp_root }}/ephemeral/workstation/home"
    workstation_bw_bin_path: "{{ temp_root }}/bin/bw"
    workstation_bootstrap_bin_path: "{{ temp_root }}/bin/workstation-bootstrap"
    workstation_system_bin_owner: "{{ lookup('pipe', 'id -un') }}"
    workstation_system_bin_group: "{{ lookup('pipe', 'id -gn') }}"
    workstation_persistent_home_links:
      - name: claude
        path: "{{ workstation_home }}/.claude"
        target: "{{ workstation_persistent_home_root }}/.claude"
        mode: "0700"
      - name: codex
        path: "{{ workstation_home }}/.codex"
        target: "{{ workstation_persistent_home_root }}/.codex"
        mode: "0700"
      - name: repos
        path: "{{ workstation_home }}/repos"
        target: "{{ workstation_persistent_home_root }}/repos"
        mode: "0755"
    lxc_ssh_user: "{{ workstation_username }}"
    lxc_ssh_uid: "{{ lookup('pipe', 'id -u') | int }}"
    lxc_ssh_gid: "{{ lookup('pipe', 'id -g') | int }}"
    lxc_github_keys_home: "{{ workstation_home }}"
    lxc_github_users:
      - faviann
    docker_user: "{{ workstation_username }}"
    docker_uid: "{{ lookup('pipe', 'id -u') | int }}"
    docker_gid: "{{ lookup('pipe', 'id -g') | int }}"
  tasks:
    - name: Ensure writable test bin directory exists
      ansible.builtin.file:
        path: "{{ temp_root }}/bin"
        state: directory
        mode: "0755"

    - name: Place mock curl on PATH
      ansible.builtin.copy:
        dest: "{{ temp_root }}/curl"
        mode: "0755"
        content: |
          #!/bin/sh
          case "$*" in
            *faviann.keys*)
              printf '%s\n' 'ssh-ed25519 AAAATESTKEYONE faviann@laptop'
              ;;
            *get.chezmoi.io*)
              printf '%s\n' '#!/bin/sh' 'exit 0'
              ;;
            *mise.run*)
              printf '%s\n' \
                '#!/bin/sh' \
                'set -eu' \
                'install -d "$HOME/.local/bin"' \
                'cat > "$HOME/.local/bin/mise" <<"EOF"' \
                '#!/bin/sh' \
                'if [ "$1" = "--version" ]; then' \
                '  echo mise-test' \
                '  exit 0' \
                'fi' \
                'exit 0' \
                'EOF' \
                'chmod 0755 "$HOME/.local/bin/mise"'
              ;;
            *)
              exit 0
              ;;
          esac

    - name: Ensure workstation home exists
      ansible.builtin.file:
        path: "{{ workstation_home }}"
        state: directory
        mode: "0755"

    - name: Include workstation baseline role with PATH mocks
      block:
        - ansible.builtin.include_role:
            name: config/lxc_workstation_baseline
      environment:
        PATH: "{{ temp_root }}:{{ lookup('env', 'PATH') }}"

    - name: Stat persistent home root
      ansible.builtin.stat:
        path: "{{ temp_root }}/ephemeral/workstation/home"
      register: persistent_home_root_stat

    - name: Stat Claude home path
      ansible.builtin.stat:
        path: "{{ workstation_home }}/.claude"
      register: claude_home_stat

    - name: Stat Codex home path
      ansible.builtin.stat:
        path: "{{ workstation_home }}/.codex"
      register: codex_home_stat

    - name: Stat repos home path
      ansible.builtin.stat:
        path: "{{ workstation_home }}/repos"
      register: repos_home_stat

    - name: Assert workstation persistent home was skipped
      ansible.builtin.assert:
        that:
          - not persistent_home_root_stat.stat.exists
          - not claude_home_stat.stat.exists
          - not codex_home_stat.stat.exists
          - not repos_home_stat.stat.exists
        fail_msg: "Disabled workstation persistent home should not create directories or links"
