---
- name: Test lxc_github_keys multi-user deduplication
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    lxc_ssh_user: faviann
    lxc_ssh_uid: "{{ lookup('pipe', 'id -u') | int }}"
    lxc_ssh_gid: "{{ lookup('pipe', 'id -g') | int }}"
    lxc_github_keys_home: "{{ temp_root }}/home/faviann"
    lxc_github_users:
      - faviann
      - aperture
  tasks:
    - name: Place mock curl on PATH
      ansible.builtin.copy:
        dest: "{{ temp_root }}/curl"
        mode: "0755"
        content: |
          #!/bin/sh
          url=""
          for arg in "$@"; do
            case "$arg" in
              http://*|https://*)
                url="$arg"
                ;;
            esac
          done
          case "$url" in
            *faviann.keys)
              printf '%s\n' \
                'ssh-ed25519 AAAATESTKEYONE faviann@laptop' \
                'ssh-ed25519 AAAATESTKEYONE faviann@laptop'
              ;;
            *aperture.keys)
              printf '%s\n' \
                'ssh-ed25519 AAAATESTKEYTWO faviann@phone'
              ;;
            *)
              echo "unexpected curl url: $url" >&2
              exit 1
              ;;
          esac

    - name: Include lxc_github_keys role with mock curl on PATH
      environment:
        PATH: "{{ temp_root }}:{{ lookup('env', 'PATH') }}"
      block:
        - name: Include lxc_github_keys role
          ansible.builtin.include_role:
            name: config/lxc_github_keys
    - name: Read authorized_keys
      ansible.builtin.slurp:
        src: "{{ lxc_github_keys_home }}/.ssh/authorized_keys"
      register: authorized_keys_content

    - name: Assert lxc_github_keys deduplicated keys across multiple users
      ansible.builtin.assert:
        that:
          - (authorized_keys_content.content | b64decode) == "ssh-ed25519 AAAATESTKEYONE faviann@laptop\nssh-ed25519 AAAATESTKEYTWO
            faviann@phone\n"
        fail_msg: "lxc_github_keys did not correctly deduplicate keys across multiple users"
