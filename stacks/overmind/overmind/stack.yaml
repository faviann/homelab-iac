---
schema_version: 1
kind: stack
name: overmind
description: Complete Overmind HTTP MCP application
portability:
  tier: host-bound-app
  owner: stack
runtime:
  host_requirements:
    external_networks: []
    host_directories:
      - /data/overmind/postgres/pgdata
      - /tank/overmind
      - /tank/backups/overmind
    ownership_overrides:
      - /data/overmind/postgres/pgdata
    bind_mounts:
      - /tank/overmind,mp=/data/overmind
      - /tank/backups/overmind,mp=/backups/overmind
exposure:
  traefik: none
  homepage_instances: []
