services:
  sabnzbd:
    container_name: sabnzbd
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Montreal
    image: lscr.io/linuxserver/sabnzbd:latest
    restart: unless-stopped
    ports:
      - $SABNZBD_PORT:8080 # sabnzbd
    volumes:
      - ./appdata/sabnzbd:/config
      - /data:/data #optional
      - /ephemeral/sabnzbd:/ephemeral #optional
networks: {}
