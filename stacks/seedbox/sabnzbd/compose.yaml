x-prereq-dirs:
  - ./appdata/sabnzbd
  - /ephemeral/sabnzbd

services:
  sabnzbd:
    container_name: sabnzbd
    labels:
      traefik.enable: true
      homepage.instance.admin.group: Downloads
      homepage.instance.admin.name: SABnzbd
      homepage.instance.admin.href: https://${HOMEPAGE_FQDN}
      homepage.instance.admin.description: Usenet client
      homepage.instance.admin.icon: sabnzbd
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=America/Montreal
    image: lscr.io/linuxserver/sabnzbd:latest
    restart: unless-stopped
    ports:
      - $SABNZBD_PORT:8080 # sabnzbd
    volumes:
      - ./appdata/sabnzbd:/config
      - /data:/data #optional
      - /ephemeral/sabnzbd:/ephemeral #optional
networks: {}
