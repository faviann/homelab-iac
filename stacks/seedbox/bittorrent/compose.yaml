---
x-prereq-dirs:
  - ./appdata/gluetun
  - ./appdata/qbittorrent

services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - $SPEEDTEST_PORT:3000
      - $QBIT_WEBUI_PORT:$QBIT_WEBUI_PORT
    volumes:
      - ./appdata/gluetun:/gluetun
      - /lib/modules:/lib/modules:ro
    environment:
      - VPN_SERVICE_PROVIDER=windscribe
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - WIREGUARD_PRESHARED_KEY=${WIREGUARD_PRESHARED_KEY}
      - WIREGUARD_ENDPOINT_PORT=443
      - SERVER_HOSTNAMES=us-east-116.whiskergalaxy.com,us-east-120.whiskergalaxy.com
      - FIREWALL_VPN_INPUT_PORTS=${WS_LAST_PORT:-10412}
      - HEALTH_VPN_DURATION_INITIAL=120s
    healthcheck:
      test: ping -c 1 www.google.com || exit 1
      interval: 60s
      timeout: 20s
      retries: 5
    restart: unless-stopped
    labels:
      traefik.enable: true
      traefik.http.services.gluetun.loadbalancer.server.port: $QBIT_WEBUI_PORT
      homepage.instance.admin.group: Downloads
      homepage.instance.admin.name: qBittorrent
      homepage.instance.admin.href: https://${HOMEPAGE_FQDN}
      homepage.instance.admin.description: Torrent client
      homepage.instance.admin.icon: qbittorrent
  deunhealth:
    image: qmcgaw/deunhealth
    container_name: deunhealth
    network_mode: none
    environment:
      - LOG_LEVEL=info
      - HEALTH_SERVER_ADDRESS=127.0.0.1:9999
      - TZ=$TZ
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.1.4
    container_name: qbittorrent
    restart: unless-stopped
    labels:
      deunhealth.restart.on.unhealthy: true
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - WEBUI_PORT=$QBIT_WEBUI_PORT
      - TORRENTING_PORT=${WS_LAST_PORT:-10412}
    volumes:
      - ./appdata/qbittorrent:/config
      - /data:/data
      - /ephemeral:/downloads
    network_mode: service:gluetun
    healthcheck:
      test: ping -c 1 www.google.com || exit 1
      interval: 60s
      retries: 3
      start_period: 20s
      timeout: 10s
  #
  ws-ephemeral:
    container_name: ws-ephemeral
    image: ghcr.io/faviann/ws-ephemeral:latest
    network_mode: service:gluetun
    environment:
      # === Windscribe session cookie ===
      - WS_SESSION_COOKIE=${WS_SESSION_COOKIE}
      - WS_DEBUG=False
      - TZ=${TZ:-UTC}

      - QBIT_HOST=127.0.0.1
      - QBIT_PORT=$QBIT_WEBUI_PORT
      - QBIT_USERNAME=$QBIT_USERNAME
      - QBIT_PASSWORD=$QBIT_PASSWORD
      - QBIT_PRIVATE_TRACKER=true

      # === Gluetun settings ===
      - GLUETUN_HOST=127.0.0.1
      - GLUETUN_PORT=8000
      - GLUETUN_AUTH_TYPE=none

      - DAYS=6
      - TIME=05:00
      - ONESHOT=false
      - REQUEST_TIMEOUT=10
    depends_on:
      - gluetun
      - qbittorrent
    restart: unless-stopped
networks: {}
