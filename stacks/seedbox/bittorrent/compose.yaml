services:
  gluetun:
    image: qmcgaw/gluetun
    hostname: gluetunn
    container_name: gluetun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE #to Enable modprob of the Wireguard module
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - $SPEEDTEST_PORT:3000
      - $QBIT_WEBUI_PORT:$QBIT_WEBUI_PORT # qbittorrent web interface
    volumes:
      - ./appdata/gluetun:/gluetun
      - /lib/modules:/lib/modules:ro #I think it helps loading the wg kernel module
    environment:
      - VPN_SERVICE_PROVIDER=windscribe
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - WIREGUARD_PRESHARED_KEY=${WIREGUARD_PRESHARED_KEY}
      - WIREGUARD_ENDPOINT_PORT=443
      - SERVER_HOSTNAMES=us-east-116.whiskergalaxy.com,us-east-120.whiskergalaxy.com
      - FIREWALL_VPN_INPUT_PORTS=${WS_LAST_PORT:-10412}
      - HEALTH_VPN_DURATION_INITIAL=120s
    healthcheck:
      test: ping -c 1 www.google.com || exit 1
      interval: 60s
      timeout: 20s
      retries: 5
    restart: unless-stopped
  #
  # This is a new addition since creating the tutorial video on this stack. 
  # See the 'qBittorrent Stalls with VPN Timeout' section for more information.
  deunhealth:
    image: qmcgaw/deunhealth
    container_name: deunhealth
    network_mode: none
    environment:
      - LOG_LEVEL=info
      - HEALTH_SERVER_ADDRESS=127.0.0.1:9999
      - TZ=$TZ
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
  #
  # Healthcheck was added to work with deunhealth to restart container
  # on unhealthy status. labels allows deunhealth to monitor.
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    labels:
      deunhealth.restart.on.unhealthy: true
      homepage.group: Downloads
      homepage.name: qBittorrent
      homepage.href: https://${HOMEPAGE_FQDN}
      homepage.description: Torrent client
      homepage.icon: qbittorrent
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - WEBUI_PORT=$QBIT_WEBUI_PORT
      - TORRENTING_PORT=${WS_LAST_PORT:-10412}
    volumes:
      - ./appdata/qbittorrent:/config
      - /data:/data
      - /ephemeral/qbittorrent:/ephemeral
    network_mode: service:gluetun
    healthcheck:
      test: ping -c 1 www.google.com || exit 1
      interval: 60s
      retries: 3
      start_period: 20s
      timeout: 10s
  #
  ws-ephemeral:
    container_name: ws-ephemeral
    image: ghcr.io/jelliedpizza/ws-ephemeral:latest
    network_mode: service:gluetun
    environment:
      # === Windscribe session cookie ===
      - WS_SESSION_COOKIE=${WS_SESSION_COOKIE}
      - WS_DEBUG=False
      - TZ=${TZ:-UTC}

      # === qBittorrent settings ===
      - QBIT_HOST=$QBIT_HOST
      - QBIT_PORT=$QBIT_WEBUI_PORT
      - QBIT_USERNAME=$QBIT_USERNAME # qBittorrent web UI username
      - QBIT_PASSWORD=$QBIT_PASSWORD # qBittorrent web UI password
      - QBIT_PRIVATE_TRACKER=true # Disable DHT/PeX/LSD for private trackers

      # === Gluetun settings ===
      - GLUETUN_HOST=localhost # Gluetun container hostname
      - GLUETUN_PORT=8000 # Gluetun control server port
      - GLUETUN_AUTH_TYPE=none  # Gluetun type -> none, basic, or apikey

      # === Schedule settings ===
      - DAYS=6 # Run every N days
      - TIME=05:00 # Time of day to run (HH:MM)
      - ONESHOT=false # Set to true to run once and exit
      - REQUEST_TIMEOUT=10 # HTTP request timeout in seconds
    depends_on:
      - gluetun
      - qbittorrent
    restart: unless-stopped
networks: {}
