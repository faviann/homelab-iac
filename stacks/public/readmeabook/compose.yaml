services:
  readmeabook:
    image: ghcr.io/kikootwo/readmeabook:1.1.7
    container_name: readmeabook
    restart: unless-stopped
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      UMASK: ${UMASK}
      LOG_LEVEL: ${LOG_LEVEL}
      PUBLIC_URL: https://${HOMEPAGE_FQDN}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DISABLE_LOCAL_LOGIN: ${DISABLE_LOCAL_LOGIN}
    volumes:
      - ./appdata/config:/app/config
      - /ephemeral/readmeabook/cache:/app/cache
      - /data/downloads/readmeabook:/downloads
      - /data/media/audiobooks:/media
      - ./appdata/pgdata:/var/lib/postgresql/data
      - ./appdata/redis:/var/lib/redis
    ports:
      - "3030:3030"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3030/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
