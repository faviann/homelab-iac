x-prereq-dirs:
  - ./appdata/sonarr-anime

services:
  # TODO: After first boot, register /data/media/tv/anime as a root folder in the Sonarr Anime web UI.
  sonarr-anime:
    image: lscr.io/linuxserver/sonarr:4.0.17
    container_name: sonarr-anime
    hostname: sonarr-anime
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./appdata/sonarr-anime:/config
      - /data:/data
    ports:
      - 8990:8989
    labels:
      traefik.enable: true
      traefik.http.routers.sonarr-anime.middlewares: protected-edge-auth@file
      traefik.http.services.sonarr-anime.loadbalancer.server.port: 8990
      homepage.instance.admin.group: Arr
      homepage.instance.admin.name: Sonarr Anime
      homepage.instance.admin.href: https://${HOMEPAGE_FQDN}
      homepage.instance.admin.description: Anime series management
      homepage.instance.admin.icon: sonarr
    networks:
      - servarr-internal

networks:
  servarr-internal:
    name: servarr-internal
    external: true