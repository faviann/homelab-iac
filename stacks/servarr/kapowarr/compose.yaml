---
x-prereq-dirs:
  - ./appdata/db
  - /ephemeral/kapowarr/downloads

services:
  kapowarr:
    image: mrcas/kapowarr:v1.3.1
    container_name: kapowarr
    restart: unless-stopped
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - ./appdata/db:/app/db
      - /ephemeral/kapowarr/downloads:/app/temp_downloads
      - /data:/data
    ports:
      - 5656:5656
    labels:
      traefik.enable: true
      traefik.http.routers.kapowarr.middlewares: protected-edge-auth@file
      homepage.instance.admin.group: Arr
      homepage.instance.admin.name: Kapowarr
      homepage.instance.admin.href: https://${HOMEPAGE_FQDN}
      homepage.instance.admin.description: Comic library management
      homepage.instance.admin.icon: kapowarr
    networks:
      - shared

networks:
  shared:
    name: shared
    external: true
