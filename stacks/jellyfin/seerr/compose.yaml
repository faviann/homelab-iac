x-prereq-dirs:
  - ./appdata/seerr/config

services:
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    init: true
    restart: unless-stopped
    user: ${PUID}:${PGID}
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - PORT=${PORT}
    ports:
      - 5055:5055
    volumes:
      - ./appdata/seerr/config:/app/config
    labels:
      - traefik.enable=true
      - traefik.http.routers.seerr.middlewares=protected-edge-auth@file
      - homepage.group=Media
      - homepage.name=${COMPOSE_PROJECT_NAME}
      - homepage.icon=overseerr
      - homepage.href=https://${HOMEPAGE_FQDN}
      - homepage.description=Media request manager
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
