---
x-prereq-dirs:
  - ./appdata/data

networks:
  shared:
    external: true

services:
  dockhand:
    image: fnsys/dockhand:v1.0.25
    container_name: dockhand
    restart: unless-stopped
    user: "0:0"
    ports:
      - "127.0.0.1:3004:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./appdata/data:/app/data
    environment:
      TZ: ${TZ}
      PUID: ${PUID}
      PGID: ${PGID}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      DISABLE_LOCAL_LOGIN: "true"
    networks:
      - shared
    labels:
      traefik.enable: true
      traefik.domain: admin.faviann.com
      homepage.instance.admin.group: Operations
      homepage.instance.admin.name: Dockhand
      homepage.instance.admin.href: https://${HOMEPAGE_FQDN}
      homepage.instance.admin.description: Multi-host Docker control plane
      homepage.instance.admin.icon: mdi-docker
