networks:
  proxy:
    name: proxy
    external: true

services:
  homepage-media:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage-media
    ports:
      - 3001:3000
    volumes:
      - ./appdata/homepage/config:/app/config
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - HOMEPAGE_INSTANCE_NAME=media
      - HOMEPAGE_ALLOWED_HOSTS=localhost:3001,127.0.0.1:3001,[::1]:3001,portal.faviann.vms:3001,media.faviann.com
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.homepage-media.rule=Host(`media.faviann.com`)
      - traefik.http.routers.homepage-media.middlewares=forwardAuth-authentik@file
      - traefik.http.services.homepage-media.loadbalancer.server.port=3000
