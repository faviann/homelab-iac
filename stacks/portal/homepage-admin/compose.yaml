networks:
  proxy:
    name: proxy
    external: true

services:
  homepage-admin:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage-admin
    ports:
      - 3003:3000
    volumes:
      - ./appdata/homepage/config:/app/config
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - HOMEPAGE_INSTANCE_NAME=admin
      - HOMEPAGE_ALLOWED_HOSTS=localhost:3003,127.0.0.1:3003,[::1]:3003,portal.faviann.vms:3003,admin.faviann.com
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.homepage-admin.rule=Host(`admin.faviann.com`)
