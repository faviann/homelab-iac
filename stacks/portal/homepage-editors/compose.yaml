networks:
  proxy:
    name: proxy
    external: true

services:
  homepage-editors:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage-editors
    ports:
      - 3002:3000
    volumes:
      - ./appdata/homepage/config:/app/config
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - HOMEPAGE_INSTANCE_NAME=editors
      - HOMEPAGE_ALLOWED_HOSTS=localhost:3002,127.0.0.1:3002,[::1]:3002,portal.faviann.vms:3002,home.faviann.com
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.homepage-editors.rule=Host(`home.faviann.com`)
