---
http:
  routers:

# --- SPECIFIC ROUTERS ---

    traefik:
      rule: "Host(`traefik.local.faviann.com`)"
      entryPoints: websecure
      service: api@internal
      priority: 1000
      middlewares:
        - forwardAuth-authentik
        - local-ip-restriction

    proxmox:
      rule: "Host(`proxmox.local.faviann.com`)"
      entryPoints: websecure
      service: proxmoxve
      priority: 1000
      middlewares:
        - forwardAuth-authentik
        - sslheader
        - local-ip-restriction

    # Authentik itself must NOT go through forwardAuth — it is the auth server.
    authentik:
      rule: "Host(`auth.faviann.com`)"
      entryPoints: websecure
      service: authentik
      priority: 1000
      middlewares:
        - sslheader

    # Authentik outpost callback routers — one per tier domain + root.
    # These handle /outpost.goauthentik.io/* paths (auth callbacks) and must
    # NOT have forwardAuth, otherwise the callback itself triggers a loop.
    authentik-outpost-root:
      rule: "Host(`faviann.com`) && PathPrefix(`/outpost.goauthentik.io`)"
      entryPoints: websecure
      service: authentik
      priority: 1001
      middlewares:
        - sslheader

    authentik-outpost-admin:
      rule: "Host(`admin.faviann.com`) && PathPrefix(`/outpost.goauthentik.io`)"
      entryPoints: websecure
      service: authentik
      priority: 1001
      middlewares:
        - sslheader

    authentik-outpost-home:
      rule: "Host(`home.faviann.com`) && PathPrefix(`/outpost.goauthentik.io`)"
      entryPoints: websecure
      service: authentik
      priority: 1001
      middlewares:
        - sslheader

    authentik-outpost-media:
      rule: "Host(`media.faviann.com`) && PathPrefix(`/outpost.goauthentik.io`)"
      entryPoints: websecure
      service: authentik
      priority: 1001
      middlewares:
        - sslheader

    dockge:
      rule: "Host(`dockge.local.faviann.com`)"
      entryPoints: websecure
      service: dockge
      priority: 1000
      middlewares:
        - forwardAuth-authentik
        - local-ip-restriction

  services:
    proxmoxve:
      loadBalancer:
        servers:
          - url: "https://proxmox.lan:8006"
    authentik:
      loadBalancer:
        servers:
          - url: "http://auth.faviann.vms:9000"
    dockge:
      loadBalancer:
        servers:
          - url: "http://frontend.faviann.vms:5001"
    noop:
      loadBalancer:
        servers: []

  middlewares:
    sslheader:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: "https"
    local-ip-restriction:
      IPAllowList:
        sourceRange:
          - "127.0.0.1/32"
          - "10.1.0.1/18"
          - "10.0.0.1/24"
          - "10.200.196.1/24"
