---
http:
  routers:

# --- SPECIFIC ROUTERS ---

    traefik:
      rule: "Host(`traefik.local.faviann.com`)"
      entryPoints: websecure
      service: api@internal
      priority: 1000
      middlewares:
        - local-ip-restriction

    proxmox:
      rule: "Host(`proxmox.local.faviann.com`)"
      entryPoints: websecure
      service: proxmoxve
      priority: 1000
      middlewares:
        - sslheader
        - local-ip-restriction

    # Authentik itself stays edge-open at Traefik so it can handle its own login
    # and callback flows without being wrapped by Traefik forwardAuth.
    authentik:
      rule: "Host(`auth.faviann.com`)"
      entryPoints: websecure
      service: authentik
      priority: 1000
      middlewares:
        - sslheader

    # Authentik outpost callback routers for the protected tiers that still use
    # edge forwardAuth. Public hosts do not use outpost callbacks by default.
    authentik-outpost-root:
      rule: "Host(`faviann.com`) && PathPrefix(`/outpost.goauthentik.io`)"
      entryPoints: websecure
      service: authentik
      priority: 1001
      middlewares:
        - sslheader

    authentik-outpost-admin:
      rule: "Host(`admin.faviann.com`) && PathPrefix(`/outpost.goauthentik.io`)"
      entryPoints: websecure
      service: authentik
      priority: 1001
      middlewares:
        - sslheader

    authentik-outpost-admin-subdomains:
      rule: "HostRegexp(`^[a-z0-9-]+\\.admin\\.faviann\\.com$`) && PathPrefix(`/outpost.goauthentik.io`)"
      entryPoints: websecure
      service: authentik
      priority: 1001
      middlewares:
        - sslheader

    authentik-outpost-home:
      rule: "Host(`home.faviann.com`) && PathPrefix(`/outpost.goauthentik.io`)"
      entryPoints: websecure
      service: authentik
      priority: 1001
      middlewares:
        - sslheader

    authentik-outpost-home-subdomains:
      rule: "HostRegexp(`^[a-z0-9-]+\\.home\\.faviann\\.com$`) && PathPrefix(`/outpost.goauthentik.io`)"
      entryPoints: websecure
      service: authentik
      priority: 1001
      middlewares:
        - sslheader

    authentik-outpost-media:
      rule: "Host(`media.faviann.com`) && PathPrefix(`/outpost.goauthentik.io`)"
      entryPoints: websecure
      service: authentik
      priority: 1001
      middlewares:
        - sslheader

    authentik-outpost-media-subdomains:
      rule: "HostRegexp(`^[a-z0-9-]+\\.media\\.faviann\\.com$`) && PathPrefix(`/outpost.goauthentik.io`)"
      entryPoints: websecure
      service: authentik
      priority: 1001
      middlewares:
        - sslheader

  services:
    proxmoxve:
      loadBalancer:
        servers:
          - url: "https://proxmox.lan:8006"
    authentik:
      loadBalancer:
        servers:
          - url: "http://auth.faviann.vms:9000"
    noop:
      loadBalancer:
        servers: []

  middlewares:
    sslheader:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: "https"
    local-ip-restriction:
      IPAllowList:
        sourceRange:
          - "127.0.0.1/32"
          - "10.1.0.1/18"
          - "10.0.0.1/24"
          - "10.200.196.1/24"
