---
http:
  # -- Change Router Configuration here...
  routers:


# --- SPECIFIC ROUTERS ---

    traefik:
      rule: "Host(`traefik.local.faviann.com`)"
      entryPoints: websecure
      service: api@internal  # <-- Point to Service Name here...
      priority: 1000
      middlewares:
        - local-ip-restriction
        - forwardAuth-authentik
        
    proxmox:
      rule: "Host(`proxmox.local.faviann.com`)"
      entryPoints: websecure
      service: proxmoxve  # <-- Point to Service Name here...
      priority: 1000
      middlewares:
        - sslheader  # Apply custom header middleware
        - local-ip-restriction

    # TODO REMOVE THIS
    torrent:
      rule: "Host(`bittorrent.faviann.com`)"  # <-- Change Rules here...
      entryPoints: websecure
      service: torrent  # <-- Point to Service Name here...
      priority: 1000
      middlewares:
        - forwardAuth-authentik
    
    authentik:
      rule: "Host(`auth.faviann.com`)"
      entryPoints: websecure
      service: authentik
      priority: 1000
      middlewares:
        - sslheader

    authentik-outpost-admin:
      rule: "Host(`admin.faviann.com`) && PathPrefix(`/outpost.goauthentik.io`)"
      entryPoints: websecure
      service: authentik
      priority: 1001
      middlewares:
        - no-auth
        - sslheader

    dockge:
      rule: "Host(`dockge.local.faviann.com`)"
      entryPoints: websecure
      service: dockge  # <-- Point to Service Name here...
      priority: 1000
      middlewares:
        - local-ip-restriction

  ## -- Change Service Configuration here...
  services:
    proxmoxve:  # <-- Change Service Name here...
      loadBalancer:
        servers:
          - url: "https://proxmox.lan:8006"  # <-- Change Target Service URL here...
    torrent:  # <-- Change Service Name here...
      loadBalancer:
        servers:
          - url: "http://seedbox.faviann.vms:8181"  # <-- Change Target Service URL here...
    authentik:  # <-- Change Service Name here...
      loadBalancer:
        servers:
          - url: "http://auth.faviann.vms:9000"  # <-- Change Target Service URL here...
    dockge:  # <-- Change Service Name here...
      loadBalancer:
        servers:
          - url: "http://frontend.faviann.vms:5001"  # <-- Change Target Service URL here...
    noop:
      loadBalancer:
        servers: []
        
  middlewares:
    sslheader:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: "https"  # Adds the X-Forwarded-Proto header with value 'https'
    local-ip-restriction:
      IPAllowList:
        sourceRange:
          - "127.0.0.1/32"
          - "10.1.0.1/18"
          - "10.0.0.1/24"
          - "10.200.196.1/24"
