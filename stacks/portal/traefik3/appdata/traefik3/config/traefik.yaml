# ---
global:
  checkNewVersion: false
  sendAnonymousUsage: false

# --> (Optional) Change log level and format here ...
#     - level: [TRACE, DEBUG, INFO, WARN, ERROR, FATAL]
log:
  level: INFO # Options: DEBUG, PANIC, FATAL, ERROR (Default), WARN, and INFO
  filePath: /logs/traefik-container.log # Default is to STDOUT
  # format: json # Uses text format (common) by default
  noColor: false # Recommended to be true when using common
  maxSize: 100 # In megabytes
  compress: true # gzip compression when rotating
################################################################
# Access logs - https://doc.traefik.io/traefik/observability/access-logs/
################################################################
accessLog:
  addInternals: true  # things like ping@internal
  filePath: /logs/traefik-access.log # In the Common Log Format (CLF) by default
  bufferingSize: 100 # Number of log lines
  fields:
    names:
      StartUTC: drop  # Write logs in Container Local Time instead of UTC
  filters:
    statusCodes:
      - "204-299"
      - "400-499"
      - "500-599"
# --> (Optional) Enable API and Dashboard here, don't do in production
api:
  dashboard: true
  debug: true
# <--

# -- Change EntryPoints here...
entryPoints:
  web:
    address: ":80"
    # --> (Optional) Redirect all HTTP to HTTPS
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
    # <--
  websecure:
    address: ":443"
    asDefault: true #Makes it the default
    http2:
      maxConcurrentStreams: 250
    http3: {}
    http:
      tls:
        # Generate a wildcard domain certificate
        certResolver: cloudflare
        domains:
          - main: faviann.com
            sans:
              - "*.faviann.com"
              - "*.admin.faviann.com"
              - "*.home.faviann.com"
              - "*.media.faviann.com"
              - "*.public.faviann.com"
#          - main: example2.com # change this to your proxy domain
#            sans:
#              - '*.example2.com' # change this to your proxy domain  

serversTransport:
  insecureSkipVerify: true
              
# -- Configure your CertificateResolver here...
certificatesResolvers:
  cloudflare:
    acme:
      email: "faviann@gmail.com"  # <-- Change this to your email
      storage: /var/traefik/certs/cloudflare-acme.json
      caServer: https://acme-v02.api.letsencrypt.org/directory # prod (default)
      # caServer: https://acme-staging-v02.api.letsencrypt.org/directory # staging
      dnsChallenge:
        provider: cloudflare  # <-- (Optional) Change this to your DNS provider
        resolvers:
          - "1.1.1.1:53"
          - "1.0.0.1:53"
        propagation:
          #disablePropagationCheck: true # uncomment this if you have issues pulling certificates through cloudflare, By setting this flag to true disables the need to wait for the propagation of the TXT record to all authoritative name servers.
          #delayBeforeCheck: 60s # uncomment along with disablePropagationCheck if needed to ensure the TXT record is ready before verification is attempted 

# --> (Optional) Disable TLS Cert verification check
# serversTransport:
#   insecureSkipVerify: true
# <--

providers:
  docker:
    # Default rule dynamically gets DOMAIN from labels
    watch: true
    endpoint: "unix:///run/docker.sock"
    exposedByDefault: false  # <-- (Optional) Change this to true if you want to expose all services
    # Specify discovery network - This ensures correct name resolving and possible issues with containers, that are in multiple networks.
    # E.g. Database container in a separate network and a container in the frontend and database network.
    # network: proxy
    defaultRule: "Host(`{{ index .Labels \"com.docker.compose.project\"}}.{{ index .Labels \"traefik.domain\" | default \"local.faviann.com\" }}`)"
  redis:
    endpoints:
      # assumes a redis link with this service name running on the same
      # docker host as traefik
      - "redis:6379"
  file:
    directory: /etc/traefik/conf.d/
    watch: true
