services:
  traefik-docker-socket-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: traefik-docker-socket-proxy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - CONTAINERS=1
      - EVENTS=1
      - INFO=1
      - NETWORKS=1
      - POST=0
    volumes:
      - /run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik
  traefik:
    image: docker.io/library/traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    depends_on:
      - traefik-docker-socket-proxy
    security_opt:
      - no-new-privileges:true
    networks:
      - shared
      - traefik
    ports:
      - 80:80
      - 443:443/tcp
      - 443:443/udp
    volumes:
      - ./appdata/traefik3/config/traefik.yaml:/etc/traefik/traefik.yaml:ro
      - ./appdata/traefik3/config/conf.d/:/etc/traefik/conf.d/:ro
      - ./appdata/traefik3/data/certs/:/var/traefik/certs/:rw
      - ./appdata/traefik3/logs/:/logs/
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
      - TRAEFIK_DASHBOARD_CREDENTIALS="${TRAEFIK_DASHBOARD_CREDENTIALS}"
  redis:
    image: bitnami/redis:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - 6379:6379
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    networks:
      - shared
networks:
  traefik:
    driver: bridge
  shared:
    external: true #CAREFUL check .env

x-managed-files:
  - path: ./appdata/traefik3/data/certs/cloudflare-acme.json
    mode: "0600"
