services:
  traefik:
    image: docker.io/library/traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    ports:
      - 80:80
      - 443:443/tcp
      - 443:443/udp
    volumes:
      - /run/docker.sock:/run/docker.sock:ro
      - ./appdata/traefik3/config/traefik.yaml:/etc/traefik/traefik.yaml:ro
      - ./appdata/traefik3/config/conf.d/:/etc/traefik/conf.d/:ro
      - ./appdata/traefik3/data/certs/:/var/traefik/certs/:rw
      - ./appdata/traefik3/logs/:/logs/
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN} # <-- Change this to your Cloudflare API Token
      - TRAEFIK_DASHBOARD_CREDENTIALS="${TRAEFIK_DASHBOARD_CREDENTIALS}"
      #labels: 
      #- traefik.enable=true
      #- traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_CREDENTIALS}
      #- "traefik.http.middlewares.test-ipwhitelist.ipwhitelist.sourcerange=127.0.0.1/32, 192.168.1.7"
      #- "traefik.http.routers.traefik-secure.middlewares=traefik-auth"
  redis:
    image: bitnami/redis:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - 6379:6379
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    networks:
      - proxy
networks:
  traefik:
    driver: bridge
  proxy:
    external: true #CAREFUL check .env
