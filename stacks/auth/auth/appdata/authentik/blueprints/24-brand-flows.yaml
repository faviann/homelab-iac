version: 1
metadata:
  name: repo-auth-brand-flows
  labels:
    blueprints.goauthentik.io/instantiate: 'false'
    blueprints.goauthentik.io/description: Managed from ServerManagementScripts
entries:
- id: brand-faviann-com
  model: authentik_brands.brand
  state: present
  identifiers:
    domain: faviann.com
  attrs:
    flow_recovery: !Find [authentik_flows.flow, [slug, recovery]]
    branding_custom_css: |
      /* =======================================================
         AUTHENTIK CSS v2.0 - Glassmorphism + CSS particles
         2026-04-26 - Fresh build, flow-scoped for Authentik
         ======================================================= */

      /* 1. Variables */
      :root {
          --ak-flow-background: transparent;
          --ak-accent: #00e5ff;
          --ak-social-separator-text: "Continuer avec";
      }

      /* 2. PatternFly dark mode */
      :root {
          --pf-global--BackgroundColor--100: #12121e !important;
          --pf-global--BackgroundColor--200: #0d0d18 !important;
          --pf-global--BackgroundColor--300: #1a1a2e !important;
          --pf-global--Color--100: #e8f0ff !important;
          --pf-global--Color--200: #9090b0 !important;
          --pf-global--BorderColor--100: rgba(255, 255, 255, 0.12) !important;
          --pf-global--primary-color--100: #00e5ff !important;
          --pf-global--primary-color--300: #0099bb !important;
          --pf-global--link--Color: #00e5ff !important;
          --pf-global--link--Color--hover: #33eeff !important;
          --pf-global--danger-color--100: #fc8181 !important;
          --pf-global--warning-color--100: #f6ad55 !important;
          --pf-global--success-color--100: #68d391 !important;
          --pf-global--disabled-color--100: #4a4a6a !important;
          color-scheme: dark !important;
      }

      @media (prefers-color-scheme: light) {
          :root {
              --pf-global--BackgroundColor--100: #12121e !important;
              --pf-global--Color--100: #e8f0ff !important;
              color-scheme: dark !important;
          }
      }

      /* 3. Flow background only */
      .pf-c-background-image {
          position: relative;
          overflow: hidden;
          background: #070712 !important;
          background-image: none !important;
      }

      .pf-c-login {
          position: relative;
          isolation: isolate;
          background: transparent !important;
      }

      /* 4. Animated blobs */
      .pf-c-background-image::before {
          content: "";
          position: fixed;
          inset: 0;
          z-index: 0;
          pointer-events: none;
          background:
              radial-gradient(ellipse 55% 45% at 15% 20%, rgba(0, 90, 200, 0.38) 0%, transparent 100%),
              radial-gradient(ellipse 45% 40% at 80% 75%, rgba(0, 200, 230, 0.28) 0%, transparent 100%),
              radial-gradient(ellipse 40% 35% at 82% 18%, rgba(0, 50, 160, 0.22) 0%, transparent 100%);
          filter: blur(60px);
          animation: blobs-drift 20s ease-in-out infinite;
      }

      @keyframes blobs-drift {
          0%, 100% { transform: translate(0, 0) scale(1); }
          25% { transform: translate(4%, 3%) scale(1.04); }
          50% { transform: translate(8%, -2%) scale(0.97); }
          75% { transform: translate(-3%, 5%) scale(1.02); }
      }

      /* 5. Star layers - all attached to flow-only elements */
      .pf-c-background-image::after,
      .pf-c-login::before,
      .pf-c-login::after {
          content: "";
          position: fixed;
          top: 0;
          left: 0;
          pointer-events: none;
          border-radius: 50%;
      }

      .pf-c-background-image::after {
          width: 1px;
          height: 1px;
          z-index: 1;
          background: rgba(180, 220, 255, 0.9);
          box-shadow:
              243px 654px rgba(180, 220, 255, 0.35), 243px 1734px rgba(180, 220, 255, 0.35), 1048px 210px rgba(180, 220, 255, 0.48), 1048px 1290px rgba(180, 220, 255, 0.48),
              1832px 861px rgba(180, 220, 255, 0.45), 1832px 1941px rgba(180, 220, 255, 0.45), 1121px 1005px rgba(180, 220, 255, 0.44), 1121px 2085px rgba(180, 220, 255, 0.44),
              1201px 903px rgba(180, 220, 255, 0.26), 1201px 1983px rgba(180, 220, 255, 0.26), 1257px 165px rgba(180, 220, 255, 0.22), 1257px 1245px rgba(180, 220, 255, 0.22),
              1672px 200px rgba(180, 220, 255, 0.33), 1672px 1280px rgba(180, 220, 255, 0.33), 1668px 1004px rgba(180, 220, 255, 0.41), 1668px 2084px rgba(180, 220, 255, 0.41),
              430px 813px rgba(180, 220, 255, 0.27), 430px 1893px rgba(180, 220, 255, 0.27), 1903px 730px rgba(180, 220, 255, 0.45), 1903px 1810px rgba(180, 220, 255, 0.45),
              1527px 1051px rgba(180, 220, 255, 0.4), 1527px 2131px rgba(180, 220, 255, 0.4), 1480px 697px rgba(180, 220, 255, 0.21), 1480px 1777px rgba(180, 220, 255, 0.21),
              1101px 598px rgba(180, 220, 255, 0.28), 1101px 1678px rgba(180, 220, 255, 0.28), 288px 632px rgba(180, 220, 255, 0.19), 288px 1712px rgba(180, 220, 255, 0.19),
              1455px 755px rgba(180, 220, 255, 0.3), 1455px 1835px rgba(180, 220, 255, 0.3), 864px 185px rgba(180, 220, 255, 0.32), 864px 1265px rgba(180, 220, 255, 0.32),
              1199px 1020px rgba(180, 220, 255, 0.47), 1199px 2100px rgba(180, 220, 255, 0.47), 871px 1037px rgba(180, 220, 255, 0.45), 871px 2117px rgba(180, 220, 255, 0.45),
              1775px 1005px rgba(180, 220, 255, 0.32), 1775px 2085px rgba(180, 220, 255, 0.32), 1074px 529px rgba(180, 220, 255, 0.47), 1074px 1609px rgba(180, 220, 255, 0.47),
              1155px 981px rgba(180, 220, 255, 0.35), 1155px 2061px rgba(180, 220, 255, 0.35), 1648px 51px rgba(180, 220, 255, 0.38), 1648px 1131px rgba(180, 220, 255, 0.38),
              1568px 264px rgba(180, 220, 255, 0.46), 1568px 1344px rgba(180, 220, 255, 0.46), 1443px 1071px rgba(180, 220, 255, 0.48), 1443px 2151px rgba(180, 220, 255, 0.48),
              210px 879px rgba(180, 220, 255, 0.34), 210px 1959px rgba(180, 220, 255, 0.34), 987px 468px rgba(180, 220, 255, 0.47), 987px 1548px rgba(180, 220, 255, 0.47),
              249px 935px rgba(180, 220, 255, 0.41), 249px 2015px rgba(180, 220, 255, 0.41), 1463px 514px rgba(180, 220, 255, 0.37), 1463px 1594px rgba(180, 220, 255, 0.37),
              1371px 630px rgba(180, 220, 255, 0.37), 1371px 1710px rgba(180, 220, 255, 0.37), 1324px 1027px rgba(180, 220, 255, 0.42), 1324px 2107px rgba(180, 220, 255, 0.42);
          animation: stars-rise-slow 90s linear infinite;
      }

      .pf-c-login::before {
          width: 1.5px;
          height: 1.5px;
          z-index: 2;
          background: rgba(180, 220, 255, 0.9);
          box-shadow:
              1058px 282px rgba(180, 220, 255, 0.34), 1058px 1362px rgba(180, 220, 255, 0.34), 1729px 380px rgba(180, 220, 255, 0.42), 1729px 1460px rgba(180, 220, 255, 0.42),
              871px 848px rgba(180, 220, 255, 0.6), 871px 1928px rgba(180, 220, 255, 0.6), 784px 624px rgba(180, 220, 255, 0.35), 784px 1704px rgba(180, 220, 255, 0.35),
              357px 539px rgba(180, 220, 255, 0.45), 357px 1619px rgba(180, 220, 255, 0.45), 1597px 851px rgba(180, 220, 255, 0.39), 1597px 1931px rgba(180, 220, 255, 0.39),
              362px 667px rgba(180, 220, 255, 0.47), 362px 1747px rgba(180, 220, 255, 0.47), 910px 245px rgba(180, 220, 255, 0.48), 910px 1325px rgba(180, 220, 255, 0.48),
              1074px 560px rgba(180, 220, 255, 0.58), 1074px 1640px rgba(180, 220, 255, 0.58), 1736px 438px rgba(180, 220, 255, 0.37), 1736px 1518px rgba(180, 220, 255, 0.37),
              190px 930px rgba(180, 220, 255, 0.52), 190px 2010px rgba(180, 220, 255, 0.52), 835px 373px rgba(180, 220, 255, 0.64), 835px 1453px rgba(180, 220, 255, 0.64),
              720px 321px rgba(180, 220, 255, 0.41), 720px 1401px rgba(180, 220, 255, 0.41), 1407px 443px rgba(180, 220, 255, 0.32), 1407px 1523px rgba(180, 220, 255, 0.32),
              1466px 574px rgba(180, 220, 255, 0.49), 1466px 1654px rgba(180, 220, 255, 0.49);
          animation: stars-rise-medium 65s linear infinite;
      }

      .pf-c-login::after {
          width: 2px;
          height: 2px;
          z-index: 3;
          background: rgba(180, 220, 255, 0.9);
          box-shadow:
              647px 441px rgba(180, 220, 255, 0.6), 647px 1521px rgba(180, 220, 255, 0.6), 872px 244px rgba(180, 220, 255, 0.63), 872px 1324px rgba(180, 220, 255, 0.63),
              1763px 1026px rgba(180, 220, 255, 0.63), 1763px 2106px rgba(180, 220, 255, 0.63), 1891px 515px rgba(180, 220, 255, 0.52), 1891px 1595px rgba(180, 220, 255, 0.52),
              1672px 729px rgba(180, 220, 255, 0.4), 1672px 1809px rgba(180, 220, 255, 0.4), 1464px 894px rgba(180, 220, 255, 0.71), 1464px 1974px rgba(180, 220, 255, 0.71),
              576px 676px rgba(180, 220, 255, 0.49), 576px 1756px rgba(180, 220, 255, 0.49), 1575px 250px rgba(180, 220, 255, 0.49), 1575px 1330px rgba(180, 220, 255, 0.49),
              853px 653px rgba(180, 220, 255, 0.6), 853px 1733px rgba(180, 220, 255, 0.6), 41px 701px rgba(180, 220, 255, 0.45), 41px 1781px rgba(180, 220, 255, 0.45);
          animation: stars-rise-fast 45s linear infinite;
      }

      @keyframes stars-rise-slow {
          from { transform: translateY(0); }
          to { transform: translateY(-1080px); }
      }

      @keyframes stars-rise-medium {
          from { transform: translateY(0); }
          to { transform: translateY(-1080px); }
      }

      @keyframes stars-rise-fast {
          from { transform: translateY(0); }
          to { transform: translateY(-1080px); }
      }

      /* 6. Card and content */
      .pf-c-login__container,
      .pf-c-login__main,
      .pf-c-login__main-header,
      .pf-c-login__main-body,
      .pf-c-login__main-footer {
          position: relative;
          z-index: 10;
      }

      .pf-c-login__main {
          background: rgba(255, 255, 255, 0.06) !important;
          backdrop-filter: blur(20px) saturate(150%) !important;
          -webkit-backdrop-filter: blur(20px) saturate(150%) !important;
          border: 1px solid rgba(255, 255, 255, 0.12) !important;
          border-radius: 20px !important;
          box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.05) !important;
      }

      .pf-c-login__main-header,
      .pf-c-login__main-body,
      .pf-c-login__main-footer,
      .pf-c-form__label,
      .pf-c-login__main-footer-band,
      .pf-c-login__main-footer-band-item,
      .pf-c-title,
      .pf-c-form__helper-text,
      .pf-c-content,
      .pf-c-login__main-body p {
          color: #dbe7ff !important;
      }

      /* 7. Inputs */
      .pf-c-form-control,
      :host .pf-c-form-control {
          background: rgba(255, 255, 255, 0.06) !important;
          border: 1px solid rgba(255, 255, 255, 0.12) !important;
          border-radius: 10px !important;
          color: #e8f0ff !important;
      }

      .pf-c-form-control::placeholder,
      :host .pf-c-form-control::placeholder {
          color: #9fb0d9 !important;
      }

      .pf-c-form-control:focus,
      :host .pf-c-form-control:focus {
          border-color: rgba(0, 229, 255, 0.5) !important;
          box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.1) !important;
          outline: none !important;
      }

      /* 8. Buttons */
      :host(ak-stage-identification) .pf-c-button.pf-m-primary,
      :host(ak-stage-password) .pf-c-button.pf-m-primary {
          background: rgba(0, 229, 255, 0.15) !important;
          border: 1px solid rgba(0, 229, 255, 0.4) !important;
          color: #ffffff !important;
          border-radius: 12px !important;
          font-weight: 600 !important;
          box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18) !important;
          transition: background 0.25s ease, border-color 0.25s ease, transform 0.25s ease !important;
      }

      :host(ak-stage-identification) .pf-c-button.pf-m-primary:hover,
      :host(ak-stage-password) .pf-c-button.pf-m-primary:hover {
          background: rgba(0, 229, 255, 0.25) !important;
          border-color: rgba(0, 229, 255, 0.6) !important;
          transform: translateY(-1px) !important;
      }

      :host(ak-stage-user-login) .pf-c-button.pf-m-primary,
      :host(ak-stage-user-login) .pf-c-button.pf-m-secondary,
      :host(ak-stage-authenticator-totp) .pf-c-button.pf-m-secondary {
          background: rgba(255, 255, 255, 0.08) !important;
          border: 1px solid rgba(255, 255, 255, 0.18) !important;
          color: #ffffff !important;
          border-radius: 12px !important;
          font-weight: 500 !important;
          transition: background 0.25s ease, border-color 0.25s ease, transform 0.25s ease !important;
      }

      :host(ak-stage-user-login) .pf-c-button:hover,
      :host(ak-stage-authenticator-totp) .pf-c-button.pf-m-secondary:hover {
          background: rgba(255, 255, 255, 0.16) !important;
          border-color: rgba(255, 255, 255, 0.3) !important;
          transform: translateY(-1px) !important;
      }

      /* 9. TOTP QR */
      :host(ak-stage-authenticator-totp) .qr-container {
          display: flex !important;
          flex-direction: column !important;
          align-items: center !important;
      }

      :host(ak-stage-authenticator-totp) qr-code {
          width: 150px !important;
          height: 150px !important;
          max-width: 150px !important;
          background: #ffffff !important;
          border-radius: 12px !important;
          overflow: hidden !important;
          display: flex !important;
          align-items: center !important;
          justify-content: center !important;
      }

      :host(ak-stage-authenticator-totp) qr-code svg {
          width: 100% !important;
          height: 100% !important;
      }
