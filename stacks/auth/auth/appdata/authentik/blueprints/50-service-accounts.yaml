version: 1
metadata:
  name: repo-auth-service-accounts
  labels:
    blueprints.goauthentik.io/instantiate: 'false'
    blueprints.goauthentik.io/description: Managed from ServerManagementScripts
entries:
- model: authentik_core.user
  state: present
  identifiers:
    username: ldapservice
  attrs:
    username: ldapservice
    type: service_account
    is_active: true
    groups:
    - !Find [authentik_core.group, [name, ldapsearch]]
    - !Find [authentik_core.group, [name, media]]
