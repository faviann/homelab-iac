[defaults]
inventory = inventory/hosts.yml
roles_path = playbooks/roles:.ansible/roles
collections_path = collections
filter_plugins = playbooks/filter_plugins
library = library
host_key_checking = False
retry_files_enabled = False
timeout = 30
stdout_callback = ansible.builtin.default
result_format = yaml
deprecation_warnings = False
bin_ansible_callbacks = True
interpreter_python = auto_silent
fact_caching = jsonfile
fact_caching_connection = .ansible/cache
fact_caching_timeout = 3600
local_tmp = .ansible/tmp
vault_password_file = ~/.ansible/vault-pass

[privilege_escalation]
# become = True  # Disabled globally - enable per-task/play as needed
become_method = sudo

[ssh_connection]
pipelining = True
control_path = .ansible/cp/%%h-%%p-%%r
ssh_args = -o IdentitiesOnly=yes
private_key_file = .ansible/ssh/proxmox_lxc
