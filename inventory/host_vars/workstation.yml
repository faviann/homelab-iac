---
# Host-specific configuration for the workstation LXC
# Inherits from: tier_large, cap_docker

lxc_hwaddr: "BC:24:11:57:80:06"
workstation_enabled: true
# Persist selected workstation home paths across intentional LXC rebuilds.
workstation_persistent_home_enabled: true

docker_agents_enabled: false
traefik_kop_enabled: false

# Container definition for proxmox_lxc_provision role
proxmox_lxc_overrides:
  vmid: 306
  hostname: workstation
  cores: 16
  memory: 32768
  disk: "128"
  description: "Persistent remote coding workstation managed via Ansible"
  tags:
    - ansible
    - workstation
    - development
