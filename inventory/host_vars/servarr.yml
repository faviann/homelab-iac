---
# Host-specific configuration for the Servarr services host
# Inherits from: tier_medium, cap_docker

default_domain: admin.faviann.com
lxc_hwaddr: "BC:24:11:77:E5:FC"

# External Docker networks required by compose stacks
lxc_docker_env_external_networks:
  - servarr-internal

lxc_docker_env_host_directories:
  - path: /data/media/movies/en
  - path: /data/media/movies/fr
  - path: /data/media/movies/foreign
  - path: /data/media/movies/anime
  - path: /data/media/tv/en
  - path: /data/media/tv/fr
  - path: /data/media/tv/asian
  - path: /data/media/tv/foreign
  - path: /data/media/tv/anime

# Komf stack secrets (resolved from vault)
lxc_docker_env_stack_vars:
  komf:
    komga_user: "{{ vault_servarr_komf_komga_user }}"
    komga_password: "{{ vault_servarr_komf_komga_password }}"

# Container definition for proxmox_lxc_provision role
# NOTE: Confirm vmid matches the existing Proxmox container if already created.
proxmox_lxc_overrides:
  vmid: 303
  hostname: servarr
  disk: "16"
  ostemplate: "local:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst"
  description: "Servarr services host managed via Ansible"
  tags:
    - ansible
    - media
    - services
