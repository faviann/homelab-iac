---
# Host-specific configuration for the Overmind memory service
# Inherits from: tier_small, cap_docker

lxc_hwaddr: "BC:24:11:0B:3D:9D"
default_domain: admin.faviann.com

docker_agents_enabled: false
traefik_kop_enabled: false

lxc_docker_env_host_directories:
  - path: /data/overmind/postgres/pgdata
    owner: "999"
    group: "999"
    mode: "0700"

proxmox_lxc_host_directories:
  - path: /tank/overmind
    owner: "100000"
    group: "100000"
    mode: "0755"
  - path: /tank/backups/overmind
    owner: "100000"
    group: "100000"
    mode: "0700"

lxc_docker_env_path_ownership_overrides:
  - path: /data/overmind/postgres/pgdata
    owner: "999"
    group: "999"
    recurse: false

lxc_docker_env_stack_vars:
  overmind:
    overmind_version: "1.0.0"
    postgres_admin_password: "{{ vault_overmind_postgres_password }}"
    memsrv_password: "{{ vault_overmind_memsrv_password }}"
    agent_key: "{{ vault_overmind_homelab_dev_agent_key }}"

overmind_postgres_backup_enabled: true
overmind_postgres_backup:
  container_name: overmind-postgres
  admin_user: postgres
  admin_password: "{{ vault_overmind_postgres_password }}"
  database: memory
  backup_dir: /backups/overmind
  retention_count: 14
  freshness_max_age_seconds: 172800
  discord_webhook_url: "{{ vault_overmind_backup_discord_webhook_url }}"
  timer_calendar: "*-*-* 03:25:00"
  randomized_delay_seconds: "30m"

proxmox_lxc_bind_mounts_overrides:
  mp3: "/tank/overmind,mp=/data/overmind"
  mp4: "/tank/backups/overmind,mp=/backups/overmind"

# Container definition for proxmox_lxc_provision role
proxmox_lxc_overrides:
  vmid: 307
  hostname: overmind
  description: "Overmind memory service managed via Ansible"
  tags:
    - ansible
    - overmind
    - memory
