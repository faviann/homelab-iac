---
# Host-specific configuration for the download and seeding service
# Inherits from: tier_large, cap_docker

default_domain: admin.faviann.com

lxc_hwaddr: "BC:24:11:6D:2E:7E"

lxc_docker_env_stack_vars:
  bittorrent:
    wireguard_private_key: "{{ vault_seedbox_wireguard_private_key }}"
    wireguard_preshared_key: "{{ vault_seedbox_wireguard_preshared_key }}"
    wireguard_address: "{{ vault_seedbox_wireguard_address }}"
    qbit_username: "{{ vault_seedbox_qbit_username }}"
    qbit_password: "{{ vault_seedbox_qbit_password }}"
    ws_username: "{{ vault_seedbox_ws_username }}"
    ws_password: "{{ vault_seedbox_ws_password }}"
    ws_session_cookie: "{{ vault_seedbox_ws_session_cookie }}"

# Container definition for proxmox_lxc_provision role
proxmox_lxc_overrides:
  vmid: 302
  hostname: seedbox
  description: "Download and seeding service managed via Ansible"
  tags:
    - ansible
    - download
    - tunneled
