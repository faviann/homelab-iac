---
# Host-specific configuration for the public service
# Inherits from: tier_large, cap_docker

lxc_hwaddr: "BC:24:11:D4:52:3F"
default_domain: public.faviann.com

lxc_docker_env_stack_vars:
  storyteller:
    secret_key: "{{ vault_public_storyteller_secret_key }}"
  mealie:
    smtp_password: "{{ vault_public_mealie_smtp_password }}"
  readmeabook:
    jwt_secret: "{{ vault_public_readmeabook_jwt_secret | default('REPLACE_ME', true) }}"
    jwt_refresh_secret: "{{ vault_public_readmeabook_jwt_refresh_secret | default('REPLACE_ME', true) }}"
    config_encryption_key: "{{ vault_public_readmeabook_config_encryption_key | default('REPLACE_ME', true) }}"
    postgres_password: "{{ vault_public_readmeabook_postgres_password | default('REPLACE_ME', true) }}"
  romm:
    db_passwd: "{{ vault_public_romm_db_passwd }}"
    db_root_passwd: "{{ vault_public_romm_db_root_passwd }}"
    auth_secret_key: "{{ vault_public_romm_auth_secret_key }}"
    oidc_client_secret: "{{ vault_public_romm_oidc_client_secret }}"
    igdb_client_id: "{{ vault_public_romm_igdb_client_id }}"
    igdb_client_secret: "{{ vault_public_romm_igdb_client_secret }}"
    retroachievements_api_key: "{{ vault_public_romm_retroachievements_api_key }}"
    steamgriddb_api_key: "{{ vault_public_romm_steamgriddb_api_key }}"
  music:
    authentik_token: "{{ vault_authentik_reconciler_token }}"
    navidrome_automation_password: "{{ vault_navidrome_automation_password }}"
  immich:
    db_password: "{{ vault_public_immich_db_password }}"

lxc_docker_env_path_ownership_overrides:
  - path: "/shared/{{ inventory_hostname }}/stacks/romm/appdata/db"
    owner: '999'
    group: '999'
    recurse: true
  - path: "/shared/{{ inventory_hostname }}/stacks/immich/appdata/pgdata"
    owner: '999'
    group: '999'
    recurse: true
  - path: "/shared/{{ inventory_hostname }}/stacks/readmeabook/appdata/pgdata"
    owner: '102'
    group: '1000'
    recurse: true

# Container definition for proxmox_lxc_provision role
proxmox_lxc_overrides:
  vmid: 305
  hostname: public
  disk: "16"
  description: "Public service managed via Ansible"
  tags:
    - ansible
    - public
    - web
    - gpu
