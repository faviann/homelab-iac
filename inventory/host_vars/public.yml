---
# Host-specific configuration for the public service
# Inherits from: tier_large, cap_docker

lxc_hwaddr: "BC:24:11:D4:52:3F"
default_domain: public.faviann.com

lxc_docker_env_external_networks:
  - proxy

lxc_docker_env_path_ownership_overrides:
  - path: "/shared/{{ inventory_hostname }}/stacks/romm/appdata/db"
    owner: '999'
    group: '999'
    recurse: true

# Mealie stack secrets (resolved from vault)
public_mealie_smtp_password: "{{ vault_public_mealie_smtp_password }}"
public_authentik_reconciler_token: "{{ vault_authentik_reconciler_token }}"
public_navidrome_automation_password: "{{ vault_navidrome_automation_password }}"

# RomM stack secrets (resolved from vault)
public_romm_db_passwd: "{{ vault_public_romm_db_passwd }}"
public_romm_db_root_passwd: "{{ vault_public_romm_db_root_passwd }}"
public_romm_auth_secret_key: "{{ vault_public_romm_auth_secret_key }}"
public_romm_oidc_client_secret: "{{ vault_public_romm_oidc_client_secret }}"
public_romm_igdb_client_id: "{{ vault_public_romm_igdb_client_id }}"
public_romm_igdb_client_secret: "{{ vault_public_romm_igdb_client_secret }}"
public_romm_retroachievements_api_key: "{{ vault_public_romm_retroachievements_api_key }}"
public_romm_steamgriddb_api_key: "{{ vault_public_romm_steamgriddb_api_key }}"

# Container definition for proxmox_lxc_provision role
proxmox_lxc_overrides:
  vmid: 305
  hostname: public
  description: "Public service managed via Ansible"
  tags:
    - ansible
    - public
    - web
