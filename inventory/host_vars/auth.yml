---
# Host-specific configuration for the auth service
# Inherits from: tier_small, cap_docker

lxc_hwaddr: "BC:24:11:18:EE:67"
default_domain: faviann.com

# Notifiarr integration
auth_notifiarr_webhook_url: "{{ vault_notifiarr_authentik_webhook_url }}"
auth_discord_approval_webhook_url: "{{ vault_authentik_discord_approval_webhook_url }}"
auth_romm_oidc_client_secret: "{{ vault_public_romm_oidc_client_secret }}"
auth_romm_oidc_signing_certificate_name: "authentik Self-signed Certificate"

# External Docker networks required by compose stacks
lxc_docker_env_external_networks:
  - proxy

lxc_docker_env_path_ownership_overrides:
  - path: "/shared/{{ inventory_hostname }}/stacks/auth/appdata/database"
    owner: '70'
    group: '70'
    recurse: true

# Container definition for proxmox_lxc_provision role
proxmox_lxc_overrides:
  vmid: 301
  hostname: auth
  description: "Auth service managed via Ansible"
  tags:
    - ansible
    - auth
    - security
