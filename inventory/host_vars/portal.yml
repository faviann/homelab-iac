---
# Host-specific configuration for the portal service
# Inherits from: tier_medium, cap_docker

portal_instance: true
default_domain: faviann.com
traefik_kop_enabled: false
lxc_hwaddr: "BC:24:11:BA:09:16"

lxc_docker_env_stack_vars:
  dockhand:
    encryption_key: "{{ vault_portal_dockhand_encryption_key }}"
  traefik3:
    cloudflare_dns_api_token: "{{ vault_portal_traefik_cloudflare_dns_api_token }}"
    dashboard_credentials: "{{ vault_portal_traefik_dashboard_credentials }}"

dockhand_discord_webhook_url: "{{ vault_dockhand_discord_webhook_url }}"

# External Docker networks required by compose stacks
lxc_docker_env_external_networks:
  - shared

# Container definition for proxmox_lxc_provision role
proxmox_lxc_overrides:
  vmid: 300
  hostname: portal
  description: "Portal service managed via Ansible"
  tags:
    - ansible
    - portal
    - web
