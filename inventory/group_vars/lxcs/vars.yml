---
# Shared defaults for all LXC containers managed by Ansible.
# Individual hosts override values via proxmox_lxc_overrides in host_vars.

# Dynamically build ansible_host from inventory hostname + DNS suffix
# This assumes DNS resolves {hostname}.faviann.vms for all LXC containers
ansible_host: "{{ inventory_hostname }}.faviann.vms"

# SSH connection settings for LXC containers
ansible_user: root
ansible_connection: ssh

proxmox_lxc_group_defaults: {}

lxc_ssh_user: faviann
lxc_ssh_uid: 1000
lxc_ssh_gid: 1000
lxc_github_users:
  - faviann
