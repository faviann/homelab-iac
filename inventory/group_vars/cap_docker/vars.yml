---
# Capability group: Docker runtime support
# Enables Docker and related tooling inside the container.

# Feature flag for Docker capability
docker_enabled: true

# Docker will be installed automatically by lxc_internal_setup role using geerlingguy.docker
install_docker: true

# LXC features required by Docker.
# These flow through the spec layer merge so hosts can override them explicitly.
proxmox_lxc_capability_defaults:
  features:
    - nesting=1
    - keyctl=1

# Docker user identity — canonical source for lxc_docker_runtime and lxc_docker_environment roles.
# Override in host_vars/{host}.yml if a specific host needs a different Docker user.
docker_user: faviann
docker_uid: 1000
docker_gid: 1000

# Universal Docker agents managed stack
docker_agents_enabled: true
traefik_kop_enabled: true
dockhand_hawser_token: "{{ vault_dockhand_hawser_token }}"
dockhand_hawser_stacks_dir: "/conf/docker/dockhand-stacks"

# Homepage Docker discovery proxy
homepage_docker_proxy_port: 2375

# Default location for compose projects (override per host as needed)
docker_compose_base_path: /conf/docker
