---
# ==============================================================================
# Proxmox API Connection Settings
# ==============================================================================
lxc_dns_domain: "faviann.vms"

proxmox_api_host: "proxmox.lan"
proxmox_api_port: 8006
proxmox_api_user: "{{ vault_proxmox_api_user }}"
proxmox_api_token_id: "{{ vault_proxmox_api_token_id }}"
proxmox_api_token_secret: "{{ vault_proxmox_api_token_secret }}"
proxmox_verify_ssl: false

# ==============================================================================
# Default LXC Provisioning Settings
# ==============================================================================
proxmox_default_node: "proxmox"
proxmox_default_pool: "ansible_pool"
proxmox_default_storage: "local-zfs"  # Storage for container root disks
proxmox_default_ostemplate: "local:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst"

# ==============================================================================
# Shared Storage Configuration
# The shared volume is mounted to all containers via config file (not mount_volumes)
# because the volume is owned by container 200 and shared across containers
# ==============================================================================
proxmox_shared_volume_path: "local-zfs:subvol-200-disk-1"
proxmox_shared_mount_point: "/shared"

# Bind mounts requiring config file editing (API restriction)
# mp0 is the shared volume from container 200
proxmox_default_bind_mounts:
  mp0: "{{ proxmox_shared_volume_path }},mp={{ proxmox_shared_mount_point }},size=256G"
  mp1: "/conf,mp=/conf,ro=1"
  mp2: "/ephemeral,mp=/ephemeral"
  mp3: "/tank,mp=/data"

# ==============================================================================
# UID/GID Mapping for Unprivileged Containers
# ==============================================================================
proxmox_default_idmap:
  - "u 0 100000 1000"
  - "g 0 100000 1000"
  - "u 1000 1001 1"
  - "g 1000 1001 1"
  - "u 1001 101001 64535"
  - "g 1001 101001 64535"

# ==============================================================================
# Global LXC Container Defaults
# ==============================================================================
proxmox_lxc_global_defaults:
  state: present
  update: false
  unprivileged: true
  onboot: true
  start_on_create: true  # Start containers after creation to enable SSH access
  pool: "{{ proxmox_default_pool }}"
  ostemplate: "{{ proxmox_default_ostemplate }}"
  node: "{{ proxmox_default_node }}"
  tags:
    - ansible

# ==============================================================================
# Host Configuration Settings
# ==============================================================================
proxmox_lxc_host_config_enabled: true
# Delegation variables for different operation types:
# - API calls (community.proxmox modules): delegate to localhost (where API client runs)
# - pct commands (host-side operations): delegate to Proxmox host directly
proxmox_api_delegate_host: localhost
proxmox_pct_delegate_host: "{{ proxmox_api_host }}"
proxmox_host_delegate_user: root

# ==============================================================================
# Validation Settings
# ==============================================================================
# Strict validation mode: if true, abort entire playbook when VMID/name mismatches
# are detected. If false (default), skip conflicting hosts and continue with others.
# Name matching is strict and exact (no FQDN normalization).
proxmox_validation_strict: false

# Rebuild running containers when the guest Debian major release does not match
# the desired release derived from the ostemplate. Stopped containers are only
# reported, never auto-destroyed.
proxmox_lxc_rebuild_on_release_mismatch: false

# ==============================================================================
# SSH Connection Settings for Proxmox Host
# ==============================================================================
# Use the custom SSH key generated by control_node_bootstrap (project-relative)
ansible_ssh_private_key_file: ".ansible/ssh/proxmox_lxc"
ansible_ssh_common_args: '-o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new'
